<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Option 5 - Illuminated | Poetry بالعربي</title>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-primary: #120f08;
      --bg-secondary: #1a1610;
      --bg-card: #221d14;
      --text-primary: #e8dcc8;
      --text-secondary: #a09882;
      --border-color: #3a3328;
      --gold: #c5a059;
      --gold-light: #e8d5a3;
      --gold-dark: #8a6e2f;
      --warm-glow: rgba(197, 160, 89, 0.06);
      --frame-width: 3px;
    }

    [data-theme="light"] {
      --bg-primary: #faf5e8;
      --bg-secondary: #f0e8d4;
      --bg-card: #fff9ec;
      --text-primary: #2a2015;
      --text-secondary: #6a5f48;
      --border-color: #d5c8a8;
      --warm-glow: rgba(197, 160, 89, 0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .brand {
      display: flex;
      align-items: flex-end;
      gap: 0.35em;
    }

    .brand-en {
      font-family: 'Forum', cursive;
      text-transform: lowercase;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--gold-light);
    }

    .brand-ar {
      font-family: 'Reem Kufi', sans-serif;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      direction: rtl;
    }

    /* Gold ornamental frame */
    .ornate-frame {
      position: relative;
      padding: 2.5rem 3rem;
      background: var(--warm-glow);
    }

    .ornate-frame::before,
    .ornate-frame::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .ornate-frame::before {
      border: var(--frame-width) solid var(--gold);
      opacity: 0.5;
    }

    .ornate-frame::after {
      border: 1px solid var(--gold);
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      opacity: 0.3;
    }

    /* Corner ornaments */
    .ornate-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      z-index: 1;
    }

    .ornate-corner--tl {
      top: -2px;
      left: -2px;
      border-top: var(--frame-width) solid var(--gold);
      border-left: var(--frame-width) solid var(--gold);
    }

    .ornate-corner--tr {
      top: -2px;
      right: -2px;
      border-top: var(--frame-width) solid var(--gold);
      border-right: var(--frame-width) solid var(--gold);
    }

    .ornate-corner--bl {
      bottom: -2px;
      left: -2px;
      border-bottom: var(--frame-width) solid var(--gold);
      border-left: var(--frame-width) solid var(--gold);
    }

    .ornate-corner--br {
      bottom: -2px;
      right: -2px;
      border-bottom: var(--frame-width) solid var(--gold);
      border-right: var(--frame-width) solid var(--gold);
    }

    /* Parchment glow */
    .parchment-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300%;
      height: 300%;
      background: radial-gradient(ellipse, var(--warm-glow) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    /* Hero context */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    .hero .parchment-glow {
      background: radial-gradient(ellipse, rgba(197, 160, 89, 0.08) 0%, transparent 50%);
    }

    .hero .brand {
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .hero .brand-en {
      font-size: clamp(3rem, 6vw, 4.5rem);
    }

    .hero .brand-ar {
      font-size: clamp(1.875rem, 4vw, 3rem);
    }

    .hero .brand-icon {
      width: clamp(1.5rem, 3vw, 2.25rem);
      height: clamp(1.5rem, 3vw, 2.25rem);
      color: var(--gold);
      margin-bottom: 0.15em;
    }

    .hero-label {
      margin-top: 2rem;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      position: relative;
      z-index: 1;
    }

    /* Gold divider */
    .gold-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 0;
    }

    .gold-divider-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .gold-divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.6;
    }

    /* Section layout */
    .section {
      padding: 3rem 1.5rem;
      border-top: 1px solid var(--border-color);
    }

    /* Nav context */
    .nav-demo {
      background: var(--bg-secondary);
      border: 1px solid var(--gold);
      border-radius: 0;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      opacity: 0.9;
    }

    .nav-demo::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      right: 3px;
      bottom: 3px;
      border: 1px solid var(--gold);
      opacity: 0.2;
      pointer-events: none;
    }

    .nav-demo .brand-en {
      font-size: 1.25rem;
    }

    .nav-demo .brand-ar {
      font-size: 0.875rem;
    }

    .nav-demo .brand-icon {
      width: 0.875rem;
      height: 0.875rem;
      color: var(--gold);
      margin-bottom: 0.1em;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .nav-link {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-decoration: none;
    }

    /* Card context */
    .card-demo {
      max-width: 360px;
      margin: 0 auto;
    }

    .card-inner {
      background: var(--bg-card);
      position: relative;
      padding: 2rem;
    }

    .card-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 2px solid var(--gold);
      opacity: 0.4;
    }

    .card-inner::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border: 1px solid var(--gold);
      opacity: 0.2;
      pointer-events: none;
    }

    .card-inner .brand {
      margin-bottom: 1.25rem;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .card-inner .brand-en {
      font-size: 1.5rem;
    }

    .card-inner .brand-ar {
      font-size: 1.05rem;
    }

    .card-inner .brand-icon {
      width: 1rem;
      height: 1rem;
      color: var(--gold);
      margin-bottom: 0.1em;
    }

    .card-poem {
      font-family: 'Amiri', serif;
      font-size: 1.125rem;
      line-height: 2;
      color: var(--text-primary);
      direction: rtl;
      text-align: center;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }

    .card-poet {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.8125rem;
      color: var(--gold);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 48px;
      height: 48px;
      border-radius: 0;
      border: 1px solid var(--gold);
      background: var(--bg-secondary);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background 0.3s ease;
    }

    .theme-toggle:hover {
      background: var(--bg-card);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Context labels */
    .context-badge {
      display: inline-block;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 0;
      padding: 0.2em 0.6em;
      margin-bottom: 1rem;
    }

    /* Icon visibility for theme toggle */
    .icon-sun, .icon-moon {
      display: none;
    }

    [data-mode="dark"] .icon-sun {
      display: block;
    }

    [data-mode="light"] .icon-moon {
      display: block;
    }
  </style>
</head>
<body data-mode="dark">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="icon-sun"><i data-lucide="sun"></i></span>
    <span class="icon-moon"><i data-lucide="moon"></i></span>
  </button>

  <!-- Hero Context -->
  <section class="hero">
    <div class="parchment-glow"></div>
    <div class="ornate-frame">
      <span class="ornate-corner ornate-corner--tl"></span>
      <span class="ornate-corner ornate-corner--tr"></span>
      <span class="ornate-corner ornate-corner--bl"></span>
      <span class="ornate-corner ornate-corner--br"></span>
      <div class="brand">
        <i data-lucide="sparkles" class="brand-icon"></i>
        <span class="brand-en">poetry</span>
        <span class="brand-ar" dir="rtl" lang="ar">بالعربي</span>
      </div>
    </div>
    <div class="gold-divider">
      <span class="gold-divider-line"></span>
      <span class="gold-divider-diamond"></span>
      <span class="gold-divider-line"></span>
    </div>
    <p class="hero-label">Option 5 -- Illuminated</p>
  </section>

  <!-- Nav Context -->
  <section class="section">
    <span class="context-badge">Navigation</span>
    <div class="nav-demo">
      <div class="brand">
        <i data-lucide="sparkles" class="brand-icon"></i>
        <span class="brand-en">poetry</span>
        <span class="brand-ar" dir="rtl" lang="ar">بالعربي</span>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-link">Discover</a>
        <a href="#" class="nav-link">Poets</a>
      </nav>
    </div>
  </section>

  <!-- Card Context -->
  <section class="section">
    <span class="context-badge">Card</span>
    <div class="card-demo">
      <div class="card-inner">
        <div class="brand">
          <i data-lucide="sparkles" class="brand-icon"></i>
          <span class="brand-en">poetry</span>
          <span class="brand-ar" dir="rtl" lang="ar">بالعربي</span>
        </div>
        <div class="gold-divider">
          <span class="gold-divider-line"></span>
          <span class="gold-divider-diamond"></span>
          <span class="gold-divider-line"></span>
        </div>
        <p class="card-poem" lang="ar" dir="rtl">
          وما نيلُ المطالبِ بالتمنّي<br>
          ولكنْ تُؤخَذُ الدنيا غِلابا
        </p>
        <p class="card-poet" lang="ar" dir="rtl">-- أحمد شوقي</p>
      </div>
    </div>
  </section>

  <script>
    lucide.createIcons();

    const toggle = document.getElementById('themeToggle');
    let isDark = true;

    toggle.addEventListener('click', function() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
      document.body.setAttribute('data-mode', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
