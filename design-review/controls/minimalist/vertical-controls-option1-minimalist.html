<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 1: Minimalist (Apple/Jony Ive) - Vertical Controls</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0c0c0e;
      color: #e7e5e4;
      overflow: hidden;
      height: 100vh;
    }
    
    .container {
      display: flex;
      height: 100vh;
      position: relative;
    }
    
    /* Minimalist Vertical Control Bar - Right Side */
    .vertical-controls {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 8px;
      z-index: 1000;
    }
    
    .control-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      color: rgba(255, 255, 255, 0.5);
      position: relative;
    }
    
    .control-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
      transform: scale(1.05);
    }
    
    .control-btn.active {
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
    }
    
    .control-btn svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.5;
    }
    
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 4px 8px;
    }
    
    /* Heart icon pulsing when active */
    .control-btn.active.heart {
      animation: heartbeat 1.2s ease-in-out infinite;
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    
    /* Tooltip */
    .tooltip {
      position: absolute;
      right: calc(100% + 12px);
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      letter-spacing: 0.3px;
    }
    
    .control-btn:hover .tooltip {
      opacity: 1;
    }
    
    /* Sample content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 120px 0 80px;
    }
    
    .poem-container {
      max-width: 800px;
      text-align: center;
    }
    
    .poem-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: #C5A059;
      margin-bottom: 1rem;
      font-family: 'Amiri', serif;
    }
    
    .poem-text {
      font-size: clamp(1.25rem, 2vw, 1.5rem);
      line-height: 2.4;
      color: #e7e5e4;
      font-family: 'Amiri', serif;
    }
    
    .design-label {
      position: fixed;
      top: 24px;
      left: 24px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #818cf8;
    }
    
    /* Zoom levels visual feedback */
    .zoom-1 { font-size: clamp(1rem, 1.6vw, 1.2rem); }
    .zoom-2 { font-size: clamp(1.25rem, 2vw, 1.5rem); }
    .zoom-3 { font-size: clamp(1.5rem, 2.4vw, 1.8rem); }
  </style>
</head>
<body>
  <div class="design-label">Option 1: Minimalist (Jony Ive)</div>
  
  <div class="container">
    <div class="content">
      <div class="poem-container">
        <h1 class="poem-title" dir="rtl">قصيدة عن الحب</h1>
        <p class="poem-text zoom-2" id="poemText" dir="rtl">
          يا من هواه أعزه وأذلني<br>
          كيف السبيل إلى وصالك دلني
        </p>
      </div>
    </div>
    
    <!-- Vertical Control Bar (Right Side) -->
    <div class="vertical-controls">
      <!-- Heart/Save Button -->
      <button class="control-btn heart" id="saveBtn" aria-label="Save to collection">
        <span class="tooltip">Save</span>
        <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
      
      <div class="divider"></div>
      
      <!-- Text Zoom In -->
      <button class="control-btn" id="zoomIn" aria-label="Increase text size">
        <span class="tooltip">Zoom In</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
          <line x1="11" y1="8" x2="11" y2="14"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </button>
      
      <!-- Text Zoom Out -->
      <button class="control-btn" id="zoomOut" aria-label="Decrease text size">
        <span class="tooltip">Zoom Out</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </button>
      
      <div class="divider"></div>
      
      <!-- Transliteration Toggle -->
      <button class="control-btn" id="translitBtn" aria-label="Toggle transliteration">
        <span class="tooltip">Transliteration</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 7h7m-7 4h10M5 15h14m-6 4l6-16"></path>
          <path d="M12 5v14"></path>
        </svg>
      </button>
    </div>
  </div>
  
  <script>
    // Interactive functionality
    let zoomLevel = 2;
    let isSaved = true;
    let translitEnabled = false;
    
    const poemText = document.getElementById('poemText');
    const saveBtn = document.getElementById('saveBtn');
    const zoomIn = document.getElementById('zoomIn');
    const zoomOut = document.getElementById('zoomOut');
    const translitBtn = document.getElementById('translitBtn');
    
    saveBtn.addEventListener('click', () => {
      isSaved = !isSaved;
      saveBtn.classList.toggle('active');
    });
    
    zoomIn.addEventListener('click', () => {
      if (zoomLevel < 3) {
        zoomLevel++;
        poemText.className = `poem-text zoom-${zoomLevel}`;
      }
    });
    
    zoomOut.addEventListener('click', () => {
      if (zoomLevel > 1) {
        zoomLevel--;
        poemText.className = `poem-text zoom-${zoomLevel}`;
      }
    });
    
    translitBtn.addEventListener('click', () => {
      translitEnabled = !translitEnabled;
      translitBtn.classList.toggle('active');
      if (translitEnabled) {
        const lines = poemText.innerHTML.split('<br>');
        poemText.innerHTML = lines.map(line => 
          `${line}<br><span style="opacity: 0.4; font-size: 0.85em; font-style: italic; font-family: system-ui;">yā man hawāhu a'azzahu wa-adhallanī</span>`
        ).join('<br>');
      } else {
        poemText.innerHTML = `يا من هواه أعزه وأذلني<br>كيف السبيل إلى وصالك دلني`;
      }
    });
  </script>
</body>
</html>
