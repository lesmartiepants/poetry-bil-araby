<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2E #6: Bento Modernist — Modular Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0c0e;
  --bg2: #18181b;
  --card: #27272a;
  --border: rgba(255, 255, 255, 0.1);
  --text: #FDFCF8;
  --text-dim: rgba(253, 252, 248, 0.6);
  --gold: #C5A059;
  --indigo: #4F46E5;
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.light {
  --bg: #FDFCF8;
  --bg2: #f5f0e8;
  --card: #ffffff;
  --border: rgba(0, 0, 0, 0.1);
  --text: #0c0c0e;
  --text-dim: rgba(12, 12, 14, 0.6);
}
html {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
}
body { min-height: 100vh; }

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  font-size: 20px;
}
.theme-toggle:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}

.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
}

/* SPLASH */
#splash {
  background: var(--bg);
}
.bento-splash {
  max-width: 1200px;
  width: 100%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  animation: gridAssemble 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes gridAssemble {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.bento-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  animation: cardPop 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  will-change: transform;
}
@keyframes cardPop {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.bento-card:nth-child(1) { grid-column: span 2; grid-row: span 2; animation-delay: 0.1s; }
.bento-card:nth-child(2) { grid-column: span 2; animation-delay: 0.2s; }
.bento-card:nth-child(3) { grid-column: span 2; animation-delay: 0.3s; }
.bento-card:nth-child(4) { grid-column: span 2; animation-delay: 0.4s; }
.bento-card:hover {
  transform: translateY(-4px);
  border-color: var(--gold);
  box-shadow: 0 12px 40px rgba(197, 160, 89, 0.2);
}

.card-hero {
  text-align: center;
}
.hero-title {
  font-family: var(--font-ar);
  font-size: 4rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--gold), var(--indigo));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
}
.hero-btn {
  margin-top: 32px;
  padding: 16px 48px;
  min-width: 44px;
  min-height: 44px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
}
.hero-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 24px rgba(197, 160, 89, 0.3);
}

.card-feature {
  text-align: center;
}
.feature-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--gold), var(--indigo));
  border-radius: 12px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.feature-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.feature-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
}

/* MAIN */
#main {
  background: var(--bg);
  display: none;
  padding: 40px 24px;
}
.main-layout {
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.main-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding: 16px 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.main-brand {
  font-family: var(--font-ar);
  font-size: 24px;
  font-weight: 700;
  color: var(--gold);
}

.poem-module {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px;
  margin-bottom: 24px;
  transition: all 0.3s ease;
}
.poem-module:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}

.poem-verse {
  font-family: var(--font-ar);
  font-size: 32px;
  line-height: 2.2;
  color: var(--text);
  text-align: right;
  direction: rtl;
  margin-bottom: 32px;
}
.poem-poet {
  font-size: 14px;
  color: var(--gold);
  text-align: left;
  font-weight: 600;
}

.notion-btn {
  padding: 14px 40px;
  min-width: 44px;
  min-height: 44px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
}
.notion-btn:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 20px rgba(197, 160, 89, 0.3);
}

@media (max-width: 768px) {
  .bento-splash {
    grid-template-columns: 1fr;
  }
  .bento-card {
    grid-column: span 1 !important;
    grid-row: span 1 !important;
    padding: 24px;
  }
  .hero-title { font-size: 3rem; }
  .poem-module { padding: 32px 24px; }
  .poem-verse {
    font-size: 24px;
    line-height: 2;
  }
  .theme-toggle {
    width: 44px;
    height: 44px;
    top: 16px;
    right: 16px;
  }
  .label {
    font-size: 8px;
    top: 16px;
    left: 16px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">☀️</span>
  </button>

  <div class="screen" id="splash">
    <div class="label">Bento Modernist</div>
    <div class="bento-splash">
      <div class="bento-card card-hero">
        <h1 class="hero-title">قافية</h1>
        <p class="hero-subtitle">Modular Poetry Grid</p>
        <button class="hero-btn" onclick="showMain()">Explore</button>
      </div>
      <div class="bento-card card-feature">
        <div class="feature-icon">📚</div>
        <h3 class="feature-title">84K Poems</h3>
        <p class="feature-desc">Comprehensive Arabic collection</p>
      </div>
      <div class="bento-card card-feature">
        <div class="feature-icon">✨</div>
        <h3 class="feature-title">AI Insights</h3>
        <p class="feature-desc">Deep literary analysis</p>
      </div>
      <div class="bento-card card-feature">
        <div class="feature-icon">🎨</div>
        <h3 class="feature-title">Beautiful Design</h3>
        <p class="feature-desc">Crafted with care</p>
      </div>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="main-layout">
      <nav class="main-nav">
        <div class="main-brand">قافية</div>
      </nav>

      <div class="poem-module">
        <div class="poem-verse" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="poem-poet">— أحمد شوقي</div>
      </div>

      <button class="notion-btn">Next Poem</button>
    </div>
  </div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  html.classList.toggle('light');
  icon.textContent = html.classList.contains('light') ? '🌙' : '☀️';
}

function showMain() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}
</script>
</body>
</html>
