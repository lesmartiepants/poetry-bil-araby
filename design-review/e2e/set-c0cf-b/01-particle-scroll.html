<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Scroll — poetry bil-araby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --bg-dark: #0c0c0e;
      --bg-light: #FDFCF8;
      --text-dark: #e8e8e8;
      --text-light: #2c2c2c;
      --gold: #C5A059;
      --gold-soft: #d4b574;
      --indigo: #4F46E5;
      --parchment: #f4ead5;
      --parchment-deep: #e8dcc0;
      --ink: #2c2218;
      --shadow-dark: rgba(0,0,0,0.3);
      --shadow-light: rgba(0,0,0,0.1);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-dark);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }
    body.light {
      background: var(--bg-light);
      color: var(--text-light);
    }

    /* ===== SPLASH ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: linear-gradient(160deg, #08080a 0%, #14101e 50%, #0c0c0e 100%);
      transition: opacity 0.8s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .brand {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      user-select: none;
    }
    .brand .en {
      font-family: 'Forum', serif;
      font-size: clamp(3rem, 6vw, 4.5rem);
      color: var(--gold);
      line-height: 1;
    }
    .brand .ar {
      font-family: 'Reem Kufi', sans-serif;
      font-weight: 700;
      font-size: clamp(1.875rem, 4vw, 3rem);
      color: var(--gold-soft);
      line-height: 1.2;
    }

    .splash-sub {
      position: relative;
      z-index: 2;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: rgba(232,232,232,0.5);
      letter-spacing: 0.05em;
    }

    .cta-enter {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.875rem 2.5rem;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 24px rgba(197,160,89,0.3);
    }
    .cta-enter:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(197,160,89,0.45); }
    .cta-enter:active { transform: scale(0.97); }
    .cta-enter:focus-visible { outline: 3px solid var(--indigo); outline-offset: 3px; }

    /* ===== ONBOARDING ===== */
    #onboarding {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8,8,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
    }
    #onboarding.active { display: flex; }
    body.light #onboarding { background: rgba(253,252,248,0.92); }

    .onboard-card {
      width: min(360px, 88vw);
      background: rgba(20,16,30,0.85);
      border: 1px solid rgba(197,160,89,0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
    }
    body.light .onboard-card {
      background: rgba(255,255,255,0.9);
      border-color: rgba(197,160,89,0.3);
    }

    .onboard-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(197,160,89,0.12);
    }
    .onboard-icon svg { color: var(--gold); width: 28px; height: 28px; }

    .onboard-title {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .onboard-desc {
      font-size: 0.95rem;
      font-weight: 300;
      opacity: 0.7;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .onboard-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }
    .onboard-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(197,160,89,0.25);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .onboard-dot.active {
      background: var(--gold);
      transform: scale(1.3);
    }

    .onboard-hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      opacity: 0.4;
    }

    /* ===== MAIN APP ===== */
    #app {
      display: none;
      min-height: 100vh;
      padding: 2rem 1.25rem 7rem;
      background: #080810;
      position: relative;
    }
    #app.active { display: block; }
    body.light #app { background: #fafaf8; }

    /* Particle trail background canvas */
    #appParticleCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .app-inner {
      max-width: 520px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* App Brand */
    .app-brand {
      display: flex;
      align-items: flex-end;
      gap: 0.4rem;
      margin-bottom: 2rem;
      user-select: none;
    }
    .app-brand .en {
      font-family: 'Forum', serif;
      font-size: 1.5rem;
      color: var(--gold);
      line-height: 1;
    }
    .app-brand .ar {
      font-family: 'Reem Kufi', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--gold-soft);
      line-height: 1.2;
    }

    /* Poem Card - dark with particle feel */
    .poem-card-particle {
      position: relative;
      background: rgba(12,12,20,0.85);
      border: 1px solid rgba(197,160,89,0.12);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      overflow: hidden;
    }
    body.light .poem-card-particle {
      background: rgba(255,255,255,0.85);
      border-color: rgba(197,160,89,0.15);
    }
    /* Subtle particle glow */
    .poem-card-particle::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(197,160,89,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Poem text with shimmering particle effect */
    .poem-area {
      text-align: center;
      padding: 1.5rem 0;
      position: relative; z-index: 1;
    }
    .bayt {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .hemistich {
      font-family: 'Amiri', serif;
      font-size: clamp(1.25rem, 4vw, 1.7rem);
      line-height: 2;
      flex: 1;
      min-width: 120px;
      /* Particle shimmer on text */
      animation: particleShimmer 3s ease-in-out infinite;
    }
    @keyframes particleShimmer {
      0%, 100% { text-shadow: 0 0 0 transparent; opacity: 0.95; }
      50% { text-shadow: 0 0 12px rgba(197,160,89,0.2), 0 0 24px rgba(197,160,89,0.08); opacity: 1; }
    }
    .hemistich:first-child { text-align: left; }
    .hemistich:last-child { text-align: right; }
    .bayt-sep {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(197,160,89,0.4);
    }

    .poet-name {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gold);
      text-align: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(197,160,89,0.15);
      position: relative; z-index: 1;
    }

    /* Info section */
    .info-section {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(197,160,89,0.04);
      border: 1px solid rgba(197,160,89,0.1);
      border-radius: 12px;
    }
    body.light .info-section {
      background: rgba(197,160,89,0.06);
      border-color: rgba(197,160,89,0.12);
    }
    .info-section h3 {
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .info-section p {
      font-size: 0.9rem;
      line-height: 1.8;
      opacity: 0.75;
    }

    /* ===== CONTROLS: Desktop vertical ===== */
    .controls-desktop {
      position: fixed;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 1000;
    }
    .ctrl-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20,16,30,0.7);
      border: 1px solid rgba(197,160,89,0.15);
      border-radius: 12px;
      color: var(--gold-soft);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    body.light .ctrl-btn {
      background: rgba(255,255,255,0.8);
      border-color: rgba(197,160,89,0.2);
    }
    .ctrl-btn:hover { background: rgba(197,160,89,0.15); transform: scale(1.08); }
    .ctrl-btn:focus-visible { outline: 3px solid var(--indigo); outline-offset: 2px; }
    .ctrl-btn svg { width: 20px; height: 20px; }

    /* ===== CONTROLS: Particle Burst Tap-Zones (Mobile) ===== */
    .controls-mobile {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      justify-content: space-around;
      align-items: center;
      height: 64px;
      background: transparent;
      z-index: 1000;
    }
    body.light .controls-mobile {
      background: transparent;
    }

    .particle-zone {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      color: rgba(197,160,89,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 50%;
      position: relative;
    }
    /* Invisible until interaction */
    .particle-zone::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(197,160,89,0) 0%, rgba(197,160,89,0) 100%);
      transition: background 0.3s ease;
    }
    .particle-zone:hover, .particle-zone:focus-visible {
      color: var(--gold);
    }
    .particle-zone:hover::before {
      background: radial-gradient(circle, rgba(197,160,89,0.15) 0%, transparent 70%);
    }
    .particle-zone:active::before {
      background: radial-gradient(circle, rgba(197,160,89,0.3) 0%, transparent 60%);
    }
    .particle-zone svg { width: 20px; height: 20px; position: relative; z-index: 1; }

    @media (max-width: 768px) {
      .controls-desktop { display: none; }
      .controls-mobile { display: flex; }
      #app { padding-bottom: 5rem; }
      .poem-card-particle { padding: 2rem 1.5rem; }
      .bayt { gap: 0.75rem; }
    }
    @media (min-width: 769px) {
      .controls-desktop { display: flex; }
      .controls-mobile { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <canvas id="particleCanvas"></canvas>
    <div class="brand">
      <span class="en">poetry</span>
      <span class="ar">بالعربي</span>
    </div>
    <div class="splash-sub">Particle Scroll</div>
    <button class="cta-enter" id="ctaEnter" aria-label="ادخل التطبيق">
      <span>ابدأ الرحلة</span>
      <i data-lucide="sparkles"></i>
    </button>
  </div>

  <!-- Onboarding -->
  <div id="onboarding" role="dialog" aria-label="دليل الاستخدام"></div>

  <!-- Main App -->
  <div id="app">
    <canvas id="appParticleCanvas" aria-hidden="true"></canvas>
    <div class="app-inner">
      <div class="app-brand">
        <span class="en">poetry</span>
        <span class="ar">بالعربي</span>
      </div>

      <div class="poem-card-particle">
        <div class="poem-area">
          <div class="bayt">
            <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
            <span class="bayt-sep"></span>
            <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
          </div>
        </div>

        <div class="poet-name">احمد شوقي</div>
      </div>

      <div class="info-section">
        <h3>عن القصيدة</h3>
        <p>
          من روائع أمير الشعراء أحمد شوقي، حيث يشبّه نفسه بالبحر الذي
          يحوي الدرر في أعماقه، ويتحدى من يشكك في قدراته أن يسأل
          الغواصين عما يخفيه من جواهر.
        </p>
      </div>
    </div>

    <!-- Desktop controls -->
    <nav class="controls-desktop" aria-label="App controls">
      <button class="ctrl-btn" aria-label="Next poem"><i data-lucide="shuffle"></i></button>
      <button class="ctrl-btn" aria-label="Save poem"><i data-lucide="heart"></i></button>
      <button class="ctrl-btn" aria-label="Listen"><i data-lucide="headphones"></i></button>
      <button class="ctrl-btn" aria-label="Share"><i data-lucide="share-2"></i></button>
      <button class="ctrl-btn" id="themeToggleDesktop" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
    </nav>

    <!-- Particle Burst Tap-Zones (Mobile) -->
    <nav class="controls-mobile" aria-label="App controls">
      <button class="particle-zone" aria-label="Next poem"><i data-lucide="shuffle"></i></button>
      <button class="particle-zone" aria-label="Save poem"><i data-lucide="heart"></i></button>
      <button class="particle-zone" aria-label="Listen"><i data-lucide="headphones"></i></button>
      <button class="particle-zone" aria-label="Share"><i data-lucide="share-2"></i></button>
    </nav>
  </div>

  <script>
    (function() {
      'use strict';

      /* ===== Particle System (preserved from original) ===== */
      var canvas = document.getElementById('particleCanvas');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var animFrameId;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function Particle() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 2 - 1;
        this.speedY = Math.random() * 2 - 1;
        this.opacity = Math.random() * 0.5 + 0.5;
      }

      Particle.prototype.update = function() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      };

      Particle.prototype.draw = function() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#C5A059';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#C5A059';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      };

      function initParticles() {
        particles = [];
        for (var i = 0; i < 100; i++) {
          particles.push(new Particle());
        }
      }

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
        }
        animFrameId = requestAnimationFrame(animateParticles);
      }

      resizeCanvas();
      initParticles();
      animateParticles();

      window.addEventListener('resize', function() {
        resizeCanvas();
        initParticles();
      });

      /* ===== Onboarding System ===== */
      var onboardSteps = [
        {
          icon: 'sparkles',
          title: 'Gold Particles',
          titleAr: 'جسيمات ذهبية',
          desc: 'Floating gold particles create an immersive entry experience.',
          descAr: 'جسيمات ذهبية عائمة تصنع تجربة دخول آسرة.'
        },
        {
          icon: 'scroll',
          title: 'Parchment Scroll',
          titleAr: 'سجل ورقي',
          desc: 'Poetry unfurls on a textured parchment scroll.',
          descAr: 'الشعر ينفتح على سجل بملمس الرق.'
        },
        {
          icon: 'headphones',
          title: 'Listen & Explore',
          titleAr: 'استمع واستكشف',
          desc: 'Navigate poems, toggle themes, and discover Arabic verse.',
          descAr: 'تصفح القصائد وبدّل السمات واستكشف الشعر العربي.'
        }
      ];

      var onboardEl = document.getElementById('onboarding');
      var currentStep = 0;

      function renderOnboardStep(idx) {
        var step = onboardSteps[idx];

        // Clear previous content
        while (onboardEl.firstChild) {
          onboardEl.removeChild(onboardEl.firstChild);
        }

        var card = document.createElement('div');
        card.className = 'onboard-card';

        // Icon circle
        var iconWrap = document.createElement('div');
        iconWrap.className = 'onboard-icon';
        var iconEl = document.createElement('i');
        iconEl.setAttribute('data-lucide', step.icon);
        iconWrap.appendChild(iconEl);
        card.appendChild(iconWrap);

        // Title
        var titleEl = document.createElement('div');
        titleEl.className = 'onboard-title';
        titleEl.textContent = step.title;
        card.appendChild(titleEl);

        // Arabic title
        var titleArEl = document.createElement('div');
        titleArEl.className = 'onboard-title';
        titleArEl.style.fontSize = '1rem';
        titleArEl.style.marginTop = '-0.25rem';
        titleArEl.style.marginBottom = '0.75rem';
        titleArEl.textContent = step.titleAr;
        card.appendChild(titleArEl);

        // Description EN
        var descEl = document.createElement('div');
        descEl.className = 'onboard-desc';
        descEl.textContent = step.desc;
        card.appendChild(descEl);

        // Description AR
        var descArEl = document.createElement('div');
        descArEl.className = 'onboard-desc';
        descArEl.style.marginTop = '-0.75rem';
        descArEl.textContent = step.descAr;
        card.appendChild(descArEl);

        // Dots
        var dots = document.createElement('div');
        dots.className = 'onboard-dots';
        for (var d = 0; d < onboardSteps.length; d++) {
          var dot = document.createElement('div');
          dot.className = 'onboard-dot' + (d === idx ? ' active' : '');
          dots.appendChild(dot);
        }
        card.appendChild(dots);

        // Hint
        var hint = document.createElement('div');
        hint.className = 'onboard-hint';
        hint.textContent = idx < onboardSteps.length - 1 ? 'Tap to continue' : 'Tap to start';
        card.appendChild(hint);

        onboardEl.appendChild(card);
        lucide.createIcons({ nameAttr: 'data-lucide' });
      }

      function advanceOnboard() {
        currentStep++;
        if (currentStep >= onboardSteps.length) {
          onboardEl.classList.remove('active');
          var appEl = document.getElementById('app');
          appEl.classList.add('active');
          lucide.createIcons({ nameAttr: 'data-lucide' });
        } else {
          renderOnboardStep(currentStep);
        }
      }

      onboardEl.addEventListener('click', advanceOnboard);

      /* ===== CTA Enter ===== */
      document.getElementById('ctaEnter').addEventListener('click', function() {
        cancelAnimationFrame(animFrameId);
        var splashEl = document.getElementById('splash');
        splashEl.classList.add('hidden');
        onboardEl.classList.add('active');
        renderOnboardStep(0);
      });

      /* ===== Theme Toggle ===== */
      function toggleTheme() {
        document.body.classList.toggle('light');
      }

      var dtBtn = document.getElementById('themeToggleDesktop');
      var mbBtn = document.getElementById('themeToggleMobile');
      if (dtBtn) dtBtn.addEventListener('click', toggleTheme);
      if (mbBtn) mbBtn.addEventListener('click', toggleTheme);

      /* ===== Init Lucide ===== */
      lucide.createIcons({ nameAttr: 'data-lucide' });

    })();
  </script>
</body>
</html>
