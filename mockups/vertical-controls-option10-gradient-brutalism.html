<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 10: Gradient Brutalism - Vertical Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated gradient background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      opacity: 0.15;
      z-index: 0;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .container {
      display: flex;
      gap: 0;
      position: relative;
      z-index: 1;
      max-width: 1200px;
      width: 100%;
      padding: 0 40px;
    }
    
    /* Vertical control bar - LEFT side, brutalist style */
    .controls {
      background: #111;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 4px solid #fff;
      box-shadow: 12px 12px 0 rgba(255, 255, 255, 0.1);
      min-width: 280px;
    }
    
    .control-section {
      border-bottom: 4px solid #fff;
      padding: 24px;
    }
    
    .control-section:last-child {
      border-bottom: none;
    }
    
    .control-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 16px;
      color: #666;
    }
    
    /* Gradient buttons */
    .control-btn {
      width: 100%;
      padding: 20px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.2s;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      margin-bottom: 12px;
    }
    
    .control-btn:last-child {
      margin-bottom: 0;
    }
    
    .control-btn:hover {
      transform: scale(1.05);
    }
    
    .control-btn:active {
      transform: scale(0.98);
    }
    
    .btn-save {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      box-shadow: 0 4px 0 #b01f3a;
    }
    
    .btn-save:active {
      box-shadow: 0 2px 0 #b01f3a;
      transform: translateY(2px);
    }
    
    .btn-save.active {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 4px 0 #0080a8;
    }
    
    .btn-zoom-in {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 0 #4a2970;
    }
    
    .btn-zoom-in:active {
      box-shadow: 0 2px 0 #4a2970;
      transform: translateY(2px);
    }
    
    .btn-zoom-out {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #fff;
      box-shadow: 0 4px 0 #0080a8;
    }
    
    .btn-zoom-out:active {
      box-shadow: 0 2px 0 #0080a8;
      transform: translateY(2px);
    }
    
    .btn-translit {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: #222;
      box-shadow: 0 4px 0 #c89b00;
    }
    
    .btn-translit:active {
      box-shadow: 0 2px 0 #c89b00;
      transform: translateY(2px);
    }
    
    .btn-translit.active {
      background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
      color: #fff;
      box-shadow: 0 4px 0 #1a0a3a;
    }
    
    .counter {
      display: inline-block;
      background: #000;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      margin-right: 8px;
      font-weight: 700;
    }
    
    .zoom-level {
      text-align: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      margin-top: 16px;
      text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.3);
    }
    
    /* Content area */
    .content {
      flex: 1;
      padding: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .poem {
      font-family: 'Amiri', serif;
      font-size: var(--poem-size, 42px);
      line-height: 1.8;
      text-align: center;
      max-width: 600px;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5);
      transition: font-size 0.3s ease;
    }
    
    .poem-title {
      font-size: 1.5em;
      margin-bottom: 40px;
      font-weight: 700;
      color: #fbbf24;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
    }
    
    .verse {
      margin-bottom: 24px;
    }
    
    .transliteration {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.45em;
      color: #a1a1aa;
      margin-top: 8px;
      display: none;
      font-style: italic;
    }
    
    .transliteration.active {
      display: block;
    }
    
    /* Title badge */
    .title-badge {
      position: absolute;
      top: 40px;
      left: 40px;
      background: #fff;
      color: #000;
      padding: 12px 24px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 4px solid #000;
      box-shadow: 8px 8px 0 rgba(102, 126, 234, 0.5);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="title-badge">10: GRADIENT BRUTALISM</div>
  
  <div class="container">
    <div class="controls">
      <div class="control-section">
        <div class="control-label">حفظ</div>
        <button class="control-btn btn-save" onclick="toggleSave()">
          <span class="counter" id="saveCounter">0</span>
          <span id="saveText">حفظ القصيدة</span>
        </button>
      </div>
      
      <div class="control-section">
        <div class="control-label">حجم النص</div>
        <button class="control-btn btn-zoom-in" onclick="zoomIn()">
          تكبير +
        </button>
        <button class="control-btn btn-zoom-out" onclick="zoomOut()">
          تصغير −
        </button>
        <div class="zoom-level" id="zoomLevel">100%</div>
      </div>
      
      <div class="control-section">
        <div class="control-label">النطق</div>
        <button class="control-btn btn-translit" onclick="toggleTranslit()">
          <span id="translitText">إظهار النطق</span>
        </button>
      </div>
    </div>
    
    <div class="content">
      <div class="poem">
        <div class="poem-title">قصيدة عن الحب</div>
        <div class="verse">
          يا من هواه أعزه وأذلني
          <div class="transliteration">yā man hawāhu aʿazzahu wa-adhallani</div>
        </div>
        <div class="verse">
          كيف السبيل إلى وصالك دلني
          <div class="transliteration">kayfa s-sabīlu ilā wiṣālika dallani</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let saved = false;
    let saveCount = 0;
    let zoomLevel = 100;
    let translitActive = false;
    
    function toggleSave() {
      saved = !saved;
      const btn = document.querySelector('.btn-save');
      const text = document.getElementById('saveText');
      const counter = document.getElementById('saveCounter');
      
      if (saved) {
        saveCount++;
        btn.classList.add('active');
        text.textContent = 'تم الحفظ ✓';
      } else {
        btn.classList.remove('active');
        text.textContent = 'حفظ القصيدة';
      }
      counter.textContent = saveCount;
    }
    
    function zoomIn() {
      if (zoomLevel < 120) {
        zoomLevel += 20;
        updateZoom();
      }
    }
    
    function zoomOut() {
      if (zoomLevel > 80) {
        zoomLevel -= 20;
        updateZoom();
      }
    }
    
    function updateZoom() {
      const sizes = {
        80: '34px',
        100: '42px',
        120: '50px'
      };
      document.documentElement.style.setProperty('--poem-size', sizes[zoomLevel]);
      document.getElementById('zoomLevel').textContent = zoomLevel + '%';
    }
    
    function toggleTranslit() {
      translitActive = !translitActive;
      const translits = document.querySelectorAll('.transliteration');
      const btn = document.querySelector('.btn-translit');
      const text = document.getElementById('translitText');
      
      translits.forEach(t => {
        if (translitActive) {
          t.classList.add('active');
        } else {
          t.classList.remove('active');
        }
      });
      
      if (translitActive) {
        btn.classList.add('active');
        text.textContent = 'إخفاء النطق';
      } else {
        btn.classList.remove('active');
        text.textContent = 'إظهار النطق';
      }
    }
  </script>
</body>
</html>
