<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Mockup — Desktop Not Signed In</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', -apple-system, sans-serif; background: #0c0c0e; color: #e7e5e4; height: 100vh; display: flex; flex-direction: column; }
    .poem-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; text-align: center; }
    .poem-content { max-width: 700px; }
    .poem-title { font-family: 'Amiri', serif; font-size: 14px; color: #a8a29e; margin-bottom: 8px; letter-spacing: 0.05em; }
    .poem-text { font-family: 'Amiri', serif; font-size: 28px; line-height: 2.2; direction: rtl; color: #fafaf9; }
    .poem-poet { font-size: 13px; color: #78716c; margin-top: 16px; }
    .control-bar { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 12px 16px; background: #1a1a1c; border-top: 1px solid #292524; }
    .btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 12px; min-width: 52px; background: transparent; border: none; color: #a8a29e; font-size: 10px; font-family: 'Tajawal', sans-serif; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
    .btn:hover { background: #292524; color: #e7e5e4; }
    .btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .btn-heart svg { fill: none; stroke: #a8a29e; }
    .btn-heart { opacity: 0.5; }
    .divider { width: 1px; height: 28px; background: #292524; margin: 0 4px; }
    .btn-signin { color: #a78bfa; }
    .btn-signin svg { stroke: #a78bfa; }
  </style>
</head>
<body>
  <div class="poem-area">
    <div class="poem-content">
      <div class="poem-title">من معلقة امرئ القيس</div>
      <div class="poem-text">
        قفا نبكِ من ذكرى حبيبٍ ومنزلِ<br>
        بسقطِ اللوى بينَ الدخولِ فحوملِ<br>
        فتوضحَ فالمقراةِ لم يعفُ رسمها<br>
        لما نسجتها من جنوبٍ وشمألِ
      </div>
      <div class="poem-poet">— امرؤ القيس</div>
    </div>
  </div>
  <div class="control-bar">
    <div class="btn"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><span>Listen</span></div>
    <div class="btn"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Learn</span></div>
    <div class="btn"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg><span>Discover</span></div>
    <div class="btn btn-heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Save</span></div>
    <div class="divider"></div>
    <div class="btn"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy</span></div>
    <div class="btn"><svg viewBox="0 0 24 24"><path d="M21 2H3v16h5v4l4-4h5l4-4V2zm-10 9V7m4 4V7"/></svg><span>Local</span></div>
    <div class="btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>Theme</span></div>
    <div class="btn"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Poets</span></div>
    <div class="btn btn-signin"><svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg><span>Sign In</span></div>
  </div>
</body>
</html>
