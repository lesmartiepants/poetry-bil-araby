<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haiku Style — Poetry Bil-Araby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --text: #d8d4cc;
    --accent: #a0916e;
    --gold: #c5a059;
    --gold-dim: rgba(197,160,89,0.18);
    --gold-glow: rgba(197,160,89,0.12);
    --surface: rgba(255,255,255,0.03);
    --surface-border: rgba(160,145,110,0.15);
    --muted: rgba(216,212,204,0.45);
    --line: rgba(160,145,110,0.12);
    --transition-speed: 0.35s;
  }
  [data-theme="light"] {
    --bg: #f8f5ef;
    --text: #2a2822;
    --accent: #7a6a4e;
    --gold: #9a7a28;
    --gold-dim: rgba(154,122,40,0.16);
    --gold-glow: rgba(154,122,40,0.1);
    --surface: rgba(42,40,34,0.04);
    --surface-border: rgba(122,106,78,0.15);
    --muted: rgba(42,40,34,0.4);
    --line: rgba(42,40,34,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
    transition: background var(--transition-speed), color var(--transition-speed);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ============================================
     SPLASH SCREEN — Haiku Stillness
     ============================================ */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: #0d0d0f;
    transition: opacity 0.6s ease;
    will-change: opacity;
    overflow: hidden;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  .splash-content {
    position: relative; z-index: 2;
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 0;
    pointer-events: none;
  }

  .splash-line-en {
    font-family: 'Tajawal', sans-serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: 0.35em;
    text-transform: lowercase;
    color: var(--text);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    margin-bottom: 2.8rem;
  }
  .splash-line-en.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .splash-line-ar {
    font-family: 'Amiri', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--gold);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    margin-bottom: 3.5rem;
    direction: rtl;
  }
  .splash-line-ar.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .splash-rule {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transition: width 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    margin-bottom: 3.5rem;
  }
  .splash-rule.visible {
    width: 180px;
  }

  .splash-enter {
    pointer-events: auto;
    padding: 0.9rem 3.2rem;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: lowercase;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--surface-border);
    border-radius: 0;
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease,
                color 0.3s ease, border-color 0.3s ease,
                box-shadow 0.3s ease, letter-spacing 0.3s ease;
  }
  .splash-enter.visible {
    opacity: 1;
    transform: translateY(0);
    animation: enterPulse 3s ease-in-out 0.5s infinite;
  }
  @keyframes enterPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(197,160,89,0); }
    50% { box-shadow: 0 0 18px 2px rgba(197,160,89,0.12); }
  }
  .splash-enter:hover, .splash-enter:focus-visible {
    color: var(--gold);
    border-color: var(--gold-dim);
    box-shadow: 0 0 24px 4px rgba(197,160,89,0.15);
    letter-spacing: 0.38em;
    animation: none;
  }
  .splash-enter:active {
    transform: scale(0.96);
    box-shadow: 0 0 10px 2px rgba(197,160,89,0.2);
  }

  .splash-theme-toggle {
    position: absolute; top: 1.5rem; right: 1.5rem;
    z-index: 3;
    background: none; border: 1px solid var(--surface-border);
    color: var(--muted);
    font-size: 0.85rem;
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    opacity: 0;
  }
  .splash-theme-toggle.visible { opacity: 1; }
  .splash-theme-toggle:hover {
    color: var(--gold);
    border-color: var(--gold-dim);
  }

  /* Ambient drifting lines on splash */
  .splash-ambient {
    position: absolute; inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }
  .splash-ambient-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
    opacity: 0;
    animation: ambientDrift 12s ease-in-out infinite;
  }
  @keyframes ambientDrift {
    0% { opacity: 0; transform: translateX(-30%); }
    30% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; transform: translateX(30%); }
  }

  /* ============================================
     ONBOARDING — Haiku Breathing Room
     ============================================ */
  #onboarding {
    position: fixed; inset: 0; z-index: 90;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    background: var(--bg);
    transition: opacity 0.6s ease;
    overflow: hidden;
  }
  #onboarding.active { display: flex; }
  #onboarding.hidden { opacity: 0; pointer-events: none; }

  .onboarding-card {
    position: relative; z-index: 2;
    text-align: center;
    max-width: 420px;
    width: 90%;
    padding: 5rem 2rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .onboarding-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .onboarding-card.exit {
    opacity: 0;
    transform: translateY(-14px);
  }

  .ob-icon {
    font-size: 1.6rem;
    margin-bottom: 2rem;
    display: block;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .ob-rule {
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
    margin: 0 auto 2.2rem;
  }

  .ob-title {
    font-family: 'Tajawal', sans-serif;
    font-weight: 300;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .ob-title-ar {
    font-family: 'Amiri', serif;
    font-size: 1.15rem;
    color: var(--gold);
    margin-bottom: 1.6rem;
    direction: rtl;
  }
  .ob-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.9;
    max-width: 300px;
    margin: 0 auto 3rem;
    font-weight: 300;
  }

  .ob-dots {
    display: flex;
    justify-content: center;
    gap: 0.7rem;
    margin-bottom: 2.2rem;
  }
  .ob-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--surface-border);
    transition: all 0.4s ease;
  }
  .ob-dot.active {
    background: var(--gold);
    width: 18px;
    border-radius: 2px;
  }

  .ob-next-btn {
    padding: 0.75rem 2.6rem;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: lowercase;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--surface-border);
    border-radius: 0;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .ob-next-btn:hover, .ob-next-btn:focus-visible {
    color: var(--gold);
    border-color: var(--gold-dim);
    background: rgba(197,160,89,0.04);
  }
  .ob-next-btn:active {
    transform: scale(0.96);
  }

  .ob-skip {
    position: absolute; bottom: 2.5rem; right: 2.5rem;
    z-index: 3;
    background: none; border: none;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.3s, color 0.3s;
  }
  .ob-skip:hover { opacity: 1; color: var(--accent); }

  /* ============================================
     MAIN APP — Expansive Whitespace
     ============================================ */
  #app {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
  }
  #app.active { display: flex; }

  .app-ambient {
    position: fixed; inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .app-ambient-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
    opacity: 0;
    animation: appLineDrift 16s ease-in-out infinite;
  }
  @keyframes appLineDrift {
    0% { opacity: 0; transform: translateX(-20%); }
    25% { opacity: 0.7; }
    75% { opacity: 0.7; }
    100% { opacity: 0; transform: translateX(20%); }
  }

  .app-header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.8rem;
  }
  .app-brand {
    font-family: 'Tajawal', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .app-brand span {
    font-family: 'Amiri', serif;
    color: var(--gold);
    font-size: 0.85rem;
  }
  .app-theme-btn {
    background: none; border: 1px solid var(--surface-border);
    color: var(--muted);
    font-size: 0.85rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .app-theme-btn:hover {
    color: var(--gold);
    border-color: var(--gold-dim);
  }

  .poem-frame {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 5rem 2rem;
    text-align: center;
  }

  .poem-rule-top, .poem-rule-bottom {
    display: block;
    width: 44px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0 auto 2.8rem;
    opacity: 0.5;
  }
  .poem-rule-bottom {
    margin: 2.8rem auto 0;
  }

  .poem-content {
    direction: rtl;
    margin-bottom: 2.2rem;
  }
  .poem-line {
    font-family: 'Amiri', serif;
    font-size: 1.65rem;
    line-height: 2.5;
    color: var(--text);
    transition: font-size 0.3s ease;
  }
  .poem-separator {
    display: block;
    width: 16px; height: 1px;
    background: var(--line);
    margin: 0.5rem auto;
  }
  .poet-name {
    font-family: 'Amiri', serif;
    font-size: 0.92rem;
    color: var(--gold);
    direction: rtl;
    letter-spacing: 0.02em;
  }

  .poem-controls {
    display: flex;
    justify-content: center;
    gap: 0.9rem;
    margin-top: 3rem;
  }
  .ctrl-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--surface-border);
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .ctrl-btn:hover, .ctrl-btn:focus-visible {
    color: var(--accent);
    border-color: var(--accent);
  }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn.active {
    color: var(--gold);
    border-color: var(--gold);
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 600px) {
    .splash-line-en { font-size: 1.05rem; letter-spacing: 0.25em; }
    .splash-line-ar { font-size: 2.4rem; margin-bottom: 2.5rem; }
    .splash-rule.visible { width: 120px; }
    .splash-enter { padding: 0.8rem 2.2rem; font-size: 0.82rem; }
    .splash-content { gap: 0; }
    .splash-line-en { margin-bottom: 2rem; }
    .splash-line-ar { margin-bottom: 2.5rem; }
    .splash-rule { margin-bottom: 2.5rem; }
    .ob-title { font-size: 1.3rem; }
    .onboarding-card { padding: 3.5rem 1.2rem; }
    .poem-line { font-size: 1.35rem; }
    .poem-frame { padding: 3.5rem 1rem; }
    .app-header { padding: 0.8rem 1rem; }
  }
</style>
</head>
<body>

<!-- ============================================
     SPLASH SCREEN
     ============================================ -->
<div id="splash" role="region" aria-label="Splash screen">
  <div class="splash-ambient" id="splashAmbient" aria-hidden="true"></div>
  <button class="splash-theme-toggle" id="splashThemeBtn" aria-label="Toggle theme">☀</button>
  <div class="splash-content">
    <div class="splash-line-en" id="splashEn">poetry</div>
    <div class="splash-line-ar" id="splashAr" dir="rtl">بالعربي</div>
    <div class="splash-rule" id="splashRule"></div>
    <button class="splash-enter" id="enterBtn" aria-label="Enter the app">enter</button>
  </div>
</div>

<!-- ============================================
     ONBOARDING
     ============================================ -->
<div id="onboarding" role="region" aria-label="Onboarding">
  <div class="onboarding-card" id="obCard">
    <div class="ob-icon" id="obIcon">✦</div>
    <div class="ob-rule"></div>
    <div class="ob-title" id="obTitle">Discover</div>
    <div class="ob-title-ar" id="obTitleAr" dir="rtl">اكتشف</div>
    <div class="ob-desc" id="obDesc">Explore a vast collection of Arabic poetry spanning centuries of literary tradition.</div>
    <div class="ob-dots" id="obDots">
      <div class="ob-dot active"></div>
      <div class="ob-dot"></div>
      <div class="ob-dot"></div>
      <div class="ob-dot"></div>
    </div>
    <button class="ob-next-btn" id="obNextBtn" aria-label="Next step">continue</button>
  </div>
  <button class="ob-skip" id="obSkipBtn" aria-label="Skip onboarding">skip</button>
</div>

<!-- ============================================
     MAIN APP
     ============================================ -->
<div id="app" role="main">
  <div class="app-ambient" id="appAmbient" aria-hidden="true"></div>
  <header class="app-header">
    <div class="app-brand">poetry <span dir="rtl">بالعربي</span></div>
    <button class="app-theme-btn" id="appThemeBtn" aria-label="Toggle theme">☀</button>
  </header>
  <div class="poem-frame">
    <span class="poem-rule-top"></span>
    <div class="poem-content">
      <div class="poem-line">إِذا المَرءُ لَم يُدنَس مِنَ اللُؤمِ عِرضُهُ</div>
      <span class="poem-separator"></span>
      <div class="poem-line">فَكُلُّ رِداءٍ يَرتَديهِ جَميلُ</div>
    </div>
    <div class="poet-name">— السموأل</div>
    <span class="poem-rule-bottom"></span>
    <div class="poem-controls">
      <button class="ctrl-btn" id="playBtn" aria-label="Play recitation">▶</button>
      <button class="ctrl-btn" id="nextBtn" aria-label="Next poem">⟳</button>
      <button class="ctrl-btn" id="saveBtn" aria-label="Save poem">♡</button>
      <button class="ctrl-btn" id="fontBtn" aria-label="Change font size">ع</button>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  var prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ============================================
     AMBIENT LINE SYSTEM
     Thin horizontal lines that drift slowly
     across the screen like haiku pauses.
     ============================================ */
  function createAmbientLines(container, count) {
    var lines = [];
    var i;
    for (i = 0; i < count; i++) {
      var el = document.createElement("div");
      el.className = container === splashAmbient ? "splash-ambient-line" : "app-ambient-line";
      el.style.top = (10 + Math.random() * 80) + "%";
      el.style.left = (5 + Math.random() * 30) + "%";
      el.style.width = (80 + Math.random() * 200) + "px";
      el.style.animationDelay = (Math.random() * 8) + "s";
      el.style.animationDuration = (10 + Math.random() * 8) + "s";
      container.appendChild(el);
      lines.push(el);
    }
    return lines;
  }

  /* ============================================
     DOM ELEMENTS
     ============================================ */
  var splash = document.getElementById("splash");
  var splashAmbient = document.getElementById("splashAmbient");
  var splashEn = document.getElementById("splashEn");
  var splashAr = document.getElementById("splashAr");
  var splashRule = document.getElementById("splashRule");
  var enterBtn = document.getElementById("enterBtn");
  var splashThemeBtn = document.getElementById("splashThemeBtn");

  var onboarding = document.getElementById("onboarding");
  var obCard = document.getElementById("obCard");
  var obIcon = document.getElementById("obIcon");
  var obTitle = document.getElementById("obTitle");
  var obTitleAr = document.getElementById("obTitleAr");
  var obDesc = document.getElementById("obDesc");
  var obDots = document.getElementById("obDots");
  var obNextBtn = document.getElementById("obNextBtn");
  var obSkipBtn = document.getElementById("obSkipBtn");

  var appEl = document.getElementById("app");
  var appAmbient = document.getElementById("appAmbient");
  var appThemeBtn = document.getElementById("appThemeBtn");

  /* ============================================
     SPLASH — Haiku Reveal Sequence
     Lines appear one by one with stillness between.
     ============================================ */
  if (!prefersReduced) {
    createAmbientLines(splashAmbient, 5);
  }

  var splashDelay = prefersReduced ? 50 : 400;

  setTimeout(function() {
    splashEn.classList.add("visible");
  }, splashDelay);

  setTimeout(function() {
    splashAr.classList.add("visible");
  }, splashDelay + 700);

  setTimeout(function() {
    splashRule.classList.add("visible");
  }, splashDelay + 1300);

  setTimeout(function() {
    enterBtn.classList.add("visible");
  }, splashDelay + 1800);

  setTimeout(function() {
    splashThemeBtn.classList.add("visible");
  }, splashDelay + 2200);

  /* ============================================
     ENTER → ONBOARDING TRANSITION
     ============================================ */
  enterBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    splash.classList.add("hidden");
    setTimeout(function() {
      splash.style.display = "none";
      showOnboarding();
    }, 600);
  });

  /* Keyboard: Enter or Space on splash triggers entry */
  enterBtn.addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      enterBtn.click();
    }
  });

  /* ============================================
     ONBOARDING SEQUENTIAL STEPS
     ============================================ */
  var obSteps = [
    { icon: "✦", title: "Discover", titleAr: "اكتشف", desc: "Explore a vast collection of Arabic poetry spanning centuries of literary tradition.", btn: "continue" },
    { icon: "◈", title: "Explore", titleAr: "استكشف", desc: "Browse by poet, era, or theme. Find verses that resonate with your soul.", btn: "continue" },
    { icon: "◉", title: "Listen", titleAr: "استمع", desc: "Hear poems recited aloud with authentic pronunciation and natural rhythm.", btn: "continue" },
    { icon: "❋", title: "Share", titleAr: "شارك", desc: "Save your favorite verses and share the beauty of Arabic poetry with others.", btn: "begin" }
  ];
  var obStep = 0;
  var obTransitioning = false;

  function showOnboarding() {
    onboarding.classList.add("active");
    renderObStep(0, true);
  }

  function renderObStep(index, immediate) {
    var step = obSteps[index];
    if (!immediate) {
      obCard.classList.remove("visible");
      obCard.classList.add("exit");
    }
    var delay = immediate ? 50 : 320;
    setTimeout(function() {
      obIcon.textContent = step.icon;
      obTitle.textContent = step.title;
      obTitleAr.textContent = step.titleAr;
      obDesc.textContent = step.desc;
      obNextBtn.textContent = step.btn;

      var dots = obDots.children;
      var i;
      for (i = 0; i < dots.length; i++) {
        if (i === index) {
          dots[i].classList.add("active");
        } else {
          dots[i].classList.remove("active");
        }
      }

      obCard.classList.remove("exit");
      void obCard.offsetWidth;
      obCard.classList.add("visible");
      obTransitioning = false;
    }, delay);
  }

  obNextBtn.addEventListener("click", function() {
    if (obTransitioning) return;
    obTransitioning = true;
    obStep++;
    if (obStep >= obSteps.length) {
      finishOnboarding();
    } else {
      renderObStep(obStep, false);
    }
  });

  obSkipBtn.addEventListener("click", function() {
    finishOnboarding();
  });

  /* Keyboard navigation for onboarding */
  document.addEventListener("keydown", function(e) {
    if (!onboarding.classList.contains("active")) return;
    if (onboarding.classList.contains("hidden")) return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown") {
      e.preventDefault();
      obNextBtn.click();
    }
    if (e.key === "Escape") {
      e.preventDefault();
      obSkipBtn.click();
    }
  });

  function finishOnboarding() {
    onboarding.classList.add("hidden");
    setTimeout(function() {
      onboarding.classList.remove("active");
      showApp();
    }, 600);
  }

  /* ============================================
     MAIN APP
     ============================================ */
  function showApp() {
    appEl.classList.add("active");
    if (!prefersReduced) {
      createAmbientLines(appAmbient, 3);
    }
  }

  /* Resize handling */
  var resizeTimer;
  window.addEventListener("resize", function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {}, 150);
  });

  /* ============================================
     THEME TOGGLE
     ============================================ */
  var isDark = true;
  var SUN = "☀";
  var MOON = "☾";

  function toggleTheme() {
    isDark = !isDark;
    if (isDark) {
      document.documentElement.removeAttribute("data-theme");
      splashThemeBtn.textContent = SUN;
      appThemeBtn.textContent = SUN;
    } else {
      document.documentElement.setAttribute("data-theme", "light");
      splashThemeBtn.textContent = MOON;
      appThemeBtn.textContent = MOON;
    }
  }

  splashThemeBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    toggleTheme();
  });
  appThemeBtn.addEventListener("click", toggleTheme);

  /* ============================================
     APP MOCK INTERACTIONS
     ============================================ */
  var poems = [
    {
      lines: [
        "إِذا المَرءُ لَم يُدنَس مِنَ اللُؤمِ عِرضُهُ",
        "فَكُلُّ رِداءٍ يَرتَديهِ جَميلُ"
      ],
      poet: "السموأل"
    },
    {
      lines: [
        "عَلى قَدرِ أَهلِ العَزمِ تَأتي العَزائِمُ",
        "وَتَأتي عَلى قَدرِ الكِرامِ المَكارِمُ"
      ],
      poet: "المتنبي"
    },
    {
      lines: [
        "وَما نَيلُ المَطالِبِ بِالتَمَنّي",
        "وَلَكِن تُؤخَذُ الدُنيا غِلابا"
      ],
      poet: "أحمد شوقي"
    },
    {
      lines: [
        "إِذا غامَرتَ في شَرَفٍ مَرومٍ",
        "فَلا تَقنَع بِما دونَ النُجومِ"
      ],
      poet: "المتنبي"
    }
  ];
  var currentPoem = 0;
  var fontLevel = 0;
  var fontSizes = ["1.65rem", "1.95rem", "2.25rem", "1.35rem"];

  document.getElementById("nextBtn").addEventListener("click", function() {
    currentPoem = (currentPoem + 1) % poems.length;
    var p = poems[currentPoem];
    var lines = document.querySelectorAll(".poem-line");
    var poetEl = document.querySelector(".poet-name");

    var frame = document.querySelector(".poem-frame");
    frame.style.opacity = "0";
    frame.style.transform = "translateY(6px)";
    setTimeout(function() {
      lines[0].textContent = p.lines[0];
      lines[1].textContent = p.lines[1];
      poetEl.textContent = "— " + p.poet;
      frame.style.opacity = "";
      frame.style.transform = "";
    }, 200);
  });

  document.getElementById("playBtn").addEventListener("click", function() {
    var btn = this;
    btn.classList.add("active");
    btn.textContent = "❚❚";
    setTimeout(function() {
      btn.classList.remove("active");
      btn.textContent = "▶";
    }, 2000);
  });

  document.getElementById("saveBtn").addEventListener("click", function() {
    var btn = this;
    if (btn.classList.contains("active")) {
      btn.classList.remove("active");
      btn.textContent = "♡";
    } else {
      btn.classList.add("active");
      btn.textContent = "♥";
    }
  });

  document.getElementById("fontBtn").addEventListener("click", function() {
    fontLevel = (fontLevel + 1) % fontSizes.length;
    var lines = document.querySelectorAll(".poem-line");
    var i;
    for (i = 0; i < lines.length; i++) {
      lines[i].style.fontSize = fontSizes[fontLevel];
    }
  });

  /* Smooth transition for poem frame */
  var poemFrame = document.querySelector(".poem-frame");
  if (poemFrame) {
    poemFrame.style.transition = "opacity 0.25s ease, transform 0.25s ease";
  }

})();
</script>
</body>
</html>
