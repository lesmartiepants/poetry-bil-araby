<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 6: Neumorphic Sidebar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #e0e5ec;
      color: #4a5568;
      overflow: hidden;
      height: 100vh;
    }
    
    .container {
      display: flex;
      height: 100vh;
      position: relative;
    }
    
    /* Neumorphic Vertical Sidebar - Left Side */
    .vertical-controls {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 100px;
      background: #e0e5ec;
      border-radius: 32px;
      padding: 24px 12px;
      box-shadow: 
        12px 12px 24px #a8b0ba,
        -12px -12px 24px #ffffff;
      z-index: 1000;
    }
    
    .control-section {
      margin-bottom: 32px;
    }
    
    .control-section:last-child {
      margin-bottom: 0;
    }
    
    .section-icon {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    .control-btn {
      width: 76px;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e0e5ec;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #64748b;
      position: relative;
      margin: 0 auto 12px;
      box-shadow: 
        8px 8px 16px #a8b0ba,
        -8px -8px 16px #ffffff;
    }
    
    .control-btn:hover {
      box-shadow: 
        4px 4px 8px #a8b0ba,
        -4px -4px 8px #ffffff;
    }
    
    .control-btn:active,
    .control-btn.active {
      box-shadow: 
        inset 4px 4px 8px #a8b0ba,
        inset -4px -4px 8px #ffffff;
    }
    
    .control-btn.active {
      color: #6366f1;
    }
    
    .control-btn svg {
      width: 28px;
      height: 28px;
      stroke-width: 2;
    }
    
    .control-btn:last-child {
      margin-bottom: 0;
    }
    
    /* Badge */
    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 
        4px 4px 8px #a8b0ba,
        -2px -2px 6px #ffffff;
    }
    
    /* Divider */
    .divider {
      height: 2px;
      background: linear-gradient(to right, 
        #e0e5ec 0%, 
        #a8b0ba 50%, 
        #e0e5ec 100%);
      margin: 20px 12px;
      border-radius: 1px;
    }
    
    /* Sample content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 80px 0 160px;
      background: #e0e5ec;
    }
    
    .poem-container {
      max-width: 800px;
      text-align: center;
      background: #e0e5ec;
      padding: 60px 40px;
      border-radius: 32px;
      box-shadow: 
        20px 20px 40px #a8b0ba,
        -20px -20px 40px #ffffff;
    }
    
    .poem-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 1.5rem;
      font-family: 'Amiri', serif;
    }
    
    .poem-text {
      font-size: clamp(1.25rem, 2vw, 1.5rem);
      line-height: 2.4;
      color: #475569;
      font-family: 'Amiri', serif;
      transition: font-size 0.3s ease;
    }
    
    .design-label {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #e0e5ec;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #64748b;
      box-shadow: 
        8px 8px 16px #a8b0ba,
        -8px -8px 16px #ffffff;
    }
    
    /* Zoom levels */
    .zoom-1 { font-size: clamp(1rem, 1.6vw, 1.2rem); }
    .zoom-2 { font-size: clamp(1.25rem, 2vw, 1.5rem); }
    .zoom-3 { font-size: clamp(1.5rem, 2.4vw, 1.8rem); }
  </style>
</head>
<body>
  <div class="design-label">Option 6: Neumorphic</div>
  
  <div class="container">
    <!-- Neumorphic Vertical Sidebar (Left Side) -->
    <div class="vertical-controls">
      <!-- Save Section -->
      <div class="control-section">
        <div class="section-icon">Save</div>
        <button class="control-btn active" id="saveBtn" aria-label="Save to collection">
          <span class="badge">8</span>
          <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
      </div>
      
      <div class="divider"></div>
      
      <!-- Zoom Section -->
      <div class="control-section">
        <div class="section-icon">Size</div>
        <button class="control-btn" id="zoomIn" aria-label="Increase text size">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <text x="6" y="18" font-size="16" font-weight="bold" fill="currentColor">A+</text>
          </svg>
        </button>
        <button class="control-btn" id="zoomOut" aria-label="Decrease text size">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <text x="7" y="18" font-size="14" font-weight="bold" fill="currentColor">A-</text>
          </svg>
        </button>
      </div>
      
      <div class="divider"></div>
      
      <!-- Language Section -->
      <div class="control-section">
        <div class="section-icon">Lang</div>
        <button class="control-btn" id="translitBtn" aria-label="Toggle transliteration">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 0 1 6.412 9m0 0a17.91 17.91 0 0 1-3.412-4.5m0 0h7.5"></path>
            <path d="m15 20 6-6m0 0-6-6m6 6H9"></path>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="content">
      <div class="poem-container">
        <h1 class="poem-title" dir="rtl">قصيدة عن الحب</h1>
        <p class="poem-text zoom-2" id="poemText" dir="rtl">
          يا من هواه أعزه وأذلني<br>
          كيف السبيل إلى وصالك دلني<br><br>
          والله لو عاقبتني ما ضرني<br>
          حبي لك الدنيا وما حولي ملني
        </p>
      </div>
    </div>
  </div>
  
  <script>
    // Interactive functionality
    let zoomLevel = 2;
    let saveCount = 8;
    let isSaved = true;
    let translitEnabled = false;
    
    const poemText = document.getElementById('poemText');
    const saveBtn = document.getElementById('saveBtn');
    const zoomIn = document.getElementById('zoomIn');
    const zoomOut = document.getElementById('zoomOut');
    const translitBtn = document.getElementById('translitBtn');
    const badge = document.querySelector('.badge');
    
    saveBtn.addEventListener('click', () => {
      isSaved = !isSaved;
      saveBtn.classList.toggle('active');
      if (isSaved) {
        saveCount++;
      } else {
        saveCount--;
      }
      badge.textContent = saveCount;
    });
    
    zoomIn.addEventListener('click', () => {
      if (zoomLevel < 3) {
        zoomLevel++;
        poemText.className = `poem-text zoom-${zoomLevel}`;
      }
    });
    
    zoomOut.addEventListener('click', () => {
      if (zoomLevel > 1) {
        zoomLevel--;
        poemText.className = `poem-text zoom-${zoomLevel}`;
      }
    });
    
    translitBtn.addEventListener('click', () => {
      translitEnabled = !translitEnabled;
      translitBtn.classList.toggle('active');
      if (translitEnabled) {
        poemText.innerHTML = `يا من هواه أعزه وأذلني<br><span style="opacity: 0.5; font-size: 0.8em; font-style: italic; font-family: system-ui;">yā man hawāhu a'azzahu wa-adhallanī</span><br>كيف السبيل إلى وصالك دلني<br><span style="opacity: 0.5; font-size: 0.8em; font-style: italic; font-family: system-ui;">kayfa as-sabīlu ilā wiṣālika dallanī</span><br><br>والله لو عاقبتني ما ضرني<br><span style="opacity: 0.5; font-size: 0.8em; font-style: italic; font-family: system-ui;">wallāhi law 'āqabtanī mā ḍarranī</span><br>حبي لك الدنيا وما حولي ملني<br><span style="opacity: 0.5; font-size: 0.8em; font-style: italic; font-family: system-ui;">ḥubbī laka ad-dunyā wa mā ḥawlī mallanī</span>`;
      } else {
        poemText.innerHTML = `يا من هواه أعزه وأذلني<br>كيف السبيل إلى وصالك دلني<br><br>والله لو عاقبتني ما ضرني<br>حبي لك الدنيا وما حولي ملني`;
      }
    });
  </script>
</body>
</html>
