name: Design Review DB Integration

# Runs on every PR push to main.
# Spins up a local PostgreSQL service container (IPv4, no external connectivity needed),
# seeds the design review schema, and runs integration tests to confirm the
# persist-to-DB API works end-to-end on this PR.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  integration:
    name: Design Review — DB API Tests
    runs-on: ubuntu-latest
    # Skip on forked PRs: secrets are not available from forks.
    if: github.event.pull_request.head.repo.fork == false

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: design_review_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed design review schema
        run: |
          # Minimal poems table so /api/health works (full poetry data only exists in prod)
          PGPASSWORD=postgres psql -h localhost -U postgres -d design_review_test -c "
            CREATE TABLE IF NOT EXISTS poems (
              id SERIAL PRIMARY KEY,
              title TEXT,
              content TEXT,
              created_at TIMESTAMPTZ DEFAULT now()
            );"
          # Apply the design review tables migration
          PGPASSWORD=postgres psql -h localhost -U postgres -d design_review_test \
            -f supabase/migrations/20260222000000_design_review_tables.sql
          echo "Schema seeded ✓"

      # ── Run integration tests against the local PostgreSQL DB ─────────────
      # Use PGHOST/PGUSER/PGPASSWORD/PGDATABASE instead of DATABASE_URL because
      # server.js unconditionally enables SSL when DATABASE_URL is set, but the
      # local postgres:15 service container has no SSL support.
      - name: Run design review integration tests
        run: npm run test:integration
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: design_review_test
          PGUSER: postgres
          PGPASSWORD: postgres

      # ── Report outcome on the PR ──────────────────────────────────────────
      - name: Post success comment to PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ✅ Design Review DB Integration\n\n' +
                    '**All 9 integration tests passed against a real PostgreSQL schema**\n\n' +
                    '- Items sync ✓\n' +
                    '- Session create ✓\n' +
                    '- Verdict submit ✓\n' +
                    '- Session complete ✓\n' +
                    '- Summary & history read-back ✓\n\n' +
                    '**Persist-to-DB feature confirmed working on this PR** 🎉'
            });

      - name: Post failure comment to PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Design Review DB Integration\n\n' +
                    '**Integration tests failed** — see logs for details.\n\n' +
                    `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
