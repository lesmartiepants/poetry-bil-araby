<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Manuscript - Water Ripple</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --deep-water: #0A1420; --ripple-silver: #B8C8D8; --moonlight: #E8E4F0;
  --lotus: #C47A8A; --gold: #C5A059; --surface: #0D1A28;
  --text-primary: #E8E4F0; --text-dim: rgba(232,228,240,0.5);
  --card-bg: rgba(13,26,40,0.85); --card-border: rgba(184,200,216,0.15);
  --font-ar: 'Amiri', serif; --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.light {
  --deep-water: #D8E4F0; --ripple-silver: #5A7A94; --moonlight: #1A1428;
  --lotus: #A0506A; --gold: #8A7030; --surface: #C8D8E8;
  --text-primary: #1A1428; --text-dim: rgba(26,20,40,0.5);
  --card-bg: rgba(220,232,244,0.9); --card-border: rgba(90,122,148,0.25);
}
html { font-family: var(--font-ui); background: var(--deep-water); color: var(--text-primary); }
body { min-height: 100vh; overflow-x: hidden; }

canvas#water {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ===== SPLASH ===== */
.splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
  transition: opacity 0.8s ease;
}
.splash.hidden { opacity: 0; pointer-events: none; }

.splash-drop {
  position: absolute; top: -20px; left: 50%;
  width: 12px; height: 12px; margin-left: -6px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  background: radial-gradient(circle at 40% 40%, var(--moonlight), var(--ripple-silver));
  opacity: 0; animation: dropFall 1.2s cubic-bezier(0.55,0,1,0.45) 0.3s forwards;
}
@keyframes dropFall {
  0% { opacity: 1; transform: rotate(-45deg) translateY(0); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: rotate(-45deg) translateY(45vh); }
}

.splash-ring {
  position: absolute; top: 50%; left: 50%; width: 0; height: 0;
  border-radius: 50%; border: 2px solid var(--ripple-silver);
  opacity: 0; transform: translate(-50%,-50%);
}
.splash-ring:nth-child(2) { animation: splashExpand 2.5s ease-out 1.5s forwards; }
.splash-ring:nth-child(3) { animation: splashExpand 2.5s ease-out 1.8s forwards; border-color: var(--lotus); }
.splash-ring:nth-child(4) { animation: splashExpand 2.5s ease-out 2.1s forwards; border-color: var(--gold); }
@keyframes splashExpand {
  0% { width: 0; height: 0; opacity: 0.8; }
  100% { width: 120vmax; height: 120vmax; opacity: 0; }
}

.splash-content {
  position: relative; z-index: 5; text-align: center; padding: 40px;
  max-width: 600px; opacity: 0;
  animation: revealTitle 1.2s cubic-bezier(0.16,1,0.3,1) 1.8s forwards;
}
@keyframes revealTitle {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.splash-brand {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 0.5rem; margin-bottom: 1rem;
}
.splash-brand-en {
  font-family: 'Forum', serif; font-size: clamp(3rem, 6vw, 4.5rem);
  letter-spacing: -0.05em; color: var(--gold); line-height: 1;
  text-shadow: 0 0 40px rgba(197,160,89,0.3);
}
.splash-brand-ar {
  font-family: 'Reem Kufi', sans-serif; font-weight: 700;
  font-size: clamp(1.875rem, 4vw, 3rem); color: var(--gold); line-height: 1;
}

.splash-subtitle {
  font-size: 14px; color: var(--text-dim); letter-spacing: 0.3em;
  text-transform: uppercase; margin-bottom: 48px; direction: ltr;
}

.splash-enter {
  padding: 14px 40px; min-height: 44px; background: transparent;
  border: 1px solid var(--gold); color: var(--gold);
  font-family: var(--font-ui); font-size: 15px; border-radius: 8px;
  cursor: pointer; transition: all 0.3s ease;
  opacity: 0; animation: revealTitle 0.8s cubic-bezier(0.16,1,0.3,1) 2.4s forwards;
}
.splash-enter:hover {
  background: var(--gold); color: var(--deep-water);
  box-shadow: 0 0 30px rgba(197,160,89,0.3);
}

/* ===== WALKTHROUGH ===== */
.walkthrough {
  position: fixed; inset: 0; z-index: 90;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; cursor: pointer;
}
.walkthrough.active { display: flex; }

.walk-card {
  max-width: 400px; width: 90%; padding: 2rem; text-align: center;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 16px; backdrop-filter: blur(12px);
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.walk-card.visible { opacity: 1; transform: translateY(0); }

.walk-icon {
  width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 50%;
  border: 2px solid var(--ripple-silver); background: rgba(184,200,216,0.05);
  display: flex; align-items: center; justify-content: center;
  color: var(--ripple-silver);
  animation: circleRipple 2s ease-out infinite;
}
@keyframes circleRipple {
  0% { box-shadow: 0 0 0 0 rgba(184,200,216,0.2); }
  70% { box-shadow: 0 0 0 20px rgba(184,200,216,0); }
  100% { box-shadow: 0 0 0 0 rgba(184,200,216,0); }
}

.walk-card h3 {
  font-family: var(--font-ui); font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  font-weight: 500; color: var(--moonlight); direction: ltr; margin-bottom: 4px;
}
.walk-card .walk-ar {
  font-family: var(--font-ui); font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: var(--gold); direction: rtl; margin-bottom: 8px;
}
.walk-card p {
  font-size: clamp(0.8rem, 1.8vw, 0.95rem); line-height: 1.7;
  color: var(--text-dim); direction: ltr;
}
.walk-progress { display: flex; gap: 8px; margin-top: 2rem; }
.walk-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--card-border);
  transition: all 0.3s;
}
.walk-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
.walk-hint { margin-top: 1rem; font-size: 13px; color: var(--text-dim); opacity: 0.6; }

/* ===== MAIN APP ===== */
.main-app { display: none; min-height: 100vh; padding-bottom: 80px; position: relative; z-index: 1; }
.main-app.active { display: block; }

.app-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: rgba(10,20,32,0.85);
  backdrop-filter: blur(12px); border-bottom: 1px solid var(--card-border);
  direction: ltr;
}
html.light .app-top { background: rgba(216,228,240,0.9); }
.app-top-brand { display: flex; align-items: flex-end; gap: 6px; }
.app-top-brand-en {
  font-family: 'Forum', serif; font-size: 20px;
  letter-spacing: -0.05em; color: var(--gold); line-height: 1;
}
.app-top-brand-ar {
  font-family: 'Reem Kufi', sans-serif; font-weight: 700;
  font-size: 14px; color: var(--gold); line-height: 1;
}
.app-top-actions { display: flex; gap: 8px; }
.app-top-btn {
  width: 40px; height: 40px; display: flex; align-items: center;
  justify-content: center; background: transparent;
  border: 1px solid var(--card-border); border-radius: 8px;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.app-top-btn:hover { color: var(--gold); border-color: var(--gold); }

/* Poem card floating on water */
.poem-card {
  position: relative; background: var(--card-bg);
  border: 1px solid var(--card-border); backdrop-filter: blur(12px);
  padding: 3rem 2.5rem; border-radius: 20px; direction: rtl;
  animation: floatBob 4s ease-in-out infinite;
  /* Wave clip on bottom */
  clip-path: polygon(
    0% 0%, 100% 0%, 100% calc(100% - 12px),
    95% 100%, 90% calc(100% - 8px), 85% calc(100% - 2px),
    80% calc(100% - 10px), 75% 100%, 70% calc(100% - 6px),
    65% calc(100% - 12px), 60% calc(100% - 4px), 55% 100%,
    50% calc(100% - 8px), 45% calc(100% - 2px),
    40% calc(100% - 10px), 35% 100%, 30% calc(100% - 6px),
    25% calc(100% - 12px), 20% calc(100% - 4px), 15% 100%,
    10% calc(100% - 8px), 5% calc(100% - 2px), 0% calc(100% - 10px)
  );
}
@keyframes floatBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.poem-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.poet-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(197,160,89,0.2), rgba(184,200,216,0.1));
  display: flex; align-items: center; justify-content: center;
  color: var(--gold); font-family: var(--font-ar); font-size: 20px;
}
.poet-info h2 { font-family: var(--font-ui); font-size: 16px; font-weight: 500; }
.poet-info span { font-size: 13px; color: var(--text-dim); }

.poem-verses {
  font-family: var(--font-ar); font-size: clamp(20px, 3.5vw, 28px);
  line-height: 2.2; text-align: center; padding: 20px 0;
  border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border);
}
.verse-line { opacity: 0; animation: fadeInUp 0.5s ease forwards; }
.verse-line:nth-child(1) { animation-delay: 0.2s; }
.verse-line:nth-child(2) { animation-delay: 0.5s; }
.hemistich-divider {
  display: inline-block; width: 40px; height: 1px; background: var(--gold);
  vertical-align: middle; margin: 0 12px; opacity: 0.4;
}

.poem-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }
.poem-action-btn {
  display: flex; align-items: center; gap: 6px; padding: 10px 16px;
  background: transparent; border: 1px solid var(--card-border); border-radius: 10px;
  color: var(--text-dim); font-family: var(--font-ui); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.poem-action-btn:hover { color: var(--gold); border-color: var(--gold); }

.reader { max-width: 720px; margin: 0 auto; padding: 80px 20px 40px; }

/* Vertical Rail */
.vertical-rail {
  position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 4px; z-index: 40; direction: ltr;
}
.rail-btn {
  width: 44px; height: 44px; display: flex; align-items: center;
  justify-content: center; background: var(--card-bg);
  border: 1px solid var(--card-border); border-radius: 10px;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(8px); position: relative;
}
.rail-btn:hover { color: var(--gold); border-color: var(--gold); transform: scale(1.08); }
.rail-btn .tooltip {
  position: absolute; right: 52px; top: 50%; transform: translateY(-50%);
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text-primary); font-family: var(--font-ui); font-size: 12px;
  padding: 4px 10px; border-radius: 6px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.rail-btn:hover .tooltip { opacity: 1; }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 10px 20px; background: rgba(10,20,32,0.9);
  backdrop-filter: blur(16px); border-top: 1px solid var(--card-border);
  direction: ltr;
}
html.light .bottom-nav { background: rgba(216,228,240,0.95); }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 16px; background: transparent; border: none;
  color: var(--text-dim); cursor: pointer; font-family: var(--font-ui);
  font-size: 11px; transition: color 0.2s; min-width: 60px;
}
.nav-item.active { color: var(--gold); }
.nav-item:hover { color: var(--gold); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
  .poem-card { transform: none !important; clip-path: none; }
  canvas#water { display: none; }
}
@media (max-width: 768px) {
  .vertical-rail { display: none; }
  .reader { padding: 70px 16px 40px; }
  .poem-card { padding: 1.5rem; }
  .poem-actions { flex-wrap: wrap; }
  .splash-content { padding: 24px; }
}
</style>
</head>
<body>

<canvas id="water"></canvas>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-drop"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-content">
    <div class="splash-brand">
      <span class="splash-brand-en">poetry</span>
      <span class="splash-brand-ar">بالعربي</span>
    </div>
    <p class="splash-subtitle">Poetry on Still Water</p>
    <button class="splash-enter" id="splashEnter">Enter</button>
  </div>
</div>

<!-- WALKTHROUGH -->
<div class="walkthrough" id="walkthrough">
  <div class="walk-card" id="walkCard">
    <div class="walk-icon" id="walkIcon"></div>
    <h3 id="walkTitle"></h3>
    <div class="walk-ar" id="walkAr"></div>
    <p id="walkDesc"></p>
  </div>
  <div class="walk-progress" id="walkProgress"></div>
  <span class="walk-hint">Tap anywhere to continue</span>
</div>

<!-- MAIN APP -->
<div class="main-app" id="mainApp">
  <header class="app-top">
    <div class="app-top-brand">
      <span class="app-top-brand-en">poetry</span>
      <span class="app-top-brand-ar">بالعربي</span>
    </div>
    <div class="app-top-actions">
      <button class="app-top-btn" id="themeToggle" aria-label="Toggle theme">
        <i data-lucide="sun" style="width:18px;height:18px"></i>
      </button>
      <button class="app-top-btn" aria-label="Settings">
        <i data-lucide="settings" style="width:18px;height:18px"></i>
      </button>
    </div>
  </header>

  <nav class="vertical-rail">
    <button class="rail-btn"><i data-lucide="heart" style="width:18px;height:18px"></i><span class="tooltip">Save</span></button>
    <button class="rail-btn"><i data-lucide="type" style="width:18px;height:18px"></i><span class="tooltip">Font size</span></button>
    <button class="rail-btn"><i data-lucide="languages" style="width:18px;height:18px"></i><span class="tooltip">Transliteration</span></button>
    <button class="rail-btn"><i data-lucide="book-open" style="width:18px;height:18px"></i><span class="tooltip">Tafsir</span></button>
    <button class="rail-btn"><i data-lucide="italic" style="width:18px;height:18px"></i><span class="tooltip">Tashkeel</span></button>
    <button class="rail-btn"><i data-lucide="log-in" style="width:18px;height:18px"></i><span class="tooltip">Sign in</span></button>
    <button class="rail-btn"><i data-lucide="settings" style="width:18px;height:18px"></i><span class="tooltip">Settings</span></button>
  </nav>

  <div class="reader">
    <article class="poem-card">
      <div class="poem-meta">
        <div class="poet-avatar">م</div>
        <div class="poet-info">
          <h2>المتنبي</h2>
          <span>Al-Mutanabbi</span>
        </div>
      </div>
      <div class="poem-verses" dir="rtl" lang="ar">
        <div class="verse-line">
          عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ
          <span class="hemistich-divider"></span>
          وَتَأْتِي عَلَى قَدْرِ الكِرَامِ المَكَارِمُ
        </div>
      </div>
      <div class="poem-actions">
        <button class="poem-action-btn">
          <i data-lucide="copy" style="width:16px;height:16px"></i> نسخ
        </button>
        <button class="poem-action-btn">
          <i data-lucide="share-2" style="width:16px;height:16px"></i> مشاركة
        </button>
        <button class="poem-action-btn">
          <i data-lucide="bookmark" style="width:16px;height:16px"></i> حفظ
        </button>
      </div>
    </article>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item"><i data-lucide="music" style="width:20px;height:20px"></i>Music</button>
    <button class="nav-item"><i data-lucide="lightbulb" style="width:20px;height:20px"></i>Insight</button>
    <button class="nav-item active"><i data-lucide="refresh-cw" style="width:20px;height:20px"></i>Refresh</button>
    <button class="nav-item"><i data-lucide="library" style="width:20px;height:20px"></i>Library</button>
    <button class="nav-item"><i data-lucide="shuffle" style="width:20px;height:20px"></i>Shuffle</button>
  </nav>
</div>

<script>
/* Water Ripple Canvas */
var canvas = document.getElementById('water');
var ctx = canvas.getContext('2d');
var ripples = [];
var isMobile = window.innerWidth <= 768;
var maxRipples = isMobile ? 3 : 5;
var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function resizeCanvas() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  isMobile = window.innerWidth <= 768; maxRipples = isMobile ? 3 : 5;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function Ripple(x, y, speed, maxR) {
  this.x = x; this.y = y; this.radius = 0;
  this.speed = speed || (1 + Math.random() * 1.5);
  this.maxRadius = maxR || (150 + Math.random() * 250);
  this.opacity = 0.6; this.lineWidth = 1.5;
  this.rings = 3 + Math.floor(Math.random() * 3);
  this.ringSpacing = 18 + Math.random() * 12;
}
Ripple.prototype.update = function() {
  this.radius += this.speed;
  var p = this.radius / this.maxRadius;
  this.opacity = Math.max(0, 0.6 * (1 - p * p));
  this.lineWidth = Math.max(0.3, 1.5 * (1 - p));
  return this.radius < this.maxRadius;
};
Ripple.prototype.draw = function(c) {
  var isLight = document.documentElement.classList.contains('light');
  for (var r = 0; r < this.rings; r++) {
    var rr = this.radius - r * this.ringSpacing;
    if (rr <= 0) continue;
    var ro = this.opacity * (1 - r * 0.2);
    if (ro <= 0) continue;
    c.beginPath(); c.arc(this.x, this.y, rr, 0, Math.PI * 2);
    c.strokeStyle = isLight ? 'rgba(90,122,148,' + ro + ')' : 'rgba(184,200,216,' + ro + ')';
    c.lineWidth = this.lineWidth; c.stroke();
  }
};

function addRipple(x, y, speed, maxR) {
  if (reducedMotion) return;
  if (ripples.length >= maxRipples + 2) ripples.shift();
  ripples.push(new Ripple(x, y, speed, maxR));
}

var ambientTimer = 0;
var ambientInterval = isMobile ? 180 : 100;

function animate() {
  if (reducedMotion) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ambientTimer++;
  if (ambientTimer >= ambientInterval && ripples.length < maxRipples) {
    ambientTimer = 0;
    ambientInterval = isMobile ? (150 + Math.random() * 120) : (80 + Math.random() * 80);
    addRipple(Math.random() * canvas.width, Math.random() * canvas.height,
      0.5 + Math.random(), 100 + Math.random() * 200);
  }
  var alive = [];
  for (var i = 0; i < ripples.length; i++) {
    if (ripples[i].update()) { ripples[i].draw(ctx); alive.push(ripples[i]); }
  }
  ripples = alive;
  requestAnimationFrame(animate);
}

if (!reducedMotion) {
  setTimeout(function() { addRipple(canvas.width / 2, canvas.height * 0.48, 2, 350); }, 1500);
  setTimeout(function() { addRipple(canvas.width / 2, canvas.height * 0.48, 1.5, 450); }, 1800);
  animate();
}

document.addEventListener('click', function(e) {
  if (reducedMotion) return;
  addRipple(e.clientX, e.clientY, 1.5 + Math.random(), 120 + Math.random() * 100);
});

/* Walkthrough */
var walkSteps = [
  { icon: 'waves', title: 'Poetry on Still Water', ar: '\u0634\u0639\u0631 \u0639\u0644\u0649 \u0627\u0644\u0645\u0627\u0621', desc: 'A serene experience where Arabic poetry floats on rippling water, inviting contemplation.' },
  { icon: 'compass', title: 'Discover 84,000+ Poems', ar: '\u0627\u0643\u062A\u0634\u0641 \u0628\u062D\u0631 \u0627\u0644\u0634\u0639\u0631', desc: 'Browse classical and modern Arabic poems spanning centuries of literary heritage.' },
  { icon: 'sparkles', title: 'AI-Powered Insights', ar: '\u0631\u0624\u0649 \u0630\u0643\u064A\u0629', desc: 'Get deep analysis of meter, meaning, and historical context with intelligent annotations.' },
  { icon: 'heart', title: 'Save Your Favorites', ar: '\u0627\u062D\u0641\u0638 \u0648\u0634\u0627\u0631\u0643', desc: 'Build your personal collection and share the beauty of Arabic poetry.' }
];
var currentStep = 0;

function renderStep() {
  var step = walkSteps[currentStep];
  var card = document.getElementById('walkCard');
  var iconEl = document.getElementById('walkIcon');
  var titleEl = document.getElementById('walkTitle');
  var arEl = document.getElementById('walkAr');
  var descEl = document.getElementById('walkDesc');
  var progress = document.getElementById('walkProgress');

  while (iconEl.firstChild) iconEl.removeChild(iconEl.firstChild);
  var ic = document.createElement('i');
  ic.setAttribute('data-lucide', step.icon);
  ic.style.width = '24px'; ic.style.height = '24px';
  iconEl.appendChild(ic);

  titleEl.textContent = step.title;
  arEl.textContent = step.ar;
  descEl.textContent = step.desc;

  while (progress.firstChild) progress.removeChild(progress.firstChild);
  for (var d = 0; d < walkSteps.length; d++) {
    var dot = document.createElement('div');
    dot.className = 'walk-dot' + (d === currentStep ? ' active' : '');
    progress.appendChild(dot);
  }

  card.classList.remove('visible');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { card.classList.add('visible'); });
  });
  if (typeof lucide !== 'undefined') lucide.createIcons();
  addRipple(canvas.width / 2, canvas.height / 2, 2.5);
}

document.getElementById('splashEnter').addEventListener('click', function() {
  document.getElementById('splash').classList.add('hidden');
  setTimeout(function() {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('walkthrough').classList.add('active');
    currentStep = 0;
    renderStep();
  }, 800);
});

document.getElementById('walkthrough').addEventListener('click', function() {
  currentStep++;
  if (currentStep >= walkSteps.length) {
    document.getElementById('walkthrough').style.display = 'none';
    document.getElementById('mainApp').classList.add('active');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  } else {
    renderStep();
  }
});

document.getElementById('themeToggle').addEventListener('click', function() {
  document.documentElement.classList.toggle('light');
});

document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
</body>
</html>
