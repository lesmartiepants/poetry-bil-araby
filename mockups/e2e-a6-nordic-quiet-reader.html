<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A6: Northern Lights - Poetry bil Araby</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --aurora-green: #66FFCC;
      --aurora-purple: #9966FF;
      --aurora-teal: #33CCAA;
      --fjord-dark: #0A0E14;
      --fjord-mid: #141C26;
      --snow-white: #EEF2F7;
      --rune-gold: #D4B86A;
      --ice-blue: #7AB8D9;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--fjord-dark);
      color: var(--snow-white);
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    body.light {
      background: #F0F4F8;
      color: #1a2030;
    }

    /* ===== AURORA CANVAS ===== */
    canvas#auroraCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      will-change: transform;
    }

    body.light canvas#auroraCanvas {
      opacity: 0.25;
    }

    /* ===== SPLASH SCREEN ===== */
    .splash {
      position: fixed;
      inset: 0;
      background: var(--fjord-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      z-index: 9999;
      animation: splashFadeOut 1s ease 3.5s forwards;
      overflow: hidden;
    }

    /* Fjord silhouette */
    .fjord-silhouette {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35vh;
      will-change: opacity;
    }

    .splash-content {
      position: absolute;
      top: 28%;
      text-align: center;
      z-index: 10;
    }

    /* Rune-inspired decorative border */
    .rune-border {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeInDown 1s ease 0.5s forwards;
      will-change: opacity, transform;
    }

    .rune-symbol {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--rune-gold);
      transform: rotate(45deg);
      position: relative;
      opacity: 0.7;
    }

    .rune-symbol::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      background: var(--rune-gold);
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }

    .rune-symbol:nth-child(2) {
      border-color: var(--aurora-green);
    }
    .rune-symbol:nth-child(2)::after {
      background: var(--aurora-green);
    }
    .rune-symbol:nth-child(4) {
      border-color: var(--aurora-purple);
    }
    .rune-symbol:nth-child(4)::after {
      background: var(--aurora-purple);
    }

    .splash-title {
      font-family: 'Amiri', serif;
      font-size: clamp(32px, 6vw, 52px);
      color: var(--snow-white);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeInDown 1s ease 1s forwards;
      text-shadow: 0 0 40px rgba(102, 255, 204, 0.3);
      will-change: opacity, transform;
    }

    .splash-subtitle {
      font-size: 15px;
      color: var(--ice-blue);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInDown 1s ease 1.5s forwards;
      will-change: opacity, transform;
    }

    .aurora-line {
      width: 80px;
      height: 2px;
      margin: 20px auto 0;
      background: linear-gradient(90deg, var(--aurora-green), var(--aurora-purple));
      border-radius: 2px;
      opacity: 0;
      animation: fadeInDown 1s ease 2s forwards;
      will-change: opacity, transform;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes splashFadeOut {
      to { opacity: 0; pointer-events: none; }
    }

    /* ===== WALKTHROUGH ===== */
    .walkthrough {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 20, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }

    body.light .walkthrough {
      background: rgba(240, 244, 248, 0.97);
    }

    .walkthrough.active { display: flex; }

    .walkthrough-card {
      background: var(--fjord-mid);
      border-radius: 16px;
      padding: 50px 45px;
      max-width: 480px;
      text-align: center;
      border: 1px solid rgba(102, 255, 204, 0.2);
      box-shadow: 0 0 60px rgba(102, 255, 204, 0.1), 0 20px 60px rgba(0,0,0,0.5);
      animation: cardAppear 0.6s ease;
      will-change: transform, opacity;
    }

    body.light .walkthrough-card {
      background: white;
      border-color: rgba(102, 255, 204, 0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Rune decoration on card */
    .card-rune-top {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .card-rune-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--aurora-green);
      opacity: 0.6;
    }

    .card-rune-dot:nth-child(2) { background: var(--aurora-purple); }
    .card-rune-dot:nth-child(3) { background: var(--rune-gold); }

    .walkthrough-card h2 {
      font-family: 'Amiri', serif;
      font-size: 28px;
      color: var(--aurora-green);
      margin-bottom: 18px;
      font-weight: 400;
    }

    body.light .walkthrough-card h2 {
      color: #2A8A6A;
    }

    .walkthrough-card p {
      color: var(--ice-blue);
      font-size: 16px;
      line-height: 1.9;
      font-weight: 300;
    }

    body.light .walkthrough-card p {
      color: #5588AA;
    }

    .step-indicators {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(102, 255, 204, 0.25);
      transition: all 0.3s ease;
    }

    .step-dot.active {
      background: var(--aurora-green);
      box-shadow: 0 0 10px rgba(102, 255, 204, 0.5);
    }

    .walkthrough-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      justify-content: center;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 44px;
      min-height: 44px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--aurora-green), var(--aurora-teal));
      color: var(--fjord-dark);
      font-weight: 500;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 255, 204, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--ice-blue);
      border: 1px solid rgba(122, 184, 217, 0.3);
    }

    .btn-secondary:hover {
      border-color: var(--ice-blue);
    }

    /* ===== MAIN APP ===== */
    .app {
      display: none;
      min-height: 100vh;
      padding: 80px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .app.active { display: block; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 14, 20, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(102, 255, 204, 0.1);
      z-index: 100;
      transition: background 0.3s ease;
    }

    body.light .header {
      background: rgba(240, 244, 248, 0.9);
      border-bottom-color: rgba(102, 255, 204, 0.2);
    }

    .logo {
      font-family: 'Amiri', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--aurora-green);
      text-shadow: 0 0 20px rgba(102, 255, 204, 0.3);
    }

    body.light .logo {
      color: #2A8A6A;
      text-shadow: none;
    }

    .header-runes {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .header-rune {
      width: 5px;
      height: 5px;
      border: 1px solid var(--rune-gold);
      transform: rotate(45deg);
      opacity: 0.5;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid rgba(102, 255, 204, 0.3);
      color: var(--aurora-green);
      width: 44px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    body.light .theme-toggle {
      border-color: rgba(42, 138, 106, 0.3);
      color: #2A8A6A;
    }

    .theme-toggle:hover {
      background: rgba(102, 255, 204, 0.1);
      border-color: var(--aurora-green);
      box-shadow: 0 0 15px rgba(102, 255, 204, 0.2);
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
    }

    .poem-card {
      background: rgba(20, 28, 38, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 55px 50px;
      margin: 30px 0;
      border: 1px solid rgba(102, 255, 204, 0.1);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    body.light .poem-card {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(102, 255, 204, 0.2);
    }

    /* Aurora shimmer on card */
    .poem-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--aurora-green), var(--aurora-purple), transparent);
      animation: auroraShimmer 6s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes auroraShimmer {
      0% { transform: translateX(-25%); }
      50% { transform: translateX(25%); }
      100% { transform: translateX(-25%); }
    }

    .poem-card:hover {
      box-shadow: 0 0 40px rgba(102, 255, 204, 0.1), 0 12px 48px rgba(0, 0, 0, 0.3);
      transform: translateY(-3px);
    }

    .poem-title {
      font-family: 'Amiri', serif;
      font-size: 28px;
      color: var(--aurora-green);
      margin-bottom: 40px;
      text-align: center;
      font-weight: 400;
      text-shadow: 0 0 20px rgba(102, 255, 204, 0.2);
    }

    body.light .poem-title {
      color: #2A8A6A;
      text-shadow: none;
    }

    .poem-verse {
      font-family: 'Amiri', serif;
      font-size: 22px;
      line-height: 2.4;
      text-align: center;
      direction: rtl;
      margin: 40px 0;
      color: var(--snow-white);
    }

    body.light .poem-verse {
      color: #1a2030;
    }

    .poet-name {
      text-align: center;
      color: var(--ice-blue);
      font-size: 16px;
      margin-top: 40px;
      font-weight: 300;
    }

    body.light .poet-name {
      color: #5588AA;
    }

    .control-rail {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 40px;
    }

    .control-btn {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(102, 255, 204, 0.08);
      border: 1px solid rgba(102, 255, 204, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: var(--aurora-green);
    }

    body.light .control-btn {
      background: rgba(42, 138, 106, 0.08);
      border-color: rgba(42, 138, 106, 0.2);
      color: #2A8A6A;
    }

    .control-btn:hover {
      background: var(--aurora-green);
      color: var(--fjord-dark);
      border-color: var(--aurora-green);
      box-shadow: 0 0 20px rgba(102, 255, 204, 0.3);
      transform: translateY(-2px);
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      canvas#auroraCanvas { display: none; }
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .poem-card { padding: 40px 25px; }
      .poem-verse { font-size: 20px; }
      .header { padding: 15px 20px; }
      .rune-border { gap: 8px; }
      .rune-symbol { width: 22px; height: 22px; }
      .splash-content { top: 22%; }
    }
  </style>
</head>
<body>
  <!-- Aurora Canvas (behind everything) -->
  <canvas id="auroraCanvas"></canvas>

  <!-- Splash Screen -->
  <div class="splash" id="splash">
    <!-- Fjord silhouette SVG -->
    <svg class="fjord-silhouette" viewBox="0 0 1440 400" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 400V280L60 260L120 290L200 220L280 250L360 180L440 210L520 150L600 190L680 130L760 170L840 120L920 160L1000 100L1080 140L1160 90L1240 130L1320 110L1440 80V400H0Z" fill="#0D1520" opacity="0.9"/>
      <path d="M0 400V320L80 300L160 330L260 270L340 300L420 240L500 260L580 200L660 230L740 190L820 220L900 180L980 210L1060 170L1140 200L1220 160L1300 190L1440 140V400H0Z" fill="#111B28" opacity="0.7"/>
      <path d="M0 400V350L100 340L200 360L320 310L420 340L520 290L620 320L720 280L820 310L920 270L1020 300L1120 260L1220 290L1320 270L1440 250V400H0Z" fill="#162234"/>
    </svg>

    <div class="splash-content">
      <div class="rune-border">
        <div class="rune-symbol"></div>
        <div class="rune-symbol"></div>
        <div class="rune-symbol"></div>
        <div class="rune-symbol"></div>
        <div class="rune-symbol"></div>
      </div>
      <h1 class="splash-title">Northern Lights</h1>
      <p class="splash-subtitle">Aurora of Arabic Verse</p>
      <div class="aurora-line"></div>
    </div>
  </div>

  <!-- Walkthrough -->
  <div class="walkthrough" id="walkthrough">
    <div class="walkthrough-card">
      <div class="card-rune-top">
        <div class="card-rune-dot"></div>
        <div class="card-rune-dot"></div>
        <div class="card-rune-dot"></div>
      </div>
      <h2 id="walkthrough-title">Aurora of Poetry</h2>
      <p id="walkthrough-text">Watch the northern lights dance as you explore classical Arabic verse beneath the aurora sky.</p>
      <div class="step-indicators" id="stepIndicators">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
      <div class="walkthrough-buttons">
        <button class="btn btn-secondary" onclick="skipWalkthrough()">Skip</button>
        <button class="btn btn-primary" onclick="nextStep()">Continue</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="app">
    <header class="header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="logo">&#1583;&#1610;&#1608;&#1575;&#1606; &#1575;&#1604;&#1588;&#1593;&#1585;</div>
        <div class="header-runes">
          <div class="header-rune"></div>
          <div class="header-rune"></div>
          <div class="header-rune"></div>
        </div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9684;</button>
    </header>

    <div class="container">
      <div class="poem-card">
        <h2 class="poem-title">&#1583;&#1610;&#1608;&#1575;&#1606; &#1575;&#1604;&#1588;&#1593;&#1585; &#1575;&#1604;&#1593;&#1585;&#1576;&#1610;</h2>
        <div class="poem-verse" lang="ar">
          &#1571;&#1614;&#1606;&#1575; &#1575;&#1604;&#1576;&#1614;&#1581;&#1585;&#1615; &#1601;&#1610; &#1571;&#1614;&#1581;&#1588;&#1575;&#1574;&#1616;&#1607;&#1616; &#1575;&#1604;&#1583;&#1615;&#1585;&#1615;&#1617; &#1603;&#1575;&#1605;&#1616;&#1606;&#1612;<br>
          &#1601;&#1614;&#1607;&#1614;&#1604; &#1587;&#1614;&#1571;&#1614;&#1604;&#1608;&#1575; &#1575;&#1604;&#1594;&#1614;&#1608;&#1617;&#1575;&#1589;&#1614; &#1593;&#1614;&#1606; &#1589;&#1614;&#1583;&#1614;&#1601;&#1575;&#1578;&#1610;
        </div>
        <p class="poet-name">&mdash; &#1571;&#1581;&#1605;&#1583; &#1588;&#1608;&#1602;&#1610;</p>

        <div class="control-rail">
          <button class="control-btn" aria-label="Previous">&#8249;</button>
          <button class="control-btn" aria-label="Play">&#9654;</button>
          <button class="control-btn" aria-label="Next">&#8250;</button>
          <button class="control-btn" aria-label="Bookmark">&#9734;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ===== AURORA BOREALIS CANVAS ===== */
    const canvas = document.getElementById('auroraCanvas');
    const ctx = canvas.getContext('2d');
    let animId;
    let auroraTime = 0;

    /* Detect reduced motion */
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /* Responsive particle count */
    const isMobile = window.innerWidth <= 768;
    const BAND_SEGMENTS = isMobile ? 40 : 80;

    /* Aurora bands - each band is a flowing sine wave */
    const bands = [
      { color: [102, 255, 204], y: 0.20, amplitude: 30, frequency: 0.008, speed: 0.003, alpha: 0.12 },
      { color: [153, 102, 255], y: 0.28, amplitude: 40, frequency: 0.006, speed: 0.002, alpha: 0.10 },
      { color: [102, 255, 204], y: 0.15, amplitude: 25, frequency: 0.010, speed: 0.004, alpha: 0.08 },
      { color: [51, 204, 170],  y: 0.24, amplitude: 35, frequency: 0.007, speed: 0.0025, alpha: 0.09 },
      { color: [153, 102, 255], y: 0.35, amplitude: 20, frequency: 0.012, speed: 0.0035, alpha: 0.06 },
    ];

    function drawAuroraBand(band, time) {
      const w = canvas.width;
      const h = canvas.height;
      const baseY = h * band.y;

      ctx.beginPath();
      ctx.moveTo(0, h);

      for (let i = 0; i <= BAND_SEGMENTS; i++) {
        const x = (i / BAND_SEGMENTS) * w;
        const waveY = baseY
          + Math.sin(x * band.frequency + time * band.speed * 1000) * band.amplitude
          + Math.sin(x * band.frequency * 0.5 + time * band.speed * 600) * band.amplitude * 0.5;
        if (i === 0) ctx.moveTo(x, waveY);
        else ctx.lineTo(x, waveY);
      }

      /* Close the path downward to create a filled band */
      const lastX = w;
      const bandHeight = 120 + Math.sin(time * 0.5) * 30;
      ctx.lineTo(lastX, baseY + bandHeight);

      for (let i = BAND_SEGMENTS; i >= 0; i--) {
        const x = (i / BAND_SEGMENTS) * w;
        const waveY = baseY + bandHeight
          + Math.sin(x * band.frequency * 0.7 + time * band.speed * 800) * band.amplitude * 0.3;
        ctx.lineTo(x, waveY);
      }

      ctx.closePath();

      const gradient = ctx.createLinearGradient(0, baseY - band.amplitude, 0, baseY + bandHeight);
      const [r, g, b] = band.color;
      gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0)`);
      gradient.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${band.alpha})`);
      gradient.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${band.alpha * 0.7})`);
      gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

      ctx.fillStyle = gradient;
      ctx.fill();
    }

    function animateAurora(time) {
      if (prefersReducedMotion) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      auroraTime = time * 0.001;
      bands.forEach(band => drawAuroraBand(band, auroraTime));
      animId = requestAnimationFrame(animateAurora);
    }

    if (!prefersReducedMotion) {
      requestAnimationFrame(animateAurora);
    }

    /* ===== WALKTHROUGH ===== */
    let step = 0;
    const steps = [
      { title: 'Aurora of Poetry', text: 'Watch the northern lights dance as you explore classical Arabic verse beneath the aurora sky.' },
      { title: 'Fjord Serenity', text: 'Inspired by Scandinavian fjords -- vast, peaceful landscapes frame each poem with reverence.' },
      { title: 'Rune Navigation', text: 'Navigate through 84,000 poems with controls inspired by ancient Nordic rune stones.' },
      { title: 'Begin the Journey', text: 'Step into the aurora and discover the timeless beauty of Arabic poetry.' }
    ];

    function updateIndicators() {
      const dots = document.querySelectorAll('.step-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === step);
      });
    }

    setTimeout(() => {
      document.getElementById('walkthrough').classList.add('active');
    }, 4200);

    function nextStep() {
      step++;
      if (step >= steps.length) {
        startApp();
      } else {
        document.getElementById('walkthrough-title').textContent = steps[step].title;
        document.getElementById('walkthrough-text').textContent = steps[step].text;
        updateIndicators();
      }
    }

    function skipWalkthrough() {
      startApp();
    }

    function startApp() {
      document.getElementById('walkthrough').classList.remove('active');
      document.getElementById('app').classList.add('active');
    }

    function toggleTheme() {
      document.body.classList.toggle('light');
    }
  </script>
</body>
</html>
