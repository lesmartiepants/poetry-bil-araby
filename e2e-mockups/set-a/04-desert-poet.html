<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2E #4: Desert Poet — Cinematic Warmth</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --sand: #f4d2a7;
  --sand-dark: #db8a58;
  --earth: #3a1d12;
  --earth-mid: #7c4a2e;
  --gold: #C5A059;
  --text: #3a1d12;
  --text-dim: rgba(58, 29, 18, 0.5);
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.dark {
  --sand: #2a1d15;
  --sand-dark: #1a1210;
  --earth: #f4d2a7;
  --earth-mid: #c5a059;
  --text: #f4d2a7;
  --text-dim: rgba(244, 210, 167, 0.5);
}
html {
  font-family: var(--font-ui);
  background: var(--sand);
  color: var(--text);
}
body { min-height: 100vh; }

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: rgba(197, 160, 89, 0.15);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  font-size: 20px;
}
.theme-toggle:hover {
  background: rgba(197, 160, 89, 0.3);
  transform: scale(1.1);
}

canvas#desert {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
}

.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.desert-rays {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(219, 138, 88, 0.2), transparent 60%);
  animation: glowPulse 8s ease-in-out infinite alternate;
  pointer-events: none;
  will-change: opacity;
}
@keyframes glowPulse {
  0% { opacity: 0.4; }
  100% { opacity: 0.7; }
}

.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
}

/* SPLASH */
#splash {
  background: var(--sand);
}
.splash-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
  max-width: 700px;
  animation: riseFromSand 1.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes riseFromSand {
  from { opacity: 0; transform: translateY(60px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.desert-logo {
  font-family: var(--font-ar);
  font-size: clamp(4rem, 10vw, 6rem);
  font-weight: 700;
  color: var(--earth);
  margin-bottom: 24px;
  text-shadow: 0 2px 8px rgba(58, 29, 18, 0.15);
  animation: sunRise 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s backwards;
}
@keyframes sunRise {
  from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

.desert-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-bottom: 56px;
  animation: fadeIn 1s 0.7s backwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.desert-btn {
  padding: 18px 52px;
  min-width: 44px;
  min-height: 44px;
  border: 2px solid var(--gold);
  background: linear-gradient(135deg, rgba(197, 160, 89, 0.2), rgba(219, 138, 88, 0.1));
  color: var(--earth);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.35em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(8px);
  border-radius: 4px;
  animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s backwards;
  will-change: transform;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}
.desert-btn:hover {
  background: linear-gradient(135deg, rgba(197, 160, 89, 0.4), rgba(219, 138, 88, 0.2));
  box-shadow: 0 8px 32px rgba(197, 160, 89, 0.3);
  transform: translateY(-3px);
}

/* MAIN */
#main {
  background: var(--sand);
  display: none;
  padding: 40px 24px;
}
.desert-layout {
  position: relative;
  z-index: 2;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.desert-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding: 16px 0;
  border-bottom: 2px solid rgba(197, 160, 89, 0.2);
}
.desert-brand {
  font-family: var(--font-ar);
  font-size: 32px;
  font-weight: 700;
  color: var(--earth);
}

.oasis-card {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
  border: 2px solid rgba(197, 160, 89, 0.3);
  border-radius: 20px;
  padding: 48px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(58, 29, 18, 0.1);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.oasis-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(197, 160, 89, 0.1), transparent 70%);
  animation: shimmerWave 6s linear infinite;
}
@keyframes shimmerWave {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.oasis-card:hover {
  border-color: var(--gold);
  box-shadow: 0 12px 48px rgba(197, 160, 89, 0.25);
  transform: translateY(-4px);
}

.poem-lines {
  font-family: var(--font-ar);
  font-size: 34px;
  line-height: 2.3;
  color: var(--earth);
  text-align: right;
  direction: rtl;
  margin-bottom: 32px;
  position: relative;
  z-index: 1;
}
.poem-poet {
  font-size: 15px;
  color: var(--gold);
  text-align: left;
  font-weight: 600;
  position: relative;
  z-index: 1;
}

.mirage-btn {
  padding: 14px 40px;
  min-width: 44px;
  min-height: 44px;
  background: linear-gradient(135deg, var(--gold), var(--sand-dark));
  color: white;
  border: none;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 16px rgba(197, 160, 89, 0.3);
}
.mirage-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 24px rgba(197, 160, 89, 0.4);
}

@media (max-width: 768px) {
  .desert-logo { font-size: 4rem; }
  .splash-content { padding: 24px; }
  .oasis-card { padding: 32px 24px; }
  .poem-lines {
    font-size: 26px;
    line-height: 2;
  }
  .theme-toggle {
    width: 44px;
    height: 44px;
    top: 16px;
    right: 16px;
  }
  .label {
    font-size: 8px;
    top: 16px;
    left: 16px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .desert-rays { animation: none; }
}
</style>
</head>
<body>
  <canvas id="desert"></canvas>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">🌙</span>
  </button>

  <div class="screen" id="splash">
    <div class="desert-rays"></div>
    <div class="label">Desert Poet</div>
    <div class="splash-content">
      <h1 class="desert-logo">قافية</h1>
      <p class="desert-subtitle">Verses From The Sands</p>
      <button class="desert-btn" onclick="showMain()">Journey Begins</button>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="desert-rays"></div>
    <div class="desert-layout">
      <nav class="desert-nav">
        <div class="desert-brand">قافية</div>
      </nav>

      <div class="oasis-card">
        <div class="poem-lines" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="poem-poet">— أحمد شوقي</div>
      </div>

      <button class="mirage-btn">Next Oasis</button>
    </div>
  </div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  html.classList.toggle('dark');
  icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}

function showMain() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

// Desert Light Beams Animation
const canvas = document.getElementById('desert');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class LightBeam {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = 0;
    this.height = Math.random() * 300 + 200;
    this.width = Math.random() * 100 + 50;
    this.opacity = Math.random() * 0.1 + 0.05;
    this.speed = Math.random() * 0.5 + 0.2;
  }

  update() {
    this.opacity += this.speed * 0.01;
    if (this.opacity > 0.15 || this.opacity < 0.03) {
      this.speed *= -1;
    }
  }

  draw() {
    const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
    gradient.addColorStop(0, `rgba(219, 138, 88, ${this.opacity})`);
    gradient.addColorStop(1, 'rgba(219, 138, 88, 0)');

    ctx.fillStyle = gradient;
    ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
  }
}

const beams = Array.from({ length: 8 }, () => new LightBeam());

function animateDesert() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  beams.forEach(beam => {
    beam.update();
    beam.draw();
  });
  requestAnimationFrame(animateDesert);
}
animateDesert();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
