<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poetry bil Araby — شعر بالعربي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Scandinavian palette */
    --off-white:   #fafaf7;
    --warm-gray:   #8c8c88;
    --cool-gray:   #b8b8b4;
    --charcoal:    #2d2d2d;
    --near-black:  #1a1a18;
    --accent:      #7a6a50; /* warm bronze — one accent, nothing more */
    --accent-soft: rgba(122, 106, 80, 0.18);
    --accent-line: rgba(122, 106, 80, 0.35);

    --bg:          var(--near-black);
    --surface:     rgba(250, 250, 247, 0.04);
    --surface-mid: rgba(250, 250, 247, 0.07);
    --border:      rgba(250, 250, 247, 0.10);
    --fg:          var(--off-white);
    --fg-muted:    var(--cool-gray);
  }
  [data-theme="light"] {
    --bg:          var(--off-white);
    --surface:     rgba(45, 45, 45, 0.04);
    --surface-mid: rgba(45, 45, 45, 0.07);
    --border:      rgba(45, 45, 45, 0.12);
    --fg:          var(--charcoal);
    --fg-muted:    var(--warm-gray);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow-x: hidden;
    min-height: 100vh;
    transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ============================================================
     SPLASH SCREEN
  ============================================================ */
  #splash {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--near-black);
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #splash.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #splash-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }

  /* Brand block — the centrepiece */
  .splash-brand {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    opacity: 0;
    animation: brandReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
  }
  @keyframes brandReveal {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .splash-brand-en {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--cool-gray);
  }
  .splash-brand-divider {
    width: 48px; height: 1px;
    background: var(--accent-line);
  }
  .splash-brand-ar {
    font-family: 'Amiri', serif;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    font-weight: 700;
    color: var(--off-white);
    letter-spacing: 0.02em;
  }
  .splash-tagline {
    margin-top: 8px;
    font-family: 'Amiri', serif;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--accent);
    letter-spacing: 0.12em;
    opacity: 0;
    animation: brandReveal 1s ease 2.2s forwards;
  }

  /* Thin progress line at bottom of splash */
  .splash-progress {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }
  .splash-progress-fill {
    height: 100%;
    background: var(--accent);
    animation: progressFill 5.5s linear forwards;
    transform-origin: left;
  }
  @keyframes progressFill {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  #skip-btn {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    padding: 10px 32px;
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer; z-index: 1001;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
    min-width: 44px; min-height: 44px;
    opacity: 0;
    animation: brandReveal 0.8s ease 3s forwards;
  }
  #skip-btn:hover {
    border-color: var(--accent-line);
    color: var(--off-white);
    background: var(--surface);
  }
  #skip-btn:focus {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  /* ============================================================
     MAIN APP
  ============================================================ */
  #app { display: none; position: relative; min-height: 100vh; }
  #app.visible { display: block; }

  #ambient-canvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: 0.4;
  }

  .content { position: relative; z-index: 1; }

  /* ============================================================
     HEADER
  ============================================================ */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex; flex-direction: column; gap: 2px;
  }
  .logo-ar {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--fg);
    line-height: 1;
  }
  .logo-en {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  .header-actions {
    display: flex; align-items: center; gap: 12px;
  }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 2px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.25s, color 0.25s, background 0.25s;
  }
  .icon-btn:hover {
    border-color: var(--accent-line);
    color: var(--fg);
    background: var(--surface);
  }
  .icon-btn:focus {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ============================================================
     POEM SECTION
  ============================================================ */
  .poem-section {
    display: flex; align-items: center; justify-content: center;
    min-height: 65vh; padding: 64px 24px;
  }

  .poem-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 64px 56px;
    max-width: 720px; width: 100%;
    text-align: center;
    position: relative; overflow: hidden;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .poem-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
  }

  /* Accent left rule */
  .poem-card::before {
    content: '';
    position: absolute; top: 40px; bottom: 40px;
    right: 0; width: 2px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .poem-text {
    font-family: 'Amiri', serif;
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    line-height: 2.6;
    color: var(--fg);
    position: relative; z-index: 1;
  }
  .poem-text .hemistich {
    display: block;
    margin-bottom: 4px;
  }

  .poet-name {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 32px;
    position: relative; z-index: 1;
  }

  /* ============================================================
     CONTROLS
  ============================================================ */
  .controls {
    display: flex; gap: 8px; justify-content: center;
    padding: 32px 24px;
  }

  .ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 2px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.25s, color 0.25s, background 0.25s;
    will-change: transform;
  }
  .ctrl-btn:hover {
    border-color: var(--accent-line);
    color: var(--fg);
    background: var(--surface-mid);
  }
  .ctrl-btn:focus {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
  .ctrl-btn svg { width: 18px; height: 18px; }

  /* ============================================================
     WALKTHROUGH
  ============================================================ */
  .walkthrough {
    padding: 96px 40px; max-width: 960px; margin: 0 auto;
  }

  .walk-header {
    margin-bottom: 64px; text-align: center;
  }
  .walk-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: block;
  }
  .walk-title {
    font-family: 'Amiri', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--fg);
    line-height: 1.3;
  }

  .bento-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .step-card {
    background: var(--bg);
    padding: 40px 36px;
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(24px);
    transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform, opacity;
  }
  .step-card:nth-child(2) { transition-delay: 0.08s; }
  .step-card:nth-child(3) { transition-delay: 0.16s; }
  .step-card:nth-child(4) { transition-delay: 0.24s; }

  .step-card.revealed {
    opacity: 1; transform: translateY(0);
  }

  .step-card:hover { background: var(--surface); }

  .step-num {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
  }

  .step-label {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .step-desc {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--fg-muted);
  }

  /* ============================================================
     FOOTER
  ============================================================ */
  footer {
    padding: 48px 40px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-brand {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  .footer-brand span {
    font-family: 'Amiri', serif;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    text-transform: none;
  }

  /* ============================================================
     REDUCED MOTION
  ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0s !important;
      transition-duration: 0s !important;
    }
    #splash-canvas, #ambient-canvas { display: none; }
    .step-card { opacity: 1; transform: none; }
    .poem-card:hover { transform: none; }
    .splash-brand { opacity: 1; }
  }

  /* ============================================================
     MOBILE
  ============================================================ */
  @media (max-width: 768px) {
    header { padding: 20px 24px; }
    .poem-text { font-size: 1.45rem; line-height: 2.3; }
    .poem-card { padding: 40px 28px; }
    .ctrl-btn { width: 46px; height: 46px; }
    .bento-grid { grid-template-columns: 1fr; }
    .walkthrough { padding: 64px 20px; }
    footer { flex-direction: column; gap: 8px; text-align: center; padding: 32px 20px; }
  }
</style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash" role="dialog" aria-modal="true" aria-label="شاشة الترحيب">
    <canvas id="splash-canvas" aria-hidden="true"></canvas>

    <div class="splash-brand">
      <span class="splash-brand-en">Poetry bil Araby</span>
      <div class="splash-brand-divider"></div>
      <span class="splash-brand-ar">شعر بالعربي</span>
      <span class="splash-tagline">مكتبة شعرية عربية</span>
    </div>

    <div class="splash-progress" aria-hidden="true">
      <div class="splash-progress-fill"></div>
    </div>

    <button id="skip-btn" type="button">تخطي</button>
  </div>

  <!-- Main Application -->
  <div id="app" aria-live="polite">
    <canvas id="ambient-canvas" aria-hidden="true"></canvas>

    <div class="content">

      <header>
        <div class="logo">
          <span class="logo-ar">شعر بالعربي</span>
          <span class="logo-en">Poetry bil Araby</span>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn" type="button" aria-label="تبديل السمة">
            <!-- Sun icon -->
            <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Moon icon -->
            <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </header>

      <main>
        <section class="poem-section" aria-label="القصيدة">
          <article class="poem-card">
            <div class="poem-text" lang="ar">
              <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
              <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
            </div>
            <div class="poet-name">أحمد شوقي</div>
          </article>
        </section>

        <nav class="controls" aria-label="أدوات التحكم">
          <!-- Play -->
          <button class="ctrl-btn" type="button" aria-label="تشغيل" data-action="play">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <!-- Save/Heart -->
          <button class="ctrl-btn" type="button" aria-label="حفظ" data-action="save">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <!-- Next/Refresh -->
          <button class="ctrl-btn" type="button" aria-label="التالي" data-action="next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          </button>
          <!-- Font size -->
          <button class="ctrl-btn" type="button" aria-label="حجم الخط" data-action="font">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </button>
          <!-- Share -->
          <button class="ctrl-btn" type="button" aria-label="مشاركة" data-action="share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
        </nav>

        <section class="walkthrough" aria-label="كيفية الاستخدام">
          <div class="walk-header">
            <span class="walk-label">البداية</span>
            <h2 class="walk-title">كيف تبدأ رحلتك</h2>
          </div>
          <div class="bento-grid" id="bento-grid"></div>
        </section>
      </main>

      <footer>
        <div class="footer-brand">
          Poetry bil Araby &nbsp;/&nbsp; <span>شعر بالعربي</span>
        </div>
        <div class="footer-brand" style="font-size:0.65rem; opacity:0.5;">
          مكتبة شعرية عربية
        </div>
      </footer>

    </div>
  </div>

<script>
(function() {
  'use strict';

  var isMobile = window.innerWidth < 768;
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var SPLASH_PARTICLE_COUNT = isMobile ? 40 : 80;
  var AMBIENT_PARTICLE_COUNT = isMobile ? 12 : 24;

  /* ===== Theme Toggle ===== */
  var isDark = true;
  var themeBtn = document.getElementById('theme-toggle');
  var iconSun  = document.getElementById('icon-sun');
  var iconMoon = document.getElementById('icon-moon');

  themeBtn.addEventListener('click', function() {
    isDark = !isDark;
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      iconSun.style.display  = 'none';
      iconMoon.style.display = '';
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      iconSun.style.display  = '';
      iconMoon.style.display = 'none';
    }
  });

  /* ===== Walkthrough Steps ===== */
  var steps = [
    {
      num:   '01',
      label: 'ابدأ',
      desc:  'تصفح مكتبة شعرية غنية من روائع الأدب العربي'
    },
    {
      num:   '02',
      label: 'اكتشف',
      desc:  'اكتشف شعراء من مختلف العصور والمدارس الأدبية'
    },
    {
      num:   '03',
      label: 'استمع',
      desc:  'استمع إلى القصائد بصوت واضح وتلاوة جميلة'
    },
    {
      num:   '04',
      label: 'شارك',
      desc:  'احتفظ بمفضلاتك وشاركها مع من تحب'
    }
  ];

  var grid = document.getElementById('bento-grid');
  steps.forEach(function(step) {
    var card = document.createElement('div');
    card.className = 'step-card';

    var numEl = document.createElement('span');
    numEl.className = 'step-num';
    numEl.textContent = step.num;

    var labelEl = document.createElement('h3');
    labelEl.className = 'step-label';
    labelEl.textContent = step.label;

    var descEl = document.createElement('p');
    descEl.className = 'step-desc';
    descEl.textContent = step.desc;

    card.appendChild(numEl);
    card.appendChild(labelEl);
    card.appendChild(descEl);
    grid.appendChild(card);
  });

  /* ===== IntersectionObserver ===== */
  if ('IntersectionObserver' in window && !prefersReducedMotion) {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.step-card').forEach(function(c) { observer.observe(c); });
  } else {
    document.querySelectorAll('.step-card').forEach(function(c) {
      c.classList.add('revealed');
    });
  }

  /* ===== Particle factory ===== */
  function createParticle(w, h) {
    /* Scandinavian palette: mostly cool neutrals, rare warm accent */
    var colors = ['#b8b8b4', '#8c8c88', '#d6d6d2', '#fafaf7', '#7a6a50'];
    var roll = Math.random();
    var color = roll > 0.88
      ? colors[4]  /* accent — rare */
      : colors[Math.floor(Math.random() * 4)];
    return {
      x:       Math.random() * w,
      y:       Math.random() * h,
      vx:      (Math.random() - 0.5) * 0.4,
      vy:      Math.random() * 0.25 + 0.05,
      size:    Math.random() * 1.8 + 0.4,
      opacity: Math.random() * 0.45 + 0.1,
      color:   color
    };
  }

  /* ===== Splash Animation ===== */
  var splash        = document.getElementById('splash');
  var splashCanvas  = document.getElementById('splash-canvas');
  var sCtx          = splashCanvas.getContext('2d');
  var splashParticles = [];
  var splashPhase   = 0; /* 0=drift, 1=gather, 2=vortex, 3=settle */
  var splashTimer   = 0;
  var splashDone    = false;
  var splashRafId   = null;

  /* Phase timing (frames at 60fps) — slow, cinematic */
  var PHASE_GATHER  = 110;
  var PHASE_VORTEX  = 260;
  var PHASE_SETTLE  = 380;
  var PHASE_END     = 470;

  function initSplash() {
    splashCanvas.width  = window.innerWidth;
    splashCanvas.height = window.innerHeight;
    splashParticles = [];
    for (var i = 0; i < SPLASH_PARTICLE_COUNT; i++) {
      splashParticles.push(createParticle(splashCanvas.width, splashCanvas.height));
    }
  }

  var wordTargets = [];
  function computeWordTargets(w, h) {
    wordTargets = [];
    var cx = w / 2;
    var cy = h / 2;
    var count = splashParticles.length;
    for (var i = 0; i < count; i++) {
      var angle  = (i / count) * Math.PI * 2;
      var radius = 80 + Math.random() * 50;
      wordTargets.push({
        x: cx + Math.cos(angle) * radius * (1 + 0.25 * Math.sin(angle * 4)),
        y: cy + Math.sin(angle) * radius * 0.55
      });
    }
  }

  function animateSplash(time) {
    if (splashDone) return;
    splashRafId = requestAnimationFrame(animateSplash);
    var w = splashCanvas.width;
    var h = splashCanvas.height;
    sCtx.clearRect(0, 0, w, h);
    splashTimer++;

    if (splashTimer === 1)           computeWordTargets(w, h);
    if (splashTimer === PHASE_GATHER) splashPhase = 1;
    if (splashTimer === PHASE_VORTEX) splashPhase = 2;
    if (splashTimer === PHASE_SETTLE) splashPhase = 3;
    if (splashTimer >= PHASE_END)    { endSplash(); return; }

    var cx = w / 2;
    var cy = h / 2;

    for (var i = 0; i < splashParticles.length; i++) {
      var p = splashParticles[i];

      if (splashPhase === 0) {
        /* Gentle Nordic drift — slow, unhurried */
        p.vx += Math.sin(time * 0.0007 + i * 1.2) * 0.015 + 0.012;
        p.vy += Math.cos(time * 0.0005 + i * 0.8) * 0.008;
        p.vx *= 0.992; p.vy *= 0.992;
      } else if (splashPhase === 1) {
        /* Gather toward ring — smooth, deliberate */
        var t  = wordTargets[i];
        var dx = t.x - p.x;
        var dy = t.y - p.y;
        p.vx += dx * 0.006;
        p.vy += dy * 0.006;
        p.vx *= 0.93; p.vy *= 0.93;
      } else if (splashPhase === 2) {
        /* Slow vortex — elegant */
        var ax   = p.x - cx;
        var ay   = p.y - cy;
        var dist = Math.sqrt(ax * ax + ay * ay) || 1;
        var tx   = -ay / dist;
        var ty   =  ax / dist;
        p.vx += tx * 0.28 - ax * 0.0015;
        p.vy += ty * 0.28 - ay * 0.0015;
        p.vx *= 0.975; p.vy *= 0.975;
      } else {
        /* Settle — particles fall like snow */
        p.vx *= 0.93; p.vy *= 0.93;
        p.vy += 0.03;
        p.opacity *= 0.975;
      }

      p.x += p.vx;
      p.y += p.vy;

      if (p.x > w + 8) p.x = -8;
      if (p.x < -8)    p.x = w + 8;
      if (p.y > h + 8) { p.y = -8; p.x = Math.random() * w; }

      sCtx.beginPath();
      sCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      sCtx.fillStyle = p.color;
      sCtx.globalAlpha = p.opacity;
      sCtx.fill();
    }
    sCtx.globalAlpha = 1;
  }

  function endSplash() {
    splashDone = true;
    if (splashRafId) cancelAnimationFrame(splashRafId);
    splash.classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    setTimeout(function() { splash.style.display = 'none'; }, 1200);
    startAmbient();
  }

  document.getElementById('skip-btn').addEventListener('click', endSplash);

  /* ===== Ambient Canvas ===== */
  var ambientCanvas   = document.getElementById('ambient-canvas');
  var aCtx            = ambientCanvas.getContext('2d');
  var ambientParticles = [];
  var mouseX = 0, mouseY = 0;
  var ambientRafId = null;

  function initAmbient() {
    ambientCanvas.width  = window.innerWidth;
    ambientCanvas.height = window.innerHeight;
    ambientParticles = [];
    for (var i = 0; i < AMBIENT_PARTICLE_COUNT; i++) {
      var p = createParticle(ambientCanvas.width, ambientCanvas.height);
      p.vx *= 0.25; p.vy *= 0.15;
      p.size    = Math.random() * 1.6 + 0.3;
      p.opacity = Math.random() * 0.25 + 0.06;
      ambientParticles.push(p);
    }
    mouseX = ambientCanvas.width  / 2;
    mouseY = ambientCanvas.height / 2;
  }

  function animateAmbient(time) {
    ambientRafId = requestAnimationFrame(animateAmbient);
    var w = ambientCanvas.width;
    var h = ambientCanvas.height;
    aCtx.clearRect(0, 0, w, h);

    for (var i = 0; i < ambientParticles.length; i++) {
      var p  = ambientParticles[i];
      var dx = mouseX - p.x;
      var dy = mouseY - p.y;
      var d  = Math.sqrt(dx * dx + dy * dy) || 1;
      var f  = Math.min(0.015, 35 / d);
      p.vx += (dx / d) * f + Math.sin(time * 0.0004 + i * 0.9) * 0.004;
      p.vy += (dy / d) * f * 0.25 + 0.002;
      p.vx += Math.sin(time * 0.0008 + p.y * 0.008) * 0.006;
      p.vx *= 0.988; p.vy *= 0.988;
      p.x  += p.vx;
      p.y  += p.vy;
      if (p.x > w + 4) p.x = -4;
      if (p.x < -4)    p.x = w + 4;
      if (p.y > h + 4) { p.y = -4; p.x = Math.random() * w; }
      if (p.y < -4)    p.y = h + 4;

      aCtx.beginPath();
      aCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      aCtx.fillStyle  = p.color;
      aCtx.globalAlpha = p.opacity;
      aCtx.fill();
    }
    aCtx.globalAlpha = 1;
  }

  function startAmbient() {
    if (prefersReducedMotion) return;
    initAmbient();
    animateAmbient(0);
  }

  /* ===== Mouse / Touch ===== */
  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX; mouseY = e.clientY;
  });
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }
  }, { passive: true });

  /* ===== Resize ===== */
  var resizeTimeout;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(function() {
      isMobile = window.innerWidth < 768;
      if (!splashDone) {
        splashCanvas.width  = window.innerWidth;
        splashCanvas.height = window.innerHeight;
      }
      if (ambientCanvas) {
        ambientCanvas.width  = window.innerWidth;
        ambientCanvas.height = window.innerHeight;
      }
    }, 150);
  });

  /* ===== Init ===== */
  if (prefersReducedMotion) {
    splash.style.display = 'none';
    document.getElementById('app').classList.add('visible');
  } else {
    initSplash();
    requestAnimationFrame(animateSplash);
  }

})();
</script>
</body>
</html>
