<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Sparkler Reveal — شعر بالعربي</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Reem+Kufi:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
<script src="./vendor/gsap.min.js"></script>
<style>
  :root{
    --gold:#c5a059; --gold-bright:#d4b463; --amber:#e8923a; --ember:#c2410c;
    --bg:#0a0a0c; --bg2:#101016;
    --text:rgba(236,232,224,.94); --muted:rgba(236,232,224,.4);
    --unit-h: clamp(78px, 13.5vh, 104px);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Cormorant Garamond',Georgia,serif;-webkit-font-smoothing:antialiased}
  /* ambient night sky */
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 12%, rgba(197,160,89,.07), transparent 60%),
               radial-gradient(ellipse at 50% 120%, rgba(46,80,144,.10), transparent 55%);}

  #feed{position:fixed;inset:0;will-change:transform}
  .card{position:relative;width:100vw;height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;overflow:hidden;cursor:pointer;user-select:none}

  /* compact meta — small, quiet */
  .meta{position:absolute;top:calc(env(safe-area-inset-top,0px) + 18px);left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:2px;z-index:5;pointer-events:none;direction:rtl;
    opacity:0}
  .meta .t{font-family:'Reem Kufi',sans-serif;font-size:clamp(.95rem,3.6vw,1.2rem);color:var(--gold-bright);letter-spacing:.01em}
  .meta .p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.72rem,2.8vw,.9rem);color:var(--muted);direction:ltr}

  /* reveal stage — masks to exactly 4 line-units */
  .stage{position:relative;width:min(760px,92vw);height:calc(var(--unit-h) * 4);overflow:hidden;z-index:2}
  .track{position:absolute;left:0;right:0;top:0;will-change:transform}
  .unit{height:var(--unit-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem;text-align:center}
  .unit .ar{font-family:'Amiri',serif;direction:rtl;color:var(--text);line-height:1.7;
    font-size:clamp(1.3rem,4.6vw,2rem);
    clip-path:inset(0 0 0 100%);             /* hidden until ignited (revealed right→left) */
    text-shadow:0 0 0 transparent;will-change:clip-path}
  .unit .en{font-family:'Cormorant Garamond',serif;font-style:italic;direction:ltr;color:var(--muted);
    font-size:clamp(.74rem,3vw,.98rem);line-height:1.35;opacity:0;max-width:92%}
  .unit.lit .ar{text-shadow:0 0 18px rgba(212,180,99,.28)}

  /* sparkler head + canvas */
  .sparks{position:absolute;inset:0;z-index:3;pointer-events:none}
  .head{position:absolute;top:0;left:0;width:30px;height:30px;margin:-15px 0 0 -15px;z-index:4;pointer-events:none;
    opacity:0;will-change:transform,opacity;
    background:radial-gradient(circle, #fff 0%, #ffe9b0 28%, rgba(212,180,99,.7) 50%, transparent 72%);
    filter:blur(.5px) drop-shadow(0 0 10px rgba(255,210,120,.9));mix-blend-mode:screen}
  .head::after{content:'';position:absolute;inset:9px;border-radius:50%;background:#fff;filter:blur(1px)}

  /* progress + prompt */
  .dots{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 116px);left:0;right:0;display:flex;justify-content:center;gap:7px;z-index:5;direction:ltr}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(197,160,89,.28);transition:all .3s ease}
  .dot.on{background:var(--gold);width:16px;border-radius:3px}
  .prompt{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 64px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:.5rem;z-index:5;pointer-events:none}
  .prompt .glyph{color:var(--gold);font-size:1.1rem}
  .prompt .label{font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;color:var(--gold)}
  .insight-btn{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 54px);left:50%;transform:translateX(-50%);z-index:6;
    display:none;align-items:center;gap:.5rem;padding:10px 18px;border-radius:999px;border:1px solid var(--gold);
    background:rgba(197,160,89,.08);color:var(--gold-bright);font-family:'Cormorant Garamond',serif;font-size:.92rem;cursor:pointer;backdrop-filter:blur(6px)}
  .insight-btn.show{display:flex}

  /* scroll affordance between poems */
  .scrollcue{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);left:0;right:0;text-align:center;z-index:5;
    color:var(--muted);font-style:italic;font-size:.72rem;pointer-events:none;opacity:0;transition:opacity .4s}
  .scrollcue.show{opacity:.7}

  #footer{position:fixed;bottom:6px;right:12px;z-index:9;color:var(--muted);font-style:italic;font-size:.66rem;opacity:.5;direction:ltr}

  #switch{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;z-index:9;display:flex;gap:4px;padding:4px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(197,160,89,.25);backdrop-filter:blur(8px);direction:ltr}
  #switch .seg{font-family:'Cormorant Garamond',serif;font-size:.7rem;color:var(--muted);padding:4px 10px;border-radius:999px;cursor:pointer}
  #switch .seg.on{background:var(--gold);color:#1a1408}

  @media (prefers-reduced-motion: reduce){ .head{display:none!important} }
</style>
</head>
<body>
<div id="feed"></div>
<div id="switch"><span data-m="top" class="seg on">Top</span><span data-m="corner" class="seg">Corner</span><span data-m="header" class="seg">Header</span></div>
<div id="footer">Sparkler Reveal — tap to read · pull up for the next poem · try the meta layouts ↖</div>

<script>
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const SPARK_COLORS = ['#ffffff','#ffe9b0','#ffd277','#d4b463','#e8923a','#c2410c'];

const POEMS = [
  { title:'زوال ملك الدنيا', poet:'Abu Ishaq al-Ilbiri', lines:[
    {ar:'أَيْنَ المُلُوكُ وَأَيْنَ مَا جَمَعُوا', en:'Where are the kings, and all they amassed,'},
    {ar:'ذَخَرُوهُ مِنْ ذَهَبِ الْمَتَاعِ الذَّاهِبِ', en:'the gold they hoarded — wealth that passes?'},
    {ar:'وَمِنَ السَّوَابِغِ وَالصَّوَارِمِ وَالقَنَا', en:'Where are the coats of mail, the swords, the lances,'},
    {ar:'وَمِنَ الصَّواهِلِ بُدْنٌ وَشَوَازِبُ', en:'the neighing steeds, the sleek and the well-fed?'},
    {ar:'كَانَتْ سَوَابِقُهَا تَحْمِلُ مِنْهُمْ', en:'Their racing chargers used to carry forth'},
    {ar:'أَقْمَارُ أَنْدِيَةٍ وَأُسْدُ كَتَائِبٍ', en:'moons of the council, lions of the ranks.'},
    {ar:'كَانُوا لُيُوثًا خَفِيَّةً لَكِنَّهُمْ', en:'They were hidden lions — and even so'},
    {ar:'سَكَنُوا غِيَاضَ أَسِنَّةٍ وَقَوَاضِبِ', en:'they made their dens in thickets of blades.'},
    {ar:'قَصَفَتْهُمْ رِيحُ الرَّدَى وَرَمَتْهُمْ', en:'The wind of doom snapped them; they fell,'},
    {ar:'كَفُّ الْمَنُونِ بِكُلِّ سَهْمٍ صَائِبٍ', en:'struck by fate with every unerring arrow.'},
  ]},
  { title:'جدول ونسيم', poet:'Abu al-Baqa al-Rundi', lines:[
    {ar:'وَجَدْوَلٍ كُلَّمَا مَرَّ النَّسِيمُ بِهِ', en:'A brook — whenever the breeze passed over it,'},
    {ar:'كَسَاهُ دَرْعًا لَهَا حَبَابُهُ حُلَقُ', en:'it clothed it in mail whose bubbles were rings.'},
    {ar:'حَتَّى إِذَا انْطَبَعَتْ لَيْلًا بِهِ شُهْبُ', en:'Until, when stars were stamped on it at night,'},
    {ar:'لَمْ تَمْتَرِ الْعَيْنُ فِيهِ أَنَّهُ الأُفْقُ', en:'the eye no longer doubted it was the sky.'},
  ]},
];

/* ---------- build cards ---------- */
const feed = document.getElementById('feed');
const cards = POEMS.map((poem, pi) => {
  const card = document.createElement('section');
  card.className = 'card'; card.dataset.pi = pi;
  card.innerHTML = `
    <div class="meta"><div class="t" lang="ar">${poem.title}</div><div class="p">${poem.poet}</div></div>
    <div class="stage">
      <div class="track"></div>
      <div class="head"></div>
      <canvas class="sparks"></canvas>
    </div>
    <div class="dots"></div>
    <div class="prompt"><span class="glyph">✦</span><span class="label">tap to begin</span></div>
    <button class="insight-btn">✦ see the meaning</button>
    <div class="scrollcue">pull up for the next poem ↑</div>`;
  const track = card.querySelector('.track');
  poem.lines.forEach((ln, i) => {
    const u = document.createElement('div'); u.className = 'unit'; u.dataset.i = i;
    u.innerHTML = `<div class="ar" lang="ar" dir="rtl">${ln.ar}</div><div class="en" dir="ltr">${ln.en}</div>`;
    track.appendChild(u);
  });
  feed.appendChild(card);
  return card;
});

/* ---------- per-card sparkler controller ---------- */
function makeController(card, poem) {
  const stage = card.querySelector('.stage');
  const track = card.querySelector('.track');
  const head  = card.querySelector('.head');
  const canvas= card.querySelector('.sparks');
  const ctx   = canvas.getContext('2d');
  const units = [...card.querySelectorAll('.unit')];
  const dotsEl= card.querySelector('.dots');
  const prompt= card.querySelector('.prompt');
  const insightBtn = card.querySelector('.insight-btn');
  const meta  = card.querySelector('.meta');
  const total = poem.lines.length;
  const pages = Math.ceil(total / 2);            // a "page" = a pair of lines
  let revealed = 0;                               // lines sparkler-revealed so far
  let windowTop = 0;                              // index of the top visible unit
  let busy = false;
  const head_state = { x:0, y:0, alive:false };
  let particles = [];
  let activeTween = null;

  // dots = one per page
  for (let i=0;i<pages;i++){ const d=document.createElement('div'); d.className='dot'; dotsEl.appendChild(d); }
  const dots = [...dotsEl.querySelectorAll('.dot')];
  const syncDots = () => dots.forEach((d,i)=> d.classList.toggle('on', i === Math.floor((revealed-1)/2)));

  function sizeCanvas(){ const r = stage.getBoundingClientRect(); canvas.width = r.width*devicePixelRatio; canvas.height = r.height*devicePixelRatio; canvas.style.width=r.width+'px'; canvas.style.height=r.height+'px'; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
  sizeCanvas(); addEventListener('resize', sizeCanvas);

  // particle loop (runs continuously; cheap when idle)
  let last = performance.now ? performance.now() : 0;
  function loop(now){
    const dt = Math.min(40, now - last); last = now;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (head_state.alive && !reduce){
      for (let k=0;k<4;k++){
        const ang = Math.random()*Math.PI*2;
        const sp = 0.02 + Math.random()*0.10;
        particles.push({ x:head_state.x, y:head_state.y,
          vx:Math.cos(ang)*sp*60, vy:Math.sin(ang)*sp*60 - 0.6,
          life:1, decay:0.0018 + Math.random()*0.0022,
          size:0.6 + Math.random()*1.8, color:SPARK_COLORS[(Math.random()*SPARK_COLORS.length)|0] });
      }
    }
    ctx.globalCompositeOperation = 'lighter';
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= p.decay*dt; if (p.life<=0){ particles.splice(i,1); continue; }
      p.vy += 0.045*dt*0.06;           // gravity
      p.x += p.vx*dt*0.06; p.y += p.vy*dt*0.06;
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ignite a single unit: clip-mask reveal R→L with the sparkler head riding the edge
  function ignite(i){
    return new Promise((res)=>{
      const u = units[i]; if(!u){res();return;}
      const ar = u.querySelector('.ar'); const en = u.querySelector('.en');
      if (reduce){
        gsap.set(ar,{clipPath:'inset(0 0 0 0)'}); gsap.fromTo(u,{opacity:0},{opacity:1,duration:.45});
        gsap.to(en,{opacity:.85,duration:.4,delay:.1}); u.classList.add('lit'); res(); return;
      }
      head.style.opacity = '1'; head_state.alive = true;
      const obj = { p: 1 };
      activeTween = gsap.to(obj, { p: 0, duration: 1.4, ease:'power1.inOut',
        onUpdate(){
          const arRect = ar.getBoundingClientRect(); const cRect = canvas.getBoundingClientRect();
          ar.style.clipPath = `inset(0 0 0 ${obj.p*100}%)`;
          const hx = (arRect.left - cRect.left) + arRect.width*obj.p;
          const hy = (arRect.top - cRect.top) + arRect.height/2;
          head_state.x = hx; head_state.y = hy;
          head.style.transform = `translate(${hx}px, ${hy}px)`;
        },
        onComplete(){
          u.classList.add('lit'); head_state.alive=false;
          gsap.to(head,{opacity:0,duration:.4});
          gsap.to(en,{opacity:.85,duration:.6,delay:.05});
          res();
        }
      });
    });
  }

  function showPrompt(label){ prompt.querySelector('.label').textContent = label; gsap.to(prompt,{opacity:1,duration:.4}); }
  function hidePrompt(){ gsap.to(prompt,{opacity:0,duration:.25}); }

  async function start(){
    hidePrompt();
    const mode = window.META_MODE || 'top';
    gsap.set(meta,{clearProps:'transform'});
    if (mode === 'header'){
      // C — show large & centred for a beat, then settle up into the top bar
      gsap.set(meta,{opacity:0, y:Math.round(window.innerHeight*0.30), scale:1.7, transformOrigin:'center center'});
      await gsapTo(meta,{opacity:1, duration:1.1, ease:'power2.out'});
      await new Promise(r=>setTimeout(r,500));
      await gsapTo(meta,{y:0, scale:1, duration:1.0, ease:'power3.inOut'});
    } else {
      gsap.set(meta,{opacity:0, y:0, scale:1, x:0});
      await gsapTo(meta,{opacity:1, duration:1.0, ease:'power2.out'});
    }
    await ignite(0); revealed=1; syncDots();
    if (mode === 'corner'){
      // B — after the first line ignites, shrink the credit into the top corner
      const rightX = Math.round(window.innerWidth/2 - meta.offsetWidth/2 - 14);
      gsap.to(meta,{x:rightX, scale:.78, opacity:.72, duration:.9, ease:'power3.inOut', transformOrigin:'top right'});
    }
    await new Promise(r=>setTimeout(r,250));
    await ignite(1); revealed=2; syncDots();
    showPrompt('tap to continue');
  }

  async function advance(){
    if (busy) return;
    if (revealed >= total){            // end → offer insight
      hidePrompt(); insightBtn.classList.add('show'); return;
    }
    busy = true; hidePrompt();

    // If the window already holds 4 lines, slide up by one page (2 units) first
    if (revealed - windowTop >= 4){
      windowTop += 2;
      await gsapTo(track, { y: -windowTop * unitH(), duration: .7, ease:'power3.inOut' });
    }
    // reveal the next pair (or single trailing line)
    await ignite(revealed); revealed++; syncDots();
    if (revealed < total){ await new Promise(r=>setTimeout(r,200)); await ignite(revealed); revealed++; syncDots(); }

    busy = false;
    if (revealed >= total){ showEndCue(); } else { showPrompt('tap to continue'); }
  }
  function showEndCue(){ hidePrompt(); insightBtn.classList.add('show'); card.querySelector('.scrollcue').classList.add('show'); }

  function unitH(){ return units[0].getBoundingClientRect().height; }
  function gsapTo(t,v){ return new Promise(r=>gsap.to(t,{...v,onComplete:r})); }

  insightBtn.addEventListener('click',(e)=>{ e.stopPropagation(); insightBtn.textContent='✦ (insight panel would open here)'; });

  return { start, advance, reset(){ revealed=0; windowTop=0; busy=false; particles=[]; head_state.alive=false;
    if(activeTween) activeTween.kill();
    gsap.killTweensOf([track,meta,head]);
    head.style.opacity=0; gsap.set(track,{y:0}); gsap.set(meta,{clearProps:'all'}); meta.style.opacity=0;
    units.forEach(u=>{const ar=u.querySelector('.ar'),en=u.querySelector('.en'); gsap.killTweensOf([ar,en]); u.classList.remove('lit'); ar.style.clipPath='inset(0 0 0 100%)'; en.style.opacity=0;});
    dots.forEach(d=>d.classList.remove('on')); insightBtn.classList.remove('show'); card.querySelector('.scrollcue').classList.remove('show'); } };
}

const controllers = cards.map((c,i)=>makeController(c, POEMS[i]));

/* meta-layout switcher (prototype control) — Top / Corner / Header-fade */
window.META_MODE = 'top';
document.querySelectorAll('#switch .seg').forEach(seg=>{
  seg.addEventListener('click', e=>{
    e.stopPropagation();
    window.META_MODE = seg.dataset.m;
    document.querySelectorAll('#switch .seg').forEach(s=>s.classList.toggle('on', s===seg));
    controllers[cur].reset();
    controllers[cur].start();
  });
});

/* ---------- vertical magnetic feed ---------- */
let cur = 0, feedY = 0;
const H = () => window.innerHeight;
function setFeed(y){ feedY=y; feed.style.transform = `translate3d(0,${-y}px,0)`; }
function goCard(idx){
  idx = Math.max(0, Math.min(cards.length-1, idx));
  const changed = idx !== cur; cur = idx;
  gsap.to({y:feedY},{y:cur*H(),duration:.85,ease:'power4.out',onUpdate(){setFeed(this.targets()[0].y);}});
  if (changed) controllers[cur].start();
}

/* gesture: tap = advance reveal; vertical pull = magnetic next/prev */
let down=false, sy=0, base=0, moved=0, startT=0;
function isBtn(t){ return t.closest('.insight-btn'); }
feed.addEventListener('pointerdown',e=>{ if(isBtn(e.target))return; down=true; sy=e.clientY; base=feedY; moved=0; startT=performance.now(); feed.setPointerCapture?.(e.pointerId); },{passive:true});
feed.addEventListener('pointermove',e=>{ if(!down)return; const dy=e.clientY-sy; moved=Math.max(moved,Math.abs(dy));
  // magnetic resistance: follow at 0.35 until threshold, then looser
  const thresh = H()*0.16;
  let pull = -dy; // positive = pulling up (toward next)
  let eff = Math.sign(pull)*Math.min(Math.abs(pull), thresh)*0.35 + Math.sign(pull)*Math.max(0,Math.abs(pull)-thresh)*0.7;
  setFeed(base + eff);
},{passive:true});
feed.addEventListener('pointerup',e=>{ if(!down)return; down=false; const dy=e.clientY-sy; const dt=performance.now()-startT;
  if (moved < 10 && dt < 350){ controllers[cur].advance(); return; }      // tap
  const thresh = H()*0.18;
  if (-dy > thresh) goCard(cur+1);          // pulled up enough → next (accelerate away)
  else if (dy > thresh) goCard(cur-1);
  else gsap.to({y:feedY},{y:cur*H(),duration:.5,ease:'power3.out',onUpdate(){setFeed(this.targets()[0].y);}}); // magnet back
},{passive:true});

addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();controllers[cur].advance();}
  else if(e.key==='ArrowDown'){e.preventDefault();goCard(cur+1);} else if(e.key==='ArrowUp'){e.preventDefault();goCard(cur-1);} });

/* boot */
function boot(){ setFeed(0); controllers[0].start(); }
if (window.gsap) boot(); else addEventListener('load', boot);
</script>
</body>
</html>
