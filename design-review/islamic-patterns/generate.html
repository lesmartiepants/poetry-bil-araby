<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Pattern Generator — TiledPatternMaker Library</title>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131e;
    --surface2: #1a1a2a;
    --gold: #c5a059;
    --gold-dim: rgba(197,160,89,0.35);
    --gold-bg: rgba(197,160,89,0.1);
    --lapis: #2a5a8c;
    --text: #e8dcc8;
    --muted: rgba(232,220,200,0.5);
    --border: rgba(197,160,89,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: system-ui,-apple-system,sans-serif;
    height: 100%; overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app { display:flex; height:100vh; overflow:hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px; min-width: 220px; max-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
  }
  .tab-row {
    display: flex; gap: 4px;
  }
  .tab-btn {
    flex: 1; padding: 5px 4px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--gold-bg); color: var(--gold);
    border-color: var(--gold-dim);
  }
  .tab-btn:hover:not(.active) { color: var(--text); border-color: var(--gold-dim); }

  .sidebar-search {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 12px;
    outline: none;
  }
  .sidebar-search input::placeholder { color: var(--muted); }
  .sidebar-search input:focus { border-color: var(--gold-dim); }

  .sidebar-list {
    flex: 1; overflow-y: auto; padding: 8px 0;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .category-header {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold);
    opacity: 0.7;
  }
  .pattern-item {
    padding: 7px 16px;
    font-size: 12px; cursor: pointer;
    color: var(--muted);
    transition: background 0.1s, color 0.1s;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pattern-item .badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    background: rgba(197,160,89,0.12); color: var(--gold);
    flex-shrink: 0; letter-spacing: 0.06em;
  }
  .pattern-item:hover { background: var(--gold-bg); color: var(--text); }
  .pattern-item.active { background: rgba(197,160,89,0.15); color: var(--gold); }
  .pattern-name { overflow: hidden; text-overflow: ellipsis; }

  /* ── MAIN PANEL ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: rgba(13,13,20,0.95); backdrop-filter: blur(16px);
    flex-shrink: 0;
  }
  .toolbar-info {
    flex: 1; min-width: 0;
  }
  .toolbar-name {
    font-size: 14px; font-weight: 600; color: var(--gold); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .toolbar-desc {
    font-size: 11px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toolbar-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  select.size-sel {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  .btn {
    padding: 7px 14px; border-radius: 5px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    background: var(--gold-bg); color: var(--gold);
    border: 1px solid var(--gold-dim);
  }
  .btn:hover { background: rgba(197,160,89,0.2); border-color: var(--gold); }

  /* ── CANVAS ── */
  .canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; background: var(--bg);
    padding: 16px;
  }
  #patternCanvas {
    display: block;
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border: 1px solid rgba(197,160,89,0.15);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), 0 2px 16px rgba(0,0,0,0.3);
    transition: opacity 0.2s ease;
    transform-origin: center center;
  }
  #patternCanvas.fading { opacity: 0; }

  /* ── COLOR MODE PILLS ── */
  .color-mode-row {
    display: flex; gap: 4px; align-items: center; flex-shrink: 0;
  }
  .color-pill {
    padding: 4px 9px; border-radius: 12px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .color-pill.active {
    background: var(--gold-bg); color: var(--gold); border-color: var(--gold-dim);
  }
  .color-pill:hover:not(.active) { color: var(--text); border-color: var(--gold-dim); }

  /* ── KEYBOARD HELP OVERLAY ── */
  .kbd-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .kbd-overlay.visible { opacity: 1; pointer-events: auto; }
  .kbd-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px 28px; min-width: 340px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .kbd-panel h2 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
  }
  .kbd-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid rgba(197,160,89,0.08);
    gap: 16px;
  }
  .kbd-row:last-child { border-bottom: none; }
  .kbd-label { font-size: 12px; color: var(--muted); }
  .kbd-key {
    font-size: 10px; font-weight: 700; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 6px; color: var(--gold); white-space: nowrap; flex-shrink: 0;
  }
  .kbd-close {
    margin-top: 16px; width: 100%; padding: 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    background: var(--gold-bg); color: var(--gold);
    border: 1px solid var(--gold-dim); cursor: pointer;
    transition: background 0.15s;
  }
  .kbd-close:hover { background: rgba(197,160,89,0.2); }

  /* ── DISCOVER / COLLECTIONS ── */
  .discover-top {
    padding: 8px 12px 6px;
    flex-shrink: 0;
    display: none;
    border-bottom: 1px solid var(--border);
  }
  .discover-top.visible { display: block; }
  .btn-surprise {
    width: 100%; padding: 7px 10px; border-radius: 5px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.15s;
    background: var(--gold-bg); color: var(--gold);
    border: 1px solid var(--gold-dim); text-align: center;
  }
  .btn-surprise:hover { background: rgba(197,160,89,0.22); border-color: var(--gold); }
  .collection-header {
    padding: 10px 16px 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--gold); display: flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
    transition: opacity 0.1s;
  }
  .collection-header:hover { opacity: 0.85; }
  .collection-star { font-size: 9px; opacity: 0.7; flex-shrink: 0; }
  .collection-chevron {
    margin-left: auto; font-size: 9px; opacity: 0.6;
    transition: transform 0.2s ease; flex-shrink: 0;
  }
  .collection-header.collapsed .collection-chevron { transform: rotate(-90deg); }
  .collection-desc {
    padding: 1px 16px 5px 28px;
    font-size: 10px; color: var(--muted); letter-spacing: 0.01em;
  }
  .collection-header.collapsed + .collection-desc { display: none; }
  .collection-items-wrap {
    overflow: hidden;
    transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .collection-items-wrap.collapsed { max-height: 0 !important; }
  .collection-item {
    padding: 6px 16px 6px 16px;
    font-size: 12px; cursor: pointer; color: var(--muted);
    transition: background 0.1s, color 0.1s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 7px;
  }
  .collection-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; opacity: 0.7;
  }
  .collection-item:hover { background: var(--gold-bg); color: var(--text); }
  .collection-item.active { background: rgba(197,160,89,0.15); color: var(--gold); }

  /* ── KEYBOARD FOCUS HIGHLIGHT ── */
  .pattern-item.kbd-focus, .collection-item.kbd-focus {
    background: rgba(197,160,89,0.22); color: var(--gold);
    outline: 1px solid rgba(197,160,89,0.4);
  }

  /* ── BTN-ICON ── */
  .btn-icon {
    padding: 7px 10px; border-radius: 5px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    background: var(--gold-bg); color: var(--gold);
    border: 1px solid var(--gold-dim); line-height: 1;
  }
  .btn-icon:hover { background: rgba(197,160,89,0.2); border-color: var(--gold); }

  /* ── FULLSCREEN ── */
  .canvas-wrap.fullscreen {
    position: fixed; inset: 0; z-index: 500;
    background: var(--bg); align-items: center; justify-content: center;
  }

  /* ── TILE MODE ── */
  .canvas-wrap.tile-mode {
    position: fixed; inset: 0; z-index: 10;
    background: var(--bg);
    pointer-events: none;
  }
  .canvas-wrap.tile-mode #patternCanvas {
    width: 100% !important; height: 100% !important;
  }
  .app.tile-mode-active .sidebar {
    background: rgba(13,13,20,0.85); backdrop-filter: blur(8px);
    position: relative; z-index: 20;
  }
  .app.tile-mode-active .main {
    position: relative; z-index: 20;
  }
  .app.tile-mode-active .toolbar {
    background: rgba(13,13,20,0.85); backdrop-filter: blur(8px);
  }

  /* ── ZOOM SLIDER ── */
  .zoom-group {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .zoom-label {
    font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 30px; text-align: right;
  }
  input[type="range"]#zoomSlider {
    -webkit-appearance: none;
    width: 80px; height: 4px;
    background: rgba(197,160,89,0.2);
    border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type="range"]#zoomSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #c5a059; cursor: pointer;
    box-shadow: 0 0 4px rgba(197,160,89,0.4);
  }
  .btn-icon.active {
    background: rgba(197,160,89,0.3); border-color: var(--gold); color: var(--gold);
  }
  #tileModeBtn.active {
    background: var(--gold); color: #0d0d14; border-color: var(--gold);
    font-weight: 700;
  }

  /* ── TILE MODE FLOATING CLOSE BUTTON ── */
  #tileCloseBtn {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(13,13,20,0.9); color: var(--gold);
    border: 1.5px solid var(--gold); font-size: 18px; font-weight: 700;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    transition: background 0.15s, transform 0.15s;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }
  #tileCloseBtn:hover { background: rgba(197,160,89,0.2); transform: scale(1.08); }
  .tile-mode-active #tileCloseBtn { display: flex; }

  /* ── HEART / FAVORITES ── */
  .heart-btn {
    background: transparent; border: none; padding: 4px 6px;
    font-size: 16px; line-height: 1; cursor: pointer;
    color: var(--muted); flex-shrink: 0;
    transition: transform 0.2s ease, color 0.2s ease;
    border-radius: 4px;
  }
  .heart-btn:hover { color: var(--gold); }
  .heart-btn.hearted { color: var(--gold); }
  .heart-btn.pop {
    animation: heartPop 0.2s ease forwards;
  }
  @keyframes heartPop {
    0%   { transform: scale(1.0); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1.0); }
  }
  .sidebar-heart {
    font-size: 10px; color: var(--gold); flex-shrink: 0; line-height: 1;
    opacity: 0.85;
  }

  /* ── FAVORITES DROPDOWN ── */
  .fav-wrap { position: relative; flex-shrink: 0; }
  .fav-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 0; min-width: 180px;
    z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .fav-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .fav-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; font-size: 12px; color: var(--text);
    cursor: pointer; transition: background 0.1s;
    white-space: nowrap;
  }
  .fav-menu-item:hover { background: var(--gold-bg); color: var(--gold); }
  .fav-menu-item .fav-icon { font-size: 13px; flex-shrink: 0; }
  .fav-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .fav-count {
    font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    background: rgba(197,160,89,0.12); color: var(--gold);
    letter-spacing: 0.06em; flex-shrink: 0;
  }

  /* ── SAVED COLLECTION EMPTY STATE ── */
  .saved-empty {
    padding: 10px 16px 6px 28px;
    font-size: 11px; color: var(--muted); font-style: italic;
  }

  /* ── MOBILE ── */
  /* ── MOBILE NAV (hidden on desktop) ── */
  .mobile-nav { display: none; }
  .saved-panel { display: none; }

  @media (max-width: 640px) {
    /* App fills above the nav bar */
    .app { flex-direction: column; height: calc(100vh - 60px); overflow: hidden; }

    /* Sidebar: full-screen panel, shown via JS */
    .sidebar {
      position: fixed; top: 0; left: 0; right: 0; bottom: 60px;
      width: 100%; max-width: 100%; height: auto;
      z-index: 100; display: none; flex-direction: column;
    }
    .sidebar.mobile-active { display: flex; }

    /* Main panel: same */
    .main {
      position: fixed; top: 0; left: 0; right: 0; bottom: 60px;
      width: 100%; display: none; flex-direction: column;
    }
    .main.mobile-active { display: flex; }

    /* Toolbar: two rows on mobile */
    .toolbar { flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
    .toolbar-info { width: 100%; min-width: 0; }
    .toolbar-controls { flex-wrap: wrap; gap: 6px; width: 100%; }
    .color-mode-row { flex-wrap: wrap; gap: 4px; }

    /* Hide desktop-only controls */
    .size-sel, .zoom-group, #tileModeBtn, #helpBtn, .fav-wrap,
    .toolbar-controls label { display: none !important; }

    /* Canvas fills remaining space */
    .canvas-wrap { flex: 1; padding: 8px; }

    /* ── BOTTOM NAV ── */
    .mobile-nav {
      display: flex;
      position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
    }
    .mobile-nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }
    .mobile-nav-btn .nav-icon { font-size: 20px; line-height: 1; }
    .mobile-nav-btn.active { color: var(--gold); }

    /* ── SAVED PANEL ── */
    .saved-panel {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 60px;
      background: var(--bg); flex-direction: column;
      z-index: 100; overflow: hidden;
    }
    .saved-panel.mobile-active { display: flex; }
    .saved-panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gold);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .saved-count-badge {
      background: var(--gold-bg); color: var(--gold);
      border: 1px solid var(--gold-dim);
      border-radius: 10px; padding: 1px 8px;
      font-size: 10px; font-weight: 700;
    }
    .saved-panel-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .saved-panel-item {
      padding: 13px 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(197,160,89,0.07);
      cursor: pointer; color: var(--text); font-size: 13px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .saved-panel-item:active { background: var(--gold-bg); }
    .saved-panel-item .s-icon { color: var(--gold); font-size: 14px; flex-shrink: 0; }
    .saved-panel-empty {
      padding: 48px 24px; text-align: center;
      color: var(--muted); font-size: 13px; line-height: 1.8;
    }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Islamic Patterns</div>
      <div class="tab-row">
        <button class="tab-btn" data-tab="tilings">Tilings</button>
        <button class="tab-btn" data-tab="girih">Girih</button>
        <button class="tab-btn" data-tab="templates">Templates</button>
        <button class="tab-btn active" data-tab="discover">Discover</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search patterns…" />
    </div>
    <div class="discover-top" id="discoverTop">
      <button class="btn-surprise" id="surpriseBtn">Surprise me ✦</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </nav>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="toolbar">
      <div class="toolbar-info" style="display:flex;align-items:center;gap:6px;min-width:0;">
        <div style="min-width:0;flex:1;">
          <div class="toolbar-name" id="patternName">Select a pattern</div>
          <div class="toolbar-desc" id="patternDesc"></div>
        </div>
        <button class="heart-btn" id="heartBtn" title="Save to favorites (H)">&#x2661;</button>
      </div>
      <div class="toolbar-controls">
        <div class="color-mode-row" id="colorModeRow">
          <button class="color-pill active" data-mode="gold">Gold</button>
          <button class="color-pill" data-mode="lapis">Lapis</button>
          <button class="color-pill" data-mode="multicolor">Multi</button>
          <button class="color-pill" data-mode="neon">Neon</button>
          <button class="color-pill" data-mode="parchment">Parchment</button>
        </div>
        <select class="size-sel" id="sizeSelect">
          <option value="1024">1024px</option>
          <option value="1920" selected>1920px</option>
          <option value="2560">2560px</option>
        </select>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;flex-shrink:0;">
          <input type="checkbox" id="showConstruction" style="accent-color:var(--gold);">
          Construction
        </label>
        <button class="btn-icon" id="tileModeBtn" title="Toggle tile wallpaper mode (T)">&#x26F6; Tile</button>
        <div class="zoom-group">
          <input type="range" id="zoomSlider" min="0.25" max="4" step="0.05" value="1" title="Pattern zoom">
          <span class="zoom-label" id="zoomLabel">1.0x</span>
        </div>
        <button class="btn-icon" id="randomBtn" title="Random pattern (R)">&#x1F3B2;</button>
        <div class="fav-wrap" id="favWrap">
          <button class="btn-icon" id="favMenuBtn" title="Saved patterns">&#x2665; <span id="favCount" style="font-size:10px;margin-left:2px;"></span></button>
          <div class="fav-menu" id="favMenu">
            <div class="fav-menu-item" id="favExportBtn"><span class="fav-icon">&#x2913;</span>Export saved (JSON)</div>

<script>
// ────────────────────────────────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────────────────────────────────
let currentTab  = 'discover';
let currentItem = null;   // { kind: 'tiling'|'girih'|'template', data: {...} }
let searchQuery = '';
let showConstruction = false;
let colorMode = 'gold';   // 'gold' | 'lapis' | 'multicolor' | 'neon' | 'parchment'
let isFullscreen = false;
let isTileMode = false;
let zoomLevel = 1.0;
let offscreenTileCanvas = null; // cached offscreen canvas for tile mode
let highlightedIndex = -1; // index in current flat item list for keyboard nav

// ── FAVORITES STATE ──
const FAVORITES_KEY = 'islamic-patterns-favorites';
let favorites = new Set();

function loadFavorites() {
  try {
    const raw = localStorage.getItem(FAVORITES_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed.favorites)) {
        favorites = new Set(parsed.favorites);
      }
    }
  } catch(e) { /* ignore */ }
}

function saveFavorites() {
  try {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify({
      favorites: [...favorites],
      updatedAt: new Date().toISOString(),
    }));
  } catch(e) { /* ignore */ }
}

function toggleFavorite(name) {
  if (!name) return;
  if (favorites.has(name)) {
    favorites.delete(name);
  } else {
    favorites.add(name);
  }
  saveFavorites();
  updateHeartBtn();
  updateFavCount();
  buildSidebar();
}

function updateHeartBtn() {
  const btn = document.getElementById('heartBtn');
  if (!btn) return;
  const name = currentItem?.data?.name;
  const isFav = name && favorites.has(name);
  btn.innerHTML = isFav ? '&#x2665;' : '&#x2661;';
  btn.classList.toggle('hearted', !!isFav);
}

function updateFavCount() {
  const el = document.getElementById('favCount');
  if (!el) return;
  el.textContent = favorites.size > 0 ? favorites.size : '';
}

function exportFavorites() {
  const data = JSON.stringify({ favorites: [...favorites], updatedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'favorites.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importFavorites(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (Array.isArray(parsed.favorites)) {
        for (const name of parsed.favorites) favorites.add(name);
        saveFavorites();
        updateHeartBtn();
        updateFavCount();
        buildSidebar();
      }
    } catch(err) { /* ignore bad file */ }
  };
  reader.readAsText(file);
}

loadFavorites();
const collapsedCollections = new Set(); // track which collections are collapsed

// ────────────────────────────────────────────────────────────────────────────
// MATH HELPERS
// ────────────────────────────────────────────────────────────────────────────
const DEG = Math.PI / 180;

/**
 * Generate vertices of a regular n-gon centered at origin, radius=1,
 * with optional rotation offset in degrees.
 */
function regularPolygon(n, rotDeg = 0) {
  const verts = [];
  const rotRad = rotDeg * DEG;
  for (let k = 0; k < n; k++) {
    const angle = (2 * Math.PI * k / n) + rotRad;
    verts.push([Math.cos(angle), Math.sin(angle)]);
  }
  return verts;
}

/**
 * Apply a 2x3 affine transform to a single point.
 * Matrix: [[a,b],[c,d]] + translation [tx,ty]
 */
function applyMatrix(a, b, tx, c, d, ty, px, py) {
  return [a * px + b * py + tx, c * px + d * py + ty];
}

/**
 * Apply placement to an array of [x,y] points.
 * Handles both 'matrix' and 'srt' placement types.
 */
function applyPlacement(pts, placement) {
  if (placement.type === 'matrix') {
    const { a, b, tx, c, d, ty } = placement;
    return pts.map(([px, py]) => applyMatrix(a, b, tx, c, d, ty, px, py));
  }
  // 'srt': scale, then rotate, then translate
  const { scale, rot, tranX, tranY } = placement;
  const cosR = Math.cos(rot * DEG);
  const sinR = Math.sin(rot * DEG);
  return pts.map(([px, py]) => {
    const sx = px * scale;
    const sy = py * scale;
    return [
      cosR * sx - sinR * sy + tranX,
      sinR * sx + cosR * sy + tranY,
    ];
  });
}

/**
 * Compute bounding box of an array of [x,y] points.
 * Returns { minX, minY, maxX, maxY, w, h, cx, cy }.
 */
function bbox(pts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const [x, y] of pts) {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY,
           cx: (minX + maxX) / 2, cy: (minY + maxY) / 2 };
}

/**
 * Line-line intersection of segment (p1→p2) extended to infinite line vs (p3→p4).
 * Returns [x,y] or null if parallel.
 */
function lineIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
  const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
  return [x1 + t * (x2 - x1), y1 + t * (y2 - y1)];
}

/**
 * Default skip parameter d for a polygon with n sides.
 * Controls which midpoints are connected to form star points.
 */
function defaultD(n) {
  if (n === 3) return 1;
  if (n === 4) return 1;
  if (n === 5) return 2;
  if (n === 6) return 2;
  if (n === 7) return 2;
  if (n === 8) return 2;
  if (n === 9) return 3;
  if (n === 10) return 3;
  if (n === 12) return 4;
  return Math.floor(n / 4);
}

/**
 * Given an array of canvas-space polygon vertices, compute the star-motif
 * line segments using the TiledPatternMaker midpoint-ray algorithm.
 *
 * Algorithm:
 * 1. Compute edge midpoints mid[0..n-1]
 * 2. For each midpoint i, construct a ray: mid[i] → mid[(i+d)%n]
 * 3. The star inner vertex between midpoints i and i+1 is where
 *    ray[i] (forward) meets ray[i+1] (backward, i.e. toward mid[(i+1-d+n)%n])
 * 4. The visible segments are: mid[i] → intersection → mid[i+1]
 *
 * Special case: n=4 with d=1 produces degenerate results (rays are collinear
 * with polygon edges). Instead, draw the classic cross/plus motif by connecting
 * opposite midpoints through their intersection point at the polygon center.
 *
 * Fallback: if the ray-intersection algorithm produces 0 segments (degenerate
 * polygon), draw the polygon outline so the tile is never invisible.
 *
 * Returns an array of [x1,y1,x2,y2] segments.
 */
function starMotifsFromPoly(verts) {
  const n = verts.length;
  if (n < 3) return [];

  // Compute edge midpoints
  const mids = verts.map((v, i) => {
    const next = verts[(i + 1) % n];
    return [(v[0] + next[0]) / 2, (v[1] + next[1]) / 2];
  });

  // Special case: triangle (n=3) — d=1 rays point to adjacent midpoints which
  // are parallel for equilateral triangles, so the ray-intersection algorithm
  // produces 0 segments. Draw the Islamic Y-motif instead: connect each edge
  // midpoint to the centroid.
  if (n === 3) {
    const cx = (verts[0][0] + verts[1][0] + verts[2][0]) / 3;
    const cy = (verts[0][1] + verts[1][1] + verts[2][1]) / 3;
    return [
      [mids[0][0], mids[0][1], cx, cy],
      [mids[1][0], mids[1][1], cx, cy],
      [mids[2][0], mids[2][1], cx, cy],
    ];
  }

  // Special case: quadrilateral (n=4) — d=1 is degenerate because adjacent
  // midpoint rays are collinear with the edges.  Draw the Islamic cross motif
  // instead: connect each midpoint to the intersection of the two diagonals
  // (mid[0]↔mid[2] and mid[1]↔mid[3]).
  if (n === 4) {
    const [m0x, m0y] = mids[0];
    const [m1x, m1y] = mids[1];
    const [m2x, m2y] = mids[2];
    const [m3x, m3y] = mids[3];
    // Find where the two diagonals cross
    const center = lineIntersect(m0x, m0y, m2x, m2y, m1x, m1y, m3x, m3y);
    if (center) {
      const [cx, cy] = center;
      return [
        [m0x, m0y, cx, cy],
        [m2x, m2y, cx, cy],
        [m1x, m1y, cx, cy],
        [m3x, m3y, cx, cy],
      ];
    }
    // Fallback for degenerate quads: connect opposite midpoints directly
    return [
      [m0x, m0y, m2x, m2y],
      [m1x, m1y, m3x, m3y],
    ];
  }

  const d = defaultD(n);
  const segments = [];
  const FAR = 20; // extension multiplier — large enough to guarantee intersection

  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n; // adjacent midpoint

    // Ray from mid[i] toward mid[(i+d)%n]
    const [mx0, my0] = mids[i];
    const [ax0, ay0] = mids[(i + d) % n];
    const fwdFarX = ax0 + (ax0 - mx0) * FAR;
    const fwdFarY = ay0 + (ay0 - my0) * FAR;

    // Ray from mid[j] toward mid[(j-d+n)%n]  (backward direction from adjacent midpoint)
    const [mx1, my1] = mids[j];
    const [bx1, by1] = mids[(j - d + n) % n];
    const bwdFarX = bx1 + (bx1 - mx1) * FAR;
    const bwdFarY = by1 + (by1 - my1) * FAR;

    // Find intersection — this is the star inner vertex between mid[i] and mid[j]
    const pt = lineIntersect(mx0, my0, fwdFarX, fwdFarY, mx1, my1, bwdFarX, bwdFarY);
    if (pt) {
      segments.push([mx0, my0, pt[0], pt[1]]);
      segments.push([mx1, my1, pt[0], pt[1]]);
    }
  }

  // If no intersections found, return empty — do NOT draw polygon outlines as
  // that leaks construction geometry into the final render.
  return segments;
}

// ────────────────────────────────────────────────────────────────────────────
// TILING GEOMETRY — build all polygon instances to fill the viewport
// ────────────────────────────────────────────────────────────────────────────

/**
 * For a tiling, generate all polygon vertex-lists that cover the canvas.
 * Returns an array of arrays of [x,y] (canvas coords).
 *
 * Algorithm:
 * 1. Build unit-cell polygons (all features × all placements)
 * 2. Find a natural scale so the unit cell covers ~canvasSize pixels
 * 3. Tile by T1/T2 vectors over a range that fills the canvas + padding
 * 4. Apply viewport centering transform
 */
function buildTilingPolygons(tiling, canvasW, canvasH, zoom = 1) {
  const [t1x, t1y] = tiling.t1;
  const [t2x, t2y] = tiling.t2;

  // Build unit cell polygons in model coords
  const unitPolys = [];

  for (const feature of tiling.features) {
    let baseVerts;

    if (feature.type === 'regular' && feature.sides) {
      // Regular polygon, unit-circle radius
      baseVerts = regularPolygon(feature.sides, 0);
    } else if (feature.points && feature.points.length >= 3) {
      baseVerts = feature.points;
    } else if (feature.sides && feature.sides >= 3) {
      // polygon type with explicit sides but no points — treat as regular
      baseVerts = regularPolygon(feature.sides, 0);
    } else {
      // Feature with no usable geometry — infer a square from the tiling cell size
      // (handles data defects like regular-4.v5 where points/sides are null)
      const r = Math.sqrt(t1x * t1x + t1y * t1y) / 2 || 1;
      baseVerts = [[-r, -r], [r, -r], [r, r], [-r, r]];
    }

    for (const placement of feature.placements) {
      const transformed = applyPlacement(baseVerts, placement);
      unitPolys.push(transformed);
    }
  }

  if (unitPolys.length === 0) return [];

  // Determine natural scale of the unit cell by measuring T1 vector length
  const t1Len = Math.sqrt(t1x * t1x + t1y * t1y);
  const t2Len = Math.sqrt(t2x * t2x + t2y * t2y);
  const cellSize = Math.max(t1Len, t2Len);

  // Target: fit ~3.5 unit cells across the smaller canvas dimension.
  // zoom scales the cell size: zoom=2 means each cell is twice as large (fewer cells).
  const targetFit = Math.min(canvasW, canvasH) * 0.9;
  const numCellsTarget = 3.5 / zoom;
  const scale = (cellSize > 0) ? (targetFit / (cellSize * numCellsTarget)) : zoom;

  // Tiling range: enough to fill canvas + margin
  // Use the actual T1/T2 projected extents to determine coverage
  const margin = 3;  // extra cells in each direction to ensure full coverage
  const rangeI = Math.ceil(Math.max(canvasW, canvasH) / (t1Len * scale)) + margin;
  const rangeJ = Math.ceil(Math.max(canvasW, canvasH) / (t2Len * scale)) + margin;

  // Collect all polygons across the tile grid
  const allPolys = [];
  for (let i = -rangeI; i <= rangeI; i++) {
    for (let j = -rangeJ; j <= rangeJ; j++) {
      const ox = i * t1x + j * t2x;
      const oy = i * t1y + j * t2y;
      for (const poly of unitPolys) {
        allPolys.push(poly.map(([px, py]) => [px + ox, py + oy]));
      }
    }
  }

  // Find bounding box of all model-space coords
  const allPts = allPolys.flat();
  const b = bbox(allPts);

  // Map to canvas: center + scale
  // For tile mode (full viewport), use scale directly so pattern fills edge-to-edge
  // without the bbox-fit compression that would leave edges unrendered.
  const finalScale = scale;
  const offX = canvasW / 2 - b.cx * finalScale;
  const offY = canvasH / 2 - b.cy * finalScale;

  return allPolys.map(poly =>
    poly.map(([px, py]) => [px * finalScale + offX, py * finalScale + offY])
  );
}

/**
 * Build polygons for a girih shape (single shape, centered).
 */
function buildGirihPolygons(shape, canvasW, canvasH) {
  let verts;

  if (shape.type === 'regular' && shape.sides) {
    // Regular polygon, apply shape's own transform
    const base = regularPolygon(shape.sides, 0);
    verts = base.map(([px, py]) => {
      const s   = shape.scale;
      const rRad = shape.rot * DEG; // already in degrees from parser
      const cosR = Math.cos(rRad), sinR = Math.sin(rRad);
      return [
        cosR * px * s - sinR * py * s + shape.tx,
        sinR * px * s + cosR * py * s + shape.ty,
      ];
    });
  } else if (shape.points && shape.points.length >= 3) {
    // Apply shape's own transform to the pre-defined points
    verts = shape.points.map(([px, py]) => {
      const s    = shape.scale;
      const rRad = shape.rot * DEG;
      const cosR = Math.cos(rRad), sinR = Math.sin(rRad);
      return [
        cosR * px * s - sinR * py * s + shape.tx,
        sinR * px * s + cosR * py * s + shape.ty,
      ];
    });
  } else {
    return [];
  }

  // Center and scale to canvas
  const b = bbox(verts);
  const dim  = Math.min(canvasW, canvasH) * 0.7;
  const scl  = dim / Math.max(b.w, b.h, 0.001);
  const offX = canvasW / 2 - b.cx * scl;
  const offY = canvasH / 2 - b.cy * scl;

  return [verts.map(([px, py]) => [px * scl + offX, py * scl + offY])];
}

/**
 * Build lines/circles for a template.
 */
function buildTemplateGeometry(template, canvasW, canvasH) {
  // Template coords are normalized (roughly -1..1)
  const dim  = Math.min(canvasW, canvasH) * 0.42;
  const offX = canvasW / 2;
  const offY = canvasH / 2;

  const lines = template.lines.map(([x1, y1, x2, y2]) => [
    x1 * dim + offX, y1 * dim + offY,
    x2 * dim + offX, y2 * dim + offY,
  ]);

  const circles = template.circles.map(({ r, cx, cy }) => ({
    x: cx * dim + offX, y: cy * dim + offY, r: r * dim,
  }));

  return { lines, circles };
}

// ────────────────────────────────────────────────────────────────────────────
// RENDERING
// ────────────────────────────────────────────────────────────────────────────
// ────────────────────────────────────────────────────────────────────────────
// COLOR MODES
// ────────────────────────────────────────────────────────────────────────────
const COLOR_MODES = ['gold', 'lapis', 'multicolor', 'neon', 'parchment'];

const MULTICOLOR_BY_SIDES = {
  3: '#e8715a', 4: '#c5a059', 5: '#6A4C93', 6: '#4a8abf',
  8: '#c5a059', 10: '#2d6b4a', 12: '#8b4513',
};

function getColors(mode) {
  switch (mode) {
    case 'lapis':
      return { bg: '#0d0d14', stroke: '#4a8abf', construction: '#2a5a8c', constructionAlpha: 0.5, fill: '#2a5a8c', fillAlpha: 0.15 };
    case 'neon':
      return { bg: '#050510', stroke: '#00ffaa', strokeAlpha: 0.7, construction: '#ff6b9d', constructionAlpha: 0.5, fill: '#00ffaa', fillAlpha: 0.08 };
    case 'parchment':
      return { bg: '#FDFCF8', stroke: '#2a1f14', strokeAlpha: 0.5, construction: '#8b7355', constructionAlpha: 0.08, fill: '#8b7355', fillAlpha: 0.08 };
    case 'multicolor':
      return { bg: '#0d0d14', stroke: '#c5a059', construction: '#2a5a8c', constructionAlpha: 0.5, fill: '#2a5a8c', fillAlpha: 0.12 };
    case 'gold':
    default:
      return { bg: '#0d0d14', stroke: '#c5a059', construction: '#2a5a8c', constructionAlpha: 0.5, fill: '#2a5a8c', fillAlpha: 0.15 };
  }
}

function getMultiStroke(poly, fallback) {
  // Pick color by number of polygon sides
  const n = poly.length;
  return MULTICOLOR_BY_SIDES[n] || fallback;
}

function renderTiling(ctx, tiling, w, h, zoom = 1) {
  const c = getColors(colorMode);
  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, w, h);

  const polys = buildTilingPolygons(tiling, w, h, zoom);
  if (polys.length === 0) return;

  // Optional: show construction lines (polygon edges) at very low opacity
  if (showConstruction) {
    ctx.globalAlpha = c.constructionAlpha || 0.03;
    ctx.strokeStyle = c.construction;
    ctx.lineWidth = Math.max(0.5, w / 2000);
    for (const poly of polys) {
      if (poly.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(poly[0][0], poly[0][1]);
      for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
      ctx.closePath();
      ctx.stroke();
    }
  }

  // Draw star motifs using midpoint-ray algorithm
  ctx.globalAlpha = c.strokeAlpha || 0.85;
  ctx.lineWidth = Math.max(1.5, w / 700);
  ctx.lineCap = 'round';

  // Compute area of each polygon (shoelace formula) and find the maximum.
  // Small filler polygons (squares and triangles between the main star tiles)
  // are left as negative space in real Islamic art — only large primary tiles
  // get a star/cross/Y motif drawn inside them.
  const areas = polys.map(poly => {
    let a = 0;
    const n = poly.length;
    for (let i = 0; i < n; i++) {
      const [x1, y1] = poly[i];
      const [x2, y2] = poly[(i + 1) % n];
      a += x1 * y2 - x2 * y1;
    }
    return Math.abs(a) / 2;
  });
  const maxArea = areas.reduce((m, a) => Math.max(m, a), 0);
  // Only filter small filler polygons when:
  // 1. maxArea is meaningful (> 1 canvas pixel²) — avoids fp-noise on degenerate/bowtie polygons
  // 2. There are 3+ distinct polygon size classes — 2-class tilings like 4.8^2 (octagons+squares)
  //    have both classes as primary tiles and must not be filtered.
  // When filtering applies, skip polygons whose area is < 15% of the largest polygon.
  // This removes small filler triangles/squares (~6-12% of max) while keeping all
  // primary tiles including the smaller partner in 3-class tilings (~30%+ of max).
  let areaThreshold = 0;
  if (maxArea > 1) {
    // Count distinct polygon types by side count (n-gon variety).
    // Tilings with 3+ distinct polygon types (e.g. triangles + squares + octagons)
    // contain filler polygons — skip the small ones (< 15% of largest area).
    // Tilings with only 2 types are Archimedean partners (e.g. 4.8^2: squares +
    // octagons) where both are primary decorated tiles — filter nothing.
    const distinctSides = new Set(polys.map(p => p.length)).size;
    if (distinctSides >= 3) areaThreshold = maxArea * 0.15;
  }

  for (let pi = 0; pi < polys.length; pi++) {
    // Skip filler polygons — they are negative space, not decorated tiles
    if (areas[pi] < areaThreshold) continue;
    const poly = polys[pi];
    ctx.strokeStyle = colorMode === 'multicolor' ? getMultiStroke(poly, c.stroke) : c.stroke;
    const segs = starMotifsFromPoly(poly);
    for (const [x1, y1, x2, y2] of segs) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
  }

  ctx.globalAlpha = 1;
}

function renderGirih(ctx, shape, w, h) {
  const c = getColors(colorMode);
  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, w, h);

  const polys = buildGirihPolygons(shape, w, h);
  if (polys.length === 0) return;

  ctx.globalAlpha = c.fillAlpha || 0.15;
  ctx.fillStyle = c.fill;
  for (const poly of polys) {
    ctx.beginPath();
    ctx.moveTo(poly[0][0], poly[0][1]);
    for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
    ctx.closePath();
    ctx.fill();
  }

  ctx.globalAlpha = c.strokeAlpha || 1;
  ctx.strokeStyle = c.stroke;
  ctx.lineWidth = Math.max(2, w / 600);
  for (const poly of polys) {
    ctx.beginPath();
    ctx.moveTo(poly[0][0], poly[0][1]);
    for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
    ctx.closePath();
    ctx.stroke();
  }

  // Label vertices
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = c.stroke;
  ctx.font = `${Math.max(10, w / 120)}px system-ui`;
  ctx.textAlign = 'center';
  for (const poly of polys) {
    poly.forEach(([px, py], i) => {
      ctx.fillText(i + 1, px, py - 6);
    });
  }
}

function renderTemplate(ctx, template, w, h) {
  const c = getColors(colorMode);
  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, w, h);

  const { lines, circles } = buildTemplateGeometry(template, w, h);

  // Draw circles
  ctx.strokeStyle = c.construction;
  ctx.lineWidth = Math.max(0.5, w / 2000);
  ctx.globalAlpha = c.constructionAlpha || 0.6;
  for (const { x, y, r } of circles) {
    ctx.beginPath();
    ctx.arc(x, y, Math.abs(r), 0, 2 * Math.PI);
    ctx.stroke();
  }

  // Draw lines
  ctx.strokeStyle = c.stroke;
  ctx.globalAlpha = c.strokeAlpha || 1;
  ctx.lineWidth = Math.max(0.8, w / 1500);
  for (const [x1, y1, x2, y2] of lines) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
}

// ── Renders the pattern into an offscreen canvas at the given tile size
function renderToOffscreen(tileSize) {
  const oc = document.createElement('canvas');
  oc.width  = tileSize;
  oc.height = tileSize;
  const ctx = oc.getContext('2d');
  ctx.globalAlpha = 1;
  const { kind, data } = currentItem;
  if (kind === 'tiling')        renderTiling(ctx, data, tileSize, tileSize);
  else if (kind === 'girih')    renderGirih(ctx, data, tileSize, tileSize);
  else if (kind === 'template') renderTemplate(ctx, data, tileSize, tileSize);
  return oc;
}

function render() {
  if (!currentItem) return;

  const sizeVal = parseInt(document.getElementById('sizeSelect').value, 10);
  const canvas  = document.getElementById('patternCanvas');
  const wrap    = document.getElementById('canvasWrap');

  // Fade-in animation: briefly hide then reveal
  canvas.classList.add('fading');

  requestAnimationFrame(() => {
    if (isTileMode) {
      // Full-viewport tiling mode: render directly onto fullscreen canvas.
      // Direct rendering fills the canvas edge-to-edge with no gaps — avoids
      // the parallelogram-gap problem that createPattern('repeat') causes when
      // the T1/T2 lattice is not axis-aligned.
      const vpW = window.innerWidth;
      const vpH = window.innerHeight;
      canvas.width  = vpW;
      canvas.height = vpH;
      canvas.style.width  = vpW + 'px';
      canvas.style.height = vpH + 'px';

      const ctx = canvas.getContext('2d');
      ctx.globalAlpha = 1;

      const { kind, data } = currentItem;
      // Pass zoomLevel so the pattern scale responds to the zoom slider.
      // zoom > 1 = larger cells (fewer across screen); zoom < 1 = smaller cells.
      if (kind === 'tiling')        renderTiling(ctx, data, vpW, vpH, zoomLevel);
      else if (kind === 'girih')    renderGirih(ctx, data, vpW, vpH);
      else if (kind === 'template') renderTemplate(ctx, data, vpW, vpH);
    } else {
      // Normal mode: render at export resolution; zoom is pure CSS transform (no re-render)
      canvas.width  = sizeVal;
      canvas.height = sizeVal;
      // Clear inline size so CSS max-width/max-height controls display fit
      canvas.style.width  = '';
      canvas.style.height = '';
      // Re-apply zoom transform (clearing width/height resets layout; transform persists)
      canvas.style.transform = 'scale(' + zoomLevel + ')';
      canvas.style.transformOrigin = 'center center';

      const ctx = canvas.getContext('2d');
      ctx.globalAlpha = 1;

      const { kind, data } = currentItem;
      if (kind === 'tiling')        renderTiling(ctx, data, sizeVal, sizeVal);
      else if (kind === 'girih')    renderGirih(ctx, data, sizeVal, sizeVal);
      else if (kind === 'template') renderTemplate(ctx, data, sizeVal, sizeVal);
    }

    // Trigger fade-in
    requestAnimationFrame(() => canvas.classList.remove('fading'));
  });
}

// ── Toggle tile wallpaper mode
function toggleTileMode(force) {
  isTileMode = force !== undefined ? force : !isTileMode;
  const app  = document.querySelector('.app');
  const wrap = document.getElementById('canvasWrap');
  const btn  = document.getElementById('tileModeBtn');
  app.classList.toggle('tile-mode-active', isTileMode);
  wrap.classList.toggle('tile-mode', isTileMode);
  btn.classList.toggle('active', isTileMode);
  btn.innerHTML = isTileMode ? '✕ Exit' : '⛶ Tile';
  if (currentItem) render();
}

// ── Zoom helpers
function setZoom(val) {
  zoomLevel = Math.max(0.25, Math.min(4, val));
  const slider  = document.getElementById('zoomSlider');
  const label   = document.getElementById('zoomLabel');
  const canvas  = document.getElementById('patternCanvas');
  slider.value = zoomLevel;
  label.textContent = zoomLevel.toFixed(2).replace(/\.?0+$/, '') + 'x';
  // Apply zoom as CSS transform — instant, GPU-accelerated, no re-render needed
  canvas.style.transform = 'scale(' + zoomLevel + ')';
  canvas.style.transformOrigin = 'center center';
}

function findCatalogItem(tab, name) {
  const lname = name.toLowerCase();
  if (tab === 'tilings') return CATALOG.tilings.find(t => t.name.toLowerCase() === lname) || null;
  if (tab === 'girih')   return CATALOG.girihShapes.find(g => g.name.toLowerCase() === lname) || null;
  if (tab === 'templates') return CATALOG.templates.find(t => t.name.toLowerCase() === lname) || null;
  return null;
}

// Build a flat navigable list of all items for the current tab (for keyboard nav)
function getFlatItems() {
  const q = searchQuery.toLowerCase();
  if (currentTab === 'tilings') {
    return CATALOG.tilings.filter(t => !q || t.name.toLowerCase().includes(q))
      .map(t => ({ kind: 'tiling', data: t }));
  } else if (currentTab === 'girih') {
    return CATALOG.girihShapes.filter(g => !q || g.name.toLowerCase().includes(q))
      .map(g => ({ kind: 'girih', data: g }));
  } else if (currentTab === 'templates') {
    return CATALOG.templates.filter(t => !q || t.name.toLowerCase().includes(q))
      .map(t => ({ kind: 'template', data: t }));
  } else if (currentTab === 'discover') {
    const flat = [];
    for (const col of COLLECTIONS) {
      for (const entry of col.items) {
        const data = findCatalogItem(entry.tab, entry.name);
        if (!data) continue;
        const kind = entry.tab === 'tilings' ? 'tiling' : entry.tab === 'girih' ? 'girih' : 'template';
        flat.push({ kind, data });
      }
    }
    return flat;
  }
  return [];
}

function syncHighlight() {
  // Remove all highlight classes
  document.querySelectorAll('.pattern-item.kbd-focus, .collection-item.kbd-focus').forEach(el => {
    el.classList.remove('kbd-focus');
  });
  if (highlightedIndex < 0) return;
  const items = document.querySelectorAll('.pattern-item, .collection-item');
  if (items[highlightedIndex]) {
    items[highlightedIndex].classList.add('kbd-focus');
    items[highlightedIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function makeItem(name, badge, onClick) {
  const el = document.createElement('div');
  el.className = 'pattern-item';
  const heartSpan = favorites.has(name) ? `<span class="sidebar-heart">&#x2665;</span>` : '';
  el.innerHTML =
    `<span class="pattern-name">${escapeHtml(name)}</span>` +
    (badge ? `<span class="badge">${escapeHtml(String(badge))}</span>` : '') +
    heartSpan;
  el.addEventListener('click', onClick);
  return el;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ────────────────────────────────────────────────────────────────────────────
// ITEM SELECTION
// ────────────────────────────────────────────────────────────────────────────
function selectItem(kind, data) {
  currentItem = { kind, data };
  offscreenTileCanvas = null; // invalidate tile cache on pattern change
  updateHeartBtn();
  buildSidebar();

  const nameEl = document.getElementById('patternName');
  const descEl = document.getElementById('patternDesc');

  if (kind === 'tiling') {
    nameEl.textContent = data.name + ' — ' + (data.category || '');
    const parts = [];
    if (data.desc) parts.push(data.desc);
    if (data.auth) parts.push('by ' + data.auth);
    descEl.textContent = parts.join(' · ');
  } else if (kind === 'girih') {
    nameEl.textContent = data.name;
    descEl.textContent = data.type + (data.sides ? ', ' + data.sides + ' sides' : '');
  } else {
    nameEl.textContent = data.name;
    descEl.textContent = data.group + ' · ' + data.lines.length + ' lines, ' + data.circles.length + ' circles';
  }

  render();
}

// ────────────────────────────────────────────────────────────────────────────
// EVENTS
// ────────────────────────────────────────────────────────────────────────────

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    highlightedIndex = -1;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildSidebar();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  highlightedIndex = -1;
  buildSidebar();
});

// Size select
document.getElementById('sizeSelect').addEventListener('change', render);

// Show construction toggle
document.getElementById('showConstruction').addEventListener('change', e => {
  showConstruction = e.target.checked;
  render();
});

// Download / Save
function savePng() {
  const canvas = document.getElementById('patternCanvas');
  const name   = (currentItem?.data?.name || 'pattern').replace(/[^a-zA-Z0-9-_.]/g, '_');
  const link   = document.createElement('a');
  link.download = name + '.png';
  link.href     = canvas.toDataURL('image/png');
  link.click();
}
document.getElementById('downloadBtn').addEventListener('click', savePng);

// Color mode pills
document.getElementById('colorModeRow').addEventListener('click', e => {
  const pill = e.target.closest('.color-pill');
  if (!pill) return;
  setColorMode(pill.dataset.mode);
});

function setColorMode(mode) {
  colorMode = mode;
  offscreenTileCanvas = null; // invalidate tile cache on color change
  document.querySelectorAll('.color-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mode === mode);
  });
  render();
}

function cycleColorMode() {
  const idx = COLOR_MODES.indexOf(colorMode);
  setColorMode(COLOR_MODES[(idx + 1) % COLOR_MODES.length]);
}

// Random button
function selectRandom() {
  const all = [
    ...CATALOG.tilings.map(t => ({ kind: 'tiling', data: t })),
    ...CATALOG.girihShapes.map(g => ({ kind: 'girih', data: g })),
    ...CATALOG.templates.map(t => ({ kind: 'template', data: t })),
  ];
  const pick = all[Math.floor(Math.random() * all.length)];
  // Switch to the correct tab
  const tabMap = { tiling: 'tilings', girih: 'girih', template: 'templates' };
  const newTab = tabMap[pick.kind];
  if (newTab !== currentTab) {
    currentTab = newTab;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === newTab);
    });
  }
  highlightedIndex = -1;
  selectItem(pick.kind, pick.data);
}
document.getElementById('randomBtn').addEventListener('click', selectRandom);

// Surprise me button — random pattern from any Discover collection
function selectSurprise() {
  const all = [];
  for (const col of COLLECTIONS) {
    for (const entry of col.items) {
      const data = findCatalogItem(entry.tab, entry.name);
      if (!data) continue;
      const kind = entry.tab === 'tilings' ? 'tiling' : entry.tab === 'girih' ? 'girih' : 'template';
      all.push({ kind, data });
    }
  }
  if (all.length === 0) return;
  const pick = all[Math.floor(Math.random() * all.length)];
  highlightedIndex = -1;
  selectItem(pick.kind, pick.data);
}
document.getElementById('surpriseBtn').addEventListener('click', selectSurprise);

// Heart button
document.getElementById('heartBtn').addEventListener('click', () => {
  const name = currentItem?.data?.name;
  if (!name) return;
  const btn = document.getElementById('heartBtn');
  btn.classList.remove('pop');
  // Force reflow to restart animation
  void btn.offsetWidth;
  btn.classList.add('pop');
  toggleFavorite(name);
});

// Favorites menu toggle
document.getElementById('favMenuBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  const menu = document.getElementById('favMenu');
  menu.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if (!document.getElementById('favWrap').contains(e.target)) {
    document.getElementById('favMenu').classList.remove('open');
  }
});
document.getElementById('favExportBtn').addEventListener('click', () => {
  exportFavorites();
  document.getElementById('favMenu').classList.remove('open');
});
document.getElementById('favImportBtn').addEventListener('click', () => {
  document.getElementById('favFileInput').click();
  document.getElementById('favMenu').classList.remove('open');
});
document.getElementById('favFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) importFavorites(file);
  e.target.value = '';
});

// Help overlay
function toggleHelp(show) {
  const overlay = document.getElementById('kbdOverlay');
  if (show === undefined) show = !overlay.classList.contains('visible');
  overlay.classList.toggle('visible', show);
}
document.getElementById('helpBtn').addEventListener('click', () => toggleHelp());
document.getElementById('kbdClose').addEventListener('click', () => toggleHelp(false));
document.getElementById('kbdOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) toggleHelp(false);
});

// Fullscreen canvas
function toggleFullscreen(force) {
  const wrap = document.getElementById('canvasWrap');
  isFullscreen = force !== undefined ? force : !isFullscreen;
  wrap.classList.toggle('fullscreen', isFullscreen);
  if (currentItem) render();
}

// Tile mode button
document.getElementById('tileModeBtn').addEventListener('click', () => toggleTileMode());
// Floating exit button (only visible in tile mode)
document.getElementById('tileCloseBtn').addEventListener('click', () => toggleTileMode(false));

// Zoom slider
document.getElementById('zoomSlider').addEventListener('input', e => {
  setZoom(parseFloat(e.target.value));
});

// ────────────────────────────────────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ────────────────────────────────────────────────────────────────────────────
const TABS_ORDER = ['discover', 'tilings', 'girih', 'templates'];

function switchTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
  // Highlight and auto-render first item in new tab
  const flat = getFlatItems();
  highlightedIndex = flat.length > 0 ? 0 : -1;
  buildSidebar();
  if (flat.length > 0) selectItem(flat[0].kind, flat[0].data);
}

document.addEventListener('keydown', e => {
  const search = document.getElementById('searchInput');
  const isSearchFocused = document.activeElement === search;
  const isOverlayOpen = document.getElementById('kbdOverlay').classList.contains('visible');

  // Always: Escape
  if (e.key === 'Escape') {
    if (isOverlayOpen) { toggleHelp(false); return; }
    if (isTileMode) { toggleTileMode(false); return; }
    if (isFullscreen) { toggleFullscreen(false); return; }
    if (searchQuery) { search.value = ''; searchQuery = ''; highlightedIndex = -1; buildSidebar(); return; }
    if (isSearchFocused) { search.blur(); return; }
    return;
  }

  // Always: ? for help (only when search not focused)
  if (e.key === '?' && !isSearchFocused) {
    e.preventDefault();
    toggleHelp();
    return;
  }

  // / or Ctrl+K to focus search
  if ((e.key === '/' || (e.key === 'k' && e.ctrlKey)) && !isSearchFocused) {
    e.preventDefault();
    search.focus();
    search.select();
    return;
  }

  // If overlay open, block other shortcuts
  if (isOverlayOpen) return;

  // Tab / Shift+Tab — cycle tabs (only when search not focused)
  if (e.key === 'Tab' && !isSearchFocused) {
    e.preventDefault();
    const idx = TABS_ORDER.indexOf(currentTab);
    const next = e.shiftKey
      ? TABS_ORDER[(idx - 1 + TABS_ORDER.length) % TABS_ORDER.length]
      : TABS_ORDER[(idx + 1) % TABS_ORDER.length];
    switchTab(next);
    return;
  }

  // Don't intercept when typing in search, except Up/Down arrows
  if (isSearchFocused && !['ArrowUp', 'ArrowDown'].includes(e.key)) return;

  switch (e.key) {
    case 'ArrowUp': {
      e.preventDefault();
      const flat = getFlatItems();
      if (flat.length === 0) break;
      highlightedIndex = highlightedIndex <= 0 ? flat.length - 1 : highlightedIndex - 1;
      buildSidebar();
      // Auto-render the newly highlighted item
      const pick = flat[highlightedIndex];
      if (pick) selectItem(pick.kind, pick.data);
      break;
    }
    case 'ArrowDown': {
      e.preventDefault();
      const flat = getFlatItems();
      if (flat.length === 0) break;
      highlightedIndex = highlightedIndex < 0 ? 0 : (highlightedIndex + 1) % flat.length;
      buildSidebar();
      // Auto-render the newly highlighted item
      const pick = flat[highlightedIndex];
      if (pick) selectItem(pick.kind, pick.data);
      break;
    }
    case 'ArrowLeft': {
      if (!isSearchFocused) { e.preventDefault(); setZoom(zoomLevel - 0.25); }
      break;
    }
    case 'ArrowRight': {
      if (!isSearchFocused) { e.preventDefault(); setZoom(zoomLevel + 0.25); }
      break;
    }
    case ' ': {
      if (!isSearchFocused) {
        e.preventDefault();
        const cb = document.getElementById('showConstruction');
        cb.checked = !cb.checked;
        showConstruction = cb.checked;
        render();
      }
      break;
    }
    case 's':
    case 'S': {
      if (!isSearchFocused) savePng();
      break;
    }
    case 'c':
    case 'C': {
      if (!isSearchFocused) cycleColorMode();
      break;
    }
    case 'f':
    case 'F': {
      if (!isSearchFocused) toggleFullscreen();
      break;
    }
    case 'h':
    case 'H': {
      if (!isSearchFocused) {
        const name = currentItem?.data?.name;
        if (name) {
          const btn = document.getElementById('heartBtn');
          btn.classList.remove('pop');
          void btn.offsetWidth;
          btn.classList.add('pop');
          toggleFavorite(name);
        }
      }
      break;
    }
    case 'r':
    case 'R': {
      if (!isSearchFocused) selectRandom();
      break;
    }
    case 't':
    case 'T': {
      if (!isSearchFocused) toggleTileMode();
      break;
    }
    case '+':
    case '=': {
      if (!isSearchFocused) { e.preventDefault(); setZoom(zoomLevel + 0.25); }
      break;
    }
    case '-': {
      if (!isSearchFocused) { e.preventDefault(); setZoom(zoomLevel - 0.25); }
      break;
    }
    case '0': {
      if (!isSearchFocused) setZoom(1.0);
      break;
    }
  }
});

// Resize: re-render on window resize
window.addEventListener('resize', () => { if (currentItem) render(); });

// ────────────────────────────────────────────────────────────────────────────
// INITIAL RENDER
// ────────────────────────────────────────────────────────────────────────────
updateFavCount();
buildSidebar();
// Auto-select first pattern from Masterpieces collection in Discover tab
(function() {
  const firstCollection = COLLECTIONS[0];
  if (firstCollection && firstCollection.items.length > 0) {
    const entry = firstCollection.items[0];
    const data = findCatalogItem(entry.tab, entry.name);
    if (data) {
      const kind = entry.tab === 'tilings' ? 'tiling' : entry.tab === 'girih' ? 'girih' : 'template';
      selectItem(kind, data);
      return;
    }
  }
  // Fallback: first tiling
  const first = CATALOG.tilings[0];
  if (first) selectItem('tiling', first);
})();

// ── MOBILE NAVIGATION ──────────────────────────────────────────────────────
(function() {
  const MOBILE = () => window.innerWidth <= 640;

  window.mobileTab = function(tab) {
    if (!MOBILE()) return;
    const sidebar = document.getElementById('sidebar');
    const main = document.querySelector('.main');
    const savedPanel = document.getElementById('savedPanel');
    sidebar.classList.remove('mobile-active');
    main.classList.remove('mobile-active');
    savedPanel.classList.remove('mobile-active');
    document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));

    if (tab === 'patterns') {
      sidebar.classList.add('mobile-active');
      document.getElementById('mnavPatterns').classList.add('active');
    } else if (tab === 'canvas') {
      main.classList.add('mobile-active');
      document.getElementById('mnavCanvas').classList.add('active');
    } else if (tab === 'saved') {
      savedPanel.classList.add('mobile-active');
      document.getElementById('mnavSaved').classList.add('active');
      buildSavedPanel();
    }
  };

  function buildSavedPanel() {
    const list = document.getElementById('savedPanelList');
    const badge = document.getElementById('savedCountBadge');
    if (!list) return;
    if (favorites.size === 0) {
      list.innerHTML = '<div class="saved-panel-empty">No saved patterns yet.<br>Tap ♡ on any pattern to save it.</div>';
      if (badge) badge.style.display = 'none';
      return;
    }
    if (badge) { badge.textContent = favorites.size; badge.style.display = ''; }
    list.innerHTML = [...favorites].map(name =>
      `<div class="saved-panel-item" onclick="loadFromSaved(${JSON.stringify(name)})">
        <span class="s-icon">♥</span><span>${name}</span>
      </div>`
    ).join('');
  }

  window.loadFromSaved = function(name) {
    // Find item by name across all catalog entries
    function findItem(obj) {
      if (!obj) return null;
      if (obj.name === name) return obj;
      for (const key of Object.keys(obj)) {
        if (Array.isArray(obj[key])) {
          for (const child of obj[key]) {
            const found = findItem(child);
            if (found) return found;
          }
        }
      }
      return null;
    }
    const item = findItem(CATALOG);
    if (item) {
      // Detect type by catalog membership
      const type = CATALOG.tilings?.includes(item) ? 'tiling'
                 : CATALOG.girih?.includes(item) ? 'girih' : 'template';
      selectItem(type, item);
      mobileTab('canvas');
    }
  };

  // Switch to canvas when a sidebar pattern is tapped on mobile
  document.getElementById('sidebarList').addEventListener('click', e => {
    if (MOBILE() && e.target.closest('.pattern-item')) {
      setTimeout(() => mobileTab('canvas'), 80);
    }
  });

  // Init on mobile: show patterns panel
  if (MOBILE()) mobileTab('patterns');
})();

</script>
