<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 14: 3D Isometric - Vertical Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }
    
    .container {
      display: flex;
      gap: 80px;
      max-width: 1350px;
      width: 100%;
      padding: 0 60px;
    }
    
    /* Content area */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .poem {
      font-family: 'Amiri', serif;
      font-size: var(--poem-size, 45px);
      line-height: 1.88;
      text-align: center;
      max-width: 660px;
      transition: font-size 0.4s ease;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
    }
    
    .poem-title {
      font-size: 1.48em;
      margin-bottom: 46px;
      font-weight: 700;
      color: #fff;
    }
    
    .verse {
      margin-bottom: 27px;
    }
    
    .transliteration {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.41em;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 11px;
      display: none;
      font-style: italic;
      font-weight: 400;
    }
    
    .transliteration.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* Vertical control bar - RIGHT side with 3D isometric effects */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 36px;
      min-width: 260px;
    }
    
    .control-box {
      background: #fff;
      padding: 32px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    
    /* 3D isometric effect */
    .control-box::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -12px;
      right: 12px;
      bottom: 12px;
      background: rgba(0, 0, 0, 0.15);
      transform: skewY(-3deg);
      z-index: -1;
    }
    
    .control-box::after {
      content: '';
      position: absolute;
      top: 12px;
      left: -12px;
      right: 12px;
      bottom: -12px;
      background: rgba(0, 0, 0, 0.1);
      transform: skewX(-3deg);
      z-index: -2;
    }
    
    .control-box:hover {
      transform: translateY(-6px) rotateX(5deg);
    }
    
    .control-box:active {
      transform: translateY(-2px) rotateX(2deg);
    }
    
    .box-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .box-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      position: relative;
      transform-style: preserve-3d;
    }
    
    .box-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--icon-color-1), var(--icon-color-2));
      transform: translateZ(-8px);
    }
    
    .box-icon::after {
      content: attr(data-icon);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--icon-color-1), var(--icon-color-2));
      color: #fff;
    }
    
    .box-save .box-icon {
      --icon-color-1: #ff6b6b;
      --icon-color-2: #ee5a6f;
    }
    
    .box-save.active .box-icon {
      --icon-color-1: #51cf66;
      --icon-color-2: #37b24d;
    }
    
    .box-zoom .box-icon {
      --icon-color-1: #4c6ef5;
      --icon-color-2: #3b5bdb;
    }
    
    .box-translit .box-icon {
      --icon-color-1: #ff922b;
      --icon-color-2: #fd7e14;
    }
    
    .box-translit.active .box-icon {
      --icon-color-1: #20c997;
      --icon-color-2: #12b886;
    }
    
    .box-title {
      font-size: 22px;
      font-weight: 700;
      color: #212529;
    }
    
    .box-subtitle {
      font-size: 13px;
      color: #868e96;
      font-weight: 400;
      margin-top: 4px;
    }
    
    .box-content {
      color: #495057;
    }
    
    .save-badge {
      display: inline-block;
      background: #ff6b6b;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      margin-top: 8px;
    }
    
    .zoom-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .zoom-btn-3d {
      flex: 1;
      padding: 16px;
      border: none;
      background: linear-gradient(135deg, #4c6ef5, #3b5bdb);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease;
      font-family: 'Space Grotesk', sans-serif;
      transform-style: preserve-3d;
    }
    
    .zoom-btn-3d::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #364fc7, #2f4bb5);
      transform: translateZ(-6px);
    }
    
    .zoom-btn-3d:hover {
      transform: translateY(-3px);
    }
    
    .zoom-btn-3d:active {
      transform: translateY(-1px);
    }
    
    .zoom-display-3d {
      text-align: center;
      font-size: 52px;
      font-weight: 700;
      color: #212529;
      margin-top: 16px;
      font-variant-numeric: tabular-nums;
    }
    
    /* Title badge */
    .title-badge {
      position: absolute;
      top: 40px;
      left: 40px;
      background: #fff;
      color: #667eea;
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transform-style: preserve-3d;
    }
    
    .title-badge::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      transform: translateZ(-8px) translateX(8px) translateY(8px);
    }
  </style>
</head>
<body>
  <div class="title-badge">14 / 3D Isometric</div>
  
  <div class="container">
    <div class="content">
      <div class="poem">
        <div class="poem-title">قصيدة عن الحب</div>
        <div class="verse">
          يا من هواه أعزه وأذلني
          <div class="transliteration">yā man hawāhu aʿazzahu wa-adhallani</div>
        </div>
        <div class="verse">
          كيف السبيل إلى وصالك دلني
          <div class="transliteration">kayfa s-sabīlu ilā wiṣālika dallani</div>
        </div>
      </div>
    </div>
    
    <div class="controls">
      <div class="control-box box-save" onclick="toggleSave()">
        <div class="box-header">
          <div class="box-icon" data-icon="♥"></div>
          <div>
            <div class="box-title" id="saveTitleText">حفظ</div>
            <div class="box-subtitle">Save to collection</div>
          </div>
        </div>
        <div class="box-content" id="saveContentText">
          انقر للحفظ
        </div>
      </div>
      
      <div class="control-box box-zoom">
        <div class="box-header">
          <div class="box-icon" data-icon="A"></div>
          <div>
            <div class="box-title">حجم النص</div>
            <div class="box-subtitle">Text size</div>
          </div>
        </div>
        <div class="box-content">
          <div class="zoom-buttons">
            <button class="zoom-btn-3d" onclick="zoomIn()">+</button>
            <button class="zoom-btn-3d" onclick="zoomOut()">−</button>
          </div>
          <div class="zoom-display-3d" id="zoomLevel">100%</div>
        </div>
      </div>
      
      <div class="control-box box-translit" onclick="toggleTranslit()">
        <div class="box-header">
          <div class="box-icon" data-icon="Aa"></div>
          <div>
            <div class="box-title">النطق</div>
            <div class="box-subtitle">Pronunciation</div>
          </div>
        </div>
        <div class="box-content" id="translitContentText">
          إظهار النطق
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let saved = false;
    let saveCount = 0;
    let zoomLevel = 100;
    let translitActive = false;
    
    function toggleSave() {
      saved = !saved;
      const box = document.querySelector('.box-save');
      const title = document.getElementById('saveTitleText');
      const content = document.getElementById('saveContentText');
      
      if (saved) {
        saveCount++;
        box.classList.add('active');
        title.textContent = 'محفوظ ✓';
        content.innerHTML = `<span class="save-badge">عدد المحفوظات: ${saveCount}</span>`;
      } else {
        box.classList.remove('active');
        title.textContent = 'حفظ';
        content.textContent = 'انقر للحفظ';
      }
    }
    
    function zoomIn() {
      if (zoomLevel < 120) {
        zoomLevel += 20;
        updateZoom();
      }
    }
    
    function zoomOut() {
      if (zoomLevel > 80) {
        zoomLevel -= 20;
        updateZoom();
      }
    }
    
    function updateZoom() {
      const sizes = {
        80: '36px',
        100: '45px',
        120: '54px'
      };
      document.documentElement.style.setProperty('--poem-size', sizes[zoomLevel]);
      document.getElementById('zoomLevel').textContent = zoomLevel + '%';
    }
    
    function toggleTranslit() {
      translitActive = !translitActive;
      const translits = document.querySelectorAll('.transliteration');
      const box = document.querySelector('.box-translit');
      const content = document.getElementById('translitContentText');
      
      translits.forEach(t => {
        if (translitActive) {
          t.classList.add('active');
        } else {
          t.classList.remove('active');
        }
      });
      
      if (translitActive) {
        box.classList.add('active');
        content.textContent = 'إخفاء النطق';
      } else {
        box.classList.remove('active');
        content.textContent = 'إظهار النطق';
      }
    }
  </script>
</body>
</html>
