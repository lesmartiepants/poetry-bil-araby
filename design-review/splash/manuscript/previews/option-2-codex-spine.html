<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 2: Ancient Codex with Book Spine (Page Flip)</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Amiri', serif;
      background: #0f0d0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      perspective: 1800px;
    }

    /* Open book container with 3D effect */
    .book-container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      aspect-ratio: 16/9;
      transform-style: preserve-3d;
      animation: bookOpen 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes bookOpen {
      0% { transform: rotateY(-25deg) scale(0.9); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    /* Left page */
    .page-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 48%;
      height: 100%;
      background: linear-gradient(to right, #1a1410 0%, #2d2419 20%, #3d3428 100%);
      border: 2px solid #5a4a35;
      border-right: none;
      box-shadow:
        inset -15px 0 30px rgba(0, 0, 0, 0.5),
        -10px 10px 40px rgba(0, 0, 0, 0.6);
      /* More generous padding for breathing room */
      padding: 48px 44px 48px 56px;
      transform-origin: right center;
      transform: rotateY(-2deg);
      overflow: hidden;
    }

    /* Right page — page-flip wrapper */
    .page-right-wrapper {
      position: absolute;
      right: 0;
      top: 0;
      width: 48%;
      height: 100%;
      perspective: 1200px;
    }

    /* The flipping page itself */
    .page-right {
      position: absolute;
      inset: 0;
      background: linear-gradient(to left, #1a1410 0%, #2d2419 20%, #3d3428 100%);
      border: 2px solid #5a4a35;
      border-left: none;
      box-shadow:
        inset 15px 0 30px rgba(0, 0, 0, 0.5),
        10px 10px 40px rgba(0, 0, 0, 0.6);
      /* More padding */
      padding: 48px 56px 48px 44px;
      transform-origin: left center;
      transform-style: preserve-3d;
      /* Entry flip: rotate in from right */
      animation: pageFlipIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.8s both;
      will-change: transform;
    }

    @keyframes pageFlipIn {
      0% {
        transform: rotateY(90deg);
        box-shadow: -20px 0 40px rgba(0, 0, 0, 0.8), inset 15px 0 30px rgba(0, 0, 0, 0.5);
      }
      60% {
        transform: rotateY(-8deg);
      }
      80% {
        transform: rotateY(3deg);
      }
      100% {
        transform: rotateY(2deg);
        box-shadow: inset 15px 0 30px rgba(0, 0, 0, 0.5), 10px 10px 40px rgba(0, 0, 0, 0.6);
      }
    }

    /* Flip button — triggers re-flip */
    .flip-trigger {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 14px;
      background: rgba(212, 165, 116, 0.12);
      border: 1px solid rgba(212, 165, 116, 0.35);
      color: #d4a574;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .flip-trigger:hover {
      background: rgba(212, 165, 116, 0.25);
    }

    /* Book spine in center */
    .book-spine {
      position: absolute;
      left: 48%;
      top: 0;
      width: 4%;
      height: 100%;
      background: linear-gradient(to bottom,
        #1a1410 0%, #2d2419 10%, #3d3428 50%, #2d2419 90%, #1a1410 100%);
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.8),
        0 0 30px rgba(0, 0, 0, 0.8);
      z-index: 10;
      border-top: 2px solid #5a4a35;
      border-bottom: 2px solid #5a4a35;
    }

    .spine-bands { position: absolute; width: 100%; height: 100%; }

    .spine-band {
      position: absolute;
      width: 100%;
      height: 8px;
      background: #4a3f2f;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6);
    }
    .spine-band:nth-child(1) { top: 15%; }
    .spine-band:nth-child(2) { top: 35%; }
    .spine-band:nth-child(3) { top: 55%; }
    .spine-band:nth-child(4) { top: 75%; }

    /* Page content */
    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      position: relative;
      gap: 0;
    }

    /* Illuminated drop cap */
    .drop-cap {
      font-family: 'Cinzel', serif;
      font-size: 110px;
      font-weight: 600;
      background: linear-gradient(135deg, #d4a574 0%, #f5d89e 50%, #d4a574 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 0.85;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 8px rgba(212, 165, 116, 0.4));
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { filter: drop-shadow(0 4px 8px rgba(212, 165, 116, 0.4)) brightness(1); }
      50% { filter: drop-shadow(0 6px 12px rgba(212, 165, 116, 0.6)) brightness(1.2); }
    }

    .title-arabic {
      font-size: 68px;
      font-weight: bold;
      color: #c9b896;
      /* Increased letter-spacing for breathing room */
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      text-shadow: 0 2px 8px rgba(201, 184, 150, 0.3);
      /* Looser line-height */
      line-height: 1.3;
    }

    .title-english {
      font-family: 'Cinzel', serif;
      font-size: 40px;
      font-weight: 600;
      color: #8b7355;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 28px;
      line-height: 1.4;
    }

    /* Manuscript line decorations */
    .manuscript-line {
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4a574, transparent);
      margin: 20px auto;
      position: relative;
    }

    .manuscript-line::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: #d4a574;
      border-radius: 50%;
    }

    /* Polished description text — looser */
    .description {
      font-size: 20px;
      color: #c9b896;
      /* 20% more line-height */
      line-height: 2.0;
      max-width: 90%;
      margin: 0 auto 16px;
      opacity: 0.9;
      /* Slight letter-spacing for legibility */
      letter-spacing: 0.03em;
    }

    .description-sub {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: #8b7355;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.75;
      line-height: 1.8;
    }

    /* Aged page edges */
    .page-edge { position: absolute; pointer-events: none; }
    .page-edge.top { top: 0; left: 0; right: 0; height: 30px; background: linear-gradient(to bottom, rgba(26, 20, 16, 0.6), transparent); }
    .page-edge.bottom { bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(to top, rgba(26, 20, 16, 0.6), transparent); }

    /* Page numbers (folio) */
    .folio {
      position: absolute;
      bottom: 18px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: #8b7355;
      opacity: 0.45;
      letter-spacing: 0.1em;
    }
    .page-left .folio { left: 56px; }

    .page-right .folio { right: 56px; }

    /* Enter button — ornate manuscript style */
    .enter-button {
      margin-top: 26px;
      padding: 15px 44px;
      background: transparent;
      border: 2px solid #d4a574;
      color: #d4a574;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
      box-shadow: 0 0 16px rgba(212, 165, 116, 0.1);
    }

    .enter-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #d4a574, #f5d89e);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .enter-button:hover {
      color: #1a1410;
      box-shadow: 0 0 28px rgba(212, 165, 116, 0.5);
      transform: translateY(-1px);
    }

    .enter-button:hover::before { transform: translateX(0); }

    .enter-button span { position: relative; z-index: 1; }

    /* Paper texture overlay */
    .paper-texture {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(201, 184, 150, 0.03) 1px, rgba(201, 184, 150, 0.03) 2px);
      pointer-events: none;
      opacity: 0.6;
    }

    /* Corner wear effects */
    .corner-wear {
      position: absolute;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle at top left, transparent 60%, rgba(26, 20, 16, 0.4) 100%);
      pointer-events: none;
    }
    .page-left .corner-wear.top-left { top: 0; left: 0; }
    .page-left .corner-wear.bottom-left { bottom: 0; left: 0; transform: rotate(-90deg); }
    .page-right .corner-wear.top-right { top: 0; right: 0; transform: rotate(90deg); }
    .page-right .corner-wear.bottom-right { bottom: 0; right: 0; transform: rotate(180deg); }
  </style>
</head>
<body>
  <div class="book-container">

    <!-- Left page -->
    <div class="page-left">
      <div class="paper-texture"></div>
      <div class="page-edge top"></div>
      <div class="page-edge bottom"></div>
      <div class="corner-wear top-left"></div>
      <div class="corner-wear bottom-left"></div>

      <div class="page-content">
        <div class="drop-cap">P</div>
        <p class="description">حكمة الأجداد<br/>محفوظة في المخطوطات</p>
        <div class="manuscript-line"></div>
        <p class="description-sub">Ancient Wisdom<br/>in Timeless Manuscripts</p>
      </div>

      <div class="folio">I</div>
    </div>

    <!-- Book spine -->
    <div class="book-spine">
      <div class="spine-bands">
        <div class="spine-band"></div>
        <div class="spine-band"></div>
        <div class="spine-band"></div>
        <div class="spine-band"></div>
      </div>
    </div>

    <!-- Right page — with page-flip animation wrapper -->
    <div class="page-right-wrapper">
      <div class="page-right" id="pageRight">
        <div class="paper-texture"></div>
        <div class="page-edge top"></div>
        <div class="page-edge bottom"></div>
        <div class="corner-wear top-right"></div>
        <div class="corner-wear bottom-right"></div>

        <!-- Flip again button -->
        <button class="flip-trigger" onclick="flipPage()">Flip Page</button>

        <div class="page-content">
          <h1 class="title-arabic">بالعربي</h1>
          <h2 class="title-english">Poetry</h2>
          <div class="manuscript-line"></div>
          <p class="description">كل قصيدة كنز<br/>من التراث</p>
          <p class="description-sub">Every poem — a treasure of heritage</p>
          <button class="enter-button">
            <span>ENTER</span>
          </button>
        </div>

        <div class="folio">II</div>
      </div>
    </div>

  </div>

  <script>
    let flipped = false;

    function flipPage() {
      const page = document.getElementById('pageRight');
      if (!flipped) {
        page.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
        page.style.transformStyle = 'preserve-3d';
        page.style.transform = 'rotateY(-180deg)';
        flipped = true;
      } else {
        page.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
        page.style.transform = 'rotateY(2deg)';
        flipped = false;
      }
    }
  </script>
</body>
</html>
