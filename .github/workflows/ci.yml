name: CI Pipeline

on:
  push:
    branches: [main]
    # Smart path-based triggering: skip CI for documentation-only changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    # Smart path-based triggering: skip CI for documentation-only changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Stage 0: Detect what changed to optimize CI execution
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.filter.outputs.code }}
      tests-changed: ${{ steps.filter.outputs.tests }}
      config-changed: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'index.html'
            tests:
              - 'src/test/**'
              - 'e2e/**'
              - '**/*.test.{js,jsx,ts,tsx}'
              - 'vitest.config.js'
              - 'playwright.config.js'
              - 'playwright.config.full.js'
            config:
              - 'package*.json'
              - 'vite.config.js'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - '.github/workflows/**'

  # Stage 1: Build and validate
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: detect-changes
    # Always run build on code, config, or test changes
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Stage 2: Test suite (will grow as project evolves)
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run unit tests if code or tests changed
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Stage 3: E2E Testing with Playwright (Critical browsers only)
  e2e-tests:
    name: E2E Tests (Chrome Desktop + Mobile)
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run E2E tests if code, E2E tests, or relevant config changed
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 5

    # PostgreSQL service for database integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qafiyah_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (chromium only for CI speed)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Setup PostgreSQL schema (for database tests)
        run: |
          # Load database schema from migrations
          echo "Loading database schema from supabase/migrations..."
          PGPASSWORD=postgres psql -h localhost -U postgres -d qafiyah_test -f supabase/migrations/20260114000000_import_poetry.sql
          echo "Database schema loaded successfully"
        continue-on-error: true

      - name: Start backend API server (background)
        run: |
          # Start backend server in background for E2E tests
          # Only if database feature is enabled in tests
          npm run dev:server &
          echo "Backend server starting on http://localhost:3001"
          sleep 3
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: qafiyah_test
          PGHOST: localhost
          PGPORT: 5432
          PORT: 3001
        continue-on-error: true

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true
          VITE_API_URL: http://localhost:3001
        continue-on-error: true
        id: e2e-tests-run

      # Agent Browser: Capture failure state for AI debugging
      - name: Install agent-browser for failure analysis
        if: always() && steps.e2e-tests-run.outcome == 'failure'
        run: npx agent-browser install --with-deps

      - name: Start dev server for agent-browser debugging
        if: always() && steps.e2e-tests-run.outcome == 'failure'
        run: |
          npm run dev &
          sleep 5
          echo "Dev server started for agent-browser analysis"
        continue-on-error: true

      - name: Capture browser state with agent-browser
        if: always() && steps.e2e-tests-run.outcome == 'failure'
        run: |
          chmod +x .github/scripts/agent-browser-debug.sh
          .github/scripts/agent-browser-debug.sh "http://localhost:5173" "./agent-browser-debug"
        continue-on-error: true

      - name: Analyze test failures with agent-browser
        if: always() && steps.e2e-tests-run.outcome == 'failure'
        run: |
          chmod +x .github/scripts/agent-browser-analyze.sh
          .github/scripts/agent-browser-analyze.sh "./test-results" "./agent-browser-analysis"
        continue-on-error: true

      - name: Upload agent-browser debug artifacts
        if: always() && steps.e2e-tests-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-debug-e2e
          path: agent-browser-debug/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload agent-browser analysis
        if: always() && steps.e2e-tests-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-analysis-e2e
          path: agent-browser-analysis/
          retention-days: 14
          if-no-files-found: ignore

      # Fail the job if E2E tests failed
      - name: Check E2E test results
        if: steps.e2e-tests-run.outcome == 'failure'
        run: exit 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-e2e
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Stage 4: UI/UX Quality Checks (Chrome only)
  ui-ux-tests:
    name: UI/UX Design Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run UI/UX tests if code or relevant tests changed
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache-ui
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache-ui.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache-ui.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run UI/UX tests
        run: npm run test:e2e:ui
        env:
          CI: true
        continue-on-error: true
        id: ui-ux-tests-run

      # Agent Browser: Capture UI/UX failure state for AI debugging
      - name: Install agent-browser for UI/UX analysis
        if: always() && steps.ui-ux-tests-run.outcome == 'failure'
        run: npx agent-browser install --with-deps

      - name: Start dev server for agent-browser UI/UX debugging
        if: always() && steps.ui-ux-tests-run.outcome == 'failure'
        run: |
          npm run dev &
          sleep 5
          echo "Dev server started for agent-browser UI/UX analysis"
        continue-on-error: true

      - name: Capture UI state with agent-browser
        if: always() && steps.ui-ux-tests-run.outcome == 'failure'
        run: |
          chmod +x .github/scripts/agent-browser-debug.sh
          .github/scripts/agent-browser-debug.sh "http://localhost:5173" "./agent-browser-debug-ui"
        continue-on-error: true

      - name: Analyze UI/UX failures with agent-browser
        if: always() && steps.ui-ux-tests-run.outcome == 'failure'
        run: |
          chmod +x .github/scripts/agent-browser-analyze.sh
          .github/scripts/agent-browser-analyze.sh "./test-results" "./agent-browser-analysis-ui"
        continue-on-error: true

      - name: Upload agent-browser UI debug artifacts
        if: always() && steps.ui-ux-tests-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-debug-ui-ux
          path: agent-browser-debug-ui/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload agent-browser UI analysis
        if: always() && steps.ui-ux-tests-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-analysis-ui-ux
          path: agent-browser-analysis-ui/
          retention-days: 14
          if-no-files-found: ignore

      # Fail the job if UI/UX tests failed
      - name: Check UI/UX test results
        if: steps.ui-ux-tests-run.outcome == 'failure'
        run: exit 1

      - name: Upload UI/UX test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ux-report
          path: playwright-report/
          retention-days: 14

      - name: Upload UI/UX screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ux-screenshots
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Stage 5: Deploy preview (Vercel, Netlify, or GitHub Pages)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only deploy preview if code or config changed (not just test changes)
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.code-changed == 'true' ||
       needs.detect-changes.outputs.config-changed == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Placeholder for deployment - will add Vercel/Netlify config
      - name: Deploy to preview environment
        run: echo "Preview deployment will be configured with Vercel/Netlify"

      # Comment on PR with preview link
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployment ready! (Vercel/Netlify integration pending)'
            })

  # Stage 6: Provide feedback on PR
  pr-feedback:
    name: PR Feedback Bot
    runs-on: ubuntu-latest
    needs: [detect-changes, build, test, e2e-tests, ui-ux-tests]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post CI summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ needs.build.result }}';
            const testStatus = '${{ needs.test.result }}';
            const e2eStatus = '${{ needs.e2e-tests.result }}';
            const uiUxStatus = '${{ needs.ui-ux-tests.result }}';
            const codeChanged = '${{ needs.detect-changes.outputs.code-changed }}' === 'true';
            const testsChanged = '${{ needs.detect-changes.outputs.tests-changed }}' === 'true';
            const configChanged = '${{ needs.detect-changes.outputs.config-changed }}' === 'true';

            const statusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              if (status === 'skipped') return '⏭️';
              return '⚠️';
            };

            // Smart skip messages
            const skipReason = !codeChanged && !testsChanged && !configChanged
              ? 'Documentation-only changes detected - tests skipped'
              : '';

            const body = `
            ## 🤖 CI/CD Feedback Loop - Poetry Bil-Araby

            ${skipReason ? `### ℹ️ ${skipReason}\n\n` : ''}

            ### 📦 Changed File Categories:
            - Code Files: ${codeChanged ? '✅ Yes' : '❌ No'}
            - Test Files: ${testsChanged ? '✅ Yes' : '❌ No'}
            - Config Files: ${configChanged ? '✅ Yes' : '❌ No'}

            | Check | Status | Description |
            |-------|--------|-------------|
            | Build | ${statusEmoji(buildStatus)} ${buildStatus} | Application build and compilation |
            | Unit Tests | ${statusEmoji(testStatus)} ${testStatus} | Component and unit test coverage |
            | E2E Tests | ${statusEmoji(e2eStatus)} ${e2eStatus} | Playwright functional tests across browsers |
            | UI/UX Tests | ${statusEmoji(uiUxStatus)} ${uiUxStatus} | Design quality and accessibility checks |

            ### 📊 Test Coverage Details

            **E2E Testing:**
            - Core functionality tests across Desktop Chrome, Firefox, Safari
            - Mobile testing on Pixel 5 and iPhone 12 emulation
            - Tablet testing on iPad Pro emulation
            - [View Playwright Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            **UI/UX Testing:**
            - Responsive layout validation
            - Arabic typography and RTL text handling
            - Accessibility compliance (WCAG guidelines)
            - Touch target sizing for mobile
            - Color contrast and visual consistency
            - [View UI/UX Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### 🎯 Next Steps for AI Contributors:
            ${e2eStatus === 'failure' ? '- ❌ **Action Required:** E2E tests failing - review test results and fix issues\n' : ''}${uiUxStatus === 'failure' ? '- ❌ **Action Required:** UI/UX tests failing - review design quality issues\n' : ''}- Download test artifacts for detailed failure analysis
            - Review screenshots and videos for visual regressions
            - Check Playwright HTML reports for detailed test traces
            - Ensure all tests pass before merging

            ### 🔍 Debug Resources:
            - **Playwright Report:** Check "playwright-report" artifact
            - **UI/UX Screenshots:** Check "ui-ux-screenshots" artifact
            - **Test Results:** Check "playwright-results" artifact
            - **Coverage Report:** Check CodeCov integration
            ${e2eStatus === 'failure' ? '\n#### 🤖 Agent Browser Debug Artifacts (E2E Failures):\n- **agent-browser-debug-e2e**: Accessibility snapshots, console logs, screenshots\n- **agent-browser-analysis-e2e**: AI-friendly failure analysis and debugging guide\n- 📘 See `AI-DEBUGGING-GUIDE.md` in artifacts for step-by-step debugging instructions\n' : ''}${uiUxStatus === 'failure' ? '\n#### 🤖 Agent Browser Debug Artifacts (UI/UX Failures):\n- **agent-browser-debug-ui-ux**: UI state snapshots, console logs, screenshots\n- **agent-browser-analysis-ui-ux**: Visual regression analysis and debugging guide\n- 📘 See `AI-DEBUGGING-GUIDE.md` in artifacts for step-by-step debugging instructions\n' : ''}
            ### 💡 Using Agent Browser for Debugging:

            When tests fail, agent-browser automatically captures:
            1. **Accessibility Snapshot** - Interactive element tree with refs (@e1, @e2, etc.)
            2. **Full Page Screenshot** - Visual state when failure occurred
            3. **Console Logs** - All browser console output (log, warn, error)
            4. **JavaScript Errors** - Stack traces and error messages
            5. **Page Metadata** - URL, title, viewport dimensions

            **AI Agents (Copilot/Claude):** Download the agent-browser artifacts above to:
            - Understand exactly what the UI looked like when tests failed
            - See JavaScript errors and console warnings
            - Get element refs for reproducing issues locally
            - Follow AI-DEBUGGING-GUIDE.md for structured debugging approach

            *Automated testing ensures Poetry Bil-Araby maintains high quality across all devices and browsers*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
