<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A8 Deco Discovery - Desert Mirage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand: #E8D5B7; --sienna: #8B5E3C; --desert-night: #1A0F0A;
    --oasis: #2D7B6F; --gold: #C5A059;
    --sand-light: #F5EDE0; --sienna-dark: #6B3720;
    --bg: var(--desert-night); --fg: var(--sand); --card-bg: rgba(26,15,10,0.85);
    --card-border: rgba(139,94,60,0.4); --muted: rgba(232,213,183,0.5);
    /* Unified dune palette (warm gradient from dark to light) */
    --dune-1: #6B3720; --dune-2: #5A2E1A; --dune-3: #4A2516; --dune-4: #3A1C12;
  }
  [data-theme="light"] {
    --bg: var(--sand-light); --fg: var(--desert-night); --card-bg: rgba(255,255,255,0.92);
    --card-border: rgba(197,160,89,0.4); --muted: rgba(26,15,10,0.4);
    --dune-1: #D4B896; --dune-2: #C8A880; --dune-3: #BC9A6E; --dune-4: #B08C5E;
  }
  html { font-size: 16px; }
  body {
    font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--fg);
    min-height: 100vh; overflow-x: hidden; transition: background 0.6s, color 0.6s;
  }

  /* ---- SVG Sand Texture ---- */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
  }

  /* ---- Splash ---- */
  .splash {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(180deg, #0D0A14 0%, var(--desert-night) 40%, var(--dune-4) 100%);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    transition: opacity 1s ease-out;
  }
  .splash.hidden { opacity: 0; pointer-events: none; }
  .stars { position: absolute; inset: 0; overflow: hidden; }
  .star {
    position: absolute; background: #FFF; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: 0.95; } }

  /* Unified dune color palette */
  .dune { position: absolute; bottom: 0; left: -5%; width: 110%; }
  .dune-1 { height: 25%; background: var(--dune-1); border-radius: 55% 75% 0 0 / 100%; z-index: 4; animation: dune1 10s ease-in-out infinite alternate; }
  .dune-2 { height: 33%; background: var(--dune-2); border-radius: 75% 45% 0 0 / 100%; z-index: 3; animation: dune2 14s ease-in-out infinite alternate; }
  .dune-3 { height: 40%; background: var(--dune-3); border-radius: 45% 65% 0 0 / 100%; z-index: 2; animation: dune3 18s ease-in-out infinite alternate; }
  .dune-4 { height: 48%; background: var(--dune-4); border-radius: 65% 50% 0 0 / 100%; z-index: 1; animation: dune4 23s ease-in-out infinite alternate; }
  @keyframes dune1 { to { transform: translateX(18px); } }
  @keyframes dune2 { to { transform: translateX(-22px); } }
  @keyframes dune3 { to { transform: translateX(12px); } }
  @keyframes dune4 { to { transform: translateX(-9px); } }

  .splash-brand {
    position: relative; z-index: 10; display: flex; align-items: flex-end;
    justify-content: center; gap: 0.5rem; margin-bottom: 0.75rem;
  }
  .splash-brand-en {
    font-family: 'Forum', serif; font-size: clamp(3rem, 6vw, 4.5rem);
    letter-spacing: -0.05em; color: var(--gold); line-height: 1;
    text-shadow: 0 0 50px rgba(197,160,89,0.4);
  }
  .splash-brand-ar {
    font-family: 'Reem Kufi', sans-serif; font-weight: 700;
    font-size: clamp(1.875rem, 4vw, 3rem); color: var(--gold); line-height: 1;
  }
  .splash-subtitle {
    position: relative; z-index: 10; font-family: 'Tajawal', sans-serif;
    font-size: clamp(0.9rem, 2.5vw, 1.25rem); color: var(--muted);
    margin-top: 0.5rem; letter-spacing: 0.1em; direction: ltr;
  }
  .splash-enter {
    position: relative; z-index: 10; margin-top: 2.5rem;
    padding: 14px 40px; min-height: 44px; background: transparent;
    border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Tajawal', sans-serif; font-size: 15px; border-radius: 8px;
    cursor: pointer; transition: all 0.3s ease;
    opacity: 0; animation: fadeIn 1s 2s forwards;
  }
  .splash-enter:hover { background: var(--gold); color: var(--desert-night); box-shadow: 0 0 30px rgba(197,160,89,0.3); }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ---- Walkthrough (sequential tap) ---- */
  .walkthrough {
    position: fixed; inset: 0; z-index: 900; background: var(--bg);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem; cursor: pointer;
  }
  .walkthrough.active { display: flex; }

  .walk-card {
    max-width: 400px; width: 90%; padding: 2rem; text-align: center;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 16px; opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .walk-card.visible { opacity: 1; transform: translateY(0); }

  .walk-icon {
    width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 50%;
    background: rgba(45,123,111,0.15); display: flex; align-items: center;
    justify-content: center; color: var(--oasis);
  }
  .walk-card h3 {
    font-family: 'Tajawal', sans-serif; font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: 500; color: var(--fg); direction: ltr; margin-bottom: 4px;
  }
  .walk-card .walk-ar {
    font-family: 'Tajawal', sans-serif; font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: var(--gold); direction: rtl; margin-bottom: 8px;
  }
  .walk-card p {
    font-size: clamp(0.8rem, 1.8vw, 0.95rem); line-height: 1.7; color: var(--muted); direction: ltr;
  }
  .walk-progress { display: flex; gap: 8px; margin-top: 2rem; }
  .walk-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--card-border);
    transition: all 0.3s;
  }
  .walk-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
  .walk-hint { margin-top: 1rem; font-size: 13px; color: var(--muted); opacity: 0.6; }

  /* ---- Main App ---- */
  .app { display: none; min-height: 100vh; padding-bottom: 80px; }
  .app.active { display: block; }

  .app-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: rgba(26,15,10,0.85);
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--card-border);
    direction: ltr;
  }
  [data-theme="light"] .app-top { background: rgba(245,237,224,0.9); }

  .app-top-brand { display: flex; align-items: flex-end; gap: 6px; }
  .app-top-brand-en {
    font-family: 'Forum', serif; font-size: 20px;
    letter-spacing: -0.05em; color: var(--gold); line-height: 1;
  }
  .app-top-brand-ar {
    font-family: 'Reem Kufi', sans-serif; font-weight: 700;
    font-size: 14px; color: var(--gold); line-height: 1;
  }
  .app-top-actions { display: flex; gap: 8px; }
  .app-top-btn {
    width: 40px; height: 40px; display: flex; align-items: center;
    justify-content: center; background: transparent;
    border: 1px solid var(--card-border); border-radius: 8px;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .app-top-btn:hover { color: var(--gold); border-color: var(--gold); }

  /* Reader */
  .reader { max-width: 720px; margin: 0 auto; padding: 80px 20px 40px; }

  .poem-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 3rem 2.5rem; direction: rtl;
    position: relative; overflow: hidden;
    box-shadow: 0 0 80px -20px rgba(45,123,111,0.2), 0 0 140px -40px rgba(45,123,111,0.1);
    animation: fadeInUp 0.6s ease;
  }
  .poem-card::before {
    content: ''; position: absolute; inset: -60%; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(45,123,111,0.06) 0%, transparent 65%);
  }
  .poem-content { position: relative; z-index: 1; }
  .poem-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .poet-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(197,160,89,0.2), rgba(45,123,111,0.15));
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-family: 'Amiri', serif; font-size: 20px;
  }
  .poet-info h2 { font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 500; }
  .poet-info span { font-size: 13px; color: var(--muted); }

  .poem-verses {
    font-family: 'Amiri', serif; font-size: clamp(20px, 3.5vw, 28px);
    line-height: 2.2; text-align: center; padding: 20px 0;
    border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border);
  }
  .verse-line { opacity: 0; animation: fadeInUp 0.5s ease forwards; }
  .verse-line:nth-child(1) { animation-delay: 0.2s; }
  .verse-line:nth-child(2) { animation-delay: 0.5s; }

  .hemistich-divider {
    display: inline-block; width: 40px; height: 1px; background: var(--gold);
    vertical-align: middle; margin: 0 12px; opacity: 0.4;
  }

  .poem-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }
  .poem-action-btn {
    display: flex; align-items: center; gap: 6px; padding: 10px 16px;
    background: transparent; border: 1px solid var(--card-border); border-radius: 10px;
    color: var(--muted); font-family: 'Tajawal', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .poem-action-btn:hover { color: var(--gold); border-color: var(--gold); }

  /* Vertical Rail */
  .vertical-rail {
    position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 4px; z-index: 40; direction: ltr;
  }
  .rail-btn {
    width: 44px; height: 44px; display: flex; align-items: center;
    justify-content: center; background: var(--card-bg);
    border: 1px solid var(--card-border); border-radius: 10px;
    color: var(--muted); cursor: pointer; transition: all 0.2s; position: relative;
  }
  .rail-btn:hover { color: var(--gold); border-color: var(--gold); transform: scale(1.08); }
  .rail-btn .tooltip {
    position: absolute; right: 52px; top: 50%; transform: translateY(-50%);
    background: var(--card-bg); border: 1px solid var(--card-border);
    color: var(--fg); font-family: 'Tajawal', sans-serif; font-size: 12px;
    padding: 4px 10px; border-radius: 6px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .rail-btn:hover .tooltip { opacity: 1; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 10px 20px; background: rgba(26,15,10,0.9);
    backdrop-filter: blur(16px); border-top: 1px solid var(--card-border); direction: ltr;
  }
  [data-theme="light"] .bottom-nav { background: rgba(245,237,224,0.95); }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 16px; background: transparent; border: none;
    color: var(--muted); cursor: pointer; font-family: 'Tajawal', sans-serif;
    font-size: 11px; transition: color 0.2s; min-width: 60px;
  }
  .nav-item.active { color: var(--gold); }
  .nav-item:hover { color: var(--gold); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .dune { transform: none !important; }
  }
  @media (max-width: 768px) {
    .vertical-rail { display: none; }
    .reader { padding: 70px 16px 40px; }
    .poem-card { padding: 1.5rem; }
    .poem-actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>

  <!-- Splash Screen -->
  <div class="splash" id="splash">
    <div class="stars" id="stars"></div>
    <div class="dune dune-4"></div>
    <div class="dune dune-3"></div>
    <div class="dune dune-2"></div>
    <div class="dune dune-1"></div>
    <div class="splash-brand">
      <span class="splash-brand-en">poetry</span>
      <span class="splash-brand-ar">بالعربي</span>
    </div>
    <p class="splash-subtitle">Desert Mirage</p>
    <button class="splash-enter" id="splashEnter">Enter</button>
  </div>

  <!-- Walkthrough (sequential tap-to-advance) -->
  <div class="walkthrough" id="walkthrough">
    <div class="walk-card" id="walkCard">
      <div class="walk-icon" id="walkIcon"></div>
      <h3 id="walkTitle"></h3>
      <div class="walk-ar" id="walkAr"></div>
      <p id="walkDesc"></p>
    </div>
    <div class="walk-progress" id="walkProgress"></div>
    <span class="walk-hint">Tap anywhere to continue</span>
  </div>

  <!-- Main App -->
  <main class="app" id="app">
    <header class="app-top">
      <div class="app-top-brand">
        <span class="app-top-brand-en">poetry</span>
        <span class="app-top-brand-ar">بالعربي</span>
      </div>
      <div class="app-top-actions">
        <button class="app-top-btn" id="themeToggle" aria-label="Toggle theme">
          <i data-lucide="sun" style="width:18px;height:18px"></i>
        </button>
        <button class="app-top-btn" aria-label="Settings">
          <i data-lucide="settings" style="width:18px;height:18px"></i>
        </button>
      </div>
    </header>

    <nav class="vertical-rail">
      <button class="rail-btn"><i data-lucide="heart" style="width:18px;height:18px"></i><span class="tooltip">Save</span></button>
      <button class="rail-btn"><i data-lucide="type" style="width:18px;height:18px"></i><span class="tooltip">Font size</span></button>
      <button class="rail-btn"><i data-lucide="languages" style="width:18px;height:18px"></i><span class="tooltip">Transliteration</span></button>
      <button class="rail-btn"><i data-lucide="book-open" style="width:18px;height:18px"></i><span class="tooltip">Tafsir</span></button>
      <button class="rail-btn"><i data-lucide="italic" style="width:18px;height:18px"></i><span class="tooltip">Tashkeel</span></button>
      <button class="rail-btn"><i data-lucide="log-in" style="width:18px;height:18px"></i><span class="tooltip">Sign in</span></button>
      <button class="rail-btn"><i data-lucide="settings" style="width:18px;height:18px"></i><span class="tooltip">Settings</span></button>
    </nav>

    <div class="reader">
      <article class="poem-card">
        <div class="poem-content">
          <div class="poem-meta">
            <div class="poet-avatar">م</div>
            <div class="poet-info">
              <h2>المتنبي</h2>
              <span>Al-Mutanabbi</span>
            </div>
          </div>
          <div class="poem-verses" dir="rtl" lang="ar">
            <div class="verse-line">
              عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ
              <span class="hemistich-divider"></span>
              وَتَأْتِي عَلَى قَدْرِ الكِرَامِ المَكَارِمُ
            </div>
          </div>
          <div class="poem-actions">
            <button class="poem-action-btn">
              <i data-lucide="copy" style="width:16px;height:16px"></i> نسخ
            </button>
            <button class="poem-action-btn">
              <i data-lucide="share-2" style="width:16px;height:16px"></i> مشاركة
            </button>
            <button class="poem-action-btn">
              <i data-lucide="bookmark" style="width:16px;height:16px"></i> حفظ
            </button>
          </div>
        </div>
      </article>
    </div>

    <nav class="bottom-nav">
      <button class="nav-item"><i data-lucide="music" style="width:20px;height:20px"></i>Music</button>
      <button class="nav-item"><i data-lucide="lightbulb" style="width:20px;height:20px"></i>Insight</button>
      <button class="nav-item active"><i data-lucide="refresh-cw" style="width:20px;height:20px"></i>Refresh</button>
      <button class="nav-item"><i data-lucide="library" style="width:20px;height:20px"></i>Library</button>
      <button class="nav-item"><i data-lucide="shuffle" style="width:20px;height:20px"></i>Shuffle</button>
    </nav>
  </main>

<script>
(function() {
  // Stars
  var starsEl = document.getElementById('stars');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = (Math.random() * 100).toFixed(1) + '%';
    s.style.top = (Math.random() * 48).toFixed(1) + '%';
    s.style.setProperty('--dur', (1.2 + Math.random() * 3.5).toFixed(2) + 's');
    s.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
    var sz = (1 + Math.random() * 2).toFixed(1);
    s.style.width = sz + 'px'; s.style.height = sz + 'px';
    starsEl.appendChild(s);
  }

  // Walkthrough steps (English primary, bilingual)
  var walkSteps = [
    { icon: 'compass', title: 'Discover 84,000+ Poems', ar: 'اكتشف القصائد', desc: 'Browse thousands of classical and modern Arabic poems from centuries of literary heritage.' },
    { icon: 'headphones', title: 'Listen to Recitation', ar: 'استمع للإيقاع', desc: 'Hear poems brought to life with natural AI voices capturing the melody of Arabic verse.' },
    { icon: 'sparkles', title: 'AI-Powered Insights', ar: 'رؤى ذكية', desc: 'Get deep analysis of meter, meaning, and historical context with intelligent annotations.' },
    { icon: 'heart', title: 'Save Your Favorites', ar: 'شارك الجمال', desc: 'Build your personal collection and share the beauty of Arabic poetry.' }
  ];
  var currentStep = 0;

  function renderStep() {
    var step = walkSteps[currentStep];
    var card = document.getElementById('walkCard');
    var iconEl = document.getElementById('walkIcon');
    var titleEl = document.getElementById('walkTitle');
    var arEl = document.getElementById('walkAr');
    var descEl = document.getElementById('walkDesc');
    var progress = document.getElementById('walkProgress');

    while (iconEl.firstChild) iconEl.removeChild(iconEl.firstChild);
    var ic = document.createElement('i');
    ic.setAttribute('data-lucide', step.icon);
    ic.style.width = '24px'; ic.style.height = '24px';
    iconEl.appendChild(ic);

    titleEl.textContent = step.title;
    arEl.textContent = step.ar;
    descEl.textContent = step.desc;

    while (progress.firstChild) progress.removeChild(progress.firstChild);
    for (var d = 0; d < walkSteps.length; d++) {
      var dot = document.createElement('div');
      dot.className = 'walk-dot' + (d === currentStep ? ' active' : '');
      progress.appendChild(dot);
    }

    card.classList.remove('visible');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { card.classList.add('visible'); });
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  // Splash enter
  document.getElementById('splashEnter').addEventListener('click', function() {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('walkthrough').classList.add('active');
    currentStep = 0;
    renderStep();
  });

  // Tap to advance
  document.getElementById('walkthrough').addEventListener('click', function() {
    currentStep++;
    if (currentStep >= walkSteps.length) {
      document.getElementById('walkthrough').style.display = 'none';
      document.getElementById('app').classList.add('active');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    } else {
      renderStep();
    }
  });

  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', function() {
    var html = document.documentElement;
    if (html.getAttribute('data-theme') === 'light') {
      html.removeAttribute('data-theme');
    } else {
      html.setAttribute('data-theme', 'light');
    }
  });

  // Init icons
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
  });
})();
</script>
</body>
</html>
