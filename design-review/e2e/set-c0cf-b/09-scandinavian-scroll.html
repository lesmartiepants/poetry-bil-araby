<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind & Sand — رياح الصحراء</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --desert-night: #1A1410;
    --sand: #D4C5A0;
    --gold: #C5A059;
    --gold-dim: rgba(197, 160, 89, 0.3);
    --sienna: #A0522D;
    --cream: #F5ECD7;
    --dark-brown: #3B2A1A;
    --bg: var(--desert-night);
    --fg: var(--sand);
    --card-bg: rgba(212, 197, 160, 0.08);
    --card-border: rgba(197, 160, 89, 0.2);
    --speed: 0.5s;
  }
  [data-theme="light"] {
    --bg: var(--cream);
    --fg: var(--dark-brown);
    --card-bg: rgba(160, 82, 45, 0.07);
    --card-border: rgba(160, 82, 45, 0.2);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow-x: hidden;
    min-height: 100vh;
    transition: background var(--speed), color var(--speed);
  }

  /* ============ Splash ============ */
  #splash {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 60%, #3B2A1A 0%, #1A1410 70%);
    transition: opacity 0.8s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Brand Logo */
  .splash-brand {
    position: relative; z-index: 10;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.5s forwards;
  }
  .splash-brand .en {
    font-family: 'Forum', serif;
    font-size: clamp(3rem, 6vw, 4.5rem);
    letter-spacing: -0.05em;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(197,160,89,0.3);
  }
  .splash-brand .ar {
    font-family: 'Reem Kufi', sans-serif;
    font-weight: 700;
    font-size: clamp(1.875rem, 4vw, 3rem);
    color: var(--sand);
    line-height: 1;
    padding-bottom: 0.15em;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CTA Button */
  #enterBtn {
    position: relative; z-index: 10;
    background: transparent;
    border: 1.5px solid var(--sand);
    color: var(--sand);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.05rem; font-weight: 500;
    padding: 0.8rem 2.5rem;
    border-radius: 24px;
    cursor: pointer;
    min-width: 44px; min-height: 44px;
    transition: background 0.3s, transform 0.2s;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.5s forwards;
    display: flex; align-items: center; gap: 0.5rem;
  }
  #enterBtn:hover, #enterBtn:focus-visible {
    background: rgba(212, 197, 160, 0.15);
    transform: scale(1.04);
  }

  /* ============ Onboarding ============ */
  #onboarding {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(26, 20, 16, 0.95);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  [data-theme="light"] #onboarding { background: rgba(245, 236, 215, 0.95); }
  #onboarding.active { opacity: 1; pointer-events: auto; }

  .onboard-card {
    max-width: 380px; width: 90%;
    background: var(--card-bg);
    border: 1.5px solid var(--gold);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: transform 0.5s ease, opacity 0.5s ease;
  }
  .onboard-card .icon-wrap {
    width: 56px; height: 56px;
    margin: 0 auto 1.2rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(197, 160, 89, 0.12);
    color: var(--gold);
  }
  .onboard-card .icon-wrap svg { width: 28px; height: 28px; }
  .onboard-card h3 {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .onboard-card .subtitle { font-size: 0.9rem; opacity: 0.6; margin-bottom: 1rem; }
  .onboard-card p { font-size: 0.88rem; line-height: 1.7; opacity: 0.85; margin-bottom: 0.5rem; }
  .onboard-card p[lang="ar"] { font-family: 'Tajawal', sans-serif; direction: rtl; }
  .onboard-card p.en-text { direction: ltr; text-align: center; font-size: 0.82rem; opacity: 0.55; }
  .onboard-dots { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
  .onboard-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold-dim); transition: background 0.3s, transform 0.3s;
  }
  .onboard-dot.active { background: var(--gold); transform: scale(1.3); }
  .onboard-tap { font-size: 0.72rem; color: var(--sand); opacity: 0.5; margin-top: 1rem; }

  /* ===== MAIN APP ===== */
  #app {
    display: none; position: relative; min-height: 100vh;
    background: #fafaf9;
    color: #2c2c2b;
    transition: none;
  }
  #app.visible { display: flex; flex-direction: column; min-height: 100vh; }
  [data-theme="light"] #app { background: #fafaf9; color: #2c2c2b; }
  #ambient-canvas { display: none; }

  /* Birch accent — single 1px line across the top */
  .birch-line-top {
    width: 100%;
    height: 1px;
    background: #d6d3cd;
    flex-shrink: 0;
  }

  .content {
    position: relative; z-index: 1;
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4rem 2rem 6rem;
  }

  /* Poem — extreme whitespace, single-line centered */
  .poem-section {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 0;
  }
  .poem-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    width: 100%;
    text-align: center;
    position: relative;
  }
  .poem-card::before { display: none; }
  .poem-card:hover { transform: none; }

  .poem-text {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    line-height: 3.2;
    color: #2c2c2b;
    letter-spacing: 0.01em;
  }
  .poem-text .hemistich {
    display: block;
    margin-bottom: 2rem;
    opacity: 0;
    animation: nordicFadeIn 1s ease forwards;
  }
  .poem-text .hemistich:first-of-type { animation-delay: 0.3s; }
  .poem-text .hemistich:last-of-type { animation-delay: 0.9s; }

  @keyframes nordicFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Birch separator between hemistichs */
  .bayt-sep {
    display: block;
    width: 24px;
    height: 1px;
    background: #c5c0b8;
    margin: 0 auto 2rem;
    opacity: 0;
    animation: nordicFadeIn 0.6s ease 0.6s forwards;
  }

  .poet-name {
    font-family: 'Tajawal', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    color: #9a9590;
    margin-top: 3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0;
    animation: nordicFadeIn 0.8s ease 1.2s forwards;
  }
  .poet-name::before, .poet-name::after { display: none; }

  /* ===== CONTROLS ===== */
  /* Ultra-thin dot line — nearly invisible until interaction */
  .controls-dot-line {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 64px;
    padding: 0 1rem;
  }
  .controls-dot-line::before {
    content: '';
    position: absolute;
    bottom: 32px; left: 10%; right: 10%;
    height: 1px;
    background: #e0ddd8;
  }

  .dot-action {
    position: relative;
    width: 44px; height: 44px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
    margin: 0 16px;
    -webkit-tap-highlight-color: transparent;
  }
  /* The tiny dot */
  .dot-action::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #c5c0b8;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.3s ease;
  }
  .dot-action:hover::before,
  .dot-action:active::before {
    transform: scale(1.8);
    background: #2c2c2b;
  }

  /* Label appears on hover/tap */
  .dot-label {
    position: absolute;
    bottom: 44px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 300;
    font-size: 0.62rem;
    color: #9a9590;
    letter-spacing: 0.06em;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .dot-action:hover .dot-label,
  .dot-action:active .dot-label {
    opacity: 1;
    transform: translateY(0);
  }

  /* Hide the old controls */
  .controls-vertical { display: none; }
  .controls-bottom { display: none; }

  /* ============ Responsive ============ */
  @media (max-width: 768px) {
    .content { padding: 3rem 1.5rem 5rem; }
    .poem-text { font-size: 1.35rem; line-height: 2.8; }
    .poem-text .hemistich { margin-bottom: 1.5rem; }
    .bayt-sep { margin-bottom: 1.5rem; }
    .poet-name { margin-top: 2.5rem; }
    .dot-action { margin: 0 10px; }
  }

  /* ============ Reduced Motion ============ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0s !important;
      transition-duration: 0s !important;
    }
    #splash-canvas, #ambient-canvas { display: none; }
    #splash { display: none !important; }
    #onboarding { display: none !important; }
    #app { display: block !important; }
  }
</style>
</head>
<body>
  <!-- ======== Splash ======== -->
  <div id="splash" role="dialog" aria-label="Welcome screen">
    <canvas id="splash-canvas" aria-hidden="true"></canvas>
    <div class="splash-brand">
      <span class="en">poetry</span>
      <span class="ar">بالعربي</span>
    </div>
    <button id="enterBtn" aria-label="Enter the app">
      <i data-lucide="wind" style="width:18px;height:18px;"></i>
      <span>ابدأ الرحلة</span>
    </button>
  </div>

  <!-- ======== Onboarding ======== -->
  <div id="onboarding">
    <div class="onboard-card" id="onboardCard">
      <div class="icon-wrap" id="onboardIcon"></div>
      <h3 id="onboardTitle"></h3>
      <div class="subtitle" id="onboardSubtitle"></div>
      <p lang="ar" id="onboardTextAr"></p>
      <p class="en-text" id="onboardTextEn"></p>
      <div class="onboard-dots" id="onboardDots"></div>
      <div class="onboard-tap">tap to continue</div>
    </div>
  </div>

  <!-- ======== Main App ======== -->
  <div id="app" aria-live="polite">
    <div class="birch-line-top" aria-hidden="true"></div>
    <div class="content">
      <section class="poem-section" aria-label="Poem">
        <article class="poem-card">
          <div class="poem-text" lang="ar">
            <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
            <span class="bayt-sep" aria-hidden="true"></span>
            <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
          </div>
          <div class="poet-name">أحمد شوقي</div>
        </article>
      </section>
    </div>

    <!-- Ultra-thin dot line controls -->
    <nav class="controls-dot-line" aria-label="Poem actions">
      <button class="dot-action" aria-label="Next poem">
        <span class="dot-label">shuffle</span>
      </button>
      <button class="dot-action" aria-label="Save poem">
        <span class="dot-label">save</span>
      </button>
      <button class="dot-action" aria-label="Listen to poem">
        <span class="dot-label">listen</span>
      </button>
      <button class="dot-action" aria-label="Share poem">
        <span class="dot-label">share</span>
      </button>
    </nav>
  </div>

<script>
(function() {
  'use strict';
  var isMobile = window.innerWidth < 768;
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var SPLASH_PARTICLE_COUNT = isMobile ? 50 : 100;
  var AMBIENT_PARTICLE_COUNT = isMobile ? 15 : 30;

  /* ---------- Onboarding data ---------- */
  var onboardSteps = [
    {
      icon: 'wind',
      titleAr: 'رياح الصحراء',
      subtitle: 'Wind & Sand',
      textAr: 'تصفّح مكتبة شعرية غنية من التراث العربي',
      textEn: 'Browse a rich poetry library from Arabic heritage'
    },
    {
      icon: 'search',
      titleAr: 'اكتشف شعراء',
      subtitle: 'Discover Poets',
      textAr: 'اكتشف شعراء من مختلف العصور العربية',
      textEn: 'Discover poets from various Arabic eras'
    },
    {
      icon: 'headphones',
      titleAr: 'استمع وتأمّل',
      subtitle: 'Listen & Reflect',
      textAr: 'اسمع القصائد بصوت واضح وتدبّر معانيها',
      textEn: 'Listen to poems clearly and contemplate their meaning'
    }
  ];
  var currentStep = 0;

  function showOnboardStep(idx) {
    var step = onboardSteps[idx];
    var iconWrap = document.getElementById('onboardIcon');
    while (iconWrap.firstChild) iconWrap.removeChild(iconWrap.firstChild);
    var iconEl = document.createElement('i');
    iconEl.setAttribute('data-lucide', step.icon);
    iconWrap.appendChild(iconEl);

    document.getElementById('onboardTitle').textContent = step.titleAr;
    document.getElementById('onboardSubtitle').textContent = step.subtitle;
    document.getElementById('onboardTextAr').textContent = step.textAr;
    document.getElementById('onboardTextEn').textContent = step.textEn;

    var dotsContainer = document.getElementById('onboardDots');
    while (dotsContainer.firstChild) dotsContainer.removeChild(dotsContainer.firstChild);
    for (var i = 0; i < onboardSteps.length; i++) {
      var dot = document.createElement('span');
      dot.className = 'onboard-dot' + (i === idx ? ' active' : '');
      dotsContainer.appendChild(dot);
    }
    lucide.createIcons({ nodes: [iconWrap] });
  }

  function advanceOnboard() {
    currentStep++;
    if (currentStep >= onboardSteps.length) {
      document.getElementById('onboarding').classList.remove('active');
      document.getElementById('app').classList.add('visible');
      startAmbient();
    } else {
      showOnboardStep(currentStep);
    }
  }

  /* ---------- Particle System ---------- */
  function createParticle(w, h) {
    var colors = ['#D4C5A0', '#C5A059', '#A0522D', '#BFB08A', '#C9A96E'];
    return {
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.5, vy: Math.random() * 0.3 + 0.1,
      size: Math.random() * 3 + 1,
      opacity: Math.random() * 0.6 + 0.2,
      color: colors[Math.floor(Math.random() * colors.length)]
    };
  }

  /* ---------- Splash Animation ---------- */
  var splash = document.getElementById('splash');
  var splashCanvas = document.getElementById('splash-canvas');
  var sCtx = splashCanvas.getContext('2d');
  var splashParticles = [];
  var splashDone = false;
  var splashRafId = null;

  function initSplash() {
    splashCanvas.width = window.innerWidth;
    splashCanvas.height = window.innerHeight;
    splashParticles = [];
    for (var i = 0; i < SPLASH_PARTICLE_COUNT; i++) {
      splashParticles.push(createParticle(splashCanvas.width, splashCanvas.height));
    }
  }

  function animateSplash(time) {
    if (splashDone) return;
    splashRafId = requestAnimationFrame(animateSplash);
    var w = splashCanvas.width;
    var h = splashCanvas.height;
    sCtx.clearRect(0, 0, w, h);

    for (var i = 0; i < splashParticles.length; i++) {
      var p = splashParticles[i];
      p.vx += Math.sin(time * 0.001 + i) * 0.02 + 0.03;
      p.vy += 0.01;
      p.vx *= 0.99; p.vy *= 0.99;
      p.x += p.vx; p.y += p.vy;
      if (p.x > w + 10) p.x = -10;
      if (p.x < -10) p.x = w + 10;
      if (p.y > h + 10) { p.y = -10; p.x = Math.random() * w; }

      sCtx.beginPath();
      sCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      sCtx.fillStyle = p.color;
      sCtx.globalAlpha = p.opacity;
      sCtx.fill();
    }
    sCtx.globalAlpha = 1;
  }

  function enterApp() {
    splashDone = true;
    if (splashRafId) cancelAnimationFrame(splashRafId);
    splash.classList.add('hidden');
    setTimeout(function() {
      splash.style.display = 'none';
      document.getElementById('onboarding').classList.add('active');
      showOnboardStep(0);
    }, 800);
  }

  document.getElementById('enterBtn').addEventListener('click', enterApp);
  document.getElementById('onboardCard').addEventListener('click', advanceOnboard);

  /* ---------- Ambient Canvas ---------- */
  var ambientCanvas = document.getElementById('ambient-canvas');
  var aCtx = ambientCanvas.getContext('2d');
  var ambientParticles = [];
  var mouseX = 0, mouseY = 0;

  function initAmbient() {
    ambientCanvas.width = window.innerWidth;
    ambientCanvas.height = window.innerHeight;
    ambientParticles = [];
    for (var i = 0; i < AMBIENT_PARTICLE_COUNT; i++) {
      var p = createParticle(ambientCanvas.width, ambientCanvas.height);
      p.vx *= 0.3; p.vy *= 0.2;
      p.size = Math.random() * 2.5 + 0.5;
      p.opacity = Math.random() * 0.35 + 0.1;
      ambientParticles.push(p);
    }
    mouseX = ambientCanvas.width / 2;
    mouseY = ambientCanvas.height / 2;
  }

  function animateAmbient(time) {
    requestAnimationFrame(animateAmbient);
    var w = ambientCanvas.width;
    var h = ambientCanvas.height;
    aCtx.clearRect(0, 0, w, h);

    for (var i = 0; i < ambientParticles.length; i++) {
      var p = ambientParticles[i];
      var dx = mouseX - p.x;
      var dy = mouseY - p.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var windForce = Math.min(0.02, 50 / dist);
      p.vx += (dx / dist) * windForce + Math.sin(time * 0.0005 + i * 0.7) * 0.005;
      p.vy += (dy / dist) * windForce * 0.3 + 0.003;
      p.vx += Math.sin(time * 0.001 + p.y * 0.01) * 0.008;
      p.vx *= 0.985; p.vy *= 0.985;
      p.x += p.vx; p.y += p.vy;
      if (p.x > w + 5) p.x = -5;
      if (p.x < -5) p.x = w + 5;
      if (p.y > h + 5) { p.y = -5; p.x = Math.random() * w; }
      if (p.y < -5) p.y = h + 5;

      aCtx.beginPath();
      aCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      aCtx.fillStyle = p.color;
      aCtx.globalAlpha = p.opacity;
      aCtx.fill();
    }
    aCtx.globalAlpha = 1;
  }

  function startAmbient() {
    if (prefersReducedMotion) return;
    initAmbient();
    animateAmbient(0);
  }

  document.addEventListener('mousemove', function(e) { mouseX = e.clientX; mouseY = e.clientY; });
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }
  }, { passive: true });

  /* ---------- Theme Toggle ---------- */
  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    var icon = themeBtn.querySelector('i');
    if (icon) {
      icon.setAttribute('data-lucide', isLight ? 'sun' : 'moon');
      lucide.createIcons({ nodes: [themeBtn] });
    }
  });

  /* ---------- Resize ---------- */
  window.addEventListener('resize', function() {
    if (!splashDone) {
      splashCanvas.width = window.innerWidth;
      splashCanvas.height = window.innerHeight;
    }
    if (ambientCanvas) {
      ambientCanvas.width = window.innerWidth;
      ambientCanvas.height = window.innerHeight;
    }
  });

  /* ---------- Init ---------- */
  if (prefersReducedMotion) {
    splash.style.display = 'none';
    document.getElementById('app').classList.add('visible');
  } else {
    initSplash();
    requestAnimationFrame(animateSplash);
  }

  lucide.createIcons();
})();
</script>
</body>
</html>
