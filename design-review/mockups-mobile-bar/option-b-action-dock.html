<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option B — Tinder-Style Swipe Cards</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#09090b;--surface:#18181b;--surface-2:#1c1c1f;--surface-3:#27272a;
      --border:#2e2e32;--border-light:#3f3f46;--text:#fafafa;--text-2:#a1a1aa;--text-3:#71717a;
      --accent:#d4a84b;--accent-dim:rgba(212,168,75,.15);
      --green:#22c55e;--green-dim:rgba(34,197,94,.12);
      --red:#ef4444;--red-dim:rgba(239,68,68,.12);
      --purple:#a855f7;--purple-dim:rgba(168,85,247,.12);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);width:390px;height:844px;overflow:hidden;margin:0 auto;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

    /* ── Toolbar ── */
    .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px}
    .tb-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3)}
    .tb-select{appearance:none;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:6px 24px 6px 10px;border-radius:6px;font-size:11px;font-weight:500;font-family:inherit}

    /* ── Preview ── */
    .preview{flex:1;background:#0c0c0e;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .preview-label{position:absolute;top:0;left:0;right:0;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:10px;color:var(--text-2)}
    .fake-content{text-align:center;opacity:.4}
    .fake-content h1{font-size:36px;direction:rtl;font-weight:400}
    .fake-content p{font-size:12px;color:var(--text-3);margin-top:8px}

    /* ═══════════════════════════════════════════
       OPTION B — Stacked Action Dock
       Centered circular verdict buttons (big, satisfying),
       small nav arrows flanking, comment & submit in a
       slide-up tray. Inspired by music player controls.
       ═══════════════════════════════════════════ */
    .dock{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:linear-gradient(to top,rgba(9,9,11,.98) 70%,transparent);
      padding:40px 20px 20px;
      display:flex;flex-direction:column;align-items:center;gap:12px;
    }

    /* Progress bar at top */
    .dock-progress{width:100%;display:flex;align-items:center;gap:8px}
    .dock-prog-bar{flex:1;height:3px;border-radius:2px;background:var(--surface-3);overflow:hidden}
    .dock-prog-fill{width:7%;height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
    .dock-prog-text{font-size:10px;color:var(--text-3);font-variant-numeric:tabular-nums;white-space:nowrap}

    /* Main controls row — music-player style */
    .dock-controls{display:flex;align-items:center;gap:0;width:100%;justify-content:center}

    .dock-nav{
      width:44px;height:44px;border-radius:50%;border:none;
      background:transparent;color:var(--text-3);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .15s;
    }
    .dock-nav:hover{color:var(--text)}
    .dock-nav:active{transform:scale(.9)}
    .dock-nav:disabled{opacity:.2;cursor:default}
    .dock-nav svg{width:20px;height:20px}

    .verdict-circle{
      width:56px;height:56px;border-radius:50%;border:2px solid var(--border);
      background:var(--surface-2);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;color:var(--text-3);
      cursor:pointer;transition:all .2s;margin:0 4px;
    }
    .verdict-circle:active{transform:scale(.88)}
    .verdict-circle.center{width:68px;height:68px;font-size:28px;border-color:var(--border-light)}
    .verdict-circle.active-keep{background:var(--green-dim);border-color:var(--green);color:var(--green);box-shadow:0 0 24px rgba(34,197,94,.2)}
    .verdict-circle.active-discard{background:var(--red-dim);border-color:var(--red);color:var(--red);box-shadow:0 0 24px rgba(239,68,68,.2)}
    .verdict-circle.active-revisit{background:var(--purple-dim);border-color:var(--purple);color:var(--purple);box-shadow:0 0 24px rgba(168,85,247,.2)}

    .verdict-label{font-size:9px;color:var(--text-3);margin-top:2px;text-align:center;letter-spacing:.03em}

    .verdict-col{display:flex;flex-direction:column;align-items:center;gap:2px}

    /* Bottom row: comment + submit */
    .dock-bottom{display:flex;align-items:center;gap:8px;width:100%}
    .comment-trigger{
      flex:1;display:flex;align-items:center;gap:8px;
      padding:10px 14px;
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:20px;cursor:pointer;transition:border-color .15s;
    }
    .comment-trigger:hover{border-color:var(--border-light)}
    .comment-trigger .ct-icon{font-size:16px;color:var(--text-3)}
    .comment-trigger .ct-text{font-size:12px;color:var(--text-3)}
    .comment-trigger.has-text .ct-text{color:var(--text-2)}
    .comment-trigger.has-text .ct-icon{color:var(--accent)}

    .dock-submit{
      height:40px;padding:0 20px;border-radius:20px;border:none;
      background:var(--accent);color:var(--bg);
      font-size:12px;font-weight:700;font-family:inherit;
      cursor:pointer;transition:all .15s;flex-shrink:0;
    }
    .dock-submit:active{transform:scale(.95)}

    /* Comment overlay */
    .comment-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;
      display:none;align-items:flex-end;
    }
    .comment-overlay.open{display:flex}
    .comment-sheet{
      width:100%;background:var(--surface);
      border-radius:16px 16px 0 0;padding:16px;
      display:flex;flex-direction:column;gap:10px;
    }
    .comment-sheet .handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 4px}
    .comment-sheet textarea{
      width:100%;height:100px;
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:12px;color:var(--text);font-size:14px;
      padding:12px;resize:none;outline:none;font-family:inherit;
    }
    .comment-sheet textarea:focus{border-color:var(--accent)}
    .comment-sheet textarea::placeholder{color:var(--text-3)}
    .comment-sheet .cs-actions{display:flex;justify-content:flex-end;gap:8px}
    .comment-sheet .cs-btn{padding:8px 20px;border-radius:20px;border:none;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
    .cs-cancel{background:var(--surface-3);color:var(--text-2)}
    .cs-save{background:var(--accent);color:var(--bg)}
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="tb-label">Component</span>
    <select class="tb-select"><option>Splash Screen (11)</option></select>
    <span class="tb-label" style="margin-left:4px">Category</span>
    <select class="tb-select"><option>Particle Field (3)</option></select>
  </div>

  <div class="preview">
    <div class="preview-label">Particle Field — Gold Mystical &nbsp;·&nbsp; <span style="color:var(--text-3)">Rich gold palette</span></div>
    <div class="fake-content">
      <h1>بالعربي poetry</h1>
      <p>Mockup preview area</p>
    </div>
  </div>

  <div class="dock">
    <div class="dock-progress">
      <div class="dock-prog-bar"><div class="dock-prog-fill"></div></div>
      <span class="dock-prog-text">4 / 58</span>
    </div>

    <div class="dock-controls">
      <button class="dock-nav" disabled><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg></button>

      <div class="verdict-col">
        <button class="verdict-circle" onclick="toggleV(this,'discard')">✗</button>
        <span class="verdict-label">Discard</span>
      </div>
      <div class="verdict-col">
        <button class="verdict-circle center active-keep" onclick="toggleV(this,'keep')">✓</button>
        <span class="verdict-label">Keep</span>
      </div>
      <div class="verdict-col">
        <button class="verdict-circle" onclick="toggleV(this,'revisit')">↻</button>
        <span class="verdict-label">Revisit</span>
      </div>

      <button class="dock-nav"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 3l5 5-5 5"/></svg></button>
    </div>

    <div class="dock-bottom">
      <div class="comment-trigger" id="commentTrigger" onclick="openComment()">
        <span class="ct-icon">💬</span>
        <span class="ct-text">Add comment...</span>
      </div>
      <button class="dock-submit">Submit</button>
    </div>
  </div>

  <div class="comment-overlay" id="commentOverlay">
    <div class="comment-sheet">
      <div class="handle"></div>
      <textarea placeholder="What do you think about this design?"></textarea>
      <div class="cs-actions">
        <button class="cs-btn cs-cancel" onclick="closeComment()">Cancel</button>
        <button class="cs-btn cs-save" onclick="closeComment()">Save</button>
      </div>
    </div>
  </div>

  <script>
    function toggleV(el,v){
      const cls={keep:'active-keep',discard:'active-discard',revisit:'active-revisit'};
      const was=el.classList.contains(cls[v]);
      document.querySelectorAll('.verdict-circle').forEach(b=>{b.className=b.className.replace(/active-\w+/g,'').trim()});
      if(!was) el.classList.add(cls[v]);
    }
    function openComment(){document.getElementById('commentOverlay').classList.add('open')}
    function closeComment(){document.getElementById('commentOverlay').classList.remove('open')}
  </script>
</body>
</html>
