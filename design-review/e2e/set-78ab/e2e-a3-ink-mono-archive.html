<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Ink Mono Archive - E2E Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<style>
:root {
  --gold: #C5A059;
  --dark-bg: #0c0c0e; --dark-surface: #131315; --dark-line: #222224;
  --dark-text: #e0ddd8; --dark-muted: #888580;
  --light-bg: #FDFCF8; --light-surface: #FFFFFF; --light-line: #e8e5de;
  --light-text: #1a1918; --light-muted: #6b6966;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Tajawal', system-ui, sans-serif; background: var(--dark-bg);
  color: var(--dark-text); min-height: 100vh; overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}
body.light { background: var(--light-bg); color: var(--light-text); }

/* ===== SPLASH ===== */
.splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--dark-bg);
  transition: opacity 1s ease, visibility 1s ease;
}
.splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* Arabic text reveal container */
.ink-reveal {
  position: relative; width: clamp(280px, 70vw, 550px); text-align: center;
  margin-bottom: 2rem;
}

.ink-arabic {
  font-family: 'Amiri', serif;
  font-size: clamp(36px, 8vw, 72px);
  color: var(--dark-text);
  direction: rtl;
  line-height: 1.4;
  overflow: hidden;
}
body.light .ink-arabic { color: var(--light-text); }

.ink-letter {
  display: inline-block;
  opacity: 0;
  transform: translateY(8px);
}

/* Brand */
.splash-brand {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 0.5rem; margin-bottom: 1.5rem;
  opacity: 0; animation: fadeInContent 1s ease 0.3s forwards;
}
.splash-brand-en {
  font-family: 'Forum', serif; font-size: clamp(3rem, 6vw, 4.5rem);
  letter-spacing: -0.05em; color: var(--gold); line-height: 1;
}
.splash-brand-ar {
  font-family: 'Reem Kufi', sans-serif; font-weight: 700;
  font-size: clamp(1.875rem, 4vw, 3rem); color: var(--gold); line-height: 1;
}

.splash-sub {
  font-family: 'Tajawal', sans-serif; font-size: clamp(12px, 2vw, 16px);
  color: var(--dark-muted); letter-spacing: 0.2em; direction: ltr;
  margin-top: 12px; opacity: 0; animation: fadeInContent 1s ease 2s forwards;
}
body.light .splash-sub { color: var(--light-muted); }

.splash-enter {
  margin-top: 32px; padding: 12px 36px; background: transparent;
  border: 1px solid var(--dark-muted); color: var(--dark-text);
  font-family: 'Tajawal', sans-serif; font-size: 14px; cursor: pointer;
  transition: all 0.3s ease; min-height: 44px;
  opacity: 0; animation: fadeInContent 1s ease 2.3s forwards;
}
body.light .splash-enter { border-color: var(--light-muted); color: var(--light-text); }
.splash-enter:hover { background: var(--dark-text); color: var(--dark-bg); }
body.light .splash-enter:hover { background: var(--light-text); color: var(--light-bg); }

@keyframes fadeInContent { to { opacity: 1; } }

/* ===== WALKTHROUGH ===== */
.walkthrough {
  position: fixed; inset: 0; z-index: 90; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: var(--dark-bg); padding: 20px; cursor: pointer;
}
.walkthrough.active { display: flex; }
body.light .walkthrough { background: var(--light-bg); }

.walk-card {
  max-width: 400px; width: 90%; padding: 2rem; text-align: center;
  background: var(--dark-surface); border: 1px solid var(--dark-line);
  border-radius: 16px; opacity: 0; transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.walk-card.visible { opacity: 1; transform: translateY(0); }
body.light .walk-card { background: var(--light-surface); border-color: var(--light-line); }

.walk-icon {
  width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 50%;
  background: rgba(136,133,128,0.1); display: flex; align-items: center;
  justify-content: center; color: var(--dark-muted);
}
body.light .walk-icon { color: var(--light-muted); }

.walk-card h3 {
  font-family: 'Tajawal', sans-serif; font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  font-weight: 500; direction: ltr; margin-bottom: 4px;
}
.walk-card .walk-ar {
  font-family: 'Tajawal', sans-serif; font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: var(--dark-muted); direction: rtl; margin-bottom: 8px;
}
body.light .walk-card .walk-ar { color: var(--light-muted); }

.walk-card p {
  font-size: clamp(0.8rem, 1.8vw, 0.95rem); line-height: 1.7;
  color: var(--dark-muted); direction: ltr;
}
body.light .walk-card p { color: var(--light-muted); }

.walk-progress { display: flex; gap: 8px; margin-top: 2rem; }
.walk-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--dark-line);
  transition: all 0.3s;
}
.walk-dot.active { background: var(--dark-text); width: 24px; border-radius: 4px; }
body.light .walk-dot { background: var(--light-line); }
body.light .walk-dot.active { background: var(--light-text); }

.walk-hint { margin-top: 1rem; font-size: 13px; color: var(--dark-muted); opacity: 0.6; }

/* ===== MAIN APP ===== */
.main-app { display: none; min-height: 100vh; padding-bottom: 80px; }
.main-app.active { display: block; }

.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: var(--dark-bg);
  border-bottom: 1px solid var(--dark-line); direction: ltr;
}
body.light .top-bar { background: var(--light-bg); border-color: var(--light-line); }

.top-brand { display: flex; align-items: flex-end; gap: 6px; }
.top-brand-en {
  font-family: 'Forum', serif; font-size: 20px;
  letter-spacing: -0.05em; color: var(--gold); line-height: 1;
}
.top-brand-ar {
  font-family: 'Reem Kufi', sans-serif; font-weight: 700;
  font-size: 14px; color: var(--gold); line-height: 1;
}
.top-actions { display: flex; gap: 8px; }
.top-btn {
  width: 44px; height: 44px; display: flex; align-items: center;
  justify-content: center; background: transparent; border: none;
  color: var(--dark-muted); cursor: pointer; transition: color 0.2s;
}
body.light .top-btn { color: var(--light-muted); }
.top-btn:hover { color: var(--dark-text); }
body.light .top-btn:hover { color: var(--light-text); }

/* Reader */
.reader { max-width: 640px; margin: 0 auto; padding: 80px 20px 40px; }

.poem-header {
  text-align: center; margin-bottom: 32px; padding-bottom: 20px;
  border-bottom: 1px solid var(--dark-line);
}
body.light .poem-header { border-color: var(--light-line); }
.poem-header h2 {
  font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 400;
  color: var(--dark-muted); letter-spacing: 0.15em; direction: ltr;
}
body.light .poem-header h2 { color: var(--light-muted); }
.poem-header h1 {
  font-family: 'Amiri', serif; font-size: clamp(24px, 4vw, 36px); margin-top: 8px;
}

.poem-body {
  font-family: 'Amiri', serif; font-size: clamp(22px, 3.5vw, 30px);
  line-height: 2.4; text-align: center; direction: rtl;
}
.verse {
  padding: 12px 0; opacity: 0; animation: fadeInUp 0.6s ease forwards;
}
.verse:nth-child(1) { animation-delay: 0.2s; }
.verse:nth-child(2) { animation-delay: 0.5s; }
.verse-divider {
  width: 30px; height: 1px; background: var(--dark-line); margin: 0 auto;
}
body.light .verse-divider { background: var(--light-line); }

/* Vertical Rail (right side) */
.vertical-rail {
  position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 2px; z-index: 40; direction: ltr;
}
.rail-btn {
  width: 44px; height: 44px; display: flex; align-items: center;
  justify-content: center; background: transparent; border: none;
  color: var(--dark-muted); cursor: pointer; transition: color 0.2s; border-radius: 8px;
  position: relative;
}
body.light .rail-btn { color: var(--light-muted); }
.rail-btn:hover { color: var(--dark-text); background: rgba(255,255,255,0.03); }
body.light .rail-btn:hover { color: var(--light-text); background: rgba(0,0,0,0.03); }
.rail-btn .tooltip {
  position: absolute; right: 52px; top: 50%; transform: translateY(-50%);
  background: var(--dark-surface); border: 1px solid var(--dark-line);
  color: var(--dark-text); font-family: 'Tajawal', sans-serif; font-size: 12px;
  padding: 4px 10px; border-radius: 6px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.rail-btn:hover .tooltip { opacity: 1; }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center; gap: 0;
  padding: 8px 0; background: var(--dark-bg);
  border-top: 1px solid var(--dark-line); direction: ltr;
}
body.light .bottom-nav { background: var(--light-bg); border-color: var(--light-line); }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 16px; background: transparent; border: none;
  color: var(--dark-muted); cursor: pointer; font-family: 'Tajawal', sans-serif;
  font-size: 11px; transition: color 0.2s; min-width: 60px;
}
body.light .nav-item { color: var(--light-muted); }
.nav-item.active { color: var(--dark-text); }
body.light .nav-item.active { color: var(--light-text); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .ink-letter { opacity: 1 !important; transform: none !important; }
}
@media (max-width: 768px) {
  .vertical-rail { display: none; }
  .reader { padding: 70px 16px 40px; }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-brand">
    <span class="splash-brand-en">poetry</span>
    <span class="splash-brand-ar">بالعربي</span>
  </div>
  <div class="ink-reveal">
    <div class="ink-arabic" id="inkArabic" dir="rtl" lang="ar"></div>
  </div>
  <p class="splash-sub">The Arabic Poetry Archive</p>
  <button class="splash-enter" id="splashEnter">ادخل</button>
</div>

<!-- WALKTHROUGH -->
<div class="walkthrough" id="walkthrough">
  <div class="walk-card" id="walkCard">
    <div class="walk-icon" id="walkIcon"></div>
    <h3 id="walkTitle"></h3>
    <div class="walk-ar" id="walkAr"></div>
    <p id="walkDesc"></p>
  </div>
  <div class="walk-progress" id="walkProgress"></div>
  <span class="walk-hint">Tap anywhere to continue</span>
</div>

<!-- MAIN APP -->
<div class="main-app" id="mainApp">
  <header class="top-bar">
    <div class="top-brand">
      <span class="top-brand-en">poetry</span>
      <span class="top-brand-ar">بالعربي</span>
    </div>
    <div class="top-actions">
      <button class="top-btn" id="themeToggle">
        <i data-lucide="sun" style="width:18px;height:18px"></i>
      </button>
    </div>
  </header>

  <nav class="vertical-rail">
    <button class="rail-btn"><i data-lucide="heart" style="width:18px;height:18px"></i><span class="tooltip">Save</span></button>
    <button class="rail-btn"><i data-lucide="type" style="width:18px;height:18px"></i><span class="tooltip">Font size</span></button>
    <button class="rail-btn"><i data-lucide="languages" style="width:18px;height:18px"></i><span class="tooltip">Transliteration</span></button>
    <button class="rail-btn"><i data-lucide="book-open" style="width:18px;height:18px"></i><span class="tooltip">Tafsir</span></button>
    <button class="rail-btn"><i data-lucide="italic" style="width:18px;height:18px"></i><span class="tooltip">Tashkeel</span></button>
    <button class="rail-btn"><i data-lucide="log-in" style="width:18px;height:18px"></i><span class="tooltip">Sign in</span></button>
    <button class="rail-btn"><i data-lucide="settings" style="width:18px;height:18px"></i><span class="tooltip">Settings</span></button>
  </nav>

  <main class="reader">
    <div class="poem-header">
      <h2>Al-Mutanabbi</h2>
      <h1>المتنبي</h1>
    </div>
    <div class="poem-body" dir="rtl" lang="ar">
      <div class="verse">عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ</div>
      <div class="verse-divider"></div>
      <div class="verse">وَتَأْتِي عَلَى قَدْرِ الكِرَامِ المَكَارِمُ</div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item"><i data-lucide="music" style="width:20px;height:20px"></i>Music</button>
    <button class="nav-item"><i data-lucide="lightbulb" style="width:20px;height:20px"></i>Insight</button>
    <button class="nav-item active"><i data-lucide="refresh-cw" style="width:20px;height:20px"></i>Refresh</button>
    <button class="nav-item"><i data-lucide="library" style="width:20px;height:20px"></i>Library</button>
    <button class="nav-item"><i data-lucide="shuffle" style="width:20px;height:20px"></i>Shuffle</button>
  </nav>
</div>

<script>
(function() {
  // Real Arabic text for letter-by-letter RTL reveal
  var arabicText = '\u062F\u064A\u0648\u0627\u0646 \u0627\u0644\u0634\u0639\u0631 \u0627\u0644\u0639\u0631\u0628\u064A';
  var container = document.getElementById('inkArabic');

  // Wrap each character in a span for animation
  var chars = arabicText.split('');
  for (var i = 0; i < chars.length; i++) {
    var span = document.createElement('span');
    span.className = 'ink-letter';
    span.textContent = chars[i];
    if (chars[i] === ' ') span.style.width = '0.3em';
    container.appendChild(span);
  }

  // Use anime.js for RTL letter-by-letter reveal
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (typeof anime !== 'undefined' && !prefersReduced) {
    anime({
      targets: '.ink-letter',
      opacity: [0, 1],
      translateY: [8, 0],
      easing: 'easeOutCubic',
      duration: 400,
      delay: function(el, i) { return 800 + i * 100; }
    });
  } else {
    // Fallback: show all at once
    var letters = document.querySelectorAll('.ink-letter');
    for (var j = 0; j < letters.length; j++) {
      letters[j].style.opacity = '1';
      letters[j].style.transform = 'none';
    }
  }

  // Walkthrough
  var walkSteps = [
    { icon: 'pen-tool', title: 'Ink Archive', ar: '\u0645\u062D\u0641\u0648\u0638\u0627\u062A \u0627\u0644\u062D\u0628\u0631', desc: 'A monochrome archive celebrating the tradition of Arabic ink calligraphy and poetry.' },
    { icon: 'compass', title: 'Discover 84,000+ Poems', ar: '\u0627\u0643\u062A\u0634\u0641 \u0627\u0644\u0642\u0635\u0627\u0626\u062F', desc: 'Browse classical and modern Arabic poems spanning centuries of literary heritage.' },
    { icon: 'headphones', title: 'Listen to Recitation', ar: '\u0627\u0633\u062A\u0645\u0639 \u0644\u0644\u0625\u0644\u0642\u0627\u0621', desc: 'Hear poems with natural AI voices capturing the rhythm and melody of Arabic verse.' },
    { icon: 'heart', title: 'Save Your Favorites', ar: '\u0627\u062D\u0641\u0638 \u0648\u0634\u0627\u0631\u0643', desc: 'Build your personal collection and share the beauty of Arabic poetry.' }
  ];
  var currentStep = 0;

  function renderStep() {
    var step = walkSteps[currentStep];
    var card = document.getElementById('walkCard');
    var iconEl = document.getElementById('walkIcon');
    var titleEl = document.getElementById('walkTitle');
    var arEl = document.getElementById('walkAr');
    var descEl = document.getElementById('walkDesc');
    var progress = document.getElementById('walkProgress');

    while (iconEl.firstChild) iconEl.removeChild(iconEl.firstChild);
    var ic = document.createElement('i');
    ic.setAttribute('data-lucide', step.icon);
    ic.style.width = '24px'; ic.style.height = '24px';
    iconEl.appendChild(ic);

    titleEl.textContent = step.title;
    arEl.textContent = step.ar;
    descEl.textContent = step.desc;

    while (progress.firstChild) progress.removeChild(progress.firstChild);
    for (var d = 0; d < walkSteps.length; d++) {
      var dot = document.createElement('div');
      dot.className = 'walk-dot' + (d === currentStep ? ' active' : '');
      progress.appendChild(dot);
    }

    card.classList.remove('visible');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { card.classList.add('visible'); });
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  document.getElementById('splashEnter').addEventListener('click', function() {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('walkthrough').classList.add('active');
    currentStep = 0;
    renderStep();
  });

  document.getElementById('walkthrough').addEventListener('click', function() {
    currentStep++;
    if (currentStep >= walkSteps.length) {
      document.getElementById('walkthrough').style.display = 'none';
      document.getElementById('mainApp').classList.add('active');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    } else {
      renderStep();
    }
  });

  document.getElementById('themeToggle').addEventListener('click', function() {
    document.body.classList.toggle('light');
  });

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
  });
})();
</script>
</body>
</html>
