<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qafiyah -- 20 End-to-End Design Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c0e;
  --card:#161618;
  --border:rgba(255,255,255,0.08);
  --text:#FDFCF8;
  --text-dim:rgba(253,252,248,0.5);
  --gold:#C5A059;
  --indigo:#4F46E5;
}
body{
  font-family:'Tajawal',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ========== TOP BAR ========== */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
  background:var(--card);
  z-index:100;
  flex-shrink:0;
}
.topbar-title{
  font-family:'Amiri',serif;
  font-size:1.4rem;
  font-weight:700;
  color:var(--gold);
}
.topbar-info{
  font-size:0.85rem;
  color:var(--text-dim);
  display:flex;
  align-items:center;
  gap:1rem;
}
.topbar-counter{
  font-variant-numeric:tabular-nums;
  color:var(--gold);
  font-weight:600;
}

/* ========== PREVIEW AREA ========== */
.preview-area{
  flex:1;
  position:relative;
  display:flex;
  align-items:stretch;
  min-height:0;
}

.preview-frame{
  flex:1;
  border:none;
  background:var(--bg);
}

/* Arrow navigation */
.nav-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:56px;
  height:56px;
  min-width:44px;
  min-height:44px;
  border-radius:50%;
  background:rgba(12,12,14,0.85);
  border:1px solid var(--border);
  color:var(--gold);
  font-size:1.6rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50;
  transition:all 0.25s ease;
  backdrop-filter:blur(8px);
  will-change:transform;
}
.nav-arrow:hover{
  background:rgba(197,160,89,0.15);
  border-color:var(--gold);
  transform:translateY(-50%) scale(1.1);
}
.nav-arrow:active{transform:translateY(-50%) scale(0.95)}
.nav-arrow:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.nav-arrow.left{left:16px}
.nav-arrow.right{right:16px}

/* ========== THUMBNAIL STRIP ========== */
.thumb-strip{
  flex-shrink:0;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:12px 16px;
  display:flex;
  gap:8px;
  overflow-x:auto;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.thumb-strip::-webkit-scrollbar{height:4px}
.thumb-strip::-webkit-scrollbar-track{background:transparent}
.thumb-strip::-webkit-scrollbar-thumb{background:rgba(197,160,89,0.3);border-radius:2px}

.thumb{
  flex-shrink:0;
  width:120px;
  min-height:44px;
  padding:10px 8px;
  border-radius:8px;
  border:2px solid transparent;
  background:rgba(255,255,255,0.03);
  cursor:pointer;
  transition:all 0.25s ease;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.thumb:hover{
  background:rgba(197,160,89,0.06);
  border-color:rgba(197,160,89,0.2);
}
.thumb.active{
  border-color:var(--gold);
  background:rgba(197,160,89,0.1);
  box-shadow:0 0 12px rgba(197,160,89,0.15);
}
.thumb-label{
  font-size:9px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-dim);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.thumb-name{
  font-size:11px;
  font-weight:600;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.thumb.active .thumb-name{color:var(--gold)}

/* ========== MOBILE ========== */
@media(max-width:768px){
  .topbar{padding:10px 16px}
  .topbar-title{font-size:1.1rem}
  .topbar-info{font-size:0.75rem;gap:0.5rem}
  .nav-arrow{width:44px;height:44px;font-size:1.3rem}
  .nav-arrow.left{left:8px}
  .nav-arrow.right{right:8px}
  .thumb{width:90px;padding:8px 6px}
  .thumb-name{font-size:10px}
  .thumb-label{font-size:8px}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    transition-duration:0.01ms!important;
    animation-duration:0.01ms!important;
  }
}
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-title">Qafiyah Mockups</div>
    <div class="topbar-info">
      <span id="currentLabel"></span>
      <span class="topbar-counter" id="counter">1 / 20</span>
    </div>
  </div>

  <div class="preview-area">
    <button class="nav-arrow left" id="prevBtn" aria-label="Previous mockup">&#9664;</button>
    <iframe class="preview-frame" id="previewFrame" title="Mockup preview"></iframe>
    <button class="nav-arrow right" id="nextBtn" aria-label="Next mockup">&#9654;</button>
  </div>

  <div class="thumb-strip" id="thumbStrip"></div>

<script>
var mockups = [
  { set:'A', num:'01', name:'Ethereal Gold', path:'set-a/01-ethereal-gold.html' },
  { set:'A', num:'02', name:'Zen Manuscript', path:'set-a/02-zen-manuscript.html' },
  { set:'A', num:'03', name:'Cosmic Scholar', path:'set-a/03-cosmic-scholar.html' },
  { set:'A', num:'04', name:'Desert Poet', path:'set-a/04-desert-poet.html' },
  { set:'A', num:'05', name:'Pure Ink', path:'set-a/05-pure-ink.html' },
  { set:'A', num:'06', name:'Bento Modernist', path:'set-a/06-bento-modernist.html' },
  { set:'A', num:'07', name:'Scroll Keeper', path:'set-a/07-scroll-keeper.html' },
  { set:'A', num:'08', name:'Glass Pavilion', path:'set-a/08-glass-pavilion.html' },
  { set:'A', num:'09', name:'Mosaic Discovery', path:'set-a/09-mosaic-discovery.html' },
  { set:'A', num:'10', name:'Calligraphy Flow', path:'set-a/10-calligraphy-flow.html' },
  { set:'B', num:'01', name:'Particle Scroll', path:'set-b/01-particle-scroll.html' },
  { set:'B', num:'02', name:'Prism Refraction', path:'set-b/02-ethereal-spotlight.html' },
  { set:'B', num:'03', name:'Origami Unfold', path:'set-b/03-notion-zen.html' },
  { set:'B', num:'04', name:'Neumorphic Warmth', path:'set-b/04-neumorphic-warmth.html' },
  { set:'B', num:'05', name:'Digital Manuscript', path:'set-b/05-scroll-codex.html' },
  { set:'B', num:'06', name:'Spotlight Library', path:'set-b/06-spotlight-library.html' },
  { set:'B', num:'07', name:'Waveform Spectrum', path:'set-b/07-particle-neumorphic.html' },
  { set:'B', num:'08', name:'Sand Garden', path:'set-b/08-zen-spotlight.html' },
  { set:'B', num:'09', name:'Scandinavian Scroll', path:'set-b/09-scandinavian-scroll.html' },
  { set:'B', num:'10', name:'Ethereal Constellation', path:'set-b/10-ethereal-constellation.html' }
];

var currentIndex = 0;
var frame = document.getElementById('previewFrame');
var counter = document.getElementById('counter');
var currentLabel = document.getElementById('currentLabel');
var thumbStrip = document.getElementById('thumbStrip');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var thumbEls = [];

// Build thumbnails
mockups.forEach(function(m, i) {
  var el = document.createElement('div');
  el.className = 'thumb';
  el.setAttribute('tabindex', '0');
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', m.set + '-' + m.num + ' ' + m.name);

  var label = document.createElement('div');
  label.className = 'thumb-label';
  label.textContent = m.set + '-' + m.num;

  var name = document.createElement('div');
  name.className = 'thumb-name';
  name.textContent = m.name;

  el.appendChild(label);
  el.appendChild(name);

  el.addEventListener('click', function() { goTo(i); });
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goTo(i); }
  });

  thumbStrip.appendChild(el);
  thumbEls.push(el);
});

function goTo(index) {
  if (index < 0) index = mockups.length - 1;
  if (index >= mockups.length) index = 0;
  currentIndex = index;
  var m = mockups[index];
  frame.src = m.path;
  counter.textContent = (index + 1) + ' / ' + mockups.length;
  currentLabel.textContent = m.set + '-' + m.num + ': ' + m.name;

  thumbEls.forEach(function(el, i) {
    if (i === index) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    } else {
      el.classList.remove('active');
    }
  });
}

prevBtn.addEventListener('click', function() { goTo(currentIndex - 1); });
nextBtn.addEventListener('click', function() { goTo(currentIndex + 1); });

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(currentIndex - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentIndex + 1); }
});

// Initialize
goTo(0);
</script>
</body>
</html>
