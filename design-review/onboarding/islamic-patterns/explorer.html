<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiledPatternMaker — XML Pattern Catalog</title>
<style>
:root {
  --bg: #0d0d14; --surface: #13131f; --surface2: #1a1a2a; --surface3: #22223a;
  --border: #2a2a40; --text: #e2e2f0; --text-muted: #8888aa;
  --gold: #c5a059; --lapis: #2a5a8c; --sidebar-w: 280px; --info-h: 140px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 13px; overflow: hidden; }
#app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
#sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#sidebar-header h1 { font-size: 13px; font-weight: 600; color: var(--gold); letter-spacing: 0.05em; text-transform: uppercase; }
#sidebar-header p { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
#search-wrap { padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#search { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none; transition: border-color 0.15s; }
#search:focus { border-color: var(--gold); }
#search::placeholder { color: var(--text-muted); }
#tree { flex: 1; overflow-y: auto; padding: 6px 0; }
#tree::-webkit-scrollbar { width: 4px; }
#tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.group { margin-bottom: 2px; }
.group-header { display: flex; align-items: center; padding: 6px 12px 5px; cursor: pointer; user-select: none; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; }
.group-header:hover { color: var(--text); }
.group-header .cnt { margin-left: auto; font-size: 10px; background: var(--surface3); padding: 1px 6px; border-radius: 10px; }
.group-header .arrow { font-size: 9px; transition: transform 0.2s; margin-left: 6px; opacity: 0.5; }
.group.open .arrow { transform: rotate(90deg); }
.group-items { display: none; }
.group.open .group-items { display: block; }
.subhdr { padding: 4px 12px 3px 20px; font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 4px; }
.item { padding: 5px 12px 5px 28px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); transition: background 0.1s, color 0.1s; border-left: 2px solid transparent; font-size: 12px; }
.item:hover { background: var(--surface2); color: var(--text); }
.item.active { background: var(--surface3); color: var(--gold); border-left-color: var(--gold); }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: var(--bg); min-height: 0; }
#canvas { background: #0d0d14; display: block; border: 1px solid var(--border); cursor: grab; }
#canvas:active { cursor: grabbing; }
#ctrl-bar { position: absolute; top: 12px; right: 16px; display: flex; gap: 8px; }
.cbtn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all 0.15s; }
.cbtn:hover { border-color: var(--gold); color: var(--gold); }
#name-overlay { position: absolute; top: 14px; left: 16px; font-size: 14px; font-weight: 600; color: var(--text); pointer-events: none; }
#name-overlay span { color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 8px; }
#loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); font-size: 13px; color: var(--text-muted); display: none; }
#info-panel { height: var(--info-h); min-height: var(--info-h); background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; overflow-y: auto; flex-shrink: 0; }
#info-panel h2 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.igrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px 16px; }
.icell { display: flex; flex-direction: column; gap: 2px; }
.ilbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.ival { font-size: 12px; color: var(--text); font-family: monospace; }
.idesc { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
#empty { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; flex-direction: column; gap: 8px; color: var(--text-muted); }
#empty .ico { font-size: 36px; opacity: 0.15; }
#server-warn { background: #2a1a00; border-bottom: 1px solid #5a3a00; padding: 7px 16px; font-size: 11px; color: #c5903a; display: none; }
#server-warn code { background: #1a1000; padding: 1px 6px; border-radius: 3px; font-family: monospace; }
@media (max-width: 700px) {
  :root { --sidebar-w: 100%; --info-h: 100px; }
  #app { flex-direction: column; }
  #sidebar { width: 100%; min-width: 0; height: 42vh; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>

  Fetch requires a local server. Run: <code>npx serve -l 5500 .</code> then open <code>http://localhost:5500/explorer.html</code>

      <canvas id="canvas" style="display:none"></canvas>

        <button class="cbtn" id="btn-r">Reset</button>

      </div>

    <div id="info-panel"><div id="info-content"><div style="color:var(--text-muted);font-size:12px">Select a pattern to see details</div></div></div>
  </div>

function parsePlacement(el) {
  // Structured sub-elements format
  const scEl = el.querySelector('scale'), rotEl = el.querySelector('rot'),
        txEl = el.querySelector('tranX'), tyEl = el.querySelector('tranY');
  if (scEl) return {
    scale: +scEl.textContent, rot: +rotEl.textContent,
    tranX: +txEl.textContent, tranY: +tyEl.textContent
  };
  // Compact affine matrix "a,b,c,d,e,f"
  const txt = el.textContent.trim();
  if (!txt) return {scale:1,rot:0,tranX:0,tranY:0};
  const v = txt.split(',').map(Number);
  if (v.length === 6) return {scale:1,rot:0,tranX:v[4],tranY:v[5],matrix:v};
  return {scale:v[0]||1,rot:v[1]||0,tranX:v[2]||0,tranY:v[3]||0};
}

function buildOrderedPts(lineEls) {
  const map = {}, seen = new Set(), pts = [];
  lineEls.forEach(ln => {
    ln.querySelectorAll('Point').forEach(pt => {
      const id = pt.getAttribute('id'), ref = pt.getAttribute('reference');
      const txt = pt.textContent.trim();
      let coords;
      if (id && txt) { coords = txt.split(',').map(Number); map[id] = coords; }
      else if (ref && map[ref]) { coords = map[ref]; }
      if (coords) {
        const k = coords[0].toFixed(7)+','+coords[1].toFixed(7);
        if (!seen.has(k)) { seen.add(k); pts.push(coords); }
      }
    });
  });
  return pts;
}

function parseTilingXML(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  const root = doc.documentElement;
  const name = root.querySelector('Name')?.textContent || '';
  const t1 = (root.querySelector('T1')?.textContent||'1,0').split(',').map(Number);
  const t2 = (root.querySelector('T2')?.textContent||'0,1').split(',').map(Number);
  const desc = root.querySelector('Desc')?.textContent || '';
  const features = [];
  root.querySelectorAll('Feature').forEach(feat => {
    const ftype = feat.getAttribute('type') || 'polygon';
    const sides = parseInt(feat.getAttribute('sides')) || 0;
    const placements = [...feat.querySelectorAll('Placement')].map(parsePlacement);
    // Explicit points
    const pts = [...feat.querySelectorAll(':scope > Point')]
      .map(p => p.textContent.trim().split(',').map(Number))
      .filter(c => c.length === 2);
    // Line-based points
    const linePts = buildOrderedPts([...feat.querySelectorAll(':scope > Line')]);
    const f = {type: ftype, sides, placements};
    if (pts.length) f.points = pts;
    else if (linePts.length) f.points = linePts;
    features.push(f);
  });
  return {name, t1, t2, desc, features};
}

function parseGirihXML(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  const root = doc.documentElement;
  const name = root.getAttribute('name') || '';
  const type = root.getAttribute('type') || 'irregular';
  const sides = parseInt(root.getAttribute('sides')) || 0;
  const tx = +( root.querySelector('tx')?.textContent || 0);
  const ty = +( root.querySelector('ty')?.textContent || 0);
  const scale = +( root.querySelector('scale')?.textContent || 1);
  const rot = +( root.querySelector('rot')?.textContent || 0);
  const pts = [...root.querySelectorAll(':scope > Point')]
    .map(p => p.textContent.trim().split(',').map(Number))
    .filter(c => c.length === 2);
  const linePts = buildOrderedPts([...root.querySelectorAll(':scope > Line')]);
  return {name, type, sides, tx, ty, scale, rot, points: pts.length ? pts : linePts};
}

function parseTemplateXML(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  const lines = [...doc.querySelectorAll('lines line')].map(el => {
    const v = el.textContent.trim().split(',').map(Number);
    return v.length === 4 ? v : null;
  }).filter(Boolean);
  const circles = [...doc.querySelectorAll('circles circle')].map(el => [
    +el.getAttribute('radius'), +el.getAttribute('centreX'), +el.getAttribute('centreY')
  ]);
  return {lines, circles};
}

// ============================================================
// STATE
// ============================================================
const S = {selected:null, type:null, data:null, zoom:1, fill:false, pan:{x:0,y:0}, drag:false, ds:null};

// ============================================================
// FETCH + PARSE
// ============================================================
async function loadPattern(file, type) {
  const dir = type==='tiling' ? 'tilings/original' : type==='girih' ? 'girih_shapes' : 'templates';
  const url = M.base + '/' + dir + '/' + file;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status + ': ' + url);
  const text = await resp.text();
  if (type === 'tiling') return parseTilingXML(text);
  if (type === 'girih')  return parseGirihXML(text);
  return {...parseTemplateXML(text), name: file.replace('.xml','')};
}

// ============================================================
// SIDEBAR
// ============================================================
const escH = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function buildSidebar(filter) {
  filter = (filter||'').toLowerCase();
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  function makeGroup(label, items, renderFn) {
    if (!items.length) return;
    const g = document.createElement('div');
    g.className = 'group open';
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = escH(label)
      + '<span class="cnt">' + items.length + '</span>'
      + '<span class="arrow">&#9654;</span>';
    hdr.onclick = () => g.classList.toggle('open');
    g.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'group-items';
    renderFn(body);
    g.appendChild(body);
    tree.appendChild(g);
  }

  function addSubhdr(c, txt) {
    const d = document.createElement('div'); d.className = 'subhdr'; d.textContent = txt; c.appendChild(d);
  }

  function addItem(c, entry, type) {
    const el = document.createElement('div');
    el.className = 'item' + (S.selected === entry.file && S.type === type ? ' active' : '');
    el.textContent = entry.name;
    el.title = entry.file;
    el.onclick = () => onSelect(entry, type, el);
    c.appendChild(el);
  }

  // --- Girih ---
  const gi = M.girih.filter(g => !filter || g.name.toLowerCase().includes(filter));
  makeGroup('Girih Shapes', gi, body => gi.forEach(g => addItem(body, g, 'girih')));

  // --- Tilings ---
  const CATS = ['triangles','squares','pentagons','hexagons','octagons','decagons','dodecagons+','mixed'];
  const CAT_LBL = {triangles:'Triangles (3)', squares:'Squares (4)', pentagons:'Pentagons (5)',
    hexagons:'Hexagons (6)', octagons:'Octagons (8)', decagons:'Decagons (10)',
    'dodecagons+':'Dodecagons (12+)', mixed:'Mixed'};
  const bycat = {};
  M.tilings.forEach(t => {
    if (!filter || t.name.toLowerCase().includes(filter)) {
      (bycat[t.cat] = bycat[t.cat]||[]).push(t);
    }
  });
  const tAll = Object.values(bycat).flat();
  makeGroup('Tilings', tAll, body => {
    CATS.forEach(c => {
      const items = bycat[c]; if (!items||!items.length) return;
      addSubhdr(body, CAT_LBL[c] + ' \u2014 ' + items.length);
      items.forEach(t => addItem(body, t, 'tiling'));
    });
  });

  // --- Templates ---
  const bygrp = {};
  M.templates.forEach(t => {
    if (!filter || t.name.toLowerCase().includes(filter)) {
      (bygrp[t.grp] = bygrp[t.grp]||[]).push(t);
    }
  });
  const tmplAll = Object.values(bygrp).flat();
  makeGroup('Templates', tmplAll, body => {
    Object.entries(bygrp).sort().forEach(([grp, items]) => {
      addSubhdr(body, grp + ' \u2014 ' + items.length);
      items.forEach(t => addItem(body, t, 'template'));
    });
  });

  const total = gi.length + tAll.length + tmplAll.length;
  document.getElementById('count-lbl').textContent = filter
    ? total + ' matches'
    : M.tilings.length + ' tilings \u00B7 ' + M.girih.length + ' girih \u00B7 ' + M.templates.length + ' templates';
}

// ============================================================
// SELECTION
// ============================================================
async function onSelect(entry, type, el) {
  document.querySelectorAll('.item.active').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');

  S.selected = entry.file;
  S.type = type;
  S.zoom = 1;
  S.pan = {x:0,y:0};

  // Show loading state
  const cv = document.getElementById('canvas');
  const lo = document.getElementById('loading-overlay');
  document.getElementById('empty').style.display = 'none';
  cv.style.display = 'none';
  document.getElementById('name-overlay').style.display = 'none';
  document.getElementById('ctrl-bar').style.display = 'none';
  lo.style.display = 'flex';

  try {
    const data = await loadPattern(entry.file, type);
    S.data = data;
    lo.style.display = 'none';

    const area = document.getElementById('canvas-area');
    const sz = Math.min(area.clientWidth-32, area.clientHeight-32, 600);
    cv.width = sz; cv.height = sz;
    cv.style.display = 'block';
    document.getElementById('name-overlay').style.display = 'block';
    document.getElementById('ctrl-bar').style.display = 'flex';

    render();
    updateInfo(data, type);
  } catch(err) {
    lo.style.display = 'none';
    // Show file:// warning if that's the issue
    if (location.protocol === 'file:') {
      document.getElementById('server-warn').style.display = 'block';
    }
    document.getElementById('info-content').innerHTML =
      '<div style="color:#c55;font-size:12px">Error loading ' + escH(entry.file) + ': ' + escH(err.message) + '</div>';
    console.error(err);
  }
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  if (!S.data) return;
  const cv = document.getElementById('canvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0,0,W,H);

  const ov = document.getElementById('name-overlay');
  if (S.type === 'girih') {
    drawGirih(ctx, S.data, W, H);
    ov.innerHTML = escH(S.data.name) + '<span>' + (S.data.type==='regular' ? S.data.sides+'-gon' : 'irregular') + '</span>';
  } else if (S.type === 'tiling') {
    drawTiling(ctx, S.data, W, H);
    const fs = (S.data.features||[]).filter(f=>f.sides>0).map(f=>f.sides+'-gon').filter((v,i,a)=>a.indexOf(v)===i).join(', ');
    ov.innerHTML = escH(S.data.name) + (fs ? '<span>'+fs+'</span>' : '');
  } else {
    drawTemplate(ctx, S.data, W, H);
    ov.innerHTML = escH(S.data.name) + '<span>template</span>';
  }
}

// ---- geometry ----
function fitPts(pts, W, H, pad) {
  let mnX=1e18, mxX=-1e18, mnY=1e18, mxY=-1e18;
  pts.forEach(([x,y]) => { if(isFinite(x)&&isFinite(y)){mnX=Math.min(mnX,x);mxX=Math.max(mxX,x);mnY=Math.min(mnY,y);mxY=Math.max(mxY,y);} });
  if (!isFinite(mnX)) return {ox:W/2,oy:H/2,sc:1};
  const dx=mxX-mnX, dy=mxY-mnY;
  const sc = Math.min(dx>0?W*pad/dx:W*pad, dy>0?H*pad/dy:H*pad);
  return { ox: W/2-(mnX+mxX)/2*sc, oy: H/2-(mnY+mxY)/2*sc, sc };
}

function toCanvas(x, y, ox, oy, sc) {
  return [x*sc*S.zoom+ox+S.pan.x, y*sc*S.zoom+oy+S.pan.y];
}

function applyPlacement(pts, p) {
  if (p.matrix) {
    const [a,b,c,d,e,f] = p.matrix;
    return pts.map(([x,y]) => [a*x+b*y+e, c*x+d*y+f]);
  }
  const s=p.scale||1, r=(p.rot||0)*Math.PI/180, tx=p.tranX||0, ty=p.tranY||0;
  const cr=Math.cos(r), sr=Math.sin(r);
  return pts.map(([x,y]) => { const xs=x*s,ys=y*s; return [xs*cr-ys*sr+tx, xs*sr+ys*cr+ty]; });
}

// ---- Islamic star motif algorithm ----
// Default skip d by polygon side count
function defaultD(n) {
  if (n<=4) return 1;
  if (n<=6) return 2;
  if (n<=8) return 2;
  if (n<=10) return 3;
  if (n<=12) return 4;
  return Math.floor(n/4);
}

function lineIntersect(x1,y1,x2,y2,x3,y3,x4,y4) {
  const denom=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if (Math.abs(denom)<1e-10) return null;
  const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/denom;
  return [x1+t*(x2-x1), y1+t*(y2-y1)];
}

// Given polygon vertices, compute star motif segments (midpoint->intersection->midpoint)
// Returns array of [x1,y1, xmid,ymid, x2,y2] triples
function starMotif(verts) {
  const n = verts.length;
  if (n < 3) return [];
  const d = defaultD(n);
  // Edge midpoints
  const mids = verts.map(([x,y],i) => {
    const [nx,ny] = verts[(i+1)%n];
    return [(x+nx)/2, (y+ny)/2];
  });
  const segs = [];
  for (let i=0; i<n; i++) {
    const [mx,my] = mids[i];
    // Ray toward mids[(i+d)%n]
    const [tx,ty] = mids[(i+d)%n];
    // Ray toward mids[(i-d+n)%n]
    const [bx,by] = mids[(i-d+n+n)%n];
    // Find intersection of ray from mids[i]->mids[(i+d)%n]
    // with ray from mids[(i+1)%n]->mids[(i+1-d+n)%n]  (the adjacent midpoint's backward ray)
    const j = (i+1)%n;
    const [mx2,my2] = mids[j];
    const [bx2,by2] = mids[(j-d+n+n)%n];
    const pt = lineIntersect(mx,my,tx,ty, mx2,my2,bx2,by2);
    if (pt) segs.push([mx,my,pt[0],pt[1],mx2,my2]);
  }
  return segs;
}

// Draw construction polygon edges (invisible by default, faint when toggled)
function drawConstruction(ctx, poly, ox, oy, sc) {
  const n = poly.length;
  ctx.beginPath();
  poly.forEach(([x,y],i) => {
    const [cx,cy]=toCanvas(x,y,ox,oy,sc);
    i ? ctx.lineTo(cx,cy) : ctx.moveTo(cx,cy);
  });
  ctx.closePath();
  ctx.stroke();
}

// Draw star motif for one polygon
function drawStarMotif(ctx, poly, ox, oy, sc) {
  const segs = starMotif(poly);
  segs.forEach(([x1,y1,xm,ym,x2,y2]) => {
    const [cx1,cy1]=toCanvas(x1,y1,ox,oy,sc);
    const [cxm,cym]=toCanvas(xm,ym,ox,oy,sc);
    const [cx2,cy2]=toCanvas(x2,y2,ox,oy,sc);
    ctx.beginPath();
    ctx.moveTo(cx1,cy1);
    ctx.lineTo(cxm,cym);
    ctx.lineTo(cx2,cy2);
    ctx.stroke();
  });
}

// ---- girih ----
function drawGirih(ctx, data, W, H) {
  let pts = (data.points||[]).slice();
  if (data.type==='regular' && data.sides>0) {
    const n=data.sides, s=data.scale||1, r=data.rot||0, tx=data.tx||0, ty=data.ty||0;
    const base = Array.from({length:n}, (_,k) => [Math.cos(2*Math.PI*k/n), Math.sin(2*Math.PI*k/n)]);
    pts = base.map(([x,y]) => {
      const xs=x*s, ys=y*s;
      return [xs*Math.cos(r)-ys*Math.sin(r)+tx, xs*Math.sin(r)+ys*Math.cos(r)+ty];
    });
  }
  if (pts.length < 3) {
    ctx.fillStyle='#8888aa'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Curve-based shape (no vertex data)', W/2, H/2); return;
  }
  const {ox,oy,sc} = fitPts(pts, W, H, 0.8);
  const showConst = document.getElementById('chk-c')?.checked;
  ctx.save();
  ctx.lineJoin='round';
  // Construction lines (polygon edges)
  if (showConst) {
    ctx.strokeStyle='rgba(42,90,140,0.03)'; ctx.lineWidth=1;
    drawConstruction(ctx, pts, ox, oy, sc);
  }
  // Star motif
  ctx.strokeStyle='rgba(197,160,89,0.6)'; ctx.lineWidth=1.5;
  drawStarMotif(ctx, pts, ox, oy, sc);
  ctx.restore();
  infoText(ctx, pts.length+'-gon star motif', W, H);
}

// ---- tiling ----
function drawTiling(ctx, data, W, H) {
  const t1=data.t1||[2,0], t2=data.t2||[0,2];
  const basePts = [];
  for (const feat of (data.features||[])) {
    if (feat.type==='regular' && feat.sides>0) {
      const n=feat.sides;
      const bp = Array.from({length:n}, (_,k) => [Math.cos(2*Math.PI*k/n), Math.sin(2*Math.PI*k/n)]);
      (feat.placements||[]).forEach(p => basePts.push(applyPlacement(bp,p)));
    } else if ((feat.type==='polygon'||feat.type==='edgepoly') && (feat.points||[]).length>=3) {
      (feat.placements||[]).forEach(p => basePts.push(applyPlacement(feat.points,p)));
    }
  }
  if (!basePts.length) { ctx.fillStyle='#8888aa'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('No renderable features',W/2,H/2); return; }

  const area = Math.abs(t1[0]*t2[1]-t1[1]*t2[0]);
  const RANGE = Math.min(Math.max(2, Math.ceil(8/Math.sqrt(Math.max(area,0.01)))), 7);

  const allPts = [];
  for(let i=-RANGE;i<=RANGE;i++) for(let j=-RANGE;j<=RANGE;j++) {
    const ox=i*t1[0]+j*t2[0], oy=i*t1[1]+j*t2[1];
    basePts.forEach(poly => poly.forEach(([x,y]) => allPts.push([x+ox,y+oy])));
  }
  const {ox,oy,sc} = fitPts(allPts, W, H, 0.95);
  const showConst = document.getElementById('chk-c')?.checked;

  ctx.save();
  ctx.lineJoin='round';
  for(let i=-RANGE;i<=RANGE;i++) for(let j=-RANGE;j<=RANGE;j++) {
    const offx=i*t1[0]+j*t2[0], offy=i*t1[1]+j*t2[1];
    basePts.forEach(poly => {
      // Visibility cull
      let vis=false;
      poly.forEach(([x,y]) => {
        const [cx,cy]=toCanvas(x+offx,y+offy,ox,oy,sc);
        if(cx>-60&&cx<W+60&&cy>-60&&cy<H+60) vis=true;
      });
      if (!vis) return;
      const shifted = poly.map(([x,y]) => [x+offx, y+offy]);
      if (showConst) {
        ctx.strokeStyle='rgba(42,90,140,0.03)'; ctx.lineWidth=1;
        drawConstruction(ctx, shifted, ox, oy, sc);
      }
      ctx.strokeStyle='rgba(197,160,89,0.6)'; ctx.lineWidth=1.5;
      drawStarMotif(ctx, shifted, ox, oy, sc);
    });
  }
  ctx.restore();
  infoText(ctx, basePts.length*(2*RANGE+1)**2+' polys \u00B7 range \u00B1'+RANGE, W, H);
}

// ---- template ----
function drawTemplate(ctx, data, W, H) {
  const lines=data.lines||[], circles=data.circles||[];
  const allPts=[];
  lines.forEach(([x1,y1,x2,y2]) => allPts.push([x1,y1],[x2,y2]));
  circles.forEach(([r,cx,cy]) => allPts.push([cx-r,cy-r],[cx+r,cy+r]));
  if (!allPts.length) { ctx.fillStyle='#8888aa'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('No data',W/2,H/2); return; }
  const {ox,oy,sc} = fitPts(allPts, W, H, 0.88);
  ctx.save();
  ctx.strokeStyle='rgba(42,90,140,0.55)'; ctx.lineWidth=1;
  circles.forEach(([r,cx,cy]) => {
    const [scx,scy]=toCanvas(cx,cy,ox,oy,sc);
    ctx.beginPath(); ctx.arc(scx,scy,r*sc*S.zoom,0,Math.PI*2); ctx.stroke();
  });
  ctx.strokeStyle='rgba(197,160,89,0.8)'; ctx.lineWidth=1.5;
  lines.forEach(([x1,y1,x2,y2]) => {
    const [cx1,cy1]=toCanvas(x1,y1,ox,oy,sc), [cx2,cy2]=toCanvas(x2,y2,ox,oy,sc);
    ctx.beginPath(); ctx.moveTo(cx1,cy1); ctx.lineTo(cx2,cy2); ctx.stroke();
  });
  ctx.restore();
  infoText(ctx, lines.length+' lines \u00B7 '+circles.length+' circles', W, H);
}

function infoText(ctx, txt, W, H) {
  ctx.fillStyle='#555570'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText(txt, 8, H-8);
}

// ============================================================
// INFO PANEL
// ============================================================
const fmt = n => !isFinite(n)?'?': Math.abs(n)<0.0001?'0':n.toFixed(3);

function updateInfo(data, type) {
  const ic = document.getElementById('info-content');
  let h = '';
  if (type==='girih') {
    h = '<h2>'+escH(data.name)+'</h2><div class="igrid">'
      + cell('Type', data.type)
      + cell('Sides', data.sides||'irregular')
      + cell('Vertices', (data.points||[]).length)
      + cell('Scale / Rot', fmt(data.scale)+' / '+fmt(data.rot)+'rad')
      + cell('Offset tx,ty', fmt(data.tx)+', '+fmt(data.ty))
      + '</div>';
  } else if (type==='tiling') {
    const feats=data.features||[];
    const nplac=feats.reduce((s,f)=>s+f.placements.length,0);
    const fs=feats.map(f=>(f.type==='regular'?'reg-'+f.sides:f.type)+'\u00D7'+f.placements.length).join(', ');
    h = '<h2>'+escH(data.name)+'</h2><div class="igrid">'
      + cell('T1', '['+data.t1.map(fmt).join(', ')+']')
      + cell('T2', '['+data.t2.map(fmt).join(', ')+']')
      + cell('Features', feats.length)
      + cell('Placements', nplac)
      + cell('Category', data.cat||M.tilings.find(t=>t.name===data.name)?.cat||'-')
      + '</div>'
      + (fs?'<div class="idesc" style="font-family:monospace;font-size:10px;margin-top:4px">'+escH(fs)+'</div>':'')
      + (data.desc?'<div class="idesc">'+escH(data.desc)+'</div>':'');
  } else {
    h = '<h2>'+escH(data.name)+'</h2><div class="igrid">'
      + cell('Lines', (data.lines||[]).length)
      + cell('Circles', (data.circles||[]).length)
      + '</div>';
  }
  ic.innerHTML = h;
}

function cell(lbl, val) {
  return '<div class="icell"><div class="ilbl">'+lbl+'</div><div class="ival">'+escH(String(val))+'</div></div>';
}
