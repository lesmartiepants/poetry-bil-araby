<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2E #5: Pure Ink — Stark Typography</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --bg2: #0f0f10;
  --text: #f9fafb;
  --text-dim: #71717a;
  --grid-line: rgba(255, 255, 255, 0.04);
  --accent: #a1a1aa;
  --white: #fff;
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.light {
  --bg: #ffffff;
  --bg2: #f9fafb;
  --text: #0a0a0a;
  --text-dim: #71717a;
  --grid-line: rgba(0, 0, 0, 0.04);
  --accent: #52525b;
}
html {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
}
body { min-height: 100vh; }

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 4px;
  border: 1px solid var(--grid-line);
  background: var(--bg2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  font-size: 20px;
}
.theme-toggle:hover {
  border-color: var(--accent);
  background: var(--bg);
}

canvas#ink {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.6;
}

.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 1;
}

.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.7;
  z-index: 10;
}

/* SPLASH */
#splash {
  background: var(--bg);
}
.splash-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
  max-width: 600px;
  animation: inkReveal 1s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes inkReveal {
  from { opacity: 0; clip-path: inset(0 50% 0 50%); }
  to { opacity: 1; clip-path: inset(0 0 0 0); }
}

.ink-title {
  font-family: var(--font-ar);
  font-size: clamp(4rem, 10vw, 6rem);
  font-weight: 700;
  color: var(--white);
  margin-bottom: 16px;
  line-height: 1;
  animation: strokeDraw 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
}
@keyframes strokeDraw {
  from { opacity: 0; transform: scaleY(0.5); }
  to { opacity: 1; transform: scaleY(1); }
}

.ink-subtitle {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-bottom: 64px;
  font-weight: 500;
  animation: fadeIn 0.8s 0.6s backwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.ink-btn {
  padding: 16px 48px;
  min-width: 44px;
  min-height: 44px;
  border: 2px solid var(--text);
  background: transparent;
  color: var(--text);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.35em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.9s backwards;
  will-change: transform;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
.ink-btn:hover {
  background: var(--text);
  color: var(--bg);
}

/* MAIN */
#main {
  background: var(--bg);
  display: none;
  padding: 40px 24px;
}
.ink-layout {
  position: relative;
  z-index: 2;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.ink-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding: 16px 0;
  border-bottom: 1px solid var(--grid-line);
}
.ink-brand {
  font-family: var(--font-ar);
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
}

.canvas-card {
  background: var(--bg2);
  border: 1px solid var(--grid-line);
  padding: 56px;
  margin-bottom: 32px;
  position: relative;
  transition: all 0.3s ease;
}
.canvas-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 2px;
  height: 100%;
  background: var(--accent);
}
.canvas-card:hover {
  border-color: var(--accent);
  background: var(--bg);
}

.poem-text {
  font-family: var(--font-ar);
  font-size: 36px;
  line-height: 2.4;
  color: var(--white);
  text-align: right;
  direction: rtl;
  margin-bottom: 32px;
  font-weight: 400;
}
.poem-attribution {
  font-size: 13px;
  color: var(--accent);
  text-align: left;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.stark-btn {
  padding: 14px 40px;
  min-width: 44px;
  min-height: 44px;
  background: var(--white);
  color: var(--bg);
  border: none;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  cursor: pointer;
  transition: all 0.2s ease;
}
.stark-btn:hover {
  background: var(--accent);
}

@media (max-width: 768px) {
  .ink-title { font-size: 4rem; }
  .splash-content { padding: 24px; }
  .canvas-card { padding: 32px 24px; }
  .poem-text {
    font-size: 28px;
    line-height: 2.2;
  }
  .theme-toggle {
    width: 44px;
    height: 44px;
    top: 16px;
    right: 16px;
  }
  .label {
    font-size: 8px;
    top: 16px;
    left: 16px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <canvas id="ink"></canvas>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">☀️</span>
  </button>

  <div class="screen" id="splash">
    <div class="label">Pure Ink</div>
    <div class="splash-content">
      <h1 class="ink-title">قافية</h1>
      <p class="ink-subtitle">Typography First</p>
      <button class="ink-btn" onclick="showMain()">Enter</button>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="ink-layout">
      <nav class="ink-nav">
        <div class="ink-brand">قافية</div>
      </nav>

      <div class="canvas-card">
        <div class="poem-text" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="poem-attribution">— أحمد شوقي</div>
      </div>

      <button class="stark-btn">Next</button>
    </div>
  </div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  html.classList.toggle('light');
  icon.textContent = html.classList.contains('light') ? '🌙' : '☀️';
}

function showMain() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

// Ink Stroke Animation
const canvas = document.getElementById('ink');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class InkStroke {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.length = Math.random() * 100 + 50;
    this.angle = Math.random() * Math.PI * 2;
    this.width = Math.random() * 3 + 1;
    this.opacity = Math.random() * 0.15 + 0.05;
    this.life = 0;
    this.maxLife = Math.random() * 300 + 200;
  }

  update() {
    this.life++;
    this.opacity = Math.max(0, (1 - this.life / this.maxLife) * 0.2);
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
    ctx.lineWidth = this.width;
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(this.length, 0);
    ctx.stroke();

    ctx.restore();
  }
}

const strokes = [];

function animateInk() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (Math.random() < 0.05 && strokes.length < 30) {
    strokes.push(new InkStroke());
  }

  strokes.forEach((stroke, i) => {
    stroke.update();
    stroke.draw();
    if (stroke.life > stroke.maxLife) strokes.splice(i, 1);
  });

  requestAnimationFrame(animateInk);
}
animateInk();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
