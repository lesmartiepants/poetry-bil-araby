<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Islamic Pattern Generator — TiledPatternMaker Library</title>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131e;
    --gold: #c5a059;
    --gold-dim: rgba(197,160,89,0.4);
    --lapis: #2a5a8c;
    --lapis-bright: #3a7abf;
    --emerald: #2d6b4a;
    --text: #e8dcc8;
    --muted: rgba(232,220,200,0.45);
    --border: rgba(197,160,89,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }

  /* ── TOOLBAR ── */
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,20,0.96); backdrop-filter: blur(16px);
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .toolbar-title {
    font-size: 13px; font-weight: 700; color: var(--gold);
    letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px;
    white-space: nowrap;
  }
  .pattern-btns { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .toolbar button {
    background: transparent; color: var(--gold); border: 1px solid var(--gold-dim);
    padding: 7px 13px; border-radius: 5px; cursor: pointer; font-size: 12px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .toolbar button:hover { background: rgba(197,160,89,0.1); border-color: var(--gold); }
  .toolbar button.active { background: rgba(197,160,89,0.18); border-color: var(--gold); color: #f0d898; }
  .toolbar-controls { display: flex; gap: 8px; align-items: center; }
  .toolbar select {
    background: var(--surface); color: var(--text); border: 1px solid var(--gold-dim);
    padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  #download-btn {
    background: rgba(197,160,89,0.14); color: var(--gold); font-weight: 600; border-color: var(--gold);
  }

  /* ── CANVAS ── */
  .canvas-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 120px); padding: 20px;
  }
  canvas { border: 1px solid var(--border); max-width: 100%; height: auto; display: block; }

  /* ── INFO BAR ── */
  .info-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(13,13,20,0.94); border-top: 1px solid var(--border);
    padding: 10px 20px; display: flex; gap: 20px; align-items: center;
    font-size: 12px; pointer-events: none;
  }
  .info-name { color: var(--gold); font-weight: 600; }
  .info-origin { color: var(--muted); }
  .info-math { color: rgba(197,160,89,0.55); font-style: italic; }
</style>
</head>

<div class="toolbar">
  <span class="toolbar-title">Islamic Patterns</span>
  <div class="pattern-btns">

      <option value="2560">2560 px</option>

// Apply 2x3 affine matrix [a,b,tx, c,d,ty] to point [x,y]
function applyMatrix(m, x, y) {
  // Matrix from TiledPatternMaker is [cos,-sin,tx, sin,cos,ty] (column-major style: a,b,tx,c,d,ty)
  const [a, b, tx, c, d, ty] = m;
  return [a*x + b*y + tx, c*x + d*y + ty];
}

// Apply scale/rot/translate placement object
function applyPlacement(p, x, y) {
  const cos = Math.cos(p.rot), sin = Math.sin(p.rot);
  return [p.scale*cos*x - p.scale*sin*y + p.tx,
          p.scale*sin*x + p.scale*cos*y + p.ty];
}

// Generate regular polygon points (radius=1, centered at 0,0)
function regularPoly(n, rotOffset) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + (rotOffset || 0);
    pts.push([Math.cos(a), Math.sin(a)]);
  }
  return pts;
}

// Draw polygon (array of [x,y]) transformed by [scaleX, offsetX, scaleY, offsetY]
function drawPolyTransformed(pts, sx, ox, sy, oy) {

  ctx.beginPath();
  pts.forEach((p, i) => {
    const px = p[0] * sx + ox;
    const py = p[1] * sy + oy;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  });
  ctx.closePath();
}

// Clip line defined in [-1,1] normalized template space to canvas
function drawTemplateLine(x1n, y1n, x2n, y2n, cellCx, cellCy, halfCell) {
  const x1 = cellCx + x1n * halfCell;
  const y1 = cellCy + y1n * halfCell;
  const x2 = cellCx + x2n * halfCell;
  const y2 = cellCy + y2n * halfCell;
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
}

// PATTERN RENDERERS
// ══════════════════════════════════════════════════════════════════

// ── PATTERN 1: Girih Decagon + Pentagon tiling
// Uses exact girih shape geometry: decagons (10-gons) tessellate with pentagons,
// bowties fill the remaining space. Golden-ratio proportions throughout.
function drawGirihDecagon(S) {
  setInfo(
    'Girih Tile Decagon Pattern',
    'Persian strapwork — Darb-i Imam Shrine, Isfahan (1453)',
    'Five girih tiles: decagon, pentagon, bowtie, rhombus, hexagon. Golden ratio \u03c6\u22481.618 governs all proportions.'
  );

  // Decagon + pentagon tiling: decagons on a pseudo-square grid,
  // pentagons fill gaps, bowties connect decagon edges.
  // The library gDecagon is a regular 10-gon rotated by -\u03c0/10.
  // The library gPentagon is a regular 5-gon scaled to fit between decagons.

  const phi = (1 + Math.sqrt(5)) / 2; // 1.618...
  // Decagon circumradius in our tiling unit
  const DEC_R = 1.0;
  // Edge length of decagon (side = 2*sin(\u03c0/10)*R)
  const edge = 2 * Math.sin(Math.PI / 10) * DEC_R;
  // Pentagon circumradius: pentagons share edge with decagon
  const PENT_R = edge / (2 * Math.sin(Math.PI / 5));

  // Grid spacing: decagons arranged in rows
  const spacing = DEC_R * 2 * Math.sin(Math.PI / 10) + DEC_R;

  // Scale to fill canvas
  const tileCells = 7;
  const cellSz = S / (tileCells * 1.8);
  const dec_r = cellSz * 0.5;
  const pent_r = dec_r * edge / (DEC_R * (2 * Math.sin(Math.PI / 5)));

  // Offset for decagon-pentagon layout
  // Decagons at positions using known girih tiling geometry
  const rowSpacingX = dec_r * 2 * Math.cos(Math.PI / 10) + dec_r * 2 * Math.sin(Math.PI / 10);
  const rowSpacingY = dec_r * (1 + Math.cos(Math.PI / 10) * 2);

  // Bowtie width
  const bw = dec_r * Math.sin(Math.PI / 10);
  const bh = dec_r * Math.cos(Math.PI / 10);

  const lw = Math.max(1, S * 0.0008);

  // Background already filled by redraw()

  // Draw decagons first (gold outline)
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = lw;
  const decPts = regularPoly(10, -Math.PI / 10);

  for (let row = -1; row <= tileCells + 1; row++) {
    for (let col = -1; col <= tileCells + 1; col++) {
      const cx = col * rowSpacingX + (row % 2) * rowSpacingX * 0.5;
      const cy = row * rowSpacingY;
      drawPolyTransformed(decPts, dec_r, cx, dec_r, cy);
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = LAPIS;
      ctx.fill();
      ctx.globalAlpha = 0.6;
      ctx.stroke();

      // Inner strapwork: connect midpoints of decagon edges
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = GOLD2;
      ctx.lineWidth = lw * 0.7;
      const innerDecPts = regularPoly(10, -Math.PI / 10);
      // Connect every other edge midpoint to create the girih strapwork star
      ctx.beginPath();
      for (let i = 0; i < 10; i += 2) {
        const a0 = (i / 10) * Math.PI * 2 - Math.PI / 10;
        const a1 = ((i + 2) / 10) * Math.PI * 2 - Math.PI / 10;
        const mx0 = cx + Math.cos(a0) * dec_r * 0.62;
        const my0 = cy + Math.sin(a0) * dec_r * 0.62;
        const mx1 = cx + Math.cos(a1) * dec_r * 0.62;
        const my1 = cy + Math.sin(a1) * dec_r * 0.62;
        ctx.moveTo(mx0, my0); ctx.lineTo(mx1, my1);
      }
      ctx.stroke();

      ctx.strokeStyle = GOLD;
      ctx.lineWidth = lw;
      ctx.globalAlpha = 0.6;
    }
  }

  // Draw pentagons in the gaps between decagons
  const pentPts = regularPoly(5, -Math.PI / 2);
  ctx.strokeStyle = LAPIS2;
  ctx.lineWidth = lw * 0.85;

  for (let row = -1; row <= tileCells + 1; row++) {
    for (let col = -1; col <= tileCells + 1; col++) {
      const cx = col * rowSpacingX + (row % 2) * rowSpacingX * 0.5;
      const cy = row * rowSpacingY;

      // 10 edge midpoints of the decagon — pentagons attach to alternating edges
      for (let e = 0; e < 10; e += 2) {
        // Midpoint of edge e (between vertex e and e+1)
        const a_v = (e / 10) * Math.PI * 2 - Math.PI / 10;
        const a_v2 = ((e + 1) / 10) * Math.PI * 2 - Math.PI / 10;
        const mx = cx + (Math.cos(a_v) + Math.cos(a_v2)) * dec_r * 0.5;
        const my = cy + (Math.sin(a_v) + Math.sin(a_v2)) * dec_r * 0.5;

        // Pentagon center = midpoint displaced outward by pent_r
        const edgeAngle = Math.atan2(my - cy, mx - cx);
        const pentScale = dec_r * 0.38;
        const pcx = mx + Math.cos(edgeAngle) * pentScale * 0.72;
        const pcy = my + Math.sin(edgeAngle) * pentScale * 0.72;
        const pRot = edgeAngle + Math.PI / 2 + Math.PI;

        drawPolyTransformed(regularPoly(5, pRot), pentScale, pcx, pentScale, pcy);
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = EMERALD;
        ctx.fill();
        ctx.globalAlpha = 0.45;
        ctx.stroke();
      }
    }
  }

  // Rhombus connectors (gold diamonds between decagons)
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = lw * 0.7;
  ctx.globalAlpha = 0.4;
  const rh = dec_r * Math.sin(Math.PI / 5) * 0.55;
  const rw = dec_r * Math.cos(Math.PI / 5) * 0.28;
  for (let row = -1; row <= tileCells + 1; row++) {
    for (let col = -1; col <= tileCells + 1; col++) {
      const cx = col * rowSpacingX + (row % 2) * rowSpacingX * 0.5;
      const cy = row * rowSpacingY;
      // 5 rhombuses between this decagon and its neighbors
      for (let e = 1; e < 10; e += 2) {
        const a = (e / 10) * Math.PI * 2 - Math.PI / 10;
        const nx = cx + Math.cos(a) * rowSpacingX * 0.48;
        const ny = cy + Math.sin(a) * rowSpacingX * 0.48;
        ctx.beginPath();
        ctx.moveTo(nx + Math.cos(a + Math.PI/2) * rw, ny + Math.sin(a + Math.PI/2) * rw);
        ctx.lineTo(nx + Math.cos(a) * rh, ny + Math.sin(a) * rh);
        ctx.lineTo(nx - Math.cos(a + Math.PI/2) * rw, ny - Math.sin(a + Math.PI/2) * rw);
        ctx.lineTo(nx - Math.cos(a) * rh, ny - Math.sin(a) * rh);
        ctx.closePath();
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
}

// ── PATTERN 2: 4.8^2 Star-Cross tiling
// From TiledPatternMaker tiling data. T1=(0,2), T2=(2,0).
// Unit cell: one octagon (identity placement) + one square (affine placement).
// Scale unit so several cells fill canvas.
function drawStarCross482(S) {
  setInfo(
    TILING_482.name,
    TILING_482.origin,
    TILING_482.math
  );

  // The tiling uses unit cells of size 2×2 (T1 and T2 both have length 2).
  // We scale so ~8 cells fit across S.
  const tilingUnitsAcross = 8;
  const unitScale = S / (tilingUnitsAcross * 2); // 2 = T2 x-length
  const lw = Math.max(1, S * 0.0014);

  // Octagon (inscribed in unit circle)
  const octPts = regularPoly(8, Math.PI / 8);

  // Square: from the affine matrix [0.293,-0.293, 1, 0.293,0.293, 1]
  // This is a 45°-rotated square centered at (1,1) in tiling space.
  const sqMatrix = [0.2928932188134518, -0.2928932188134519, 1, 0.2928932188134519, 0.2928932188134518, 1];
  const sqRaw = regularPoly(4, Math.PI / 4);
  const sqPts = sqRaw.map(p => applyMatrix(sqMatrix, p[0], p[1]));

  // The 8-pointed star pattern is drawn by rendering strapwork INSIDE each octagon.
  // The {8/3} star connects every-3rd vertex of a regular octagon.
  function draw8Star(cx, cy, r, strokeCol, alpha) {
    ctx.beginPath();
    ctx.globalAlpha = alpha;
    // Step-3 star polygon: 8 vertices, connect to vertex+3
    const verts = [];
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + Math.PI / 8;
      verts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
    }
    // Draw star by connecting: 0→3→6→1→4→7→2→5→0
    const order = [0, 3, 6, 1, 4, 7, 2, 5];
    ctx.moveTo(verts[order[0]][0], verts[order[0]][1]);
    for (let i = 1; i <= order.length; i++) {
      ctx.lineTo(verts[order[i % order.length]][0], verts[order[i % order.length]][1]);
    }
    ctx.closePath();
    ctx.strokeStyle = strokeCol;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Tile the plane using T1 and T2
  const T1 = TILING_482.T1; // [0, 2]
  const T2 = TILING_482.T2; // [2, 0]
  const rangeI = 10, rangeJ = 10;
  const offX = S * 0.5, offY = S * 0.5; // center origin

  ctx.lineWidth = lw;

  for (let i = -rangeI; i <= rangeI; i++) {
    for (let j = -rangeJ; j <= rangeJ; j++) {
      const baseTX = (i * T1[0] + j * T2[0]) * unitScale + offX;
      const baseTY = (i * T1[1] + j * T2[1]) * unitScale + offY;

      // Octagon (centered at (baseTX, baseTY))
      const oct_r = unitScale * 0.92;
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = lw;
      ctx.globalAlpha = 0.65;
      drawPolyTransformed(octPts, oct_r, baseTX, oct_r, baseTY);
      ctx.fillStyle = LAPIS;
      ctx.globalAlpha = 0.12;
      ctx.fill();
      ctx.globalAlpha = 0.65;
      ctx.stroke();

      // {8/3} star inside octagon
      draw8Star(baseTX, baseTY, oct_r * 0.88, GOLD2, 0.35);

      // Square (offset by matrix)
      const sq_r = unitScale * 0.29;
      const sqCX = baseTX + sqMatrix[2] * unitScale;
      const sqCY = baseTY + sqMatrix[5] * unitScale;
      ctx.strokeStyle = LAPIS2;
      ctx.lineWidth = lw * 0.8;
      ctx.globalAlpha = 0.55;
      drawPolyTransformed(regularPoly(4, Math.PI / 4), sq_r, sqCX, sq_r, sqCY);
      ctx.fillStyle = EMERALD;
      ctx.globalAlpha = 0.15;
      ctx.fill();
      ctx.globalAlpha = 0.55;
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

// ── PATTERN 3: 3-8-12 tiling
// Triangles, octagons, dodecagons from the XML placements.
// Scaled to fit canvas, tiled by T1/T2.
function draw3812(S) {
  setInfo(
    TILING_3812.name,
    TILING_3812.origin,
    TILING_3812.math
  );

  const t = TILING_3812;
  // T1 length ~27.4, so ~2 T1 cells wide
  const unitScale = S / (Math.abs(t.T1[0]) * 2.2);
  const offX = S * 0.55, offY = S * 0.5;
  const lw = Math.max(1, S * 0.0012);

  ctx.lineWidth = lw;

  for (let i = -2; i <= 2; i++) {
    for (let j = -2; j <= 2; j++) {
      const baseX = (i * t.T1[0] + j * t.T2[0]) * unitScale + offX;
      const baseY = (i * t.T1[1] + j * t.T2[1]) * unitScale + offY;

      t.features.forEach(feat => {
        feat.placements.forEach(pl => {
          const pts = regularPoly(feat.sides, -Math.PI / 2);
          const tPts = pts.map(p => applyPlacement(pl, p[0], p[1]));
          const cx = pl.tx * unitScale + baseX;
          const cy = pl.ty * unitScale + baseY;
          const r = pl.scale * unitScale;

          // Draw scaled regular poly centered at (cx, cy)
          drawPolyTransformed(pts, r, cx, r, cy);

          let fillColor, strokeColor, fillAlpha;
          switch (feat.sides) {
            case 12:
              fillColor = LAPIS;  strokeColor = GOLD;  fillAlpha = 0.18; break;
            case 8:
              fillColor = LAPIS;  strokeColor = LAPIS2; fillAlpha = 0.12; break;
            case 3:
              fillColor = EMERALD; strokeColor = GOLD2;  fillAlpha = 0.22; break;
            default:
              fillColor = BG;    strokeColor = GOLD;   fillAlpha = 0.08;
          }
          ctx.globalAlpha = fillAlpha;
          ctx.fillStyle = fillColor;
          ctx.fill();
          ctx.globalAlpha = 0.6;
          ctx.strokeStyle = strokeColor;
          ctx.stroke();

          // For dodecagons: draw inner 12-pointed star
          if (feat.sides === 12) {
            ctx.globalAlpha = 0.3;
            ctx.strokeStyle = GOLD;
            ctx.lineWidth = lw * 0.7;
            ctx.beginPath();
            const verts12 = [];
            for (let v = 0; v < 12; v++) {
              const a = (v / 12) * Math.PI * 2 - Math.PI / 2;
              verts12.push([cx + Math.cos(a) * r * 0.88, cy + Math.sin(a) * r * 0.88]);
            }
            // {12/5} star: connect every 5th
            const step = 5;
            ctx.moveTo(verts12[0][0], verts12[0][1]);
            for (let v = 1; v <= 12; v++) {
              ctx.lineTo(verts12[(v * step) % 12][0], verts12[(v * step) % 12][1]);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.lineWidth = lw;
            ctx.globalAlpha = 0.6;
          }
        });
      });
    }
  }
  ctx.globalAlpha = 1;
}

// ── PATTERN 4: 6.5 Hexagon-Pentagon tiling
// Central hexagon + 6 surrounding pentagons, tiled by T1/T2.
function draw65(S) {
  setInfo(
    TILING_65.name,
    TILING_65.origin,
    TILING_65.math
  );

  const t = TILING_65;
  // T2 length = 4.619 — scale so ~5 T2 rows fit
  const unitScale = S / (Math.abs(t.T2[1]) * 5);
  const offX = S * 0.5, offY = S * 0.5;
  const lw = Math.max(1, S * 0.0012);

  // Regular hex (unit circumradius)
  const hexPts = regularPoly(6, Math.PI / 6);

  // Pentagon points from tiling data (raw coordinates)
  const rawPentPts = t.pentagonPts;
  // Find center of pentagon to draw it centered
  const pentCX = rawPentPts.reduce((s, p) => s + p[0], 0) / rawPentPts.length;
  const pentCY = rawPentPts.reduce((s, p) => s + p[1], 0) / rawPentPts.length;
  const pentRadius = Math.max(...rawPentPts.map(p => Math.hypot(p[0] - pentCX, p[1] - pentCY)));
  const normalizedPentPts = rawPentPts.map(p => [(p[0] - pentCX) / pentRadius, (p[1] - pentCY) / pentRadius]);

  ctx.lineWidth = lw;

  for (let i = -5; i <= 5; i++) {
    for (let j = -5; j <= 5; j++) {
      const baseX = (i * t.T1[0] + j * t.T2[0]) * unitScale + offX;
      const baseY = (i * t.T1[1] + j * t.T2[1]) * unitScale + offY;

      // Hexagon radius in tiling space = ~1 unit (sides ~1)
      const hexRadius = unitScale * 1.0;

      // Draw central hexagon
      drawPolyTransformed(hexPts, hexRadius, baseX, hexRadius, baseY);
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = LAPIS;
      ctx.fill();
      ctx.globalAlpha = 0.65;
      ctx.strokeStyle = GOLD;
      ctx.stroke();

      // Draw inner hexagon star (two triangles)
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = GOLD2;
      ctx.lineWidth = lw * 0.7;
      drawPolyTransformed(regularPoly(3, Math.PI / 6), hexRadius * 0.65, baseX, hexRadius * 0.65, baseY);
      ctx.stroke();
      drawPolyTransformed(regularPoly(3, Math.PI / 6 + Math.PI), hexRadius * 0.65, baseX, hexRadius * 0.65, baseY);
      ctx.stroke();

      ctx.lineWidth = lw;
      ctx.globalAlpha = 0.65;

      // Draw 6 pentagons around hexagon
      t.pentPlacements.forEach(m => {
        // Apply affine transform to pentagon center
        const [pcx, pcy] = applyMatrix([...m], pentCX, pentCY);
        const tx2 = pcx * unitScale + baseX;
        const ty2 = pcy * unitScale + baseY;
        const pScale = pentRadius * unitScale;

        // Apply rotation from matrix to pentagon orientation
        const angle = Math.atan2(m[3], m[0]);
        const rotatedPentPts = normalizedPentPts.map(p => {
          const rx = p[0] * Math.cos(angle) - p[1] * Math.sin(angle);
          const ry = p[0] * Math.sin(angle) + p[1] * Math.cos(angle);
          return [rx, ry];
        });
        drawPolyTransformed(rotatedPentPts, pScale, tx2, pScale, ty2);
        ctx.globalAlpha = 0.14;
        ctx.fillStyle = EMERALD;
        ctx.fill();
        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = LAPIS2;
        ctx.stroke();
      });
    }
  }
  ctx.globalAlpha = 1;
}

// ── PATTERN 5: Mexuar Interlace
// The Mexuar SVG is a strapwork pattern over 4.8^2 geometry.
// We reproduce the interlace effect by drawing double-line strapwork
// over the octagon-square tiling, simulating the SVG output.
function drawMexuarInterlace(S) {
  setInfo(
    MEXUAR_INFO.name,
    MEXUAR_INFO.origin,
    MEXUAR_INFO.math
  );

  // Draw 4.8^2 base with strapwork interlace (double-line borders)
  const tilingUnits = 7;
  const unitScale = S / (tilingUnits * 2);
  const lw = Math.max(1, S * 0.001);
  const strapWidth = lw * 2.2;
  const offX = S * 0.5, offY = S * 0.5;

  const octPts = regularPoly(8, Math.PI / 8);

  // Strapwork = draw each edge of the tiling as a thick band with two parallel lines
  function strapLine(x1, y1, x2, y2, col1, col2, width) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len < 0.5) return;
    const nx = -dy / len * width * 0.5;
    const ny = dx / len * width * 0.5;
    // Outer dark fill
    ctx.beginPath();
    ctx.moveTo(x1 + nx, y1 + ny);
    ctx.lineTo(x2 + nx, y2 + ny);
    ctx.lineTo(x2 - nx, y2 - ny);
    ctx.lineTo(x1 - nx, y1 - ny);
    ctx.closePath();
    ctx.fillStyle = col1;
    ctx.globalAlpha = 0.5;
    ctx.fill();
    // Inner highlight lines
    ctx.beginPath();
    ctx.moveTo(x1 + nx * 0.45, y1 + ny * 0.45);
    ctx.lineTo(x2 + nx * 0.45, y2 + ny * 0.45);
    ctx.strokeStyle = col2;
    ctx.lineWidth = lw * 0.4;
    ctx.globalAlpha = 0.4;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x1 - nx * 0.45, y1 - ny * 0.45);
    ctx.lineTo(x2 - nx * 0.45, y2 - ny * 0.45);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  for (let i = -tilingUnits; i <= tilingUnits; i++) {
    for (let j = -tilingUnits; j <= tilingUnits; j++) {
      const baseTX = j * 2 * unitScale + offX;
      const baseTY = i * 2 * unitScale + offY;

      // Octagon edges as strapwork
      for (let e = 0; e < 8; e++) {
        const a1 = (e / 8) * Math.PI * 2 + Math.PI / 8;
        const a2 = ((e + 1) / 8) * Math.PI * 2 + Math.PI / 8;
        const r = unitScale * 0.92;
        strapLine(
          baseTX + Math.cos(a1) * r, baseTY + Math.sin(a1) * r,
          baseTX + Math.cos(a2) * r, baseTY + Math.sin(a2) * r,
          GOLD, GOLD2, strapWidth
        );
      }

      // Square (at offset 1,1 in tiling space)
      const sqCX = baseTX + unitScale;
      const sqCY = baseTY + unitScale;
      const sq_r = unitScale * 0.29;
      for (let e = 0; e < 4; e++) {
        const a1 = (e / 4) * Math.PI * 2 + Math.PI / 4;
        const a2 = ((e + 1) / 4) * Math.PI * 2 + Math.PI / 4;
        strapLine(
          sqCX + Math.cos(a1) * sq_r, sqCY + Math.sin(a1) * sq_r,
          sqCX + Math.cos(a2) * sq_r, sqCY + Math.sin(a2) * sq_r,
          LAPIS, LAPIS2, strapWidth * 0.8
        );
      }

      // Bridging strapwork between octagon and square (the "over-under" interlace lines)
      // These correspond to the radial lines in the Mexuar SVG
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = strapWidth * 0.6;
      ctx.globalAlpha = 0.35;
      // 4 diagonal connectors (octagon corner → square corner)
      const corners = [
        [Math.PI / 4, unitScale, unitScale],
        [3 * Math.PI / 4, -unitScale, unitScale],
        [5 * Math.PI / 4, -unitScale, -unitScale],
        [7 * Math.PI / 4, unitScale, -unitScale],
      ];
      corners.forEach(([a, dx, dy]) => {
        const oct_r = unitScale * 0.92;
        ctx.beginPath();
        ctx.moveTo(baseTX + Math.cos(a) * oct_r, baseTY + Math.sin(a) * oct_r);
        ctx.lineTo(sqCX + dx * 0.3, sqCY + dy * 0.3);
        ctx.stroke();
      });
    }
  }

  // Overlay: nodal diamonds at all octagon/square intersections
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = GOLD;
  for (let i = -tilingUnits; i <= tilingUnits; i++) {
    for (let j = -tilingUnits; j <= tilingUnits; j++) {
      const tx = j * 2 * unitScale + offX;
      const ty = i * 2 * unitScale + offY;
      // Nodes at octagon vertices
      for (let e = 0; e < 8; e++) {
        const a = (e / 8) * Math.PI * 2 + Math.PI / 8;
        const r = unitScale * 0.92;
        ctx.beginPath();
        ctx.arc(tx + Math.cos(a) * r, ty + Math.sin(a) * r, lw * 0.9, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
}

// ── PATTERN 6: Ben Yusuf Madrasa (template lines)
// From templates/Broug Ben Yusuf Madrasa.xml
// Lines are in [-1,1] normalized unit cell space, tiled by repeating the cell.
function drawBenYusuf(S) {
  setInfo(
    BEN_YUSUF_INFO.name,
    BEN_YUSUF_INFO.origin,
    BEN_YUSUF_INFO.math
  );

  // Cell size: number of cells across canvas
  const cellsAcross = 7;
  const cellSize = S / cellsAcross;
  const halfCell = cellSize * 0.5;
  const lw = Math.max(0.8, S * 0.0006);

  ctx.strokeStyle = GOLD;
  ctx.lineWidth = lw;

  for (let row = -1; row < cellsAcross + 1; row++) {
    for (let col = -1; col < cellsAcross + 1; col++) {
      const cx = (col + 0.5) * cellSize;
      const cy = (row + 0.5) * cellSize;

      // Alternate gold/lapis by cell color
      const isAlt = (row + col) % 2 === 0;

      // Fill cell background subtly
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = isAlt ? LAPIS : EMERALD;
      ctx.fillRect(cx - halfCell, cy - halfCell, cellSize, cellSize);

      // Draw all template lines
      ctx.beginPath();
      BEN_YUSUF_LINES.forEach(([x1, y1, x2, y2]) => {
        const px1 = cx + x1 * halfCell;
        const py1 = cy + y1 * halfCell;
        const px2 = cx + x2 * halfCell;
        const py2 = cy + y2 * halfCell;
        ctx.moveTo(px1, py1);
        ctx.lineTo(px2, py2);
      });
      ctx.globalAlpha = isAlt ? 0.55 : 0.4;
      ctx.strokeStyle = isAlt ? GOLD : LAPIS2;
      ctx.lineWidth = lw;
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

// ══════════════════════════════════════════════════════════════════
// PATTERN REGISTRY
// ══════════════════════════════════════════════════════════════════
const PATTERNS = [
  drawGirihDecagon,
  drawStarCross482,
  draw3812,
  draw65,
  drawMexuarInterlace,
  drawBenYusuf,
];

// ══════════════════════════════════════════════════════════════════
// DRAW / REDRAW
// ══════════════════════════════════════════════════════════════════
function draw(idx) {
  currentIdx = idx;
  document.querySelectorAll('.toolbar button[id^="btn-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + idx);
  if (btn) btn.classList.add('active');
  redraw();
}

function redraw() {
  const S = getSize();
  C.width = S;
  C.height = S;
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, S, S);
  ctx.globalAlpha = 1;
  PATTERNS[currentIdx](S);
}

function downloadPNG() {
  const names = ['girih-decagon', 'star-cross-482', '3-8-12', 'hexagon-pentagon', 'mexuar-interlace', 'ben-yusuf-madrasa'];
  const a = document.createElement('a');
  a.download = `islamic-${names[currentIdx]}-${getSize()}px.png`;
  a.href = C.toDataURL('image/png');
  a.click();
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
draw(0);
</script>
