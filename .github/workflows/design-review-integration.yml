name: Design Review DB Integration

# Runs on every PR push to main.
# Spins up a local PostgreSQL service, applies the design-review migration, and
# runs integration tests to confirm the persist-to-DB feature works on this PR.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  integration:
    name: Design Review — Real DB API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: design_review_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Apply design-review schema + minimal poems table for health check ──
      - name: Apply database schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d design_review_test \
            -f supabase/migrations/20260222000000_design_review_tables.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d design_review_test \
            -c "CREATE TABLE IF NOT EXISTS poems (id SERIAL PRIMARY KEY, content TEXT);"

      # ── Run integration tests against the local DB ────────────────────────
      - name: Run design review integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/design_review_test

      # ── Report outcome on the PR ──────────────────────────────────────────
      - name: Post success comment to PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ✅ Design Review DB Integration\n\n' +
                    '**All integration tests passed against real Supabase DB**\n\n' +
                    '- Items sync ✓\n' +
                    '- Session create ✓\n' +
                    '- Verdict submit ✓\n' +
                    '- Session complete ✓\n' +
                    '- Summary & history read-back ✓\n\n' +
                    '**Persist-to-DB feature confirmed working on this PR** 🎉'
            });

      - name: Post failure comment to PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Design Review DB Integration\n\n' +
                    '**Integration tests failed** — see logs for details.\n\n' +
                    `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
