<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mood Picker — C2: Bright White English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Forum&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:              #0c0c0e;
      --color-gold:            #c5a059;
      --color-gold-dim:        rgba(197, 160, 89, 0.25);
      --color-gold-glow:       rgba(197, 160, 89, 0.5);
      --color-text-primary:    #f0e8d8;
      --color-text-muted:      rgba(240, 232, 216, 0.55);
      --font-arabic:           'Reem Kufi', serif;
      --font-english:          'Forum', serif;
      --ease-out-expo:         cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:           cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-select:       0.35s;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-arabic);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ============================================================
       OPTION LABEL
       ============================================================ */
    .option-label {
      position: fixed;
      top: 16px;
      left: 16px;
      font-family: var(--font-english);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--color-gold);
      opacity: 0.7;
      z-index: 100;
      text-transform: uppercase;
      user-select: none;
    }

    /* ============================================================
       INK CANVAS — behind everything, layered color blobs
       ============================================================ */
    #ink-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      z-index: 5;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      text-align: center;
      padding-top: 40px;
      flex-shrink: 0;
    }

    .title-arabic {
      font-family: var(--font-arabic);
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      color: var(--color-gold);
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .title-english {
      font-family: var(--font-english);
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: var(--color-text-muted);
      margin-top: 6px;
      letter-spacing: 0.08em;
    }

    /* ============================================================
       TAG CLOUD CONTAINER
       The labels flow in a staggered, non-grid layout.
       ============================================================ */
    .tag-cloud {
      flex: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    /* Three rows with horizontal offset for a flowing waterfall feel */
    .tag-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 6px;
    }

    .tag-row:nth-child(odd) {
      /* Stagger odd rows slightly to the right in LTR terms;
         in RTL layout this shifts them inline-start */
      padding-inline-end: 28px;
    }

    .tag-row:nth-child(even) {
      padding-inline-start: 28px;
    }

    /* ============================================================
       EMOTION LABEL
       ============================================================ */
    .emotion-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      padding: 10px 14px;
      min-height: 64px;
      min-width: 72px;
      border-radius: 8px;
      /* Only transition transform — opacity is controlled entirely by GSAP
         to avoid CSS transition fighting the entrance animation and leaving
         labels invisible. */
      transition: transform var(--duration-select) var(--ease-spring);
    }

    .emotion-label::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 70%;
      height: 2px;
      border-radius: 2px;
      background: var(--label-color, var(--color-gold));
      transition: transform 0.3s var(--ease-out-expo);
    }

    .emotion-label.selected::after {
      transform: translateX(-50%) scaleX(1);
    }

    .emotion-label.selected {
      transform: scale(1.1);
    }

    .label-arabic {
      font-family: var(--font-arabic);
      font-size: clamp(1.05rem, 3vw, 1.2rem);
      font-weight: 700;
      line-height: 1;
      color: var(--label-color, var(--color-text-primary));
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .label-english {
      font-family: var(--font-english);
      font-size: clamp(0.65rem, 1.8vw, 0.75rem);
      color: #ffffff;
      font-weight: 400;
      margin-top: 5px;
      letter-spacing: 0.06em;
      text-shadow:
        0 0 8px rgba(0, 0, 0, 1),
        0 0 16px rgba(0, 0, 0, 0.8),
        0 1px 4px rgba(0, 0, 0, 0.9),
        0 0 24px rgba(0, 0, 0, 0.5);
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .emotion-label.selected .label-english {
      color: #ffffff;
    }

    /* Selected glow on Arabic text */
    .emotion-label.selected .label-arabic {
      text-shadow:
        0 0 12px color-mix(in srgb, var(--label-color, transparent) 60%, transparent),
        0 0 30px color-mix(in srgb, var(--label-color, transparent) 30%, transparent);
    }

    /* ============================================================
       BOTTOM CONTROLS
       ============================================================ */
    .bottom-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    /* ============================================================
       NEXT BUTTON
       ============================================================ */
    .btn-next {
      font-family: var(--font-arabic);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-gold);
      background: transparent;
      border: 1.5px solid var(--color-gold);
      border-radius: 999px;
      padding: 12px 40px;
      min-height: 48px;
      cursor: pointer;
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 0 var(--color-gold-glow);
      transition:
        box-shadow 0.25s var(--ease-out-expo),
        background 0.25s var(--ease-out-expo),
        opacity 0.35s var(--ease-out-expo),
        transform 0.35s var(--ease-spring);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }

    .btn-next.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .btn-next:hover,
    .btn-next:focus-visible {
      box-shadow: 0 0 22px 7px var(--color-gold-glow);
      background: rgba(197, 160, 89, 0.08);
      outline: none;
    }

    .btn-next:active {
      transform: scale(0.96);
      transition-duration: 0.08s;
    }

    /* Shimmer sweep */
    .btn-next::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(197,160,89,0.2), transparent);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .btn-next:hover::after { left: 150%; }

    /* ============================================================
       PROGRESS DOTS
       ============================================================ */
    .progress-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--color-gold);
      transition: background 0.3s ease, transform 0.3s var(--ease-spring);
    }

    .dot.active {
      background: var(--color-gold);
      transform: scale(1.2);
    }
  </style>
</head>
<body>

  <span class="option-label">Option C2 — White</span>

  <!-- Ink layer canvas -->
  <canvas id="ink-canvas"></canvas>

  <div class="screen">
    <header class="header">
      <h1 class="title-arabic">كيف تشعر الآن؟</h1>
      <p class="title-english" dir="ltr">How are you feeling?</p>
    </header>

    <!-- Tag cloud built by JS -->
    <div class="tag-cloud" id="tag-cloud" role="group" aria-label="اختر مشاعرك"></div>

    <div class="bottom-controls">
      <button class="btn-next" id="btn-next" aria-label="التالي" aria-disabled="true">التالي</button>
      <div class="progress-dots" role="list" aria-label="الخطوات">
        <div class="dot active" role="listitem"></div>
        <div class="dot" role="listitem"></div>
        <div class="dot" role="listitem"></div>
        <div class="dot" role="listitem"></div>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       DATA
       ============================================================ */
    const EMOTIONS = [
      { ar: 'فرح',   en: 'Joy',        color: '#c5a059' },
      { ar: 'كآبة',  en: 'Melancholy', color: '#1E3A6E' },
      { ar: 'غضب',   en: 'Anger',      color: '#8B2500' },
      { ar: 'أمل',   en: 'Hope',       color: '#4A7C59' },
      { ar: 'يأس',   en: 'Despair',    color: '#4A4A4A' },
      { ar: 'دهشة',  en: 'Wonder',     color: '#6A4C93' },
      { ar: 'فخر',   en: 'Pride',      color: '#B8860B' },
      { ar: 'وحدة',  en: 'Loneliness', color: '#2E3A5F' },
      { ar: 'حنين',  en: 'Nostalgia',  color: '#8B7355' },
    ];

    /*
      Staggered row layout: [3, 3, 3] labels per row.
      Rows are offset via CSS padding to create a tag-cloud feel
      rather than a regular grid.
    */
    const ROW_LAYOUT = [[0,1,2], [3,4,5], [6,7,8]];

    const MAX_SELECTIONS = 3;
    let selectedIndices = new Set();
    let labelElements = [];

    /* ============================================================
       HELPER: hex → {r,g,b}
       ============================================================ */
    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
      };
    }

    /* ============================================================
       INK CANVAS
       Each "ink blob" is a collection of overlapping radial
       gradients painted onto an offscreen buffer, then composited
       onto the main canvas with source-over.  The irregular shape
       comes from 5-8 staggered ellipses of varying size and offset,
       giving a genuine watercolor bleed effect.
       ============================================================ */
    const inkCanvas = document.getElementById('ink-canvas');
    const inkCtx = inkCanvas.getContext('2d');

    // Persistent ink blobs (never cleared — layers accumulate)
    let inkBlobs = [];
    let inkDirty = true;

    function resizeInkCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth;
      const h = window.innerHeight;
      inkCanvas.width = w * dpr;
      inkCanvas.height = h * dpr;
      inkCanvas.style.width = w + 'px';
      inkCanvas.style.height = h + 'px';
      inkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      inkDirty = true;
    }

    /* Brighten dark colors so ink is visible on dark bg */
    function brightenForInk(hex) {
      let { r, g, b } = hexToRgb(hex);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      if (luminance < 0.35) {
        const boost = 1.6 + (0.35 - luminance) * 2;
        r = Math.min(255, Math.round(r * boost));
        g = Math.min(255, Math.round(g * boost));
        b = Math.min(255, Math.round(b * boost));
      }
      return { r, g, b };
    }

    function addInkBlob(cx, cy, color) {
      const { r, g, b } = brightenForInk(color);
      // Create 10 sub-ellipses with noise offsets for richer watercolor
      const subBlobs = [];
      const baseR = Math.min(window.innerWidth, window.innerHeight) * 0.42;
      const COUNT = 10;
      for (let i = 0; i < COUNT; i++) {
        const angle = (i / COUNT) * Math.PI * 2 + Math.random() * 0.8;
        const dist = (0.15 + Math.random() * 0.4) * baseR;
        const rx = baseR * (0.5 + Math.random() * 0.5);
        const ry = baseR * (0.4 + Math.random() * 0.5);
        const rot = Math.random() * Math.PI;
        subBlobs.push({
          ox: Math.cos(angle) * dist,
          oy: Math.sin(angle) * dist,
          rx, ry, rot,
          alpha: 0,
          targetAlpha: 0.18 + Math.random() * 0.14,
        });
      }
      // Add a bright center flash blob
      subBlobs.push({
        ox: 0, oy: 0,
        rx: baseR * 0.25, ry: baseR * 0.25,
        rot: 0, alpha: 0,
        targetAlpha: 0.45,
        isFlash: true,
      });
      inkBlobs.push({ cx, cy, color: `${r},${g},${b}`, subBlobs, progress: 0 });
    }

    /* Render all ink blobs onto canvas */
    function paintInk() {
      if (!inkDirty) return;
      inkDirty = false;
      const w = window.innerWidth;
      const h = window.innerHeight;
      inkCtx.clearRect(0, 0, w, h);

      for (const blob of inkBlobs) {
        for (const sub of blob.subBlobs) {
          inkCtx.save();
          inkCtx.translate(blob.cx + sub.ox, blob.cy + sub.oy);
          inkCtx.rotate(sub.rot);

          const grad = inkCtx.createRadialGradient(0, 0, 0, 0, 0, sub.rx);
          grad.addColorStop(0,   `rgba(${blob.color},${sub.alpha})`);
          grad.addColorStop(0.6, `rgba(${blob.color},${sub.alpha * 0.6})`);
          grad.addColorStop(1,   `rgba(${blob.color},0)`);

          // Scale Y to make it an ellipse
          inkCtx.scale(1, sub.ry / sub.rx);
          inkCtx.beginPath();
          inkCtx.arc(0, 0, sub.rx, 0, Math.PI * 2);
          inkCtx.fillStyle = grad;
          inkCtx.fill();
          inkCtx.restore();
        }
      }
    }

    /* Animate each new blob's sub-blobs spreading in */
    function animateBlobIn(blob) {
      for (const sub of blob.subBlobs) {
        if (sub.isFlash) {
          // Flash: quick bright burst then fade to residual
          gsap.timeline()
            .to(sub, {
              alpha: sub.targetAlpha,
              duration: 0.12,
              ease: 'power2.out',
              onUpdate: () => { inkDirty = true; },
            })
            .to(sub, {
              alpha: sub.targetAlpha * 0.3,
              duration: 0.6,
              ease: 'power2.inOut',
              onUpdate: () => { inkDirty = true; },
            });
        } else {
          const delay = Math.random() * 0.2;
          gsap.to(sub, {
            alpha: sub.targetAlpha,
            duration: 0.5 + Math.random() * 0.4,
            ease: 'power2.out',
            delay,
            onUpdate: () => { inkDirty = true; },
          });
        }
      }
    }

    /* Render loop — only repaints when dirty */
    function inkLoop() {
      if (inkDirty) paintInk();
      requestAnimationFrame(inkLoop);
    }

    /* ============================================================
       BUILD TAG CLOUD
       ============================================================ */
    function buildTagCloud() {
      const cloud = document.getElementById('tag-cloud');

      ROW_LAYOUT.forEach((rowIndices, rowIdx) => {
        const row = document.createElement('div');
        row.className = 'tag-row';

        rowIndices.forEach((emotionIdx, posInRow) => {
          const emotion = EMOTIONS[emotionIdx];
          const label = document.createElement('div');
          label.className = 'emotion-label';
          label.setAttribute('role', 'button');
          label.setAttribute('aria-pressed', 'false');
          label.setAttribute('aria-label', `${emotion.ar} — ${emotion.en}`);
          label.setAttribute('tabindex', '0');
          label.style.setProperty('--label-color', emotion.color);

          label.innerHTML = `
            <span class="label-arabic">${emotion.ar}</span>
            <span class="label-english" dir="ltr">${emotion.en}</span>
          `;

          // Entrance animation: stagger by row then position
          const delay = 0.25 + rowIdx * 0.1 + posInRow * 0.05;
          gsap.from(label, {
            opacity: 0,
            y: 18,
            duration: 0.5,
            delay,
            ease: 'power3.out',
          });

          // Touch-aware tap handler — use touchend for mobile, click for desktop
          let touchHandled = false;
          label.addEventListener('touchend', e => {
            e.preventDefault();
            touchHandled = true;
            const touch = e.changedTouches[0];
            handleLabelTap(emotionIdx, label, emotion, {
              clientX: touch.clientX,
              clientY: touch.clientY,
            });
            setTimeout(() => { touchHandled = false; }, 300);
          }, { passive: false });
          label.addEventListener('click', e => {
            if (touchHandled) return; // avoid double-fire
            handleLabelTap(emotionIdx, label, emotion, e);
          });
          label.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              const rect = label.getBoundingClientRect();
              handleLabelTap(emotionIdx, label, emotion, {
                clientX: rect.left + rect.width / 2,
                clientY: rect.top + rect.height / 2,
              });
            }
          });

          row.appendChild(label);
          labelElements[emotionIdx] = label;
        });

        cloud.appendChild(row);
      });
    }

    /* ============================================================
       TAP HANDLER
       ============================================================ */
    function handleLabelTap(idx, label, emotion, event) {
      const wasSelected = selectedIndices.has(idx);

      if (!wasSelected && selectedIndices.size >= MAX_SELECTIONS) {
        // Waggle feedback
        gsap.to(label, {
          x: [-5, 5, -3, 3, 0],
          duration: 0.3,
          ease: 'none',
        });
        return;
      }

      if (wasSelected) {
        selectedIndices.delete(idx);
        label.classList.remove('selected');
        label.setAttribute('aria-pressed', 'false');
        gsap.to(label, { scale: 1, duration: 0.25, ease: 'power2.out' });
      } else {
        selectedIndices.add(idx);
        label.classList.add('selected');
        label.setAttribute('aria-pressed', 'true');

        // Scale up pulse
        gsap.timeline()
          .to(label, { scale: 1.18, duration: 0.15, ease: 'power2.out' })
          .to(label, { scale: 1.1, duration: 0.2, ease: 'power2.inOut' });

        // Drop ink at tap point
        addInkBlob(event.clientX, event.clientY, emotion.color);
        animateBlobIn(inkBlobs[inkBlobs.length - 1]);
      }

      updateNextButton();
    }

    /* ============================================================
       NEXT BUTTON
       ============================================================ */
    const btnNext = document.getElementById('btn-next');

    function updateNextButton() {
      if (selectedIndices.size > 0) {
        btnNext.classList.add('visible');
        btnNext.setAttribute('aria-disabled', 'false');
      } else {
        btnNext.classList.remove('visible');
        btnNext.setAttribute('aria-disabled', 'true');
      }
    }

    btnNext.addEventListener('click', () => {
      if (!btnNext.classList.contains('visible')) return;
      gsap.timeline()
        .to(btnNext, { scale: 0.95, duration: 0.1, ease: 'power2.in' })
        .to(btnNext, { scale: 1.04, duration: 0.15, ease: 'power2.out' })
        .to(btnNext, { scale: 1, duration: 0.1 });
    });

    /* ============================================================
       INIT
       ============================================================ */
    function init() {
      resizeInkCanvas();
      buildTagCloud();
      inkLoop();
    }

    window.addEventListener('resize', () => {
      resizeInkCanvas();
      inkDirty = true;
    });

    init();
  </script>
</body>
</html>
