name: CI Pipeline

on:
  push:
    branches: [main]
    # Smart path-based triggering: skip CI for documentation-only changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    # Smart path-based triggering: skip CI for documentation-only changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Stage 0: Detect what changed to optimize CI execution
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.filter.outputs.code }}
      tests-changed: ${{ steps.filter.outputs.tests }}
      config-changed: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'index.html'
              - 'server.js'
              - 'design-review/**'
            tests:
              - 'src/test/**'
              - 'e2e/**'
              - '**/*.test.{js,jsx,ts,tsx}'
              - 'vitest.config.js'
              - 'playwright.config.js'
              - 'playwright.config.full.js'
            config:
              - 'package*.json'
              - 'vite.config.js'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - '.github/workflows/**'

  # Stage 1: Build and validate
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Stage 2: Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

  # Stage 3: Smoke Tests — user-flow E2E (all API calls mocked, no backend needed)
  smoke-tests:
    name: Smoke Tests (User Flows)
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (chromium only for CI speed)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Stage 4: Deploy preview (Vercel, Netlify, or GitHub Pages)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.code-changed == 'true' ||
       needs.detect-changes.outputs.config-changed == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Placeholder for deployment - will add Vercel/Netlify config
      - name: Deploy to preview environment
        run: echo "Preview deployment will be configured with Vercel/Netlify"

      # Vercel handles preview comments automatically — no extra comment needed

  # Stage 5: Provide feedback on PR (upserts a single comment per PR)
  pr-feedback:
    name: PR Feedback Bot
    runs-on: ubuntu-latest
    needs: [detect-changes, build, test, smoke-tests]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post CI summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ needs.build.result }}';
            const testStatus = '${{ needs.test.result }}';
            const smokeStatus = '${{ needs.smoke-tests.result }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : s === 'skipped' ? '⏭️' : '⚠️';
            const allPassed = [buildStatus, testStatus, smokeStatus].every(s => s === 'success' || s === 'skipped');

            let body = `## CI ${allPassed ? '✅' : '❌'}\n\n`;
            body += `| Check | Status |\n|-------|--------|\n`;
            body += `| Build | ${icon(buildStatus)} ${buildStatus} |\n`;
            body += `| Unit Tests | ${icon(testStatus)} ${testStatus} |\n`;
            body += `| Smoke Tests | ${icon(smokeStatus)} ${smokeStatus} |\n`;

            const failures = [];
            if (buildStatus === 'failure') failures.push('Build');
            if (testStatus === 'failure') failures.push('Unit Tests');
            if (smokeStatus === 'failure') failures.push('Smoke Tests');

            if (failures.length > 0) {
              body += `\n**Failing:** ${failures.join(', ')} — [view logs](${process.env.RUN_URL})\n`;
            }

            body += `\n<sub>Run [#${process.env.RUN_NUMBER}](${process.env.RUN_URL}) · ${new Date().toISOString().slice(0, 16)}Z</sub>`;

            const MARKER = '<!-- ci-feedback-bot -->';
            body = MARKER + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
