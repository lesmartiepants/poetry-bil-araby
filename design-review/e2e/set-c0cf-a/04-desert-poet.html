<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoke & Ember — شعر عربي</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --charcoal: #1A1614; --ember: #E8611A; --gold: #C5A059;
    --smoke: #6B6B6B; --ash: #D4D0C8; --bg: #1A1614;
    --text: #D4D0C8; --card-bg: rgba(30, 25, 22, 0.92);
    --glow: rgba(232, 97, 26, 0.15);
    --gold-dim: rgba(197, 160, 89, 0.35);
    --speed: 0.5s;
  }
  .light {
    --bg: #F5F0E8; --text: #1A1614; --card-bg: rgba(255, 252, 245, 0.95);
    --glow: rgba(232, 97, 26, 0.1);
  }
  body {
    font-family: 'Tajawal', sans-serif; background: var(--bg);
    color: var(--text); overflow-x: hidden; transition: background var(--speed), color var(--speed);
    min-height: 100vh;
  }

  /* ============ Splash ============ */
  #splash {
    position: fixed; inset: 0; z-index: 100; display: flex;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse 60% 40% at 50% 95%, #5C2800 0%, #2A1508 30%, #0D0A08 70%);
    transition: opacity 0.8s ease-out;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Brand Logo on Splash */
  .splash-brand {
    position: relative; z-index: 10;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.5s forwards;
  }
  .splash-brand .en {
    font-family: 'Forum', serif;
    font-size: clamp(3rem, 6vw, 4.5rem);
    letter-spacing: -0.05em;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(197,160,89,0.3);
  }
  .splash-brand .ar {
    font-family: 'Reem Kufi', sans-serif;
    font-weight: 700;
    font-size: clamp(1.875rem, 4vw, 3rem);
    color: var(--ash);
    line-height: 1;
    padding-bottom: 0.15em;
  }

  .splash-subtitle {
    position: relative; z-index: 10;
    font-family: 'Amiri', serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--ash);
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
    text-align: center;
    margin-bottom: 2rem;
  }
  .splash-subtitle span { color: var(--ember); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CTA Button */
  #enterBtn {
    position: relative; z-index: 10;
    background: transparent;
    border: 1.5px solid var(--ember);
    color: var(--ember);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    padding: 0.8rem 2.5rem;
    border-radius: 8px;
    cursor: pointer;
    min-width: 44px; min-height: 44px;
    transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.8s forwards;
    display: flex; align-items: center; gap: 0.5rem;
  }
  #enterBtn:hover, #enterBtn:focus-visible {
    background: rgba(232, 97, 26, 0.15);
    box-shadow: 0 0 20px rgba(232, 97, 26, 0.25);
    transform: scale(1.04);
  }

  /* ============ Onboarding ============ */
  #onboarding {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(26, 22, 20, 0.95);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .light #onboarding { background: rgba(245, 240, 232, 0.95); }
  #onboarding.active { opacity: 1; pointer-events: auto; }

  .onboard-card {
    max-width: 380px; width: 90%;
    background: var(--card-bg);
    border: 1.5px solid var(--ember);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: transform 0.5s ease, opacity 0.5s ease;
  }
  .onboard-card .icon-wrap {
    width: 56px; height: 56px;
    margin: 0 auto 1.2rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(232, 97, 26, 0.12);
    color: var(--ember);
  }
  .onboard-card .icon-wrap svg { width: 28px; height: 28px; }
  .onboard-card h3 {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .onboard-card .subtitle {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    opacity: 0.6;
    margin-bottom: 1rem;
  }
  .onboard-card p {
    font-size: 0.88rem; line-height: 1.7; opacity: 0.85;
    margin-bottom: 0.5rem;
  }
  .onboard-card p[lang="ar"] { font-family: 'Tajawal', sans-serif; direction: rtl; }
  .onboard-card p.en-text { direction: ltr; text-align: center; font-size: 0.82rem; opacity: 0.55; }
  .onboard-dots {
    display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem;
  }
  .onboard-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(232, 97, 26, 0.25); transition: background 0.3s, transform 0.3s;
  }
  .onboard-dot.active { background: var(--ember); transform: scale(1.3); }
  .onboard-tap { font-size: 0.72rem; color: var(--smoke); margin-top: 1rem; }

  /* ============ Main App ============ */
  #app {
    max-width: 800px; margin: 0 auto; padding: 2rem 1rem 4rem;
    padding-right: 4.5rem;
    opacity: 0; transition: opacity 0.6s 0.2s;
  }
  #app.visible { opacity: 1; }

  /* ============ Controls - Vertical (Desktop) ============ */
  .controls-vertical {
    position: fixed; top: 50%; right: 0.75rem;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 0.5rem;
    z-index: 50;
  }
  .ctrl-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--card-bg);
    border: 1px solid rgba(232, 97, 26, 0.25);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.3s;
  }
  .ctrl-btn:hover, .ctrl-btn:focus-visible {
    border-color: var(--ember);
    background: rgba(232, 97, 26, 0.08);
    transform: scale(1.08);
    box-shadow: 0 0 12px rgba(232, 97, 26, 0.15);
  }
  .ctrl-btn svg { width: 20px; height: 20px; }

  /* ============ Controls - Bottom Bar (Mobile) ============ */
  .controls-bottom {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid rgba(232, 97, 26, 0.2);
    padding: 0.5rem 1rem;
    z-index: 50;
    justify-content: space-around;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .controls-bottom .ctrl-btn {
    border: none; background: transparent;
    border-radius: 8px;
  }

  /* ============ Poem Card ============ */
  .poem-card {
    background: var(--card-bg); border-radius: 16px; padding: 3rem 2.5rem;
    position: relative; overflow: hidden; margin-bottom: 2.5rem;
    box-shadow: 0 12px 40px rgba(232,97,26,0.12), 0 0 80px rgba(232,97,26,0.06);
    border: 1px solid rgba(232, 97, 26, 0.15);
    transition: box-shadow 0.3s;
  }
  .poem-card::after {
    content: ''; position: absolute; bottom: -40%; left: 10%; right: 10%; height: 80%;
    background: radial-gradient(ellipse at center bottom, rgba(232,97,26,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .poem-text {
    font-family: 'Amiri', serif; font-size: clamp(1.35rem, 3vw, 1.85rem);
    line-height: 2.4; text-align: center; position: relative; z-index: 1;
  }
  .poem-text .hemistich { display: block; margin: 0.3em 0; }
  .poem-text .separator {
    display: block; width: 40px; height: 1px;
    background: var(--ember); margin: 0.8em auto;
    opacity: 0.5;
  }
  .poet-name {
    text-align: center; margin-top: 1.8rem; font-size: 1.05rem;
    color: var(--gold); font-family: 'Amiri', serif;
    position: relative; z-index: 1;
  }
  .poet-name::before, .poet-name::after {
    content: ''; display: inline-block; width: 36px; height: 1px;
    background: var(--gold-dim); vertical-align: middle; margin: 0 0.8rem;
  }

  /* ============ Responsive ============ */
  @media (max-width: 768px) {
    #app { padding: 2rem 1rem 5rem; padding-right: 1rem; }
    .controls-vertical { display: none; }
    .controls-bottom { display: flex; }
    .poem-card { padding: 2rem 1.5rem; }
    .poem-text { font-size: 1.25rem; line-height: 2.1; }
  }
  @media (max-width: 480px) {
    .poem-card { padding: 1.5rem 1.25rem; }
  }

  /* ============ Reduced Motion ============ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    #splash { display: none !important; }
    #onboarding { display: none !important; }
    #app { opacity: 1 !important; }
  }
</style>
</head>
<body>
  <!-- ======== Splash ======== -->
  <div id="splash">
    <canvas id="splash-canvas"></canvas>
    <div class="splash-brand">
      <span class="en">poetry</span>
      <span class="ar">بالعربي</span>
    </div>
    <div class="splash-subtitle"><span>Smoke & Ember</span> — دُخانٌ وَجَمر</div>
    <button id="enterBtn" aria-label="Enter the app">
      <span>ابدأ الرحلة</span>
      <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
    </button>
  </div>

  <!-- ======== Onboarding ======== -->
  <div id="onboarding">
    <div class="onboard-card" id="onboardCard">
      <div class="icon-wrap" id="onboardIcon"></div>
      <h3 id="onboardTitle"></h3>
      <div class="subtitle" id="onboardSubtitle"></div>
      <p lang="ar" id="onboardTextAr"></p>
      <p class="en-text" id="onboardTextEn"></p>
      <div class="onboard-dots" id="onboardDots"></div>
      <div class="onboard-tap">tap to continue</div>
    </div>
  </div>

  <!-- ======== Main App ======== -->
  <main id="app">
    <!-- Vertical Controls (Desktop) -->
    <nav class="controls-vertical" aria-label="App controls">
      <button class="ctrl-btn" aria-label="Save poem"><i data-lucide="heart"></i></button>
      <button class="ctrl-btn" aria-label="Change font"><i data-lucide="type"></i></button>
      <button class="ctrl-btn" aria-label="Toggle language"><i data-lucide="languages"></i></button>
      <button class="ctrl-btn" aria-label="Poem library"><i data-lucide="book-open"></i></button>
      <button class="ctrl-btn" aria-label="Font style"><i data-lucide="italic"></i></button>
      <button class="ctrl-btn" aria-label="Sign in"><i data-lucide="log-in"></i></button>
      <button class="ctrl-btn" id="themeBtn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
    </nav>

    <!-- Bottom Controls (Mobile) -->
    <nav class="controls-bottom" aria-label="App controls">
      <button class="ctrl-btn" aria-label="Listen"><i data-lucide="music"></i></button>
      <button class="ctrl-btn" aria-label="AI insight"><i data-lucide="lightbulb"></i></button>
      <button class="ctrl-btn" aria-label="New poem"><i data-lucide="refresh-cw"></i></button>
      <button class="ctrl-btn" aria-label="Library"><i data-lucide="library"></i></button>
      <button class="ctrl-btn" aria-label="Random poem"><i data-lucide="shuffle"></i></button>
    </nav>

    <div class="poem-card">
      <div class="poem-text">
        <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
        <span class="separator"></span>
        <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
      </div>
      <div class="poet-name">أحمد شوقي</div>
    </div>
  </main>

<script>
(function() {
  'use strict';

  /* ---- Canvas Smoke & Embers ---- */
  var canvas = document.getElementById('splash-canvas');
  var ctx = canvas.getContext('2d');
  var isMobile = window.innerWidth < 600;
  var SMOKE_COUNT = isMobile ? 20 : 40;
  var EMBER_COUNT = isMobile ? 10 : 20;
  var W, H, particles = [], raf;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createSmoke(layer) {
    var p = {
      type: 'smoke', layer: layer,
      x: 0, y: 0, originX: 0,
      size: 0, speedY: 0, alpha: 0, maxAlpha: 0,
      life: 0, maxLife: 0,
      cpOffset1: 0, cpOffset2: 0
    };
    resetSmoke(p);
    return p;
  }

  function resetSmoke(p) {
    p.originX = W * 0.5 + (Math.random() - 0.5) * W * 0.15;
    p.x = p.originX;
    p.y = H + Math.random() * 20;
    p.size = p.layer === 0 ? 30 + Math.random() * 50 : 10 + Math.random() * 25;
    p.speedY = p.layer === 0 ? -(0.3 + Math.random() * 0.5) : -(0.6 + Math.random() * 1.0);
    p.alpha = 0;
    p.maxAlpha = p.layer === 0 ? 0.06 + Math.random() * 0.08 : 0.08 + Math.random() * 0.12;
    p.life = 0;
    p.maxLife = 200 + Math.random() * 200;
    p.cpOffset1 = (Math.random() - 0.5) * 100;
    p.cpOffset2 = (Math.random() - 0.5) * 140;
  }

  function updateSmoke(p) {
    p.life++;
    var t = p.life / p.maxLife;
    var mt = 1 - t;
    var mt2 = mt * mt;
    var mt3 = mt2 * mt;
    var t2 = t * t;
    var t3 = t2 * t;
    p.x = mt3 * p.originX
      + 3 * mt2 * t * (p.originX + p.cpOffset1)
      + 3 * mt * t2 * (p.originX + p.cpOffset2)
      + t3 * (p.originX + p.cpOffset2 * 1.2);
    p.y += p.speedY;
    if (t < 0.15) p.alpha = p.maxAlpha * (t / 0.15);
    else if (t > 0.55) p.alpha = p.maxAlpha * (1 - (t - 0.55) / 0.45);
    else p.alpha = p.maxAlpha;
    p.size += 0.04;
    if (p.life >= p.maxLife || p.y < -p.size) resetSmoke(p);
  }

  function drawSmoke(p) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.layer === 0 ? '#3A3530' : '#5A5550';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function createEmber() {
    var e = {
      type: 'ember',
      x: 0, y: 0, size: 0, speedY: 0, driftX: 0,
      alpha: 1, life: 0, maxLife: 0, hue: 0
    };
    resetEmber(e);
    return e;
  }

  function resetEmber(e) {
    e.x = W * 0.5 + (Math.random() - 0.5) * W * 0.1;
    e.y = H - 20 - Math.random() * 40;
    e.size = 1.5 + Math.random() * 3;
    e.speedY = -(1 + Math.random() * 2);
    e.driftX = (Math.random() - 0.5) * 1.2;
    e.alpha = 1;
    e.life = 0;
    e.maxLife = 100 + Math.random() * 150;
    e.hue = Math.random() > 0.5 ? 25 : 40;
  }

  function updateEmber(e) {
    e.life++;
    var t = e.life / e.maxLife;
    e.y += e.speedY;
    e.x += e.driftX + Math.sin(e.life * 0.04) * 0.3;
    e.speedY *= 0.998;
    var pulse = 0.7 + 0.3 * Math.sin(e.life * 0.2);
    e.alpha = Math.max(0, (1 - t) * pulse);
    if (e.life >= e.maxLife || e.y < 0) resetEmber(e);
  }

  function drawEmber(e) {
    ctx.save();
    ctx.globalAlpha = e.alpha;
    var grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size * 2.5);
    grad.addColorStop(0, e.hue === 25 ? '#E8611A' : '#C5A059');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = Math.min(1, e.alpha * 1.3);
    ctx.fillStyle = '#FFD59A';
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  var i;
  for (i = 0; i < Math.floor(SMOKE_COUNT / 2); i++) {
    var s = createSmoke(0);
    s.life = Math.floor(Math.random() * s.maxLife);
    particles.push(s);
  }
  for (i = 0; i < Math.ceil(SMOKE_COUNT / 2); i++) {
    var s2 = createSmoke(1);
    s2.life = Math.floor(Math.random() * s2.maxLife);
    particles.push(s2);
  }
  for (i = 0; i < EMBER_COUNT; i++) {
    var em = createEmber();
    em.life = Math.floor(Math.random() * em.maxLife);
    particles.push(em);
  }

  particles.sort(function(a, b) {
    if (a.type === 'smoke' && b.type === 'smoke') return a.layer - b.layer;
    if (a.type === 'smoke' && b.type === 'ember') return -1;
    if (a.type === 'ember' && b.type === 'smoke') return 1;
    return 0;
  });

  function animate() {
    ctx.clearRect(0, 0, W, H);
    var glow = ctx.createRadialGradient(W / 2, H, 0, W / 2, H, H * 0.55);
    glow.addColorStop(0, 'rgba(92, 40, 0, 0.4)');
    glow.addColorStop(0.35, 'rgba(42, 21, 8, 0.15)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    for (var j = 0; j < particles.length; j++) {
      var p = particles[j];
      if (p.type === 'smoke') { updateSmoke(p); drawSmoke(p); }
      else { updateEmber(p); drawEmber(p); }
    }
    raf = requestAnimationFrame(animate);
  }

  /* ---------- Onboarding data ---------- */
  var onboardSteps = [
    {
      icon: 'search',
      titleAr: 'اختر الشاعر',
      subtitle: 'Choose a Poet',
      textAr: 'تصفّح مجموعة واسعة من الشعراء العرب الكلاسيكيين والمعاصرين',
      textEn: 'Browse a vast collection of classical and contemporary Arab poets'
    },
    {
      icon: 'book-open',
      titleAr: 'استكشف القصائد',
      subtitle: 'Explore Poems',
      textAr: 'اقرأ القصائد بتنسيق جميل مع شرح للأبيات ومعاني المفردات',
      textEn: 'Read poems with beautiful formatting and vocabulary explanations'
    },
    {
      icon: 'headphones',
      titleAr: 'استمع للإلقاء',
      subtitle: 'Listen to Recitation',
      textAr: 'استمتع بالإلقاء الصوتي للقصائد بأصوات مميّزة تنبض بالحياة',
      textEn: 'Enjoy AI-powered poetry recitation that brings verses to life'
    }
  ];
  var currentStep = 0;

  function showOnboardStep(idx) {
    var step = onboardSteps[idx];
    var iconWrap = document.getElementById('onboardIcon');
    while (iconWrap.firstChild) iconWrap.removeChild(iconWrap.firstChild);
    var iconEl = document.createElement('i');
    iconEl.setAttribute('data-lucide', step.icon);
    iconWrap.appendChild(iconEl);

    document.getElementById('onboardTitle').textContent = step.titleAr;
    document.getElementById('onboardSubtitle').textContent = step.subtitle;
    document.getElementById('onboardTextAr').textContent = step.textAr;
    document.getElementById('onboardTextEn').textContent = step.textEn;

    var dotsContainer = document.getElementById('onboardDots');
    while (dotsContainer.firstChild) dotsContainer.removeChild(dotsContainer.firstChild);
    for (var d = 0; d < onboardSteps.length; d++) {
      var dot = document.createElement('span');
      dot.className = 'onboard-dot' + (d === idx ? ' active' : '');
      dotsContainer.appendChild(dot);
    }

    lucide.createIcons({ nodes: [iconWrap] });
  }

  function advanceOnboard() {
    currentStep++;
    if (currentStep >= onboardSteps.length) {
      document.getElementById('onboarding').classList.remove('active');
      document.getElementById('app').classList.add('visible');
    } else {
      showOnboardStep(currentStep);
    }
  }

  /* ---------- Splash -> Onboarding ---------- */
  function enterApp() {
    cancelAnimationFrame(raf);
    var splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(function() {
      splash.style.display = 'none';
      document.getElementById('onboarding').classList.add('active');
      showOnboardStep(0);
    }, 800);
  }

  /* ---------- init ---------- */
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!prefersReduced) {
    animate();
  } else {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').classList.add('visible');
  }

  document.getElementById('enterBtn').addEventListener('click', enterApp);
  document.getElementById('onboardCard').addEventListener('click', advanceOnboard);

  /* ---------- Theme Toggle ---------- */
  var themeBtn = document.getElementById('themeBtn');
  themeBtn.addEventListener('click', function() {
    document.body.classList.toggle('light');
    var isLight = document.body.classList.contains('light');
    var icon = themeBtn.querySelector('i');
    if (icon) {
      icon.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
      lucide.createIcons({ nodes: [themeBtn] });
    }
    themeBtn.setAttribute('aria-label',
      isLight ? 'Switch to dark theme' : 'Switch to light theme');
  });

  /* ---------- Lucide icons init ---------- */
  lucide.createIcons();
})();
</script>
</body>
