name: Design Review DB Integration

# Runs on every PR push to main.
# Connects directly to the production Supabase database and runs integration
# tests to confirm the persist-to-DB feature works on this PR.
# Tables are expected to already exist (migration is tested separately on deploy to main).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  integration:
    name: Design Review — Real DB API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Run integration tests against the real Supabase DB ────────────────
      - name: Run design review integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # GitHub Actions runners have IPv6 disabled. Supabase hostnames resolve to IPv6
          # first, causing ENETUNREACH. Force Node.js DNS to prefer IPv4.
          NODE_OPTIONS: --dns-result-order=ipv4first

      # ── Report outcome on the PR ──────────────────────────────────────────
      - name: Post success comment to PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ✅ Design Review DB Integration\n\n' +
                    '**All integration tests passed against real Supabase DB**\n\n' +
                    '- Items sync ✓\n' +
                    '- Session create ✓\n' +
                    '- Verdict submit ✓\n' +
                    '- Session complete ✓\n' +
                    '- Summary & history read-back ✓\n\n' +
                    '**Persist-to-DB feature confirmed working on this PR** 🎉'
            });

      - name: Post failure comment to PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Design Review DB Integration\n\n' +
                    '**Integration tests failed** — see logs for details.\n\n' +
                    `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
