<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Scroll - Vertical Controls</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --black: #000; --white: #fff; --gold: #C5A059;
    --gold-soft: #d4b574; --gold-dim: rgba(197,160,89,0.15);
    --bg: #000; --text: #e8e8e8;
    --card-bg: #0a0a0a; --card-border: rgba(197,160,89,0.12);
  }
  .light { --bg: #fff; --text: #1a1a1a; --card-bg: #f5f5f5; --card-border: rgba(197,160,89,0.2); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden; transition: background 0.5s, color 0.5s;
  }

  /* Particle Canvas */
  #particleCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

  /* Main App */
  #app {
    display: block; min-height: 100vh; padding: 2rem 1.25rem 6rem;
    padding-right: 5rem; position: relative; z-index: 1;
  }
  .app-inner { max-width: 520px; margin: 0 auto; position: relative; }

  .app-brand { display: flex; align-items: flex-end; gap: 0.4rem; margin-bottom: 2rem; user-select: none; }
  .app-brand .en { font-family: 'Forum', serif; font-size: 1.5rem; color: var(--gold); line-height: 1; }
  .app-brand .ar { font-family: 'Reem Kufi', sans-serif; font-weight: 700; font-size: 1rem; color: var(--gold-soft); line-height: 1.2; }

  /* Poem Card */
  .poem-card {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px;
    padding: 2.5rem 2rem; margin-bottom: 1.5rem; position: relative; overflow: visible;
    box-shadow: 8px 8px 16px rgba(0,0,0,0.4), -4px -4px 12px rgba(30,30,30,0.3);
  }
  .light .poem-card {
    box-shadow: 8px 8px 16px rgba(0,0,0,0.08), -4px -4px 12px rgba(255,255,255,0.6);
  }
  .poem-card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .poem-content { text-align: center; padding: 1rem 0; }
  .bayt { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .hemistich { font-family: 'Amiri', serif; font-size: clamp(1.25rem, 4vw, 1.7rem); line-height: 2.2; flex: 1; min-width: 120px; }
  .hemistich:first-child { text-align: left; }
  .hemistich:last-child { text-align: right; }
  .bayt-sep { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; box-shadow: 0 0 8px rgba(197,160,89,0.4); }

  .poet-name {
    font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: 500;
    color: var(--gold); text-align: center; margin-top: 1.25rem; padding-top: 1.25rem;
    border-top: 1px solid var(--card-border);
  }

  /* Translation row */
  .translation-row {
    display: none; font-family: 'Tajawal', sans-serif; font-size: 14px;
    opacity: 0.6; text-align: center; padding: 8px 0; direction: ltr;
  }
  .translation-row.visible { display: block; }

  /* Inline transliteration */
  .verse-translit {
    display: none; font-family: 'Tajawal', sans-serif; font-size: 12px;
    opacity: 0.4; font-style: italic; direction: ltr;
    text-align: center; margin-top: 2px;
  }
  .verse-translit.visible { display: block; }

  /* ===== BOTTOM ACTION BAR ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; justify-content: space-around; align-items: center;
    height: calc(64px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: transparent; direction: ltr;
  }
  .nav-item {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: none;
    color: rgba(197,160,89,0.3); cursor: pointer;
    transition: all 0.3s ease; border-radius: 50%; position: relative;
  }
  .nav-item::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle, rgba(197,160,89,0) 0%, rgba(197,160,89,0) 100%);
    transition: background 0.3s ease;
  }
  .nav-item:hover { color: var(--gold); }
  .nav-item:hover::before { background: radial-gradient(circle, rgba(197,160,89,0.15) 0%, transparent 70%); }

  /* Settings */
  .settings-panel {
    display: none; position: fixed; right: 64px; top: 50%; transform: translateY(-50%);
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px;
    padding: 16px; z-index: 59; box-shadow: 0 4px 24px rgba(0,0,0,0.4); width: 180px;
    font-size: 13px; backdrop-filter: blur(12px);
  }
  .settings-panel.visible { display: block; }
  .settings-panel h4 { margin-bottom: 8px; color: var(--gold); }
  .settings-panel label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; opacity: 0.8; }

  /* ===== VERTICAL CONTROLS: Particle Column ===== */
  .vc-strip {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    z-index: 60; display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 52px; padding: 12px 4px;
    background: rgba(10,10,10,0.4);
    border-radius: 16px 0 0 16px;
    border: 1px solid var(--card-border);
    border-right: none;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: -2px 0 16px rgba(0,0,0,0.2);
  }
  .light .vc-strip { background: rgba(245,245,245,0.5); }

  .vc-toggle {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: none; border-radius: 50%;
    cursor: pointer; color: var(--gold-soft); opacity: 0.5;
    transition: all 0.35s ease; position: relative;
  }

  /* Particle cluster glow ring */
  .vc-toggle::before {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 1px solid rgba(197,160,89,0.1); transition: all 0.35s;
  }
  .vc-toggle::after {
    content: ''; position: absolute; width: 4px; height: 4px;
    border-radius: 50%; background: var(--gold); opacity: 0;
    box-shadow: 0 0 8px rgba(197,160,89,0.5);
    top: -2px; right: -2px; transition: all 0.35s;
  }

  .vc-toggle:hover {
    opacity: 1; transform: scale(1.1);
  }
  .vc-toggle:hover::before { border-color: rgba(197,160,89,0.3); box-shadow: 0 0 12px rgba(197,160,89,0.15); }
  .vc-toggle:hover::after { opacity: 0.6; }

  /* Active: ignited cluster */
  .vc-toggle.active {
    opacity: 1; color: var(--gold);
  }
  .vc-toggle.active::before {
    border-color: var(--gold); box-shadow: 0 0 16px rgba(197,160,89,0.3);
  }
  .vc-toggle.active::after {
    opacity: 1; box-shadow: 0 0 12px rgba(197,160,89,0.6), 0 0 24px rgba(197,160,89,0.3);
    animation: particleOrbit 3s linear infinite;
  }

  @keyframes particleOrbit {
    0% { transform: rotate(0deg) translateX(18px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(18px) rotate(-360deg); }
  }

  .vc-toggle i { width: 18px; height: 18px; position: relative; z-index: 1; }
  .vc-badge {
    position: absolute; top: 0; right: 0; z-index: 2;
    font-family: 'Tajawal', sans-serif; font-size: 8px; font-weight: 700;
    color: var(--black); background: var(--gold);
    padding: 1px 3px; border-radius: 3px; line-height: 1.2;
  }

  @media (max-width: 768px) {
    #app { padding: 2rem 1rem 100px; padding-right: 52px; }
    .poem-card { padding: 2rem 1.5rem; }
    .bayt { gap: 0.75rem; }
    .vc-strip { width: 44px; }
    .vc-toggle { width: 36px; height: 36px; }
    .settings-panel { right: 50px; width: 160px; }
    .nav-item { width: 44px; height: 44px; }
    .verse-translit { font-size: 11px; }
  }
  @media (max-width: 480px) {
    #app { padding-right: 48px; }
    .vc-strip { width: 40px; }
    .vc-toggle { width: 34px; height: 34px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    #particleCanvas { display: none; }
  }
</style>
</head>
<body>

<canvas id="particleCanvas" aria-hidden="true"></canvas>

<div id="app">
  <div class="app-inner">
    <div class="app-brand">
      <span class="en">poetry</span>
      <span class="ar">بالعربي</span>
    </div>

    <div class="poem-card">
      <div class="poem-content">
        <div class="bayt">
          <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
          <span class="bayt-sep"></span>
          <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
        </div>
        <div class="verse-translit">Ana al-bahru fi ahsha'ihi al-durru kaminun</div>
        <div class="verse-translit">fa-hal sa'alu al-ghawwasa an sadafati</div>
      </div>
      <div class="translation-row" id="translationRow">
        I am the sea, in whose depths pearls lie hidden / Have they asked the diver about my shells?
      </div>
      <div class="poet-name">احمد شوقي</div>
    </div>
  </div>

  <!-- Bottom Action Bar -->
  <nav class="bottom-nav">
    <button class="nav-item" aria-label="Next poem"><i data-lucide="shuffle" style="width:20px;height:20px"></i></button>
    <button class="nav-item" aria-label="Save poem"><i data-lucide="heart" style="width:20px;height:20px"></i></button>
    <button class="nav-item" aria-label="Listen"><i data-lucide="headphones" style="width:20px;height:20px"></i></button>
    <button class="nav-item" aria-label="Share"><i data-lucide="share-2" style="width:20px;height:20px"></i></button>
  </nav>

  <!-- Vertical Controls: Particle Column -->
  <nav class="vc-strip" aria-label="Toggle controls">
    <button class="vc-toggle" data-action="translation" aria-label="Toggle translation">
      <span style="font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;line-height:1;letter-spacing:-0.5px">ع<span style="opacity:0.4">|</span>A</span>
    </button>
    <button class="vc-toggle" data-action="transliteration" aria-label="Toggle transliteration">
      <i data-lucide="text-cursor-input"></i>
    </button>
    <button class="vc-toggle" data-action="textsize" aria-label="Cycle text size">
      <i data-lucide="type"></i>
      <span class="vc-badge">M</span>
    </button>
    <button class="vc-toggle" data-action="settings" aria-label="Toggle settings">
      <i data-lucide="settings"></i>
    </button>
  </nav>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <h4>Settings</h4>
    <label><input type="checkbox"> Light mode</label>
    <label><input type="checkbox"> Tashkeel</label>
    <label><input type="checkbox" checked> Animations</label>
  </div>
</div>

<script>
(function() {
  'use strict';

  document.querySelectorAll('.vc-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var action = btn.dataset.action;
      if (action === 'textsize') {
        var sizes = ['S','M','L','XL'];
        var badge = btn.querySelector('.vc-badge');
        var idx = sizes.indexOf(badge.textContent);
        idx = (idx + 1) % sizes.length;
        badge.textContent = sizes[idx];
        document.querySelector('.poem-content').style.fontSize =
          {'S':'1rem','M':'1.25rem','L':'1.5rem','XL':'2rem'}[sizes[idx]];
      } else if (action === 'translation') {
        btn.classList.toggle('active');
        document.getElementById('translationRow').classList.toggle('visible');
      } else if (action === 'transliteration') {
        btn.classList.toggle('active');
        document.querySelectorAll('.verse-translit').forEach(function(el) { el.classList.toggle('visible'); });
      } else if (action === 'settings') {
        btn.classList.toggle('active');
        document.getElementById('settingsPanel').classList.toggle('visible');
      } else {
        btn.classList.toggle('active');
      }
    });
  });

  /* Ambient particles */
  var canvas = document.getElementById('particleCanvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var isMobile = window.innerWidth <= 768;
  var count = isMobile ? 25 : 50;
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.4 + 0.1
    });
  }

  function animate() {
    if (reduced) return;
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(197,160,89,' + p.alpha + ')';
      ctx.fill();
    }
  }
  animate();

  lucide.createIcons();
})();
</script>
</body>
</html>
