name: CI Pipeline

on:
  push:
    branches: [main]
    # Smart path-based triggering: skip CI for documentation-only changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    # Smart path-based triggering: skip CI for documentation-only changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Stage 0: Detect what changed to optimize CI execution
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.filter.outputs.code }}
      tests-changed: ${{ steps.filter.outputs.tests }}
      config-changed: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'index.html'
              - 'server.js'
              - 'design-review/**'
            tests:
              - 'src/test/**'
              - 'e2e/**'
              - '**/*.test.{js,jsx,ts,tsx}'
              - 'vitest.config.js'
              - 'playwright.config.js'
              - 'playwright.config.full.js'
            config:
              - 'package*.json'
              - 'vite.config.js'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - '.github/workflows/**'

  # Stage 1: Build and validate
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: detect-changes
    # Always run build on code, config, or test changes
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Stage 2: Test suite (will grow as project evolves)
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run unit tests if code or tests changed
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Stage 3: E2E Testing with Playwright (Critical browsers only)
  e2e-tests:
    name: E2E Tests (Chrome Desktop + Mobile)
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run E2E tests if code, E2E tests, or relevant config changed
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 5

    # PostgreSQL service for database integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qafiyah_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (chromium only for CI speed)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Setup PostgreSQL schema (for database tests)
        run: |
          # Create minimal schema for CI tests (full import is 118MB, skipped in CI)
          echo "Creating minimal CI test schema..."
          PGPASSWORD=postgres psql -h localhost -U postgres -d qafiyah_test <<'EOSQL'
          -- Minimal schema matching production structure
          CREATE TABLE IF NOT EXISTS poets (
            id SERIAL PRIMARY KEY,
            name TEXT NOT NULL UNIQUE
          );
          CREATE TABLE IF NOT EXISTS poems (
            id SERIAL PRIMARY KEY,
            title TEXT,
            content TEXT,
            poet_id INTEGER REFERENCES poets(id),
            theme TEXT
          );
          -- Insert a test poet and poem for E2E tests
          INSERT INTO poets (name) VALUES ('Test Poet') ON CONFLICT DO NOTHING;
          INSERT INTO poems (title, content, poet_id, theme)
          VALUES ('Test Poem', 'بيت شعري للاختبار', 1, 'test');
          EOSQL
          echo "Loading auth and user features..."
          PGPASSWORD=postgres psql -h localhost -U postgres -d qafiyah_test -f supabase/migrations/20260119000000_auth_and_user_features.sql 2>/dev/null || true
          echo "Loading design review tables..."
          PGPASSWORD=postgres psql -h localhost -U postgres -d qafiyah_test -f supabase/migrations/20260220_create_design_review_tables.sql
          echo "Database schema loaded successfully"
        continue-on-error: true

      - name: Start backend API server (background)
        run: |
          # Start backend server in background for E2E tests
          npm run dev:server &
          echo "Backend server starting on http://localhost:3001"
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/api/health > /dev/null 2>&1 && echo "Server ready" && break
            echo "Waiting for server... ($i/15)" && sleep 1
          done
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: qafiyah_test
          PGHOST: localhost
          PGPORT: 5432
          PORT: 3001
        continue-on-error: true

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true
          VITE_API_URL: http://localhost:3001

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-e2e
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Stage 4: UI/UX Quality Checks (Chrome only)
  ui-ux-tests:
    name: UI/UX Design Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run UI/UX tests if code or relevant tests changed
    if: |
      needs.detect-changes.outputs.code-changed == 'true' ||
      needs.detect-changes.outputs.tests-changed == 'true' ||
      needs.detect-changes.outputs.config-changed == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache-ui
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache-ui.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache-ui.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run UI/UX tests
        run: npm run test:e2e:ui
        env:
          CI: true

      - name: Upload UI/UX test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ux-report
          path: playwright-report/
          retention-days: 14

      - name: Upload UI/UX screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ux-screenshots
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Stage 5: Deploy preview (Vercel, Netlify, or GitHub Pages)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only deploy preview if code or config changed (not just test changes)
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.code-changed == 'true' ||
       needs.detect-changes.outputs.config-changed == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Placeholder for deployment - will add Vercel/Netlify config
      - name: Deploy to preview environment
        run: echo "Preview deployment will be configured with Vercel/Netlify"

      # Vercel handles preview comments automatically — no extra comment needed

  # Stage 6: Provide feedback on PR (upserts a single comment per PR)
  pr-feedback:
    name: PR Feedback Bot
    runs-on: ubuntu-latest
    needs: [detect-changes, build, test, e2e-tests, ui-ux-tests]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post CI summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ needs.build.result }}';
            const testStatus = '${{ needs.test.result }}';
            const e2eStatus = '${{ needs.e2e-tests.result }}';
            const uiUxStatus = '${{ needs.ui-ux-tests.result }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : s === 'skipped' ? '⏭️' : '⚠️';
            const allPassed = [buildStatus, testStatus, e2eStatus, uiUxStatus].every(s => s === 'success' || s === 'skipped');

            // Build compact body — expand details only on failure
            let body = `## CI ${allPassed ? '✅' : '❌'}\n\n`;
            body += `| Check | Status |\n|-------|--------|\n`;
            body += `| Build | ${icon(buildStatus)} ${buildStatus} |\n`;
            body += `| Unit Tests | ${icon(testStatus)} ${testStatus} |\n`;
            body += `| E2E Tests | ${icon(e2eStatus)} ${e2eStatus} |\n`;
            body += `| UI/UX Tests | ${icon(uiUxStatus)} ${uiUxStatus} |\n`;

            // Only show action items when something failed
            const failures = [];
            if (buildStatus === 'failure') failures.push('Build');
            if (testStatus === 'failure') failures.push('Unit Tests');
            if (e2eStatus === 'failure') failures.push('E2E Tests');
            if (uiUxStatus === 'failure') failures.push('UI/UX Tests');

            if (failures.length > 0) {
              body += `\n**Failing:** ${failures.join(', ')} — [view logs](${process.env.RUN_URL})\n`;
            }

            body += `\n<sub>Run [#${process.env.RUN_NUMBER}](${process.env.RUN_URL}) · ${new Date().toISOString().slice(0, 16)}Z</sub>`;

            // Upsert: find existing bot comment and update it, or create one
            const MARKER = '<!-- ci-feedback-bot -->';
            body = MARKER + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
