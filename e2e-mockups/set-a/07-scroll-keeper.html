<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2E #7: Scroll Keeper — Physical Unroll</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --parchment: #e8dcc4;
  --paper: #d4c4a8;
  --wood: #3d3428;
  --ink: #1a1512;
  --ink-dim: rgba(26, 21, 18, 0.5);
  --gold: #C5A059;
  --shadow: rgba(0, 0, 0, 0.15);
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.dark {
  --parchment: #1a1512;
  --paper: #0c0c0e;
  --wood: #e8dcc4;
  --ink: #e8dcc4;
  --ink-dim: rgba(232, 220, 196, 0.5);
  --shadow: rgba(0, 0, 0, 0.3);
}
html {
  font-family: var(--font-ui);
  background: var(--paper);
  color: var(--ink);
}
body { min-height: 100vh; }

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 8px;
  border: 2px solid var(--wood);
  background: var(--parchment);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  font-size: 20px;
  box-shadow: 0 4px 12px var(--shadow);
}
.theme-toggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px var(--shadow);
}

canvas#texture {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
}

.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
}

/* SPLASH */
#splash {
  background: var(--paper);
}
.scroll-container {
  max-width: 700px;
  width: 100%;
  background: var(--parchment);
  border: 8px solid var(--wood);
  border-radius: 4px;
  padding: 64px 48px;
  box-shadow: 0 20px 60px var(--shadow);
  animation: scrollUnroll 1.5s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform, clip-path;
}
@keyframes scrollUnroll {
  from {
    opacity: 0;
    transform: scaleY(0.1);
    clip-path: inset(48% 0 48% 0);
  }
  to {
    opacity: 1;
    transform: scaleY(1);
    clip-path: inset(0 0 0 0);
  }
}

.scroll-title {
  font-family: var(--font-ar);
  font-size: clamp(3rem, 8vw, 4.5rem);
  font-weight: 700;
  color: var(--ink);
  text-align: center;
  margin-bottom: 16px;
  animation: fadeIn 1s 0.6s backwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.scroll-subtitle {
  font-size: 13px;
  color: var(--ink-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 48px;
  animation: fadeIn 1s 0.8s backwards;
}

.scroll-btn {
  display: block;
  margin: 0 auto;
  padding: 16px 48px;
  min-width: 44px;
  min-height: 44px;
  background: var(--wood);
  color: var(--parchment);
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px var(--shadow);
  animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s backwards;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
.scroll-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px var(--shadow);
}

/* MAIN */
#main {
  background: var(--paper);
  display: none;
  padding: 40px 24px;
}
.main-layout {
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.main-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding: 16px 24px;
  background: var(--parchment);
  border: 4px solid var(--wood);
  border-radius: 8px;
  box-shadow: 0 4px 12px var(--shadow);
}
.main-brand {
  font-family: var(--font-ar);
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
}

.poem-scroll {
  background: var(--parchment);
  border: 4px solid var(--wood);
  border-radius: 4px;
  padding: 48px;
  margin-bottom: 24px;
  box-shadow: 0 8px 24px var(--shadow);
  transition: all 0.3s ease;
}
.poem-scroll:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px var(--shadow);
}

.poem-text {
  font-family: var(--font-ar);
  font-size: 32px;
  line-height: 2.2;
  color: var(--ink);
  text-align: right;
  direction: rtl;
  margin-bottom: 32px;
}
.poem-author {
  font-size: 14px;
  color: var(--gold);
  text-align: left;
  font-weight: 600;
}

.scandi-btn {
  padding: 14px 40px;
  min-width: 44px;
  min-height: 44px;
  background: var(--wood);
  color: var(--parchment);
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px var(--shadow);
}
.scandi-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px var(--shadow);
}

@media (max-width: 768px) {
  .scroll-container {
    padding: 48px 32px;
    border-width: 4px;
  }
  .scroll-title { font-size: 3rem; }
  .poem-scroll { padding: 32px 24px; }
  .poem-text {
    font-size: 24px;
    line-height: 2;
  }
  .theme-toggle {
    width: 44px;
    height: 44px;
    top: 16px;
    right: 16px;
  }
  .label {
    font-size: 8px;
    top: 16px;
    left: 16px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
  <canvas id="texture"></canvas>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">🌙</span>
  </button>

  <div class="screen" id="splash">
    <div class="label">Scroll Keeper</div>
    <div class="scroll-container">
      <h1 class="scroll-title">قافية</h1>
      <p class="scroll-subtitle">Ancient Scrolls, Modern Reading</p>
      <button class="scroll-btn" onclick="showMain()">Unroll</button>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="main-layout">
      <nav class="main-nav">
        <div class="main-brand">قافية</div>
      </nav>

      <div class="poem-scroll">
        <div class="poem-text" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="poem-author">— أحمد شوقي</div>
      </div>

      <button class="scandi-btn">Next Scroll</button>
    </div>
  </div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  html.classList.toggle('dark');
  icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}

function showMain() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

// Paper texture
const canvas = document.getElementById('texture');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

for (let i = 0; i < 200; i++) {
  ctx.fillStyle = `rgba(61, 52, 40, ${Math.random() * 0.05})`;
  ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
}
</script>
</body>
</html>
