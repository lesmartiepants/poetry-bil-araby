<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2E #1: Ethereal Gold — Luxury Mystical</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #C5A059;
  --gold-light: #d4af6a;
  --gold-glow: rgba(197, 160, 89, 0.35);
  --bg: #0c0c0e;
  --bg2: #12111a;
  --text: #FDFCF8;
  --text-dim: rgba(253, 252, 248, 0.5);
  --indigo: #4F46E5;
  --indigo-glow: rgba(79, 70, 229, 0.25);
  --radius: 16px;
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.light {
  --bg: #FDFCF8;
  --bg2: #f5f0e8;
  --text: #0c0c0e;
  --text-dim: rgba(12, 12, 14, 0.5);
  --gold-glow: rgba(197, 160, 89, 0.2);
  --indigo-glow: rgba(79, 70, 229, 0.15);
}
html {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
  overflow-x: hidden;
}
body { min-height: 100vh; }

/* Theme Toggle */
.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: rgba(197, 160, 89, 0.1);
  backdrop-filter: blur(12px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  font-size: 20px;
}
.theme-toggle:hover {
  background: rgba(197, 160, 89, 0.2);
  transform: scale(1.1) rotate(15deg);
}

/* Particles Canvas */
canvas#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.6;
}

/* Screen Base */
.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
}
.screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 40%, var(--indigo-glow), transparent 55%),
              radial-gradient(circle at 70% 60%, var(--gold-glow), transparent 50%);
  opacity: 0.4;
  animation: pulseGrad 18s ease-in-out infinite alternate;
  pointer-events: none;
  will-change: transform, opacity;
}
@keyframes pulseGrad {
  0% { opacity: 0.3; transform: scale(1); }
  100% { opacity: 0.5; transform: scale(1.08); }
}

.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.6;
}

/* SPLASH SCREEN */
#splash {
  background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
}
.splash-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
  max-width: 680px;
  animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  display: flex;
  flex-direction: row-reverse;
  align-items: flex-end;
  justify-content: center;
  gap: 20px;
  margin-bottom: 56px;
}
.logo-ar {
  font-family: var(--font-ar);
  font-size: clamp(3rem, 8vw, 4.5rem);
  font-weight: 700;
  color: var(--text);
  animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
}
.logo-en {
  font-size: clamp(2.5rem, 7vw, 5.25rem);
  font-weight: 200;
  color: var(--text);
  letter-spacing: -0.04em;
  text-transform: lowercase;
  animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
}
@keyframes floatIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.tagline {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5em;
  background: linear-gradient(90deg, var(--indigo), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 64px;
  font-weight: 600;
  animation: fadeIn 1s 0.6s backwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.enter-btn {
  display: inline-block;
  padding: 18px 56px;
  min-width: 44px;
  min-height: 44px;
  border: 2px solid var(--gold);
  background: linear-gradient(135deg, rgba(197, 160, 89, 0.12), rgba(197, 160, 89, 0.04));
  color: var(--gold);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.35em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px rgba(197, 160, 89, 0.08);
  text-decoration: none;
  border-radius: 2px;
  animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s backwards;
  will-change: transform, box-shadow;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
.enter-btn:hover {
  background: linear-gradient(135deg, rgba(197, 160, 89, 0.28), rgba(197, 160, 89, 0.12));
  box-shadow: 0 0 50px var(--gold-glow), 0 8px 24px rgba(197, 160, 89, 0.2);
  transform: translateY(-3px);
}

.hint {
  margin-top: 40px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  animation: fadeIn 1s 1s backwards;
}

/* MAIN APP */
#main {
  background: var(--bg);
  display: none;
}
.main-layout {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 900px;
  padding: 32px 24px;
  min-height: 100vh;
}
.main-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  margin-bottom: 24px;
}
.main-brand {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}

.poem-card {
  background: rgba(197, 160, 89, 0.05);
  border: 1px solid rgba(197, 160, 89, 0.2);
  border-radius: var(--radius);
  padding: 40px;
  margin-bottom: 24px;
  transition: all 0.3s ease;
}
.poem-card:hover {
  border-color: var(--gold);
  box-shadow: 0 8px 32px var(--gold-glow);
  transform: translateY(-2px);
}

.poem-text {
  font-family: var(--font-ar);
  font-size: 28px;
  line-height: 2;
  color: var(--text);
  text-align: right;
  direction: rtl;
  margin-bottom: 24px;
}
.poem-poet {
  font-size: 14px;
  color: var(--gold);
  text-align: left;
  font-weight: 600;
}

.btn-next {
  padding: 14px 40px;
  min-width: 44px;
  min-height: 44px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-next:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 20px var(--gold-glow);
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .logo-ar { font-size: 3rem; }
  .logo-en { font-size: 2.5rem; }
  .enter-btn {
    padding: 16px 40px;
    font-size: 11px;
    letter-spacing: 0.25em;
  }
  .splash-content { padding: 24px; }
  .poem-card { padding: 24px; }
  .poem-text {
    font-size: 22px;
    line-height: 1.8;
  }
  .theme-toggle {
    width: 44px;
    height: 44px;
    top: 16px;
    right: 16px;
  }
  .label {
    font-size: 8px;
    top: 16px;
    left: 16px;
  }
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .screen::before { animation: none; }
}
</style>
</head>
<body>
  <canvas id="particles"></canvas>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">☀️</span>
  </button>

  <div class="screen" id="splash">
    <div class="label">Splash Screen</div>
    <div class="splash-content">
      <div class="logo">
        <span class="logo-ar">قافية</span>
        <span class="logo-en">qafiyah</span>
      </div>
      <div class="tagline">Arabic Poetry, Pair by Pair</div>
      <button class="enter-btn" onclick="showMain()">Begin Your Journey</button>
      <div class="hint">Tap anywhere to explore</div>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="main-layout">
      <nav class="main-nav">
        <div class="main-brand">قافية</div>
      </nav>

      <div class="poem-card">
        <div class="poem-text" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="poem-poet">— أحمد شوقي</div>
      </div>

      <button class="btn-next">Next Poem</button>
    </div>
  </div>

<script>
// Theme Toggle
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  html.classList.toggle('light');
  icon.textContent = html.classList.contains('light') ? '🌙' : '☀️';
}

// Navigation
function showMain() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

// Particle Animation
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.radius = Math.random() * 2 + 1;
    this.opacity = Math.random() * 0.5 + 0.2;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(197, 160, 89, ${this.opacity})`;
    ctx.fill();
  }
}

const particles = Array.from({ length: 50 }, () => new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
