<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auth SSO E2E Flow - Guided Tap Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --gold: #C5A059;
    --gold-glow: rgba(197, 160, 89, 0.35);
    --bg: #0c0c0e;
    --surface: #131315;
    --text: #FDFCF8;
    --text-dim: rgba(253, 252, 248, 0.5);
    --border: rgba(255, 255, 255, 0.08);
    --guide-glow: rgba(197, 160, 89, 0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* Mobile frame */
  .device-frame {
    width: 393px;
    height: 852px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  @media (max-width: 420px) {
    .device-frame { width: 100vw; height: 100vh; }
  }

  /* Header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-brand {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .header-brand-en {
    font-family: 'Forum', serif;
    font-size: 1.3rem;
    color: var(--text);
    letter-spacing: -0.03em;
  }
  .header-brand-ar {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 0.9rem;
    color: var(--gold);
    font-weight: 700;
  }

  /* Poem area */
  .poem-area {
    padding: 40px 24px;
    text-align: center;
  }
  .poem-text {
    font-family: 'Amiri', serif;
    font-size: 24px;
    line-height: 2;
    direction: rtl;
    margin-bottom: 16px;
  }
  .poem-poet {
    font-size: 14px;
    color: var(--gold);
    font-weight: 600;
  }

  /* Vertical controls (right side) */
  .vertical-controls {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .vc-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    color: rgba(197, 160, 89, 0.5);
    transition: all 0.2s ease;
    position: relative;
  }
  .vc-btn:hover {
    background: rgba(197, 160, 89, 0.12);
    color: var(--gold);
  }
  .vc-btn.greyed { color: rgba(255, 255, 255, 0.15); }
  .vc-btn.active-gold { color: var(--gold); }
  .vc-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.06);
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 56px;
    background: rgba(12, 12, 14, 0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }
  .bb-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    color: rgba(197, 160, 89, 0.5);
    transition: all 0.2s ease;
  }
  .bb-btn:hover { color: var(--gold); }

  /* Guide glow animation */
  @keyframes guideGlow {
    0%, 100% { box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(197, 160, 89, 0.2), 0 0 20px rgba(197, 160, 89, 0.3); }
  }
  .glow-target {
    animation: guideGlow 2s ease infinite;
    border-radius: 8px;
    position: relative;
    z-index: 60;
  }
  .glow-target.round { border-radius: 50%; }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    background: var(--surface);
    border: 1px solid rgba(197, 160, 89, 0.3);
    border-radius: 12px;
    padding: 16px 20px;
    z-index: 70;
    max-width: 260px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }
  .tooltip.visible { display: block; }
  .tooltip-text {
    font-size: 14px;
    margin-bottom: 4px;
    color: var(--text);
  }
  .tooltip-text-ar {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 13px;
    color: var(--gold);
    direction: rtl;
    margin-bottom: 12px;
  }
  .tooltip-cta {
    display: inline-block;
    padding: 10px 24px;
    min-height: 44px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .tooltip-cta:hover { opacity: 0.9; }

  /* Auth modal */
  .auth-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    z-index: 80;
    align-items: center;
    justify-content: center;
  }
  .auth-overlay.visible { display: flex; }
  .auth-modal {
    background: var(--surface);
    border: 1px solid rgba(197, 160, 89, 0.2);
    border-radius: 20px;
    padding: 32px 28px;
    width: 340px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
  }
  .auth-welcome {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .auth-welcome-en {
    font-size: 1.1rem;
    color: var(--text-dim);
    margin-bottom: 24px;
  }
  .auth-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px;
    min-height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.2s ease;
    font-family: 'Tajawal', sans-serif;
  }
  .auth-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: var(--gold);
  }
  .auth-btn svg { flex-shrink: 0; }
  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: var(--text-dim);
    font-size: 12px;
  }
  .auth-divider::before, .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .auth-email {
    width: 100%;
    padding: 14px;
    min-height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 15px;
    font-family: 'Tajawal', sans-serif;
    outline: none;
  }
  .auth-email::placeholder { color: var(--text-dim); }
  .auth-email:focus { border-color: var(--gold); }

  /* Avatar */
  .avatar {
    display: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg);
    font-size: 14px;
    font-weight: 700;
    align-items: center;
    justify-content: center;
  }
  .avatar.visible { display: flex; }

  /* Heart pulse */
  @keyframes heartPulse {
    0% { transform: scale(1); }
    25% { transform: scale(1.3); }
    50% { transform: scale(1); }
    75% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .heart-pulse {
    animation: heartPulse 0.6s ease;
  }

  /* Step indicator */
  .step-indicator {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 90;
  }
  .step-pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(197, 160, 89, 0.3);
    transition: background 0.3s;
  }
  .step-pip.active { background: var(--gold); }
  .step-pip.done { background: rgba(197, 160, 89, 0.6); }

  /* Label */
  .flow-label {
    position: absolute;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    z-index: 90;
    white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <div class="device-frame" id="frame">
    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="step-pip active" data-step="0"></div>
      <div class="step-pip" data-step="1"></div>
      <div class="step-pip" data-step="2"></div>
      <div class="step-pip" data-step="3"></div>
      <div class="step-pip" data-step="4"></div>
    </div>

    <!-- Header -->
    <div class="app-header">
      <div class="header-brand">
        <span class="header-brand-en">poetry</span>
        <span class="header-brand-ar" lang="ar" dir="rtl">بالعربي</span>
      </div>
      <div class="avatar" id="avatar">S</div>
    </div>

    <!-- Poem -->
    <div class="poem-area">
      <div class="poem-text" lang="ar" dir="rtl">
        أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
        فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
      </div>
      <div class="poem-poet">Ahmad Shawqi</div>
    </div>

    <!-- Vertical controls -->
    <div class="vertical-controls" id="vertControls">
      <button class="vc-btn greyed" id="heartBtn" aria-label="Save">
        <i data-lucide="heart" style="width:18px;height:18px"></i>
      </button>
      <div class="vc-divider"></div>
      <button class="vc-btn" aria-label="Font size"><i data-lucide="type" style="width:18px;height:18px"></i></button>
      <div class="vc-divider"></div>
      <button class="vc-btn" aria-label="Translate"><i data-lucide="languages" style="width:18px;height:18px"></i></button>
      <div class="vc-divider"></div>
      <button class="vc-btn" aria-label="Insights"><i data-lucide="book-open" style="width:18px;height:18px"></i></button>
      <div class="vc-divider"></div>
      <button class="vc-btn" aria-label="Italic"><i data-lucide="italic" style="width:18px;height:18px"></i></button>
      <div class="vc-divider"></div>
      <button class="vc-btn" id="signInBtn" aria-label="Sign in">
        <i data-lucide="log-in" style="width:18px;height:18px"></i>
      </button>
      <div class="vc-divider"></div>
      <button class="vc-btn" aria-label="Settings"><i data-lucide="settings" style="width:18px;height:18px"></i></button>
    </div>

    <!-- Tooltip for save prompt -->
    <div class="tooltip" id="saveTooltip" style="right: 70px; top: 38%;">
      <div class="tooltip-text">Sign in to save poems</div>
      <div class="tooltip-text-ar" lang="ar" dir="rtl">سجّل دخولك للحفظ</div>
      <button class="tooltip-cta" id="tooltipCta">Sign In</button>
    </div>

    <!-- Auth modal overlay -->
    <div class="auth-overlay" id="authOverlay">
      <div class="auth-modal">
        <div class="auth-welcome" lang="ar" dir="rtl">مرحبًا</div>
        <div class="auth-welcome-en">Welcome</div>

        <button class="auth-btn" id="googleBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <button class="auth-btn" id="appleBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Continue with Apple
        </button>

        <div class="auth-divider">or</div>

        <input class="auth-email" type="email" placeholder="Email address">
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <button class="bb-btn" aria-label="Listen"><i data-lucide="music" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Insights"><i data-lucide="lightbulb" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Refresh"><i data-lucide="refresh-cw" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Library"><i data-lucide="library" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Shuffle"><i data-lucide="shuffle" style="width:20px;height:20px"></i></button>
    </div>

    <div class="flow-label">Auth SSO Flow</div>
  </div>

<script>
(function () {
  "use strict";

  if (typeof lucide !== 'undefined') lucide.createIcons();

  var step = 0;
  var heartBtn = document.getElementById('heartBtn');
  var saveTooltip = document.getElementById('saveTooltip');
  var tooltipCta = document.getElementById('tooltipCta');
  var authOverlay = document.getElementById('authOverlay');
  var googleBtn = document.getElementById('googleBtn');
  var avatar = document.getElementById('avatar');
  var pips = document.querySelectorAll('.step-pip');

  function updatePips() {
    pips.forEach(function (pip, i) {
      pip.classList.remove('active', 'done');
      if (i === step) pip.classList.add('active');
      else if (i < step) pip.classList.add('done');
    });
  }

  // Step 0: Heart is greyed and glowing -> tap it
  heartBtn.classList.add('glow-target');

  document.getElementById('frame').addEventListener('click', function (e) {
    if (step === 0 && (e.target.closest('#heartBtn') || e.target === heartBtn)) {
      // Step 1: Show tooltip
      step = 1;
      updatePips();
      heartBtn.classList.remove('glow-target');
      saveTooltip.classList.add('visible');
      tooltipCta.classList.add('glow-target');
    } else if (step === 1 && (e.target === tooltipCta || e.target.closest('.tooltip-cta'))) {
      // Step 2: Show auth modal
      step = 2;
      updatePips();
      tooltipCta.classList.remove('glow-target');
      saveTooltip.classList.remove('visible');
      authOverlay.classList.add('visible');
      googleBtn.classList.add('glow-target');
    } else if (step === 2 && (e.target === googleBtn || e.target.closest('#googleBtn'))) {
      // Step 3: Signed in - show avatar, activate heart
      step = 3;
      updatePips();
      googleBtn.classList.remove('glow-target');
      authOverlay.classList.remove('visible');
      avatar.classList.add('visible');
      heartBtn.classList.remove('greyed');
      heartBtn.classList.add('active-gold');
      heartBtn.classList.add('glow-target');
    } else if (step === 3 && (e.target.closest('#heartBtn') || e.target === heartBtn)) {
      // Step 4: Save poem - pulse heart
      step = 4;
      updatePips();
      heartBtn.classList.remove('glow-target');
      heartBtn.classList.add('heart-pulse');
      heartBtn.style.color = '#e74c3c';
      setTimeout(function () {
        heartBtn.classList.remove('heart-pulse');
      }, 700);
    }
  });
})();
</script>
</body>
</html>
