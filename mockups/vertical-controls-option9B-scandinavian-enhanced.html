<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 9B - Scandinavian Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f9f9f9;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(to bottom, #fafafa 0%, #f5f5f5 100%);
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 80px 60px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 48px;
            margin-bottom: 56px;
            color: #1a1a1a;
            font-weight: 500;
            letter-spacing: -0.5px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 34px;
            line-height: 2.6;
            color: #2a2a2a;
            margin-bottom: 40px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poem-text.zoom-medium {
            font-size: 42px;
            line-height: 2.7;
        }

        .poem-text.zoom-large {
            font-size: 50px;
            line-height: 2.8;
        }

        .poem-title.zoom-medium {
            font-size: 56px;
        }

        .poem-title.zoom-large {
            font-size: 64px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 26px;
            color: #6a6a6a;
            margin-top: 56px;
            font-style: italic;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .transliteration {
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 19px;
            color: #9a9a9a;
            font-style: italic;
            margin-top: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .transliteration.active {
            opacity: 1;
            max-height: 500px;
            margin-top: 28px;
        }

        /* Enhanced Scandinavian Control Bar */
        .control-bar {
            position: fixed;
            right: 56px;
            top: 50%;
            transform: translateY(-50%);
            background: #ffffff;
            border-radius: 32px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.06),
                0 12px 48px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-bar:hover {
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.08),
                0 16px 56px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(0, 0, 0, 0.06);
            transform: translateY(-50%) translateX(-4px);
        }

        .control-btn {
            width: 68px;
            height: 68px;
            border: none;
            background: #f9f9f9;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #3a3a3a;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 
                0 2px 8px rgba(0, 0, 0, 0.04),
                0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.06) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-btn:hover {
            background: #ffffff;
            transform: scale(1.12) translateX(-2px);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(0, 0, 0, 0.04);
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:active {
            transform: scale(1.04);
            box-shadow: 
                0 2px 8px rgba(0, 0, 0, 0.06),
                0 0 0 1px rgba(0, 0, 0, 0.04);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #ffffff;
            box-shadow: 
                0 6px 20px rgba(99, 102, 241, 0.3),
                0 12px 40px rgba(139, 92, 246, 0.2),
                0 0 0 1px rgba(99, 102, 241, 0.1);
        }

        .control-btn.active::before {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            opacity: 1;
        }

        .icon {
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 400;
        }

        .control-btn:hover .icon {
            transform: scale(1.1);
        }

        /* Refined Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 0, 0, 0.08) 50%, 
                transparent 100%);
            margin: 8px 12px;
        }

        /* Elegant Tooltip */
        .tooltip {
            position: absolute;
            right: 88px;
            background: #1a1a1a;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 400;
            letter-spacing: 0.3px;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.2),
                0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .tooltip::after {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            border: 7px solid transparent;
            border-left-color: #1a1a1a;
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 100px;
        }

        /* Smooth scale animation */
        @keyframes gentle-scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .control-btn.active {
            animation: gentle-scale 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Soft glow for active state */
        @keyframes soft-glow {
            0%, 100% {
                box-shadow: 
                    0 6px 20px rgba(99, 102, 241, 0.3),
                    0 12px 40px rgba(139, 92, 246, 0.2),
                    0 0 0 1px rgba(99, 102, 241, 0.1);
            }
            50% {
                box-shadow: 
                    0 8px 24px rgba(99, 102, 241, 0.4),
                    0 16px 48px rgba(139, 92, 246, 0.25),
                    0 0 0 1px rgba(99, 102, 241, 0.15);
            }
        }

        .control-btn.active {
            animation: gentle-scale 0.5s cubic-bezier(0.16, 1, 0.3, 1), 
                       soft-glow 2.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                uḥibbuki fī zaman al-khawf wa-l-qahr<br>
                uḥibbuki fī zaman al-ḥarb wa-l-ḍajar<br>
                wa-uḥibbuki ḥīna yamūt al-kalām<br>
                wa-yabqā al-ṣadā fī faḍāʾ al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave()">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">حفظ القصيدة</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom()">
                <span class="icon">A+</span>
                <span class="tooltip">تكبير النص</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
                <span class="icon">ع/A</span>
                <span class="tooltip">النقحرة اللاتينية</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function toggleSave() {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom() {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit() {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
