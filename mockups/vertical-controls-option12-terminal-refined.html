<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 12 - Terminal Refined</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0f0f1a;
            color: #c0c8d0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(96, 165, 250, 0.02) 0px,
                    transparent 1px,
                    transparent 2px,
                    rgba(96, 165, 250, 0.02) 3px
                ),
                linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 60px;
            position: relative;
            transition: all 0.4s ease;
        }

        .poem-container::before {
            content: '>>> POETRY TERMINAL v2.0';
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 11px;
            color: #60a5fa;
            opacity: 0.5;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 44px;
            margin-bottom: 44px;
            color: #e8f0ff;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
            text-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
            border-bottom: 2px solid rgba(96, 165, 250, 0.3);
            padding-bottom: 16px;
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 32px;
            line-height: 2.4;
            color: #d0d8e0;
            margin-bottom: 32px;
            transition: all 0.4s ease;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.2);
        }

        .poem-text.zoom-medium {
            font-size: 40px;
            line-height: 2.5;
        }

        .poem-text.zoom-large {
            font-size: 48px;
            line-height: 2.6;
        }

        .poem-title.zoom-medium {
            font-size: 52px;
        }

        .poem-title.zoom-large {
            font-size: 60px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 24px;
            color: #8899aa;
            margin-top: 44px;
            font-style: italic;
            transition: all 0.4s ease;
            opacity: 0.9;
        }

        .transliteration {
            font-family: 'Courier New', monospace;
            font-size: 17px;
            color: #a0b0c0;
            font-style: normal;
            margin-top: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            letter-spacing: 0.5px;
        }

        .transliteration.active {
            opacity: 0.9;
            max-height: 500px;
            margin-top: 24px;
        }

        /* Refined Terminal Control Bar */
        .control-bar {
            position: fixed;
            right: 48px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(96, 165, 250, 0.25);
            border-radius: 16px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(96, 165, 250, 0.15),
                inset 0 1px 0 rgba(96, 165, 250, 0.1);
            transition: all 0.3s ease;
        }

        .control-bar::before {
            content: '█';
            position: absolute;
            top: -14px;
            left: 12px;
            background: #0f0f1a;
            padding: 0 6px;
            font-size: 10px;
            color: #60a5fa;
            letter-spacing: 1px;
        }

        .control-bar:hover {
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(96, 165, 250, 0.25),
                inset 0 1px 0 rgba(96, 165, 250, 0.15);
        }

        .control-btn {
            width: 62px;
            height: 62px;
            border: 1.5px solid rgba(96, 165, 250, 0.3);
            background: rgba(30, 35, 45, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #c0d0e0;
            transition: all 0.25s ease;
            position: relative;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .control-btn:hover {
            background: rgba(40, 45, 60, 0.8);
            border-color: rgba(96, 165, 250, 0.5);
            transform: scale(1.08);
            box-shadow: 
                0 0 20px rgba(96, 165, 250, 0.3),
                inset 0 0 12px rgba(96, 165, 250, 0.1);
            color: #e0f0ff;
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:active {
            transform: scale(1.02);
        }

        .control-btn.active {
            background: rgba(96, 165, 250, 0.15);
            border-color: rgba(96, 165, 250, 0.6);
            box-shadow: 
                0 0 25px rgba(96, 165, 250, 0.4),
                inset 0 0 15px rgba(96, 165, 250, 0.2);
            color: #ffffff;
            animation: terminal-pulse 1.8s ease-in-out infinite;
        }

        @keyframes terminal-pulse {
            0%, 100% {
                border-color: rgba(96, 165, 250, 0.6);
                box-shadow: 
                    0 0 25px rgba(96, 165, 250, 0.4),
                    inset 0 0 15px rgba(96, 165, 250, 0.2);
            }
            50% {
                border-color: rgba(96, 165, 250, 0.8);
                box-shadow: 
                    0 0 35px rgba(96, 165, 250, 0.5),
                    inset 0 0 20px rgba(96, 165, 250, 0.25);
            }
        }

        .icon {
            transition: all 0.25s ease;
        }

        .control-btn:hover .icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.6));
        }

        /* Subtle Divider */
        .divider {
            height: 1.5px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(96, 165, 250, 0.25) 50%, 
                transparent 100%);
            margin: 8px 4px;
            box-shadow: 0 0 6px rgba(96, 165, 250, 0.3);
        }

        /* Terminal Tooltip */
        .tooltip {
            position: absolute;
            right: 82px;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(8px);
            color: #e0f0ff;
            padding: 9px 18px;
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
        }

        .tooltip::before {
            content: '▸ ';
            color: #60a5fa;
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 90px;
        }

        /* Subtle blink effect */
        @keyframes subtle-blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.7; }
        }

        .control-btn.active .icon {
            animation: subtle-blink 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                ▸ uhibbuki fi zaman al-khawf wa-l-qahr<br>
                ▸ uhibbuki fi zaman al-harb wa-l-dajar<br>
                ▸ wa-uhibbuki hina yamut al-kalam<br>
                ▸ wa-yabqa al-sada fi fada' al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave()">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">SAVE</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom()">
                <span class="icon">A+</span>
                <span class="tooltip">ZOOM</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
                <span class="icon">ع/A</span>
                <span class="tooltip">LATIN</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function toggleSave() {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom() {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit() {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
