name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Repair migration history (one-time fix for manually applied remote migrations)
        run: |
          echo "Repairing migration history for version 20260307 (applied manually to remote)..."
          supabase migration repair --status reverted 20260307 2>/dev/null || true
          echo "Migration history repair complete"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: |
          echo "Running migrations via Supabase CLI..."
          supabase db push --include-all
          echo "Migration completed successfully"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify tables exist
        run: |
          echo "Verifying migration was applied..."
          supabase migration list | tee /tmp/migrations.txt
          grep -q "20260220" /tmp/migrations.txt \
            && echo "design review tables migration applied" \
            || (echo "design review tables migration NOT found" && exit 1)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: siraj-aq
          SENTRY_PROJECT: poetry-bil-araby

      # Placeholder for deployment target (Vercel, Netlify, GitHub Pages)
      - name: Deploy to production
        run: echo "Production deployment will be configured"

      # Optional: Create release tag
      - name: Create release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const date = new Date().toISOString().split('T')[0];

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${date}-${sha}`,
              name: `Release ${date}`,
              body: 'Automated production deployment',
              draft: false,
              prerelease: false
            })
