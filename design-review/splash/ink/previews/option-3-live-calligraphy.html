<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 3: Live Calligraphy Writing (REFINED)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Georgia:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1c1917;
      color: #fafaf9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    /* Subtle ink wash background — no overlap with content */
    .ink-wash {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(251, 191, 36, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: washReveal 3s ease-out 1s forwards;
    }

    @keyframes washReveal {
      to { opacity: 1; }
    }

    /* Floating brush particles — kept below content z-index */
    .brush-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.4) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0;
      z-index: 1;
      pointer-events: none;
      animation: particleDrift 7s ease-in-out infinite;
    }

    @keyframes particleDrift {
      0%, 100% { opacity: 0; transform: translateY(0) translateX(0); }
      10% { opacity: 0.5; }
      50% { opacity: 0.7; transform: translateY(-70px) translateX(25px); }
      90% { opacity: 0.3; }
    }

    .brush-particle:nth-child(1) { top: 65%; left: 18%; animation-delay: 0s; }
    .brush-particle:nth-child(2) { top: 72%; right: 22%; animation-delay: 1.8s; }
    .brush-particle:nth-child(3) { top: 58%; left: 72%; animation-delay: 3.5s; }
    .brush-particle:nth-child(4) { top: 68%; right: 42%; animation-delay: 5s; }

    /* ---- Full-screen layout — single column, no overlaps ---- */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      gap: 0;
    }

    /* ---- Brand Lockup (top, primary identity) ---- */
    .brand-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* English brand name — primary, larger */
    .brand-en-primary {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.04em;
      color: #fafaf9;
      line-height: 1;
    }

    /* Arabic brand name — secondary, smaller, below English */
    .brand-ar-secondary {
      font-family: 'Amiri', serif;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      color: #fbbf24;
      direction: rtl;
      unicode-bidi: bidi-override;
      letter-spacing: 0.02em;
      line-height: 1;
      opacity: 0.9;
    }

    /* Thin gold separator */
    .brand-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.6), transparent);
      margin-top: 0.5rem;
    }

    /* ---- SVG Calligraphy — main attraction ---- */
    .arabic-calligraphy {
      width: 100%;
      max-width: 720px;
      height: auto;
      opacity: 0;
      animation: verseAppear 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
      display: block;
      margin: 0 auto;
    }

    @keyframes verseAppear {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ---- Translation subtitle ---- */
    .translation {
      font-family: Georgia, serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-style: italic;
      font-weight: 300;
      text-align: center;
      color: rgba(250, 250, 249, 0.55);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 3.6s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ---- Ornate entry button (style from manuscript option-1) ---- */
    .cta-container {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeInUp 1s cubic-bezier(0.4, 0, 0.2, 1) 4.2s forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Ornate button — extracted and adapted from manuscript option-1 */
    .enter-button {
      padding: 16px 52px;
      background: transparent;
      border: 2px solid #d4a574;
      color: #d4a574;
      font-family: Georgia, serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 20px rgba(212, 165, 116, 0.1),
        inset 0 0 12px rgba(212, 165, 116, 0.05);
      touch-action: manipulation;
    }

    /* Gold fill sweep on hover */
    .enter-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212, 165, 116, 0.9), rgba(245, 216, 158, 0.9));
      transform: translateY(101%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .enter-button:hover {
      color: #1c1917;
      transform: scale(1.03);
      box-shadow:
        0 0 35px rgba(212, 165, 116, 0.45),
        inset 0 0 20px rgba(212, 165, 116, 0.1);
    }

    .enter-button:hover::before {
      transform: translateY(0);
    }

    .enter-button span {
      position: relative;
      z-index: 1;
      display: block;
    }

    /* Arabic subtitle on button */
    .enter-button .btn-ar {
      font-family: 'Amiri', serif;
      font-size: 0.8rem;
      opacity: 0.65;
      margin-top: 0.3rem;
      letter-spacing: 0.05em;
      direction: rtl;
    }
  </style>
</head>
<body>
  <!-- Ink wash background -->
  <div class="ink-wash"></div>

  <!-- Floating brush particles -->
  <div class="brush-particle"></div>
  <div class="brush-particle"></div>
  <div class="brush-particle"></div>
  <div class="brush-particle"></div>

  <!-- Main content — single column, no overlaps -->
  <div class="content">

    <!-- Brand Lockup: English primary, Arabic secondary -->
    <div class="brand-lockup">
      <div class="brand-en-primary">Poetry bil Araby</div>
      <div class="brand-divider"></div>
      <div class="brand-ar-secondary">شعر بالعربي</div>
    </div>

    <!-- Live Calligraphy SVG — Arabic verse with animated reveal -->
    <svg viewBox="0 0 720 200" class="arabic-calligraphy" preserveAspectRatio="xMidYMid meet" aria-label="Arabic calligraphy">
      <defs>
        <!-- RTL gradient reveal: right-to-left writing direction -->
        <linearGradient id="revealGradient" x1="100%" y1="0%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="white" stop-opacity="1">
            <animate attributeName="offset"
                     from="-0.25" to="1.0"
                     dur="2.8s"
                     begin="0.8s"
                     fill="freeze"/>
          </stop>
          <stop offset="22%" stop-color="white" stop-opacity="0">
            <animate attributeName="offset"
                     from="0" to="1.25"
                     dur="2.8s"
                     begin="0.8s"
                     fill="freeze"/>
          </stop>
        </linearGradient>

        <!-- Gold glow that follows the reveal wave -->
        <linearGradient id="glowGradient" x1="100%" y1="0%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
          <stop offset="8%" stop-color="#fbbf24" stop-opacity="0.75">
            <animate attributeName="offset"
                     from="0.08" to="1.08"
                     dur="2.8s"
                     begin="0.8s"
                     fill="freeze"/>
          </stop>
          <stop offset="28%" stop-color="#fbbf24" stop-opacity="0">
            <animate attributeName="offset"
                     from="0.28" to="1.28"
                     dur="2.8s"
                     begin="0.8s"
                     fill="freeze"/>
          </stop>
        </linearGradient>

        <!-- Soft glow filter -->
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="10" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Glow layer (gold, behind) -->
      <text x="50%" y="55%"
            text-anchor="middle"
            dominant-baseline="central"
            font-family="Amiri, serif"
            font-size="120"
            font-weight="700"
            direction="rtl"
            fill="url(#glowGradient)"
            filter="url(#glow)">الشعر</text>

      <!-- Main white reveal layer -->
      <text x="50%" y="55%"
            text-anchor="middle"
            dominant-baseline="central"
            font-family="Amiri, serif"
            font-size="120"
            font-weight="700"
            direction="rtl"
            fill="url(#revealGradient)">الشعر</text>
    </svg>

    <!-- English translation -->
    <div class="translation">
      Poetry — The art of the soul
    </div>

    <!-- Ornate entry button -->
    <div class="cta-container">
      <button class="enter-button" onclick="alert('Entering the tradition...')">
        <span>Enter the Tradition</span>
        <span class="btn-ar">ادخل إلى التقليد</span>
      </button>
    </div>

  </div>
</body>
</html>
