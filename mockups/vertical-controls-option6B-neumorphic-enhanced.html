<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 6B - Neumorphic Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8ecf0;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #e8ecf0 0%, #dfe4ea 50%, #d8dde5 100%);
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 60px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 44px;
            margin-bottom: 48px;
            color: #2d3748;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 32px;
            line-height: 2.5;
            color: #4a5568;
            margin-bottom: 32px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .poem-text.zoom-medium {
            font-size: 40px;
            line-height: 2.6;
        }

        .poem-text.zoom-large {
            font-size: 48px;
            line-height: 2.7;
        }

        .poem-title.zoom-medium {
            font-size: 52px;
        }

        .poem-title.zoom-large {
            font-size: 60px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 24px;
            color: #718096;
            margin-top: 48px;
            font-style: italic;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .transliteration {
            font-family: 'Segoe UI', sans-serif;
            font-size: 18px;
            color: #a0aec0;
            font-style: italic;
            margin-top: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .transliteration.active {
            opacity: 1;
            max-height: 500px;
            margin-top: 24px;
        }

        /* Enhanced Neumorphic Control Bar */
        .control-bar {
            position: fixed;
            right: 48px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(145deg, #e8ecf0, #dfe4ea);
            border-radius: 28px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 
                12px 12px 24px rgba(163, 177, 198, 0.6),
                -12px -12px 24px rgba(255, 255, 255, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .control-bar:hover {
            box-shadow: 
                16px 16px 32px rgba(163, 177, 198, 0.7),
                -16px -16px 32px rgba(255, 255, 255, 1),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .control-btn {
            width: 64px;
            height: 64px;
            border: none;
            background: linear-gradient(145deg, #e8ecf0, #dfe4ea);
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #4a5568;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 
                8px 8px 16px rgba(163, 177, 198, 0.5),
                -8px -8px 16px rgba(255, 255, 255, 0.8);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            background: linear-gradient(145deg, transparent, rgba(255, 255, 255, 0.5));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                10px 10px 20px rgba(163, 177, 198, 0.6),
                -10px -10px 20px rgba(255, 255, 255, 0.9);
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:active {
            transform: scale(0.98);
            box-shadow: 
                inset 6px 6px 12px rgba(163, 177, 198, 0.6),
                inset -6px -6px 12px rgba(255, 255, 255, 0.8);
        }

        .control-btn.active {
            background: linear-gradient(145deg, #dfe4ea, #d0d8e0);
            box-shadow: 
                inset 8px 8px 16px rgba(163, 177, 198, 0.7),
                inset -8px -8px 16px rgba(255, 255, 255, 0.9);
            color: #667eea;
        }

        .control-btn.active .icon {
            filter: drop-shadow(0 0 8px rgba(102, 126, 234, 0.5));
        }

        .icon {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(1px 1px 2px rgba(255, 255, 255, 0.8));
        }

        .control-btn:hover .icon {
            transform: scale(1.15);
        }

        /* Refined Divider */
        .divider {
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(163, 177, 198, 0.3) 50%, 
                transparent 100%);
            margin: 8px 4px;
            border-radius: 1px;
            box-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.5),
                0 -1px 0 rgba(163, 177, 198, 0.3);
        }

        /* Tactile Tooltip */
        .tooltip {
            position: absolute;
            right: 88px;
            background: linear-gradient(145deg, #f7fafc, #edf2f7);
            color: #2d3748;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 500;
            box-shadow: 
                6px 6px 12px rgba(163, 177, 198, 0.4),
                -6px -6px 12px rgba(255, 255, 255, 0.8);
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 96px;
        }

        /* Tactile feedback animation */
        @keyframes tactile-press {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .control-btn.pressing {
            animation: tactile-press 0.2s ease;
        }

        /* Pulse effect for active state */
        @keyframes soft-pulse {
            0%, 100% {
                box-shadow: 
                    inset 8px 8px 16px rgba(163, 177, 198, 0.7),
                    inset -8px -8px 16px rgba(255, 255, 255, 0.9);
            }
            50% {
                box-shadow: 
                    inset 10px 10px 20px rgba(163, 177, 198, 0.8),
                    inset -10px -10px 20px rgba(255, 255, 255, 1);
            }
        }

        .control-btn.active {
            animation: soft-pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                uḥibbuki fī zaman al-khawf wa-l-qahr<br>
                uḥibbuki fī zaman al-ḥarb wa-l-ḍajar<br>
                wa-uḥibbuki ḥīna yamūt al-kalām<br>
                wa-yabqā al-ṣadā fī faḍāʾ al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave()">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">حفظ القصيدة</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom()">
                <span class="icon">A+</span>
                <span class="tooltip">تكبير النص</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
                <span class="icon">ع/A</span>
                <span class="tooltip">النقحرة اللاتينية</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function addTactileFeedback(btn) {
            btn.classList.add('pressing');
            setTimeout(() => btn.classList.remove('pressing'), 200);
        }

        function toggleSave() {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            addTactileFeedback(btn);
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom() {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            addTactileFeedback(btn);
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit() {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            addTactileFeedback(btn);
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
