<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main App Option A: Zen Reading Room</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --deep-water: #0A1420;
  --surface: #0D1A28;
  --ripple-silver: #B8C8D8;
  --moonlight: #E8E4F0;
  --gold: #C5A059;
  --lotus: #C47A8A;
  --text-dim: rgba(232,228,240,0.5);
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html { font-family: var(--font-ui); background: var(--deep-water); color: var(--moonlight); }
body { min-height: 100vh; overflow-x: hidden; }

/* Ink wash gradient background */
.ink-wash-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 30%, rgba(13,26,40,0.8), transparent),
    radial-gradient(ellipse 60% 40% at 30% 70%, rgba(196,122,138,0.03), transparent),
    radial-gradient(ellipse 50% 60% at 70% 50%, rgba(197,160,89,0.03), transparent),
    var(--deep-water);
}

/* Minimal top bar - just brand + theme toggle, floating */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: transparent;
  direction: ltr;
}
.top-brand {
  display: flex; align-items: flex-end; gap: 6px;
  opacity: 0.5;
  transition: opacity 0.3s;
}
.top-brand:hover { opacity: 0.8; }
.top-brand-en {
  font-family: 'Forum', serif;
  font-size: 18px; letter-spacing: -0.04em;
  color: var(--gold); line-height: 1;
}
.top-brand-ar {
  font-family: 'Reem Kufi', sans-serif;
  font-weight: 700; font-size: 12px;
  color: var(--gold); line-height: 1;
}
.top-action {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none;
  color: var(--text-dim); cursor: pointer;
  transition: color 0.2s;
}
.top-action:hover { color: var(--moonlight); }

/* Centered poem reading area */
.reading-room {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 24px 120px;
}

/* Poet attribution - minimal */
.poet-line {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.2s forwards;
}
.poet-mark {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid rgba(184,200,216,0.15);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-ar); font-size: 16px;
  color: var(--gold);
}
.poet-name {
  font-family: var(--font-ar); font-size: 15px;
  color: var(--ripple-silver); font-weight: 700;
}
.poet-sub {
  font-size: 12px; color: var(--text-dim); font-style: italic; direction: ltr;
}

/* Poem verses - centered, breathing space */
.poem-body {
  max-width: 680px; width: 100%;
  text-align: center;
  font-family: var(--font-ar);
  font-size: clamp(22px, 4vw, 32px);
  line-height: 2.6;
  color: var(--moonlight);
  opacity: 0;
  animation: fadeUp 1s ease 0.5s forwards;
}
.verse {
  margin-bottom: 16px;
}
.hemistich-gap {
  display: inline-block; width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,200,216,0.25), transparent);
  vertical-align: middle; margin: 0 12px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Floating edge controls - extremely minimal */
.edge-controls {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 24px;
  z-index: 50;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.8s forwards;
}
.edge-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(13,26,40,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(184,200,216,0.1);
  border-radius: 50%;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s ease;
}
.edge-btn:hover {
  color: var(--moonlight);
  border-color: rgba(184,200,216,0.25);
  background: rgba(13,26,40,0.8);
}
.edge-btn.primary {
  width: 52px; height: 52px;
  border-color: rgba(197,160,89,0.25);
  color: var(--gold);
}
.edge-btn.primary:hover {
  border-color: rgba(197,160,89,0.5);
  box-shadow: 0 0 20px rgba(197,160,89,0.1);
}

/* Scroll hint */
.scroll-hint {
  position: fixed; right: 24px; top: 50%;
  transform: translateY(-50%);
  writing-mode: vertical-lr;
  font-size: 11px; letter-spacing: 0.3em;
  color: var(--text-dim); opacity: 0.3;
  direction: ltr;
}

@media (max-width: 768px) {
  .scroll-hint { display: none; }
  .reading-room { padding: 60px 16px 100px; }
  .edge-controls { bottom: 24px; gap: 16px; }
}
</style>
</head>
<body>

<div class="ink-wash-bg"></div>

<header class="top-bar">
  <div class="top-brand">
    <span class="top-brand-en">poetry</span>
    <span class="top-brand-ar">بالعربي</span>
  </div>
  <button class="top-action" aria-label="Settings">
    <i data-lucide="settings" style="width:16px;height:16px"></i>
  </button>
</header>

<main class="reading-room">
  <div class="poet-line">
    <div class="poet-mark">م</div>
    <div>
      <div class="poet-name">المتنبي</div>
      <div class="poet-sub">Al-Mutanabbi</div>
    </div>
  </div>

  <div class="poem-body" dir="rtl" lang="ar">
    <div class="verse">
      عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ
      <span class="hemistich-gap"></span>
      وَتَأْتِي عَلَى قَدْرِ الكِرَامِ المَكَارِمُ
    </div>
    <div class="verse">
      وَتَعْظُمُ فِي عَيْنِ الصَّغِيرِ صِغَارُهَا
      <span class="hemistich-gap"></span>
      وَتَصْغُرُ فِي عَيْنِ العَظِيمِ العَظَائِمُ
    </div>
  </div>
</main>

<div class="scroll-hint">swipe for next</div>

<nav class="edge-controls">
  <button class="edge-btn" aria-label="Save">
    <i data-lucide="heart" style="width:18px;height:18px"></i>
  </button>
  <button class="edge-btn" aria-label="Listen">
    <i data-lucide="headphones" style="width:18px;height:18px"></i>
  </button>
  <button class="edge-btn primary" aria-label="Next poem">
    <i data-lucide="shuffle" style="width:20px;height:20px"></i>
  </button>
  <button class="edge-btn" aria-label="Share">
    <i data-lucide="share-2" style="width:18px;height:18px"></i>
  </button>
  <button class="edge-btn" aria-label="Copy">
    <i data-lucide="copy" style="width:18px;height:18px"></i>
  </button>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
</body>
</html>
