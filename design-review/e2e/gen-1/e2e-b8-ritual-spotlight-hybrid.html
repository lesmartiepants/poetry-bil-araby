<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B8 Ritual Spotlight - Floating Library</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --parchment: #F5ECD7; --leather: #8B4513; --library: #1A0F0A;
  --gold: #C5A059; --dust: #D4C5A0; --ink: #2A1F14;
  --glow: rgba(197,160,89,0.35);
}
[data-theme="light"] {
  --bg: var(--parchment); --text: var(--ink); --card-bg: #FFF8EE;
  --fold: #E8D9BF; --shadow: rgba(42,31,20,0.18);
  --tab-bg: var(--dust); --tab-text: var(--leather); --muted: rgba(42,31,20,0.5);
}
[data-theme="dark"] {
  --bg: var(--library); --text: var(--parchment); --card-bg: #2A1F14;
  --fold: #3D2E1E; --shadow: rgba(0,0,0,0.5);
  --tab-bg: #3D2E1E; --tab-text: var(--gold); --muted: rgba(245,236,215,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; transition: background 0.5s, color 0.5s;
}

/* ---- WALKTHROUGH (Japanese Ma - Negative Space) ---- */
#walkthrough {
  position: fixed; inset: 0; z-index: 90; background: var(--bg);
  display: none; cursor: pointer; overflow: hidden;
}
#walkthrough.active { display: block; }

/* Each Ma step: centered in viewport */
.ma-step {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 3rem;
}
.ma-step.active {
  display: flex;
  animation: maFade 1s ease;
}
@keyframes maFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

.ma-title {
  font-family: 'Amiri', serif; font-size: clamp(1.75rem, 5vw, 2.5rem);
  font-weight: 700; color: var(--text); line-height: 1.3;
  margin-bottom: 0.5rem; direction: ltr;
}
.ma-title-ar {
  font-family: 'Amiri', serif; font-size: clamp(1.25rem, 3.5vw, 1.75rem);
  font-weight: 700; color: var(--gold); direction: rtl;
  margin-bottom: 1.25rem; line-height: 1.4;
}
.ma-desc {
  font-family: 'Tajawal', sans-serif; font-size: 0.875rem;
  line-height: 1.8; color: var(--muted); max-width: 280px;
  direction: ltr;
}

/* Single thin line as indicator */
.ma-indicator {
  position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px; z-index: 5;
}
.ma-line {
  width: 24px; height: 1px; background: rgba(197,160,89,0.2);
  transition: all 0.6s ease;
}
.ma-line.active { background: var(--gold); width: 40px; }

.ma-hint {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase;
  color: rgba(197,160,89,0.2); z-index: 5;
}

/* ===== MAIN APP ===== */
/* Japanese Ma -- vast emptiness, poem floats alone, nothing else visible */
#app { display: none; min-height: 100vh; position: relative; }
#app.active { display: flex; align-items: center; justify-content: center; }

/* The void -- no nav, no chrome, pure emptiness */
.ma-void {
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15vh 2rem;
}

/* Single line floating in enormous space */
.ma-verse {
  font-family: 'Amiri', serif;
  font-size: clamp(1.5rem, 4vw, 2.25rem);
  line-height: 2.4;
  color: var(--text);
  direction: rtl;
  text-align: center;
  max-width: 600px;
  opacity: 0;
  animation: maFadeIn 2s ease 0.5s forwards;
}

@keyframes maFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Poet attribution -- barely visible */
.ma-poet {
  position: fixed;
  bottom: 15vh;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Tajawal', sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--muted);
  opacity: 0;
  animation: maFadeIn 1.5s ease 2s forwards;
  direction: ltr;
}

/* ===== CONTROLS ===== */
/* Ma Tap-Reveal Ephemeral -- tap bottom space, 3 actions appear for 3 seconds */

.ma-touch-zone {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 25vh;
  z-index: 50;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.ma-controls {
  position: fixed;
  bottom: 8vh;
  left: 50%;
  transform: translateX(-50%);
  z-index: 55;
  display: flex;
  gap: 2.5rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.ma-controls.visible {
  opacity: 1;
  pointer-events: auto;
}

.ma-action {
  font-family: 'Tajawal', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 12px 8px;
  min-height: 44px;
  min-width: 44px;
  transition: color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  direction: ltr;
}
.ma-action:hover,
.ma-action:active {
  color: var(--gold);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important; transition-duration: 0.01ms !important;
  }
}
@media (max-width: 768px) {
  .ma-void { padding: 20vh 1.5rem; }
  .ma-controls { gap: 1.5rem; }
}
</style>
</head>
<body data-theme="dark">

<!-- WALKTHROUGH (Japanese Ma - Negative Space) -->
<div id="walkthrough" class="active">
  <div class="ma-step active" data-ma="0">
    <div class="ma-title">Discover</div>
    <div class="ma-title-ar" lang="ar" dir="rtl">اكتشف</div>
    <div class="ma-desc">84,000 poems. Centuries of silence broken by verse.</div>
  </div>
  <div class="ma-step" data-ma="1">
    <div class="ma-title">Listen</div>
    <div class="ma-title-ar" lang="ar" dir="rtl">استمع</div>
    <div class="ma-desc">Each word breathes. Voice given to what was written in stillness.</div>
  </div>
  <div class="ma-step" data-ma="2">
    <div class="ma-title">Understand</div>
    <div class="ma-title-ar" lang="ar" dir="rtl">تأمل</div>
    <div class="ma-desc">Meaning lives in the space between words.</div>
  </div>

  <div class="ma-indicator">
    <div class="ma-line active" data-line="0"></div>
    <div class="ma-line" data-line="1"></div>
    <div class="ma-line" data-line="2"></div>
  </div>
  <div class="ma-hint">Tap</div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <!-- The void: nothing but the verse -->
  <div class="ma-void">
    <div class="ma-verse" lang="ar" dir="rtl">
      عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ
    </div>
  </div>

  <!-- Barely visible poet name -->
  <div class="ma-poet">Al-Mutanabbi</div>

  <!-- ===== CONTROLS ===== -->
  <!-- Tap the empty bottom to reveal actions for 3 seconds -->
  <div class="ma-touch-zone" id="maTouchZone"></div>
  <div class="ma-controls" id="maControls">
    <button class="ma-action" data-action="next">next</button>
    <button class="ma-action" data-action="save">save</button>
    <button class="ma-action" data-action="listen">listen</button>
    <button class="ma-action" data-action="share">share</button>
  </div>
</div>

<script>
/* ============================================
   WALKTHROUGH -- MA NEGATIVE SPACE TAP-TO-ADVANCE
   ============================================ */
var maSteps = document.querySelectorAll('.ma-step');
var maLines = document.querySelectorAll('.ma-line');
var maHint = document.querySelector('.ma-hint');
var currentStep = 0;
var totalMaSteps = maSteps.length;

function showMaStep() {
  for (var i = 0; i < maSteps.length; i++) {
    maSteps[i].classList.remove('active');
    if (maLines[i]) maLines[i].classList.remove('active');
  }
  if (currentStep < totalMaSteps) {
    maSteps[currentStep].classList.add('active');
    if (maLines[currentStep]) maLines[currentStep].classList.add('active');
    document.getElementById('walkthrough').setAttribute('data-step', currentStep);
  }
}

/* Initialize walkthrough on load */
currentStep = 0;
showMaStep();

document.getElementById('walkthrough').addEventListener('click', function(e) {
  currentStep++;
  if (currentStep >= totalMaSteps) {
    document.getElementById('walkthrough').style.display = 'none';
    document.getElementById('app').classList.add('active');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  } else {
    showMaStep();
  }
});

/* ============================================
   MA EPHEMERAL CONTROLS -- appear for 3 seconds then vanish
   ============================================ */
var maControls = document.getElementById('maControls');
var maTouchZone = document.getElementById('maTouchZone');
var maTimer = null;

function showMaControls() {
  if (maTimer) clearTimeout(maTimer);
  maControls.classList.add('visible');
  maTimer = setTimeout(function() {
    maControls.classList.remove('visible');
    maTimer = null;
  }, 3000);
}

maTouchZone.addEventListener('click', showMaControls);
maTouchZone.addEventListener('touchstart', function(e) {
  e.preventDefault();
  showMaControls();
});

/* Keep controls visible while interacting */
maControls.addEventListener('touchstart', function() {
  if (maTimer) clearTimeout(maTimer);
}, { passive: true });
maControls.addEventListener('touchend', function() {
  maTimer = setTimeout(function() {
    maControls.classList.remove('visible');
    maTimer = null;
  }, 2000);
}, { passive: true });

document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
</body>
</html>
