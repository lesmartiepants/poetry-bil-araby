<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Mockup — Mobile Overflow Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', -apple-system, sans-serif; background: #0c0c0e; color: #e7e5e4; width: 375px; height: 812px; display: flex; flex-direction: column; overflow: hidden; margin: 0 auto; }
    .poem-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; opacity: 0.3; }
    .poem-text { font-family: 'Amiri', serif; font-size: 22px; line-height: 2.2; direction: rtl; color: #fafaf9; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); }
    .menu { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1917; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 16px 0 32px; max-width: 375px; margin: 0 auto; }
    .menu-handle { width: 40px; height: 4px; background: #44403c; border-radius: 2px; margin: 0 auto 16px; }
    .menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 24px; color: #e7e5e4; font-size: 15px; }
    .menu-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
    .menu-item .label { flex: 1; }
    .menu-item .label-ar { font-size: 12px; color: #78716c; direction: rtl; }
    .menu-divider { height: 1px; background: #292524; margin: 8px 24px; }
    .menu-item-signin { color: #a78bfa; }
    .menu-item-signin svg { stroke: #a78bfa; }
  </style>
</head>
<body>
  <div class="poem-area">
    <div class="poem-text">قفا نبكِ من ذكرى حبيبٍ ومنزلِ</div>
  </div>
  <div class="overlay"></div>
  <div class="menu">
    <div class="menu-handle"></div>
    <div class="menu-item">
      <svg viewBox="0 0 24 24"><path d="M21 2H3v16h5v4l4-4h5l4-4V2zm-10 9V7m4 4V7"/></svg>
      <div><div class="label">Local / Web</div><div class="label-ar">محلي / ويب</div></div>
    </div>
    <div class="menu-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <div><div class="label">Theme</div><div class="label-ar">المظهر</div></div>
    </div>
    <div class="menu-item">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <div><div class="label">Poets</div><div class="label-ar">الشعراء</div></div>
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item menu-item-signin">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <div><div class="label">Sign In</div><div class="label-ar">تسجيل الدخول</div></div>
    </div>
  </div>
</body>
</html>
