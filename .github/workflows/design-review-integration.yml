name: Design Review DB Integration

# Runs on every PR push to main.
# Connects directly to the production Supabase database and runs integration
# tests to confirm the persist-to-DB feature works on this PR.
# Tables are expected to already exist (migration is tested separately on deploy to main).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  integration:
    name: Design Review — Real DB API Tests (${{ matrix.connection_approach }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        connection_approach: [database_url, postgres_env]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate connection secrets for this approach
        id: preflight
        run: |
          if [ "${{ matrix.connection_approach }}" = "database_url" ]; then
            if [ -n "$DATABASE_URL_SECRET" ]; then
              echo "run_tests=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Skipping database_url approach (DATABASE_URL secret not set)"
              echo "run_tests=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ -n "$PGHOST_SECRET" ] && [ -n "$PGDATABASE_SECRET" ] && [ -n "$PGUSER_SECRET" ] && [ -n "$PGPASSWORD_SECRET" ]; then
              echo "run_tests=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Skipping postgres_env approach (PGHOST/PGDATABASE/PGUSER/PGPASSWORD secrets required)"
              echo "run_tests=false" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
          PGHOST_SECRET: ${{ secrets.PGHOST }}
          PGDATABASE_SECRET: ${{ secrets.PGDATABASE }}
          PGUSER_SECRET: ${{ secrets.PGUSER }}
          PGPASSWORD_SECRET: ${{ secrets.PGPASSWORD }}

      # ── Run integration tests against the real Supabase DB ────────────────
      - name: Run design review integration tests
        if: steps.preflight.outputs.run_tests == 'true'
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ matrix.connection_approach == 'database_url' && secrets.DATABASE_URL || '' }}
          PGHOST: ${{ matrix.connection_approach == 'postgres_env' && secrets.PGHOST || '' }}
          PGDATABASE: ${{ matrix.connection_approach == 'postgres_env' && secrets.PGDATABASE || '' }}
          PGUSER: ${{ matrix.connection_approach == 'postgres_env' && secrets.PGUSER || '' }}
          PGPASSWORD: ${{ matrix.connection_approach == 'postgres_env' && secrets.PGPASSWORD || '' }}
          PGPORT: ${{ matrix.connection_approach == 'postgres_env' && (secrets.PGPORT || '5432') || '' }}
          # GitHub Actions runners have IPv6 disabled. Supabase hostnames resolve to IPv6
          # first, causing ENETUNREACH. Force Node.js DNS to prefer IPv4.
          NODE_OPTIONS: --dns-result-order=ipv4first

      - name: Report skipped approach
        if: steps.preflight.outputs.run_tests != 'true'
        run: echo "Integration tests skipped for ${{ matrix.connection_approach }} due to missing secrets."

      # ── Report outcome on the PR ──────────────────────────────────────────
      - name: Post success comment to PR
        if: success() && steps.preflight.outputs.run_tests == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ✅ Design Review DB Integration\n\n' +
                    '**All integration tests passed against real Supabase DB**\n\n' +
                    '- Items sync ✓\n' +
                    '- Session create ✓\n' +
                    '- Verdict submit ✓\n' +
                    '- Session complete ✓\n' +
                    '- Summary & history read-back ✓\n\n' +
                    '**Persist-to-DB feature confirmed working on this PR** 🎉'
            });

      - name: Post failure comment to PR
        if: failure() && steps.preflight.outputs.run_tests == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Design Review DB Integration\n\n' +
                    '**Integration tests failed** — see logs for details.\n\n' +
                    `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
