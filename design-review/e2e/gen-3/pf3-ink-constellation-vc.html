<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PF3 Ink Constellation - Vertical Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-primary: #09090b;
      --text-primary: #fafafa;
      --text-secondary: #a1a1a1;
      --text-muted: #525252;
      --border-color: #27272a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .main-app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      position: relative;
    }

    /* Grid dot overlay */
    .main-app::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(transparent 95%, rgba(255, 255, 255, 0.04) 96%),
        linear-gradient(90deg, transparent 95%, rgba(255, 255, 255, 0.04) 96%);
      background-size: 24px 24px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    .app-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      position: relative;
      z-index: 2;
    }
    .nav-brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
      background: none; border: none; cursor: pointer;
      transition: color 0.2s ease;
    }
    .nav-link:hover { color: var(--text-primary); }

    .poem-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
      padding: 2rem 1.5rem;
      padding-right: 72px;
    }
    .session-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .poem-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .poem-text {
      font-family: 'Amiri', serif;
      font-size: clamp(1.375rem, 3.5vw, 1.75rem);
      line-height: 2.2;
      color: var(--text-primary);
      direction: rtl; text-align: right;
      max-width: 600px;
      margin-bottom: 1rem;
    }
    .poem-translation {
      font-family: 'Tajawal', sans-serif;
      font-size: 13px; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 1rem;
      display: none;
    }
    .poem-transliteration {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; color: #3f3f46;
      font-style: italic; margin-bottom: 1rem;
      display: none;
    }
    .poem-poet {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    /* ===== VERTICAL CONTROLS - Terminal Flags ===== */
    /* Monochrome Noir: terminal-style flags along right edge */
    .vc-strip {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      z-index: 50;
      background: var(--bg-primary);
      border-left: 1px solid var(--border-color);
    }

    .vc-toggle {
      width: 48px;
      height: 36px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.05em;
      border-radius: 0;
    }

    .vc-toggle:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }

    .vc-toggle.active {
      border-color: var(--text-primary);
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
    }

    .vc-toggle.active::after {
      content: 'ON';
      position: absolute;
      bottom: 1px; right: 2px;
      font-size: 6px;
      color: #4ade80;
      letter-spacing: 0;
    }

    .vc-toggle svg { width: 14px; height: 14px; }

    .vc-badge {
      position: absolute;
      bottom: 1px; right: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px; font-weight: 600;
      color: var(--text-muted);
    }

    .vc-divider {
      width: 32px; height: 1px;
      background: var(--border-color);
      margin: 2px 0;
    }

    .vc-settings {
      display: none;
      position: fixed;
      right: 62px; top: 50%;
      transform: translateY(-50%);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      min-width: 200px;
      z-index: 49;
      font-family: 'IBM Plex Mono', monospace;
    }
    .vc-settings.visible { display: block; }
    .vc-settings-title {
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 10px;
    }
    .vc-settings-item {
      font-size: 12px; color: var(--text-secondary);
      padding: 4px 0;
    }
    .vc-settings-item::before {
      content: '> ';
      color: var(--text-muted);
    }
  
    /* Translation icon text */
    .vc-translate-icon {
      font-family: 'Tajawal', sans-serif;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .vc-translate-icon .ar { font-family: 'Amiri', serif; font-size: 14px; }
    .vc-translate-icon .sep { opacity: 0.4; font-size: 9px; }
    .vc-translate-icon .en { font-size: 11px; }

    /* Inline transliteration after each verse line */
    .verse-line { margin-bottom: 0.25rem; }
    .verse-translit {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.75rem;
      color: var(--text-muted, #525252);
      font-style: italic;
      display: none;
      margin-bottom: 0.75rem;
      direction: ltr;
      opacity: 0.6;
    }
    .transliteration-active .verse-translit { display: block; }

    /* Bottom action bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0; right: 56px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border-color, #27272a);
      background: var(--bg-primary, #09090b);
      z-index: 40;
      backdrop-filter: blur(12px);
    }
    .bb-btn {
      width: 48px; height: 48px;
      border: none; background: transparent;
      color: var(--text-muted, #525252);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 8px;
      transition: color 0.2s ease;
    }
    .bb-btn:hover { color: var(--text-primary, #fafafa); }
    .bb-btn svg { width: 20px; height: 20px; }
  

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 480px) {
      /* Reduce poem padding to match VC strip width */
      .poem-content {
        padding-right: 64px;
      padding-bottom: 68px;
        padding-bottom: 72px; /* space for bottom bar */
        padding-top: 1.5rem;
        padding-left: 0.75rem;
      }
      .poem-area { padding-right: 0; }

      /* Bottom bar: safe area + compact sizing */
      .bottom-bar {
        padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px));
      }
      .bb-btn {
        width: 44px; height: 44px;
        min-width: 44px; min-height: 44px;
      }
      .bb-btn svg { width: 18px; height: 18px; }

      /* VC strip: narrower on mobile */
      .vc-strip {
        width: 48px;
        gap: 6px;
      }

      /* Ensure 44px minimum touch target */
      .vc-toggle {
        width: 44px; height: 44px;
        min-width: 44px; min-height: 44px;
      }

      /* Settings panel: fit mobile viewport */
      .vc-settings {
        right: 54px;
        min-width: 160px;
        max-width: calc(100vw - 64px);
        padding: 12px;
      }

      /* Verse transliteration: readable on narrow screens */
      .verse-translit {
        font-size: 0.6875rem;
        margin-bottom: 0.5rem;
        word-break: break-word;
      }

      /* Translation block: constrain width */
      .poem-translation {
        max-width: calc(100vw - 88px);
        font-size: 0.8125rem;
      }

      /* Main layout: tighter on mobile */
      .main-layout {
        padding: 16px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="main-app">
    <nav class="app-nav">
      <div class="nav-brand">QAFIYAH</div>
      <div class="nav-links">
        <button class="nav-link">Archive</button>
        <button class="nav-link">Audio</button>
        <button class="nav-link">Notes</button>
      </div>
    </nav>

    <div class="poem-area">
      <div class="session-label">Session 04 -- Al-Mutanabbi</div>
      <div class="poem-content">
        <div class="poem-text" id="poemText" lang="ar" dir="rtl">
            <div class="verse-line">وَمَا الخَيْلُ إِلَّا كَالصَّدِيقِ</div>
            <div class="verse-translit">wa ma al-khaylu illa kal-sadiqi</div>
            <div class="verse-line">قَلِيلٌ إِذَا هُوَ مَا صَدَقَا</div>
            <div class="verse-translit">qalilun idha huwa ma sadaqa</div>
          </div>
        <div class="poem-translation" id="translationRow">Horses are like friends, so few when they are true.</div>
        <p class="poem-poet">Al-Mutanabbi</p>
      </div>
    </div>

    <!-- Vertical Controls - Terminal Flags -->
    <div class="vc-strip">
      <button class="vc-toggle" data-action="translation" aria-label="Toggle translation">
        <span class="vc-translate-icon"><span class="ar">ع</span><span class="sep">|</span><span class="en">A</span></span>
      </button>
      <div class="vc-divider"></div>
      <button class="vc-toggle" data-action="transliteration" aria-label="Toggle transliteration">
        <i data-lucide="text-cursor-input"></i>
      </button>
      <div class="vc-divider"></div>
      <button class="vc-toggle" data-action="textsize" aria-label="Text size">
        <i data-lucide="type"></i>
        <span class="vc-badge">M</span>
      </button>
      <div class="vc-divider"></div>
      <button class="vc-toggle" data-action="settings" aria-label="Settings">
        <i data-lucide="settings"></i>
      </button>
    </div>
    <!-- Bottom action bar -->
    <nav class="bottom-bar">
      <button class="bb-btn" aria-label="Listen"><i data-lucide="volume-2" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Insights"><i data-lucide="lightbulb" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Next poem"><i data-lucide="shuffle" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Save"><i data-lucide="heart" style="width:20px;height:20px"></i></button>
      <button class="bb-btn" aria-label="Share"><i data-lucide="share" style="width:20px;height:20px"></i></button>
    </nav>



    <div class="vc-settings" id="settingsPanel">
      <div class="vc-settings-title">config</div>
      <div class="vc-settings-item">theme: dark</div>
      <div class="vc-settings-item">font: amiri</div>
      <div class="vc-settings-item">autoplay: false</div>
    </div>
  </main>

<script>
(function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
  document.querySelectorAll('.vc-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var action = btn.dataset.action;
      if (action === 'textsize') {
        var sizes = ['S','M','L','XL'];
        var badge = btn.querySelector('.vc-badge');
        var idx = sizes.indexOf(badge.textContent);
        idx = (idx + 1) % sizes.length;
        badge.textContent = sizes[idx];
        document.querySelector('.poem-content').style.fontSize =
          {'S':'1rem','M':'1.25rem','L':'1.5rem','XL':'2rem'}[sizes[idx]];
      } else if (action === 'translation') {
        btn.classList.toggle('active');
        document.getElementById('translationRow').style.display = btn.classList.contains('active') ? 'block' : 'none';
      } else if (action === 'transliteration') {
        btn.classList.toggle('active');
        var poemEl = document.getElementById('poemText');
        if (btn.classList.contains('active')) {
          poemEl.classList.add('transliteration-active');
        } else {
          poemEl.classList.remove('transliteration-active');
        }
      } else if (action === 'settings') {
        btn.classList.toggle('active');
        document.getElementById('settingsPanel').classList.toggle('visible');
      }
    });
  });
})();
</script>
</body>
</html>
