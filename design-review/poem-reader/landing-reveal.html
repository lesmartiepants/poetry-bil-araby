<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>poetry بالعربي — Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
<script src="./vendor/gsap.min.js"></script>
<style>
  :root{ --gold:#c5a059; --gold-bright:#d4b463; --bg:#08080b; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:#eee;
    font-family:'Cormorant Garamond',serif;cursor:pointer;user-select:none}
  /* deep calm night gradient + faint vignette */
  #sky{position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse at 50% 42%, rgba(197,160,89,.10), transparent 60%),
               radial-gradient(ellipse at 50% 120%, rgba(46,80,144,.12), transparent 55%), var(--bg)}
  #stars{position:fixed;inset:0;z-index:1;pointer-events:none}
  #wrap{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem}
  .en{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
    font-size:clamp(2.6rem,12vw,4.2rem);letter-spacing:.06em;color:var(--gold-bright);
    opacity:0;filter:blur(10px)}
  .ar{font-family:'Reem Kufi',sans-serif;direction:rtl;
    font-size:clamp(2.2rem,10vw,3.6rem);color:var(--gold);
    opacity:0;filter:blur(10px)}
  .rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.7rem 0;opacity:.0}
  .enter{position:fixed;bottom:14vh;left:0;right:0;text-align:center;z-index:3;
    font-style:italic;letter-spacing:.22em;text-transform:uppercase;font-size:.78rem;color:var(--gold);opacity:0}
  /* the "main page" revealed beneath after tap (stub) */
  #main{position:fixed;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;background:var(--bg)}
  #main .ln{font-family:'Amiri',serif;direction:rtl;font-size:clamp(1.4rem,5vw,2rem);color:#ece8e0;text-align:center;padding:0 8vw;line-height:1.9}
  @media (prefers-reduced-motion: reduce){ .en,.ar{filter:none!important} }
</style>
</head>
<body>
<div id="sky"></div>
<canvas id="stars"></canvas>
<div id="wrap">
  <div class="en">poetry</div>
  <div class="rule"></div>
  <div class="ar" lang="ar">بالعربي</div>
</div>
<div class="enter">tap to enter</div>
<div id="main"><div class="ln" lang="ar">عَلَى هَذِهِ الأَرْضِ مَا يَسْتَحِقُّ الْحَيَاةْ</div></div>

<script>
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
/* drifting embers/stars */
const cv=document.getElementById('stars'),cx=cv.getContext('2d');
function size(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;cx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
size();addEventListener('resize',size);
const stars=Array.from({length:46},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.3+.2,a:Math.random()*.5+.2,v:Math.random()*.12+.02,tw:Math.random()*Math.PI*2}));
function draw(t){cx.clearRect(0,0,cv.width,cv.height);for(const s of stars){s.y-=s.v;if(s.y<-2){s.y=innerHeight+2;s.x=Math.random()*innerWidth;}const tw=.5+.5*Math.sin(t/700+s.tw);cx.globalAlpha=s.a*tw;cx.fillStyle=Math.random()<.15?'#e8923a':'#d4b463';cx.beginPath();cx.arc(s.x,s.y,s.r,0,7);cx.fill();}cx.globalAlpha=1;requestAnimationFrame(draw);}
requestAnimationFrame(draw);

const en=document.querySelector('.en'),ar=document.querySelector('.ar'),rule=document.querySelector('.rule'),enter=document.querySelector('.enter');
/* slow, calm reveal */
const tl=gsap.timeline();
if(reduce){
  tl.to([en,ar],{opacity:1,filter:'blur(0px)',duration:.6,stagger:.15}).to(rule,{width:'min(220px,52vw)',opacity:.6,duration:.5},'<').to(enter,{opacity:.8,duration:.5});
}else{
  tl.to(en,{opacity:1,filter:'blur(0px)',letterSpacing:'0.12em',duration:2.0,ease:'power2.out'})
    .to(rule,{width:'min(240px,55vw)',opacity:.65,duration:1.4,ease:'power2.out'},'-=1.2')
    .to(ar,{opacity:1,filter:'blur(0px)',duration:2.0,ease:'power2.out'},'-=1.0')
    .to(enter,{opacity:.85,duration:1.0,ease:'power1.inOut'},'-=0.3')
    .to(enter,{opacity:.4,duration:1.6,repeat:-1,yoyo:true,ease:'sine.inOut'});
  // gentle breathing glow on the wordmark
  gsap.to([en,ar],{textShadow:'0 0 26px rgba(212,180,99,.45)',duration:3,repeat:-1,yoyo:true,ease:'sine.inOut'});
}

let entered=false;
function enterApp(){
  if(entered)return; entered=true;
  gsap.killTweensOf(enter);
  const out=gsap.timeline({onComplete:()=>{ /* in the real app: route to main reader */ location.href='./sparkler-reveal.html'; }});
  out.to(enter,{opacity:0,duration:.3})
     .to([en,rule,ar],{opacity:0,y:-26,filter:'blur(8px)',scale:1.05,duration:.9,ease:'power2.in',stagger:.06},'<')
     .to('#main',{opacity:1,duration:.7,ease:'power2.out'},'-=0.4');
}
addEventListener('pointerdown',enterApp);
addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter')enterApp();});
</script>
</body>
</html>
