<!DOCTYPE html>
<html>
<head>
  <title>Option 3: Minimal Constellation - Sparse & Poetic</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #09090b;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 700px;
      padding: 40px;
    }

    /* Original brand title - EXACT specs from splash-particles.jsx */
    .logo-container {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 64px;
      letter-spacing: 0.02em;
    }

    .logo {
      display: flex;
      align-items: flex-end; /* baseline alignment */
      gap: 24px;
    }

    .logo-ar {
      font-family: 'Amiri', serif;
      font-size: 72px; /* text-6xl md:text-7xl equivalent */
      font-weight: 700; /* font-bold */
      color: #ffffff;
      margin-bottom: 8px; /* mb-2 offset for baseline */
    }

    .logo-en {
      font-size: 84px; /* text-7xl md:text-8xl equivalent */
      font-weight: 300; /* font-light */
      color: #ffffff;
      letter-spacing: -0.05em; /* tracking-tighter */
      text-transform: lowercase;
    }

    /* Minimal subtitle */
    .subtitle {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6em;
      color: #525252;
      margin-bottom: 96px;
      font-weight: 400;
    }

    /* Prominent CTA button with pulse */
    .cta-button {
      display: inline-block;
      padding: 16px 48px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.04);
      color: #e8e8e8;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      font-weight: 400;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      backdrop-filter: blur(4px);
      animation: buttonPulse 3s ease-in-out infinite;
      outline: none;
    }

    @keyframes buttonPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.08),
                    0 0 12px rgba(255, 255, 255, 0.04);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.0),
                    0 0 24px rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.8);
      }
    }

    .cta-button::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: scaleX(0);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cta-button:hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      animation: none;
      box-shadow: 0 0 32px rgba(255, 255, 255, 0.15);
    }

    .cta-button:hover::after {
      transform: scaleX(1);
    }

    /* Tap hint */
    .hint {
      margin-top: 80px;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: #3f3f46;
      text-transform: uppercase;
      font-weight: 400;
      touch-action: manipulation;
    }

    /* Minimalist theme toggle */
    .theme-toggle {
      position: fixed;
      top: 40px;
      right: 40px;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: #525252;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      color: #fafafa;
    }

    /* Connection lines for constellation effect */
    .connection-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      pointer-events: none;
      animation: connectionPulse 3s ease-in-out infinite;
    }

    @keyframes connectionPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
  </style>
</head>
<body>
  <!-- Particle canvas -->
  <canvas id="particleCanvas" class="particle-canvas"></canvas>

  <!-- Theme toggle -->
  <button class="theme-toggle" aria-label="Toggle theme">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
  </button>

  <!-- Content -->
  <div class="content">
    <div class="logo-container">
      <h1 class="logo">
        <span class="logo-ar">بالعربي</span>
        <span class="logo-en">poetry</span>
      </h1>
    </div>

    <div class="subtitle">
      Verses Connecting Across Time and Space
    </div>

    <button class="cta-button" id="ctaBtn">
      Enter the Tradition
    </button>

    <div class="hint">
      Tap anywhere or click to begin
    </div>
  </div>

  <script>
    // Minimal constellation system - fewer, larger particles
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 150; // Much fewer particles
    const mouse = { x: canvas.width / 2, y: canvas.height / 2 };

    // Generate sparse constellation pattern
    for (let i = 0; i < particleCount; i++) {
      const curve = Math.floor(Math.random() * 3);
      const curves = [
        { x: 0.65, y: 0.5, radius: 0.10 },
        { x: 0.5, y: 0.5, radius: 0.08 },
        { x: 0.35, y: 0.5, radius: 0.12 }
      ];

      const c = curves[curve];
      const angle = Math.random() * Math.PI * 2;
      const distance = Math.random() * c.radius;

      // Particles start scattered wide then drift to formation (bigger initial radius ~40% up)
      const scatterAngle = Math.random() * Math.PI * 2;
      const scatterDist = Math.random() * 0.35; // wider initial scatter
      const ox = (c.x + Math.cos(angle) * distance) * canvas.width;
      const oy = (c.y + Math.sin(angle) * distance) * canvas.height;

      particles.push({
        x: ox + Math.cos(scatterAngle) * scatterDist * canvas.width,
        y: oy + Math.sin(scatterAngle) * scatterDist * canvas.height,
        originX: ox,
        originY: oy,
        vx: 0,
        vy: 0,
        // ~40% bigger radii than before (was 0.8-2.0, now 1.1-2.8)
        radius: Math.random() * 1.7 + 1.1,
        opacity: Math.random() * 0.3 + 0.55,
        twinklePhase: Math.random() * Math.PI * 2,
        // Slower twinkle (~30% slower): was 0.5-1.0, now 0.3-0.7
        twinkleSpeed: Math.random() * 0.4 + 0.3
      });
    }

    // Mouse tracking
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    let time = 0;
    let constellationTriggered = false;

    // Full-screen tap/click handler to trigger constellation burst
    function triggerConstellation() {
      if (constellationTriggered) return;
      constellationTriggered = true;

      // Burst particles outward from center, then snap back
      particles.forEach(p => {
        const angle = Math.random() * Math.PI * 2;
        const burst = 8 + Math.random() * 12;
        p.vx += Math.cos(angle) * burst;
        p.vy += Math.sin(angle) * burst;
      });

      // Highlight the CTA button on tap
      const btn = document.getElementById('ctaBtn');
      if (btn) {
        btn.style.borderColor = 'rgba(255,255,255,0.95)';
        btn.style.background = 'rgba(255,255,255,0.12)';
        btn.style.transform = 'translateY(-3px) scale(1.04)';
        setTimeout(() => {
          btn.style.transition = 'all 0.6s cubic-bezier(0.16,1,0.3,1)';
          btn.style.borderColor = '';
          btn.style.background = '';
          btn.style.transform = '';
        }, 300);
      }

      // Allow re-trigger after 2s
      setTimeout(() => { constellationTriggered = false; }, 2000);
    }

    // Attach full-screen tap handler (canvas layer + body)
    canvas.style.pointerEvents = 'auto';
    canvas.style.cursor = 'pointer';
    canvas.addEventListener('click', triggerConstellation);
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); triggerConstellation(); }, { passive: false });
    document.body.style.touchAction = 'manipulation';

    // Also wire the CTA button
    const ctaBtn = document.getElementById('ctaBtn');
    if (ctaBtn) {
      ctaBtn.addEventListener('click', (e) => { e.stopPropagation(); triggerConstellation(); });
    }

    // Animation loop - minimal and elegant, ~30% slower time progression
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.0035; // was 0.005, now ~30% slower

      // Draw connection lines first (behind particles)
      particles.forEach((p, i) => {
        const nearby = particles
          .slice(i + 1)
          .filter(p2 => {
            const dx = p2.x - p.x;
            const dy = p2.y - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < 180;
          })
          .slice(0, 2); // Only connect to 2 nearest

        nearby.forEach(p2 => {
          const dx = p2.x - p.x;
          const dy = p2.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const opacity = (1 - dist / 180) * 0.15;

          ctx.beginPath();
          ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        });
      });

      // Draw particles
      particles.forEach((p, i) => {
        // Mouse interaction - gentle pull
        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const minDistance = 200;

        if (distance < minDistance) {
          const force = (minDistance - distance) / minDistance * 0.3;
          p.vx += (dx / distance) * force;
          p.vy += (dy / distance) * force;
        }

        // Return to origin — gentle pull, ~30% softer
        p.vx += (p.originX - p.x) * 0.00035;
        p.vy += (p.originY - p.y) * 0.00035;

        // Apply velocity — slightly more damping for calmer drift
        p.vx *= 0.975;
        p.vy *= 0.975;
        p.x += p.vx;
        p.y += p.vy;

        // Subtle twinkling
        const twinkle = Math.sin(time * p.twinkleSpeed + p.twinklePhase) * 0.2 + 0.8;

        // Draw star-like particle
        ctx.beginPath();
        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2.5);
        gradient.addColorStop(0, `rgba(250, 250, 250, ${p.opacity * twinkle})`);
        gradient.addColorStop(0.4, `rgba(250, 250, 250, ${p.opacity * twinkle * 0.4})`);
        gradient.addColorStop(1, 'rgba(250, 250, 250, 0)');
        ctx.fillStyle = gradient;
        ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Core bright point
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity * twinkle})`;
        ctx.arc(p.x, p.y, p.radius * 0.3, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }

    animate();

    // Resize handler
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
