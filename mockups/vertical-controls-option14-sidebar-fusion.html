<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 14 - Sidebar Fusion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d1a;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                radial-gradient(circle at 25% 25%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
                linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%);
        }

        /* Ambient glow effects */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            animation: ambient-float 25s ease-in-out infinite;
        }

        .container::before {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4), transparent);
            top: -100px;
            left: -100px;
        }

        .container::after {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.4), transparent);
            bottom: -100px;
            right: -100px;
            animation-delay: -12.5s;
        }

        @keyframes ambient-float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            33% { transform: translate(80px, -60px) scale(1.15); opacity: 0.4; }
            66% { transform: translate(-60px, 80px) scale(0.9); opacity: 0.25; }
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 70px 60px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 48px;
            margin-bottom: 56px;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 
                0 2px 20px rgba(99, 102, 241, 0.4),
                0 0 60px rgba(139, 92, 246, 0.2);
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 36px;
            line-height: 2.6;
            color: #e8e8f0;
            margin-bottom: 40px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 1px 10px rgba(99, 102, 241, 0.2);
        }

        .poem-text.zoom-medium {
            font-size: 44px;
            line-height: 2.7;
        }

        .poem-text.zoom-large {
            font-size: 52px;
            line-height: 2.8;
        }

        .poem-title.zoom-medium {
            font-size: 56px;
        }

        .poem-title.zoom-large {
            font-size: 64px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 28px;
            color: #b0b0c8;
            margin-top: 56px;
            font-style: italic;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transliteration {
            font-family: -apple-system, sans-serif;
            font-size: 20px;
            color: #9898b8;
            font-style: italic;
            margin-top: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transliteration.active {
            opacity: 1;
            max-height: 500px;
            margin-top: 32px;
        }

        /* Ultimate Fusion Control Bar */
        .control-bar {
            position: fixed;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(145deg, 
                rgba(30, 30, 50, 0.85) 0%, 
                rgba(20, 20, 40, 0.75) 100%);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 
                0 12px 48px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(99, 102, 241, 0.15),
                inset 0 2px 0 rgba(255, 255, 255, 0.08),
                inset 0 0 20px rgba(99, 102, 241, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background-clip: padding-box;
        }

        .control-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 30px;
            padding: 2px;
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.5), 
                rgba(139, 92, 246, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .control-bar:hover::before {
            opacity: 1;
        }

        .control-bar:hover {
            background: linear-gradient(145deg, 
                rgba(35, 35, 55, 0.9) 0%, 
                rgba(25, 25, 45, 0.85) 100%);
            transform: translateY(-50%) translateX(-8px) scale(1.02);
            box-shadow: 
                0 16px 64px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(99, 102, 241, 0.25),
                inset 0 2px 0 rgba(255, 255, 255, 0.12),
                inset 0 0 30px rgba(99, 102, 241, 0.08);
        }

        .control-btn {
            width: 68px;
            height: 68px;
            border: none;
            background: linear-gradient(145deg, 
                rgba(45, 45, 65, 0.6) 0%, 
                rgba(35, 35, 55, 0.5) 100%);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #d0d0e8;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 
                6px 6px 16px rgba(0, 0, 0, 0.4),
                -2px -2px 8px rgba(99, 102, 241, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, 
                rgba(255, 255, 255, 0.15) 0%, 
                transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .control-btn::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.5), 
                rgba(139, 92, 246, 0.5));
            filter: blur(14px);
            opacity: 0;
            z-index: -1;
            transition: all 0.4s ease;
        }

        .control-btn:hover {
            background: linear-gradient(145deg, 
                rgba(55, 55, 75, 0.7) 0%, 
                rgba(45, 45, 65, 0.6) 100%);
            transform: scale(1.15) translateY(-3px);
            box-shadow: 
                8px 8px 24px rgba(0, 0, 0, 0.5),
                -3px -3px 12px rgba(99, 102, 241, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.12);
            border-color: rgba(99, 102, 241, 0.3);
            color: #ffffff;
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:hover::after {
            opacity: 0.6;
        }

        .control-btn:active {
            transform: scale(1.08) translateY(-1px);
        }

        .control-btn.active {
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.35) 0%, 
                rgba(139, 92, 246, 0.35) 100%);
            border-color: rgba(99, 102, 241, 0.5);
            color: #ffffff;
            box-shadow: 
                8px 8px 24px rgba(99, 102, 241, 0.3),
                -3px -3px 12px rgba(139, 92, 246, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.15);
        }

        .control-btn.active::after {
            opacity: 0.85;
            animation: fusion-glow 2.2s ease-in-out infinite;
        }

        @keyframes fusion-glow {
            0%, 100% {
                opacity: 0.7;
                filter: blur(14px);
                transform: scale(1);
            }
            50% {
                opacity: 1;
                filter: blur(18px);
                transform: scale(1.12);
            }
        }

        .icon {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
        }

        .control-btn:hover .icon {
            transform: scale(1.18);
            filter: drop-shadow(0 4px 16px rgba(99, 102, 241, 0.7));
        }

        /* Fusion Divider */
        .divider {
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(99, 102, 241, 0.3) 50%, 
                transparent 100%);
            margin: 10px 8px;
            border-radius: 1px;
            box-shadow: 
                0 0 10px rgba(99, 102, 241, 0.4),
                0 1px 0 rgba(255, 255, 255, 0.05);
            animation: divider-pulse 3.5s ease-in-out infinite;
        }

        @keyframes divider-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Ultimate Tooltip */
        .tooltip {
            position: absolute;
            right: 100px;
            background: linear-gradient(135deg, 
                rgba(25, 25, 45, 0.98) 0%, 
                rgba(20, 20, 40, 0.98) 100%);
            backdrop-filter: blur(20px);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 18px;
            font-size: 15px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 400;
            letter-spacing: 0.5px;
            box-shadow: 
                0 10px 32px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(99, 102, 241, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 110px;
        }

        /* Staggered entrance animation */
        @keyframes fusion-entrance {
            from {
                opacity: 0;
                transform: translateX(60px) scale(0.7);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .control-btn {
            animation: fusion-entrance 0.8s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .control-btn:nth-child(1) { animation-delay: 0.1s; }
        .control-btn:nth-child(3) { animation-delay: 0.2s; }
        .control-btn:nth-child(5) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                uḥibbuki fī zaman al-khawf wa-l-qahr<br>
                uḥibbuki fī zaman al-ḥarb wa-l-ḍajar<br>
                wa-uḥibbuki ḥīna yamūt al-kalām<br>
                wa-yabqā al-ṣadā fī faḍāʾ al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave()">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">حفظ القصيدة</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom()">
                <span class="icon">A+</span>
                <span class="tooltip">تكبير النص</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
                <span class="icon">ع/A</span>
                <span class="tooltip">النقحرة اللاتينية</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function toggleSave() {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom() {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit() {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
