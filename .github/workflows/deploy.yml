name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run design review migrations
        run: |
          echo "Running migrations via Supabase CLI..."
          supabase db push --project-ref $SUPABASE_PROJECT_REF
          echo "Migration completed successfully ✓"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Verify tables exist
        run: |
          echo "Verifying migration was applied..."
          supabase migration list --project-ref $SUPABASE_PROJECT_REF | tee /tmp/migrations.txt
          grep -q "20260222000000" /tmp/migrations.txt \
            && echo "✓ design review tables migration applied" \
            || echo "✗ design review tables migration NOT found"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          # Add production env vars here or use secrets
          NODE_ENV: production

      # Placeholder for deployment target (Vercel, Netlify, GitHub Pages)
      - name: Deploy to production
        run: echo "Production deployment will be configured"

      # Optional: Create release tag
      - name: Create release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const date = new Date().toISOString().split('T')[0];

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${date}-${sha}`,
              name: `Release ${date}`,
              body: 'Automated production deployment',
              draft: false,
              prerelease: false
            })
