<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 13: Editorial Magazine - Vertical Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #fff;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Magazine grid background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      display: flex;
      gap: 0;
      max-width: 1400px;
      width: 100%;
      padding: 60px;
      position: relative;
      z-index: 1;
    }
    
    /* Vertical control bar - LEFT side, editorial style */
    .controls {
      width: 320px;
      border-left: 4px solid #1a1a1a;
      padding-right: 48px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }
    
    .control-section {
      position: relative;
    }
    
    .section-number {
      font-family: 'Playfair Display', serif;
      font-size: 96px;
      font-weight: 900;
      color: #f5f5f5;
      position: absolute;
      top: -20px;
      left: -40px;
      z-index: -1;
      line-height: 1;
    }
    
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }
    
    .section-subtitle {
      font-size: 12px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #737373;
      margin-bottom: 24px;
    }
    
    .control-btn {
      width: 100%;
      padding: 18px 28px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'IBM Plex Sans', sans-serif;
      text-align: right;
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }
    
    .control-btn:last-child {
      margin-bottom: 0;
    }
    
    .control-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 100%;
      bottom: 0;
      background: #404040;
      transition: right 0.3s ease;
    }
    
    .control-btn:hover::before {
      right: 0;
    }
    
    .control-btn span {
      position: relative;
      z-index: 1;
    }
    
    .control-btn:hover {
      transform: translateX(-4px);
    }
    
    .control-btn.active {
      background: #2563eb;
    }
    
    .control-btn.active::before {
      background: #1d4ed8;
    }
    
    .save-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ef4444;
      margin-left: 12px;
      transition: background 0.3s ease;
    }
    
    .control-btn.active .save-indicator {
      background: #10b981;
    }
    
    .counter-box {
      display: inline-block;
      padding: 2px 12px;
      background: #fff;
      color: #1a1a1a;
      font-weight: 700;
      margin-left: 12px;
      font-size: 13px;
    }
    
    .zoom-level-display {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 900;
      color: #1a1a1a;
      text-align: left;
      margin-top: 20px;
      letter-spacing: -0.03em;
    }
    
    .zoom-unit {
      font-size: 24px;
      color: #737373;
    }
    
    /* Content area */
    .content {
      flex: 1;
      padding: 0 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .poem {
      font-family: 'Amiri', serif;
      font-size: var(--poem-size, 46px);
      line-height: 1.8;
      text-align: center;
      max-width: 680px;
      transition: font-size 0.3s ease;
    }
    
    .poem-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5em;
      margin-bottom: 48px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }
    
    .verse {
      margin-bottom: 28px;
      position: relative;
    }
    
    .verse::after {
      content: '';
      position: absolute;
      bottom: -14px;
      right: 50%;
      transform: translateX(50%);
      width: 60px;
      height: 2px;
      background: #e5e5e5;
    }
    
    .verse:last-of-type::after {
      display: none;
    }
    
    .transliteration {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.4em;
      color: #a3a3a3;
      margin-top: 12px;
      display: none;
      font-weight: 300;
      font-style: italic;
    }
    
    .transliteration.active {
      display: block;
    }
    
    /* Title badge */
    .title-badge {
      position: absolute;
      top: 60px;
      right: 60px;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 400;
      color: #737373;
      text-align: right;
    }
    
    .badge-number {
      font-size: 48px;
      font-weight: 900;
      color: #1a1a1a;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="title-badge">
    <span class="badge-number">13</span>
    Editorial Magazine
  </div>
  
  <div class="container">
    <div class="controls">
      <div class="control-section">
        <div class="section-number">01</div>
        <div class="section-title">المجموعة</div>
        <div class="section-subtitle">Collection</div>
        <button class="control-btn" id="saveBtn" onclick="toggleSave()">
          <span>
            <span class="save-indicator"></span>
            <span id="saveBtnText">حفظ القصيدة</span>
            <span id="counterBox"></span>
          </span>
        </button>
      </div>
      
      <div class="control-section">
        <div class="section-number">02</div>
        <div class="section-title">القراءة</div>
        <div class="section-subtitle">Reading</div>
        <button class="control-btn" onclick="zoomIn()">
          <span>تكبير النص</span>
        </button>
        <button class="control-btn" onclick="zoomOut()">
          <span>تصغير النص</span>
        </button>
        <div class="zoom-level-display">
          <span id="zoomLevel">100</span><span class="zoom-unit">%</span>
        </div>
      </div>
      
      <div class="control-section">
        <div class="section-number">03</div>
        <div class="section-title">النطق</div>
        <div class="section-subtitle">Pronunciation</div>
        <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
          <span id="translitBtnText">إظهار النطق</span>
        </button>
      </div>
    </div>
    
    <div class="content">
      <div class="poem">
        <div class="poem-title">قصيدة عن الحب</div>
        <div class="verse">
          يا من هواه أعزه وأذلني
          <div class="transliteration">yā man hawāhu aʿazzahu wa-adhallani</div>
        </div>
        <div class="verse">
          كيف السبيل إلى وصالك دلني
          <div class="transliteration">kayfa s-sabīlu ilā wiṣālika dallani</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let saved = false;
    let saveCount = 0;
    let zoomLevel = 100;
    let translitActive = false;
    
    function toggleSave() {
      saved = !saved;
      const btn = document.getElementById('saveBtn');
      const text = document.getElementById('saveBtnText');
      const counterBox = document.getElementById('counterBox');
      
      if (saved) {
        saveCount++;
        btn.classList.add('active');
        text.textContent = 'محفوظ';
        counterBox.innerHTML = `<span class="counter-box">${saveCount}</span>`;
      } else {
        btn.classList.remove('active');
        text.textContent = 'حفظ القصيدة';
        counterBox.innerHTML = '';
      }
    }
    
    function zoomIn() {
      if (zoomLevel < 120) {
        zoomLevel += 20;
        updateZoom();
      }
    }
    
    function zoomOut() {
      if (zoomLevel > 80) {
        zoomLevel -= 20;
        updateZoom();
      }
    }
    
    function updateZoom() {
      const sizes = {
        80: '37px',
        100: '46px',
        120: '55px'
      };
      document.documentElement.style.setProperty('--poem-size', sizes[zoomLevel]);
      document.getElementById('zoomLevel').textContent = zoomLevel;
    }
    
    function toggleTranslit() {
      translitActive = !translitActive;
      const translits = document.querySelectorAll('.transliteration');
      const btn = document.getElementById('translitBtn');
      const text = document.getElementById('translitBtnText');
      
      translits.forEach(t => {
        if (translitActive) {
          t.classList.add('active');
        } else {
          t.classList.remove('active');
        }
      });
      
      if (translitActive) {
        btn.classList.add('active');
        text.textContent = 'إخفاء النطق';
      } else {
        btn.classList.remove('active');
        text.textContent = 'إظهار النطق';
      }
    }
  </script>
</body>
</html>
