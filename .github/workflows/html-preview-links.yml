name: HTML Preview Links

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  post-preview-links:
    runs-on: ubuntu-latest
    steps:
      - name: Post or update HTML preview links
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- html-preview-bot -->';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const sha = pr.head.sha.slice(0, 7);

            // в”Ђв”Ђ 1. Get all files changed in the PR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const htmlFiles = files
              .filter(f => f.filename.endsWith('.html'))
              .filter(f => !f.filename.includes('node_modules/'))
              .filter(f => f.status !== 'removed');

            // в”Ђв”Ђ 2. Find existing bot comment в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr.number, per_page: 100 }
            );
            const existing = comments.find(c => c.body.includes(MARKER));

            // в”Ђв”Ђ 3. Build comment body в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            let body;

            if (htmlFiles.length === 0) {
              // No HTML files вЂ” only update if a bot comment already exists
              if (!existing) return;
              body = [
                MARKER,
                `> HTML files removed in \`${sha}\``,
              ].join('\n');
            } else {
              const baseUrl = `https://raw.githack.com/${owner}/${repo}/${branch}`;
              // Group by directory
              const byDir = {};
              for (const f of htmlFiles) {
                const dir = f.filename.includes('/') ? f.filename.replace(/\/[^/]+$/, '') : '.';
                (byDir[dir] = byDir[dir] || []).push(f);
              }

              const lines = [];
              for (const [dir, files] of Object.entries(byDir)) {
                lines.push(`**${dir}/**`);
                for (const f of files) {
                  const url = `${baseUrl}/${f.filename}`;
                  const name = f.filename.split('/').pop();
                  const badge = f.status === 'added' ? ' вњ¦' : '';
                  lines.push(`- [${name}${badge}](${url})`);
                }
                lines.push('');
              }

              body = [
                MARKER,
                `## HTML Previews`,
                ``,
                `Branch: \`${branch}\` В· commit \`${sha}\``,
                ``,
                ...lines,
                `<sub>вњ¦ newly added В· links update automatically on each commit</sub>`,
              ].join('\n');
            }

            // в”Ђв”Ђ 4. Create or update в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: pr.number,
                body,
              });
            }
