<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background 1 ŌĆö Star & Cross</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       DESIGN TOKENS
       ============================================= */
    :root {
      --color-bg:              #0d0b08;
      --color-gold:            #c5a059;
      --color-gold-dim:        rgba(197, 160, 89, 0.5);
      --color-lapis:           #2a5a8c;
      --color-text-primary:    #e8dcc8;
      --color-text-secondary:  rgba(240, 232, 216, 0.5);

      --pattern-gold-opacity:  0.06;
      --pattern-lapis-opacity: 0.025;

      --font-amiri:            'Amiri', serif;
      --font-kufi:             'Reem Kufi', sans-serif;

      --ease-out-expo:         cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* =============================================
       RESET & BASE
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      background-color: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      font-family: var(--font-amiri);
    }

    /* =============================================
       LABEL
       ============================================= */
    .label {
      position: fixed;
      top: 16px;
      left: 16px; /* LTR label despite RTL page */
      font-family: var(--font-kufi);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: rgba(197, 160, 89, 0.45);
      text-transform: uppercase;
      direction: ltr;
      pointer-events: none;
      z-index: 100;
    }

    /* =============================================
       PATTERN LAYERS
       ============================================= */
    .pattern-stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* Layer 1: gold outline grid */
    .pattern-layer-gold {
      position: absolute;
      inset: -50%;   /* oversized so rotation doesn't reveal edges */
      width: 200%;
      height: 200%;
      opacity: var(--pattern-gold-opacity);
    }

    /* Layer 2: lapis fill accents */
    .pattern-layer-lapis {
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      opacity: var(--pattern-lapis-opacity);
    }

    /* Rotation animation ŌĆö barely perceptible 120s full cycle */
    @media (prefers-reduced-motion: no-preference) {
      .pattern-layer-gold,
      .pattern-layer-lapis {
        animation: slowSpin 120s linear infinite;
        transform-origin: 50% 50%;
      }
      .pattern-layer-lapis {
        animation-delay: -60s; /* offset for subtle shimmer */
      }
    }

    @keyframes slowSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Radial vignette mask ŌĆö pattern bright centre, invisible edges */
    .pattern-mask {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse 60% 60% at 50% 50%,
        transparent 0%,
        transparent 35%,
        var(--color-bg) 75%
      );
      z-index: 2;
    }

    /* =============================================
       POEM CARD
       ============================================= */
    .card-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }

    .poem-card {
      text-align: center;
      direction: rtl;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .poem-title {
      font-family: var(--font-amiri);
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 700;
      color: var(--color-gold);
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .poem-poet {
      font-family: var(--font-kufi);
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      font-weight: 400;
      color: var(--color-text-secondary);
      letter-spacing: 0.04em;
    }

    .ornament-divider {
      color: var(--color-gold);
      font-size: 0.7rem;
      opacity: 0.8;
      line-height: 1;
    }

    .poem-verse {
      font-family: var(--font-amiri);
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 400;
      color: var(--color-text-primary);
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .dot-divider {
      color: var(--color-gold);
      font-size: 0.55rem;
      opacity: 0.6;
      line-height: 1;
    }

    /* =============================================
       MOBILE SAFETY
       ============================================= */
    @media (max-width: 375px) {
      .poem-title  { font-size: 1.35rem; }
      .poem-verse  { font-size: 1rem; }
      .poem-poet   { font-size: 0.72rem; }
    }
  </style>
</head>
<body>

  <!-- Label -->
  <div class="label" dir="ltr">Background 1 ŌĆö Star &amp; Cross</div>

  <!--
    =============================================
    PATTERN STAGE
    SVG tile: 100├Ś100 unit Islamic star-and-cross
    Octagram: two overlapping squares rotated 45┬░,
    inner radius = outer_radius ├Ś cos(ŽĆ/8) Ōēł 0.924
    Star centre at (50,50), outer points at r=30,
    inner notch at rŌēł19.1
    Cross fills in the four cardinal negative spaces
    =============================================
  -->
  <div class="pattern-stage" aria-hidden="true">

    <!--
      LAYER 1 ŌĆö gold outlines
      The SVG <pattern> tiles at 100├Ś100 user units.
      Each tile contains:
        - 1 full octagram centred at (50,50)
        - 4 half-octagram partial shapes at each tile edge midpoint
          (these combine across tiles to form the full stars in between)
        - Cross/plus shapes rotated 45┬░ in the four quadrant gaps
    -->
    <svg
      class="pattern-layer-gold"
      xmlns="http://www.w3.org/2000/svg"
      width="100%"
      height="100%"
    >
      <defs>
        <!--
          Octagram coordinates:
          Outer radius R = 18, inner radius r = R├Śtan(ŽĆ/8) Ōēł 7.46
          (using the square-overlap definition: r = R ├Ś sin(22.5┬░) / sin(67.5┬░))

          Actually for a proper regular 8/2 star:
          outer R = 18
          inner r = R ├Ś cos(45┬░/2) ├Ś tan(22.5┬░) ŌĆö but the cleanest
          approach is to compute the 16 vertices directly.

          For {8/2} star polygon (draw every 2nd of 8 equally-spaced points
          on a circle): that gives a regular octagram.
          Outer points at angles: 90┬░, 135┬░, 180┬░, 225┬░, 270┬░, 315┬░, 0┬░, 45┬░
          (i.e. k├Ś45┬░, starting at -90┬░ for top)
          Inner intersections: midway between outer points on a smaller circle.
          r_inner = R ├Ś cos(45┬░) / (1 + cos(45┬░)) ├Ś ...

          Simplest formula used here:
          Outer R=18, inner r=7.5 (from geometric construction of star-cross tile)
          16 alternating outer/inner points at 22.5┬░ increments starting at -90┬░
        -->

        <!--
          Pre-computed 16 vertices for octagram centred at (0,0):
          Outer R=18, inner r=7.46
          Angle step = 22.5┬░, start = -90┬░

          k=0:  -90┬░        outer: (0, -18)
          k=1:  -67.5┬░      inner: (6.896, -6.896) Ōēł (6.9, -6.9)
          k=2:  -45┬░        outer: (12.728, -12.728)
          k=3:  -22.5┬░      inner: (6.896, -6.896)... wait need to recalculate

          Let me use precise values:
          outer(k) = R ├Ś (sin(k├Ś45┬░), -cos(k├Ś45┬░))   k=0..7
          inner(k) = r ├Ś (sin(k├Ś45┬░+22.5┬░), -cos(k├Ś45┬░+22.5┬░))  k=0..7

          With R=18, r=7.46:
          outer[0]: R├Śsin(0┬░)=0,   R├Ś-cos(0┬░)=-18   ŌåÆ (0, -18)
          inner[0]: r├Śsin(22.5┬░)=2.858, r├Ś-cos(22.5┬░)=-6.891 ŌåÆ (2.858, -6.891) ŌåÆ (2.86, -6.89)
          outer[1]: R├Śsin(45┬░)=12.728, R├Ś-cos(45┬░)=-12.728 ŌåÆ (12.73, -12.73)
          inner[1]: r├Śsin(67.5┬░)=6.891, r├Ś-cos(67.5┬░)=-2.858 ŌåÆ (6.89, -2.86)
          outer[2]: R├Śsin(90┬░)=18, R├Ś-cos(90┬░)=0 ŌåÆ (18, 0)
          inner[2]: r├Śsin(112.5┬░)=6.891, r├Ś-cos(112.5┬░)=2.858 ŌåÆ (6.89, 2.86)
          outer[3]: R├Śsin(135┬░)=12.728, R├Ś-cos(135┬░)=12.728 ŌåÆ (12.73, 12.73)
          inner[3]: r├Śsin(157.5┬░)=2.858, r├Ś-cos(157.5┬░)=6.891 ŌåÆ (2.86, 6.89)
          outer[4]: (0, 18)
          inner[4]: (-2.86, 6.89)
          outer[5]: (-12.73, 12.73)
          inner[5]: (-6.89, 2.86)
          outer[6]: (-18, 0)
          inner[6]: (-6.89, -2.86)
          outer[7]: (-12.73, -12.73)
          inner[7]: (-2.86, -6.89)
        -->

        <pattern id="starCrossGold" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">

          <!-- BACKGROUND: transparent -->

          <!--
            FULL STAR centred at (50,50)
            16 alternating outer/inner vertices, in order:
          -->
          <polygon
            points="
              50,32
              52.86,43.11
              62.73,37.27
              56.89,47.14
              68,50
              56.89,52.86
              62.73,62.73
              52.86,56.89
              50,68
              47.14,56.89
              37.27,62.73
              43.11,52.86
              32,50
              43.11,47.14
              37.27,37.27
              47.14,43.11
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
            stroke-linejoin="miter"
          />

          <!--
            CORNER QUARTER-STARS ŌĆö these are the partial stars that appear
            at each corner of the tile. Each corner shows 1/4 of a star.
            Together with the adjacent tile's portions they form full stars.
            Centred at (0,0), (100,0), (0,100), (100,100).
          -->

          <!-- Corner (0,0): visible quadrant is bottom-right -->
          <polygon
            points="
              0,0
              2.86,6.89
              0,18
              -2.86,6.89
              0,0
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
            stroke-linejoin="miter"
          />
          <polygon
            points="
              0,0
              6.89,2.86
              18,0
              6.89,-2.86
              0,0
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
            stroke-linejoin="miter"
          />

          <!-- =========================================
               CROSS/PLUS shapes in the four gap areas
               These sit at the midpoints between stars:
               (50,0), (100,50), (50,100), (0,50)
               Each cross is a rotated square (45┬░), arms length ~8
               ========================================= -->

          <!-- Top edge midpoint cross ŌĆö centred at (50,0) -->
          <polygon
            points="
              50,0
              53.5,-3.5
              50,-7
              46.5,-3.5

              50,0
              53.5,3.5
              50,7
              46.5,3.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />
          <!-- Right arm -->
          <polygon
            points="
              50,0
              53.5,-3.5
              57,0
              53.5,3.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />
          <!-- Left arm -->
          <polygon
            points="
              50,0
              46.5,-3.5
              43,0
              46.5,3.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- Right edge midpoint cross ŌĆö centred at (100,50) -->
          <polygon
            points="
              100,46.5
              103.5,50
              100,53.5
              96.5,50
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />
          <polygon
            points="
              93,50
              96.5,46.5
              100,50
              96.5,53.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- Bottom edge midpoint cross ŌĆö centred at (50,100) -->
          <polygon
            points="
              46.5,100
              50,96.5
              53.5,100
              50,103.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />
          <polygon
            points="
              46.5,93
              50,96.5
              53.5,93
              50,89.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- Left edge midpoint cross ŌĆö centred at (0,50) -->
          <polygon
            points="
              0,46.5
              3.5,50
              0,53.5
              -3.5,50
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />
          <polygon
            points="
              7,50
              3.5,46.5
              0,50
              3.5,53.5
            "
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!--
            CONNECTING LINES between star points and cross arms
            These are the straight edges of the khatam pattern that
            connect the tip of a star to the corner of a cross arm.
            There are 8 such connections per centre star.
          -->

          <!-- NE quadrant: star tip at (62.73,37.27) ŌåÆ cross corner near (57,43) approx -->
          <!-- We draw the full border lines of the interlocking diamonds -->

          <!-- Top-right diamond (NE gap, between centre star and corner star) -->
          <polyline points="50,32 57,43 62.73,37.27" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Top-left diamond -->
          <polyline points="50,32 43,43 37.27,37.27" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Right-top diamond -->
          <polyline points="68,50 57,43 62.73,37.27" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Right-bottom diamond -->
          <polyline points="68,50 57,57 62.73,62.73" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Bottom-right diamond -->
          <polyline points="50,68 57,57 62.73,62.73" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Bottom-left diamond -->
          <polyline points="50,68 43,57 37.27,62.73" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Left-bottom diamond -->
          <polyline points="32,50 43,57 37.27,62.73" fill="none" stroke="#c5a059" stroke-width="0.5"/>
          <!-- Left-top diamond -->
          <polyline points="32,50 43,43 37.27,37.27" fill="none" stroke="#c5a059" stroke-width="0.5"/>

          <!-- Cross shapes in the 4 cardinal quadrant gaps (full crosses, centred in each gap) -->
          <!-- These are the 45┬░-rotated square (diamond) shapes in each gap -->

          <!-- NE gap cross-diamond, centred ~(75,25) -->
          <polygon
            points="75,18  82,25  75,32  68,25"
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- SE gap cross-diamond, centred ~(75,75) -->
          <polygon
            points="75,68  82,75  75,82  68,75"
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- SW gap cross-diamond, centred ~(25,75) -->
          <polygon
            points="25,68  32,75  25,82  18,75"
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- NW gap cross-diamond, centred ~(25,25) -->
          <polygon
            points="25,18  32,25  25,32  18,25"
            fill="none"
            stroke="#c5a059"
            stroke-width="0.5"
          />

          <!-- Connecting lines from centre star to quadrant cross-diamonds -->
          <line x1="62.73" y1="37.27" x2="68" y2="25" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="62.73" y1="37.27" x2="75" y2="32" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="62.73" y1="62.73" x2="75" y2="68" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="62.73" y1="62.73" x2="68" y2="75" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="37.27" y1="62.73" x2="32" y2="75" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="37.27" y1="62.73" x2="25" y2="68" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="37.27" y1="37.27" x2="25" y2="32" stroke="#c5a059" stroke-width="0.5"/>
          <line x1="37.27" y1="37.27" x2="32" y2="25" stroke="#c5a059" stroke-width="0.5"/>

          <!-- Connecting lines from quadrant cross-diamonds to tile-edge stars -->
          <!-- NE diamond to top-edge star (50,0) and right-edge star (100,50) -->
          <line x1="75" y1="18" x2="57" y2="7"   stroke="#c5a059" stroke-width="0.5"/>
          <line x1="75" y1="18" x2="93" y2="7"   stroke="#c5a059" stroke-width="0.5"/>
          <line x1="82" y1="25" x2="93" y2="7"   stroke="#c5a059" stroke-width="0.5"/>
          <line x1="82" y1="25" x2="93" y2="43"  stroke="#c5a059" stroke-width="0.5"/>

          <!-- SE diamond to right-edge star and bottom-edge star -->
          <line x1="82" y1="75" x2="93" y2="57"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="82" y1="75" x2="93" y2="93"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="75" y1="82" x2="93" y2="93"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="75" y1="82" x2="57" y2="93"  stroke="#c5a059" stroke-width="0.5"/>

          <!-- SW diamond to bottom-edge star and left-edge star -->
          <line x1="25" y1="82" x2="7"  y2="93"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="25" y1="82" x2="43" y2="93"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="18" y1="75" x2="7"  y2="57"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="18" y1="75" x2="7"  y2="93"  stroke="#c5a059" stroke-width="0.5"/>

          <!-- NW diamond to left-edge star and top-edge star -->
          <line x1="18" y1="25" x2="7"  y2="7"   stroke="#c5a059" stroke-width="0.5"/>
          <line x1="18" y1="25" x2="7"  y2="43"  stroke="#c5a059" stroke-width="0.5"/>
          <line x1="25" y1="18" x2="7"  y2="7"   stroke="#c5a059" stroke-width="0.5"/>
          <line x1="25" y1="18" x2="43" y2="7"   stroke="#c5a059" stroke-width="0.5"/>

        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="url(#starCrossGold)" />
    </svg>

    <!--
      LAYER 2 ŌĆö lapis fill on alternating star shapes
      Fills the interior of the centre star polygon only, at very low opacity
    -->
    <svg
      class="pattern-layer-lapis"
      xmlns="http://www.w3.org/2000/svg"
      width="100%"
      height="100%"
    >
      <defs>
        <pattern id="starCrossLapis" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">

          <!-- Filled centre star -->
          <polygon
            points="
              50,32
              52.86,43.11
              62.73,37.27
              56.89,47.14
              68,50
              56.89,52.86
              62.73,62.73
              52.86,56.89
              50,68
              47.14,56.89
              37.27,62.73
              43.11,52.86
              32,50
              43.11,47.14
              37.27,37.27
              47.14,43.11
            "
            fill="#2a5a8c"
          />

          <!-- Filled quadrant diamond crosses ŌĆö alternating pattern -->
          <polygon points="75,18  82,25  75,32  68,25" fill="#2a5a8c" />
          <polygon points="25,68  32,75  25,82  18,75" fill="#2a5a8c" />

        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="url(#starCrossLapis)" />
    </svg>

  </div><!-- /.pattern-stage -->

  <!-- Radial mask ŌĆö dims pattern toward edges -->
  <div class="pattern-mask" aria-hidden="true"></div>

  <!-- =============================================
       POEM CARD
       ============================================= -->
  <main class="card-wrapper">
    <article class="poem-card" dir="rtl" lang="ar">

      <h1 class="poem-title">┘Ŗž¦ ┘ä┘Ŗ┘ä ž¦┘äžĄž©┘æ ┘ģž¬┘ē ž║ž»┘ć</h1>

      <p class="poem-poet" lang="ar">ž¦┘äžŁžĄž▒┘Ŗ ž¦┘ä┘é┘Ŗž▒┘łž¦┘å┘Ŗ</p>

      <span class="ornament-divider" aria-hidden="true">ŌØŖ</span>

      <p class="poem-verse">žŻ┘é┘Ŗž¦┘ģ┘Å ž¦┘äž│ž¦ž╣ž®┘É ┘ģ┘łž╣┘Éž»┘Å┘ć┘Å</p>

      <span class="dot-divider" aria-hidden="true">Ō£”</span>

      <p class="poem-verse">žŻ┘ģ ┘é┘Ŗž¦┘ģ┘Ŗ žŁ┘Ŗ┘å žŻž┤ž¦┘ćž»┘Å┘ć┘Å</p>

    </article>
  </main>

</body>
</html>
