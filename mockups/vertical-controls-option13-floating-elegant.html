<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 13 - Floating Elegant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #fafbfc;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                linear-gradient(to bottom, #fafbfc 0%, #f5f7fa 100%);
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 70px 60px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 46px;
            margin-bottom: 52px;
            color: #1a1a1a;
            font-weight: 500;
            letter-spacing: -0.5px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 34px;
            line-height: 2.6;
            color: #2a2a2a;
            margin-bottom: 38px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .poem-text.zoom-medium {
            font-size: 42px;
            line-height: 2.7;
        }

        .poem-text.zoom-large {
            font-size: 50px;
            line-height: 2.8;
        }

        .poem-title.zoom-medium {
            font-size: 54px;
        }

        .poem-title.zoom-large {
            font-size: 62px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 26px;
            color: #6a6a6a;
            margin-top: 52px;
            font-style: italic;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .transliteration {
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 19px;
            color: #9a9a9a;
            font-style: italic;
            margin-top: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .transliteration.active {
            opacity: 1;
            max-height: 500px;
            margin-top: 28px;
        }

        /* Floating Glass Circles Control Bar */
        .control-bar {
            position: fixed;
            right: 54px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-bar:hover {
            transform: translateY(-50%) translateX(-6px);
        }

        .control-btn {
            width: 72px;
            height: 72px;
            border: none;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #3a3a3a;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.08),
                0 4px 12px rgba(0, 0, 0, 0.06),
                0 0 0 1px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.8) 0%, 
                transparent 60%);
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-btn::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.4), 
                rgba(139, 92, 246, 0.4));
            filter: blur(12px);
            opacity: 0;
            z-index: -1;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-btn:hover {
            transform: scale(1.15) translateY(-4px);
            box-shadow: 
                0 12px 32px rgba(0, 0, 0, 0.12),
                0 8px 20px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(99, 102, 241, 0.15),
                inset 0 2px 0 rgba(255, 255, 255, 0.9);
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:hover::after {
            opacity: 0.5;
        }

        .control-btn:active {
            transform: scale(1.08) translateY(-2px);
        }

        .control-btn.active {
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.85) 0%, 
                rgba(139, 92, 246, 0.85) 100%);
            color: #ffffff;
            box-shadow: 
                0 12px 32px rgba(99, 102, 241, 0.35),
                0 8px 20px rgba(139, 92, 246, 0.25),
                0 0 0 1px rgba(99, 102, 241, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.4);
        }

        .control-btn.active::after {
            opacity: 0.8;
            animation: elegant-glow 2.5s ease-in-out infinite;
        }

        @keyframes elegant-glow {
            0%, 100% {
                opacity: 0.6;
                filter: blur(12px);
                transform: scale(1);
            }
            50% {
                opacity: 1;
                filter: blur(16px);
                transform: scale(1.1);
            }
        }

        .icon {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
        }

        .control-btn:hover .icon {
            transform: scale(1.15);
        }

        /* Elegant Tooltip */
        .tooltip {
            position: absolute;
            right: 96px;
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.95) 0%, 
                rgba(30, 30, 30, 0.95) 100%);
            backdrop-filter: blur(16px);
            color: #ffffff;
            padding: 11px 22px;
            border-radius: 18px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 400;
            letter-spacing: 0.4px;
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 106px;
        }

        /* Floating animation on load */
        @keyframes float-in {
            from {
                opacity: 0;
                transform: translateX(40px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .control-btn {
            animation: float-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .control-btn:nth-child(1) { animation-delay: 0.1s; }
        .control-btn:nth-child(2) { animation-delay: 0.2s; }
        .control-btn:nth-child(3) { animation-delay: 0.3s; }

        /* Gentle floating effect */
        @keyframes gentle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .control-btn:hover {
            animation: gentle-float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                uḥibbuki fī zaman al-khawf wa-l-qahr<br>
                uḥibbuki fī zaman al-ḥarb wa-l-ḍajar<br>
                wa-uḥibbuki ḥīna yamūt al-kalām<br>
                wa-yabqā al-ṣadā fī faḍāʾ al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave()">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">حفظ القصيدة</span>
            </button>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom()">
                <span class="icon">A+</span>
                <span class="tooltip">تكبير النص</span>
            </button>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
                <span class="icon">ع/A</span>
                <span class="tooltip">النقحرة اللاتينية</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function toggleSave() {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom() {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit() {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
