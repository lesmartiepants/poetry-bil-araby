<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Warmth - Vertical Controls</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #2a2520; --surface: #302b25; --text: #e8e0d4;
    --text-dim: rgba(232,224,212,0.5); --gold: #C5A059;
    --gold-dim: rgba(197,160,89,0.15);
    --shadow-dark: rgba(0,0,0,0.35); --shadow-light: rgba(60,54,44,0.25);
  }
  .light {
    --bg: #e8e0d4; --surface: #ddd5c8; --text: #2a2520;
    --text-dim: rgba(42,37,32,0.5);
    --shadow-dark: rgba(0,0,0,0.12); --shadow-light: rgba(255,255,255,0.7);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden; transition: background 0.5s, color 0.5s;
  }

  /* Main App */
  #app { display: block; min-height: 100vh; padding: 2rem 1.5rem 5rem; padding-right: 5rem; }
  .inner { max-width: 560px; margin: 0 auto; }

  .app-brand { display: flex; align-items: flex-end; gap: 0.4rem; margin-bottom: 2rem; user-select: none; }
  .app-brand .en { font-family: 'Forum', serif; font-size: 1.5rem; color: var(--gold); line-height: 1; }
  .app-brand .ar { font-family: 'Reem Kufi', sans-serif; font-weight: 700; font-size: 1rem; color: var(--gold); line-height: 1.2; opacity: 0.8; }

  /* Neumorphic poem card */
  .poem-card {
    background: var(--surface); border-radius: 24px;
    padding: 2.5rem 2rem; margin-bottom: 1.5rem;
    box-shadow:
      8px 8px 16px var(--shadow-dark),
      -6px -6px 12px var(--shadow-light);
    border: 1px solid var(--gold-dim);
  }
  .poem-card::before {
    content: ''; display: block; width: 40px; height: 3px;
    background: var(--gold); border-radius: 2px;
    margin: 0 auto 1.5rem; opacity: 0.5;
  }

  .poem-content {
    font-family: 'Amiri', serif; font-size: clamp(1.3rem, 3.5vw, 1.7rem);
    line-height: 2.4; text-align: center;
  }
  .hemistich { display: block; margin: 0.3em 0; }

  .poet-name {
    text-align: center; margin-top: 1.5rem; padding-top: 1rem;
    border-top: 1px solid var(--gold-dim);
    font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: 500; color: var(--gold);
  }

  /* Translation row */
  .translation-row {
    display: none; font-family: 'Tajawal', sans-serif; font-size: 14px;
    color: var(--text-dim); text-align: center; padding: 10px 0; direction: ltr;
  }
  .translation-row.visible { display: block; }

  /* Inline transliteration */
  .verse-translit {
    display: none; font-family: 'Tajawal', sans-serif; font-size: 12px;
    color: var(--text-dim); font-style: italic; direction: ltr;
    text-align: center; margin-top: 2px;
  }
  .verse-translit.visible { display: block; }

  /* ===== BOTTOM ACTION BAR ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--surface);
    padding: 12px 8px; direction: ltr;
    box-shadow: -4px 0 12px var(--shadow-dark), 0 -2px 8px var(--shadow-light);
    border-top: 1px solid var(--gold-dim);
  }
  .bottom-nav .nav-items-wrap {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    max-width: 400px; margin: 0 auto;
  }
  .nav-item {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: none; border-radius: 12px; cursor: pointer;
    color: var(--gold); opacity: 0.6;
    transition: all 0.25s ease;
    box-shadow: 3px 3px 6px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
  }
  .nav-item:hover { opacity: 1; transform: scale(1.05); }
  .nav-item.active {
    box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
  }

  /* Settings panel */
  .settings-panel {
    display: none; position: fixed; right: 64px; top: 50%; transform: translateY(-50%);
    background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 16px;
    padding: 16px; z-index: 59;
    box-shadow: 6px 6px 12px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    width: 180px; font-size: 13px;
  }
  .settings-panel.visible { display: block; }
  .settings-panel h4 { margin-bottom: 8px; color: var(--gold); }
  .settings-panel label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; opacity: 0.8; }

  /* ===== VERTICAL CONTROLS: Pressed Pill Strip ===== */
  .vc-strip {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    z-index: 60; display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 52px; padding: 10px 4px;
    background: var(--surface);
    border-radius: 20px 0 0 20px;
    border: 1px solid var(--gold-dim);
    border-right: none;
    box-shadow:
      -4px 4px 12px var(--shadow-dark),
      2px -2px 8px var(--shadow-light);
  }

  .vc-toggle {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    /* Neumorphic raised pill */
    background: var(--surface);
    border: none; border-radius: 12px; cursor: pointer;
    color: var(--gold); opacity: 0.6;
    transition: all 0.25s ease; position: relative;
    box-shadow:
      3px 3px 6px var(--shadow-dark),
      -2px -2px 4px var(--shadow-light);
  }

  .vc-toggle:hover {
    opacity: 1;
    box-shadow:
      4px 4px 8px var(--shadow-dark),
      -3px -3px 6px var(--shadow-light);
    transform: scale(1.05);
  }

  /* Active: inset shadow (pressed in) */
  .vc-toggle.active {
    opacity: 1;
    box-shadow:
      inset 3px 3px 6px var(--shadow-dark),
      inset -2px -2px 4px var(--shadow-light);
    color: var(--gold);
  }

  .vc-toggle i { width: 18px; height: 18px; }
  .vc-badge {
    position: absolute; top: 2px; right: 2px;
    font-family: 'Tajawal', sans-serif; font-size: 8px; font-weight: 700;
    color: var(--bg); background: var(--gold);
    padding: 1px 3px; border-radius: 3px; line-height: 1.2;
  }

  @media (max-width: 768px) {
    #app { padding-right: 4rem; }
    .poem-card { padding: 2rem 1.5rem; }
    .vc-strip { width: 48px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="inner">
    <div class="app-brand">
      <span class="en">poetry</span>
      <span class="ar">بالعربي</span>
    </div>

    <div class="poem-card">
      <div class="poem-content">
        <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
        <div class="verse-translit">Ana al-bahru fi ahsha'ihi al-durru kaminun</div>
        <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
        <div class="verse-translit">fa-hal sa'alu al-ghawwasa an sadafati</div>
      </div>
      <div class="translation-row" id="translationRow">
        I am the sea, in whose depths pearls lie hidden / Have they asked the diver about my shells?
      </div>
      <div class="poet-name">احمد شوقي</div>
    </div>
  </div>

  <!-- Bottom Action Bar -->
  <nav class="bottom-nav">
    <div class="nav-items-wrap">
      <button class="nav-item" aria-label="Next poem"><i data-lucide="shuffle" style="width:20px;height:20px"></i></button>
      <button class="nav-item" aria-label="Save poem"><i data-lucide="heart" style="width:20px;height:20px"></i></button>
      <button class="nav-item" aria-label="Listen"><i data-lucide="headphones" style="width:20px;height:20px"></i></button>
      <button class="nav-item" aria-label="Share"><i data-lucide="share-2" style="width:20px;height:20px"></i></button>
    </div>
  </nav>

  <!-- Vertical Controls: Pressed Pill Strip -->
  <nav class="vc-strip" aria-label="Toggle controls">
    <button class="vc-toggle" data-action="translation" aria-label="Toggle translation">
      <span style="font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;line-height:1;letter-spacing:-0.5px">ع<span style="opacity:0.4">|</span>A</span>
    </button>
    <button class="vc-toggle" data-action="transliteration" aria-label="Toggle transliteration">
      <i data-lucide="text-cursor-input"></i>
    </button>
    <button class="vc-toggle" data-action="textsize" aria-label="Cycle text size">
      <i data-lucide="type"></i>
      <span class="vc-badge">M</span>
    </button>
    <button class="vc-toggle" data-action="settings" aria-label="Toggle settings">
      <i data-lucide="settings"></i>
    </button>
  </nav>

  <div class="settings-panel" id="settingsPanel">
    <h4>Settings</h4>
    <label><input type="checkbox"> Light mode</label>
    <label><input type="checkbox"> Tashkeel</label>
    <label><input type="checkbox" checked> Animations</label>
  </div>
</div>

<script>
(function() {
  'use strict';

  document.querySelectorAll('.vc-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var action = btn.dataset.action;
      if (action === 'textsize') {
        var sizes = ['S','M','L','XL'];
        var badge = btn.querySelector('.vc-badge');
        var idx = sizes.indexOf(badge.textContent);
        idx = (idx + 1) % sizes.length;
        badge.textContent = sizes[idx];
        document.querySelector('.poem-content').style.fontSize =
          {'S':'1rem','M':'1.25rem','L':'1.5rem','XL':'2rem'}[sizes[idx]];
      } else if (action === 'translation') {
        btn.classList.toggle('active');
        document.getElementById('translationRow').classList.toggle('visible');
      } else if (action === 'transliteration') {
        btn.classList.toggle('active');
        document.querySelectorAll('.verse-translit').forEach(function(el) { el.classList.toggle('visible'); });
      } else if (action === 'settings') {
        btn.classList.toggle('active');
        document.getElementById('settingsPanel').classList.toggle('visible');
      } else {
        btn.classList.toggle('active');
      }
    });
  });

  lucide.createIcons();
})();
</script>
</body>
</html>
