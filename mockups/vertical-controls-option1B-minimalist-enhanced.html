<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 1B - Minimalist Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 60px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 42px;
            margin-bottom: 40px;
            color: #ffffff;
            opacity: 0.95;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 32px;
            line-height: 2.4;
            color: #e8e8e8;
            margin-bottom: 30px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .poem-text.zoom-medium {
            font-size: 40px;
            line-height: 2.5;
        }

        .poem-text.zoom-large {
            font-size: 48px;
            line-height: 2.6;
        }

        .poem-title.zoom-medium {
            font-size: 50px;
        }

        .poem-title.zoom-large {
            font-size: 58px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 24px;
            color: #a8a8b8;
            margin-top: 40px;
            font-style: italic;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transliteration {
            font-family: 'Segoe UI', sans-serif;
            font-size: 18px;
            color: #8899aa;
            font-style: italic;
            margin-top: 8px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transliteration.active {
            opacity: 1;
            max-height: 500px;
            margin-top: 15px;
        }

        /* Enhanced Glass Control Bar */
        .control-bar {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-bar:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 12px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 0 0 1px rgba(0, 0, 0, 0.1);
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(-4px) scale(1.05);
            box-shadow: 
                0 4px 16px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .control-btn:active {
            transform: translateX(-2px) scale(0.98);
            transition-duration: 0.1s;
        }

        .control-btn.active {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 
                0 0 20px rgba(99, 102, 241, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .control-btn.active .icon {
            color: #818cf8;
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6));
        }

        .icon {
            color: #d0d0e0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .control-btn:hover .icon {
            color: #ffffff;
            transform: scale(1.1);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.15) 50%, 
                transparent 100%);
            margin: 8px 0;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            right: 76px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 84px;
        }

        /* Glow effect on active */
        @keyframes glow-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .control-btn.active::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(139, 92, 246, 0.4));
            border-radius: 18px;
            z-index: -1;
            filter: blur(8px);
            animation: glow-pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                uḥibbuki fī zaman al-khawf wa-l-qahr<br>
                uḥibbuki fī zaman al-ḥarb wa-l-ḍajar<br>
                wa-uḥibbuki ḥīna yamūt al-kalām<br>
                wa-yabqā al-ṣadā fī faḍāʾ al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave(event)">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">حفظ القصيدة</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom(event)">
                <span class="icon">A+</span>
                <span class="tooltip">تكبير النص</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit(event)">
                <span class="icon">ع/A</span>
                <span class="tooltip">النقحرة اللاتينية</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function createRipple(event, button) {
            const ripple = document.createElement('span');
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;

            ripple.className = 'ripple';
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';

            button.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function toggleSave(event) {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            createRipple(event, btn);
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom(event) {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            createRipple(event, btn);
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit(event) {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            createRipple(event, btn);
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
