<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A3 Ink Mono Archive - E2E Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --gold: #C5A059;
      --dark-bg: #0c0c0e;
      --dark-surface: #131315;
      --dark-line: #222224;
      --dark-text: #e0ddd8;
      --dark-muted: #888580;
      --light-bg: #FDFCF8;
      --light-surface: #FFFFFF;
      --light-line: #e8e5de;
      --light-text: #1a1918;
      --light-muted: #6b6966;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', system-ui, sans-serif;
      background: var(--dark-bg);
      color: var(--dark-text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    body.light {
      background: var(--light-bg);
      color: var(--light-text);
    }

    /* ===== SPLASH: SVG BRUSH STROKE ANIMATION ===== */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--dark-bg);
      transition: opacity 1s ease, visibility 1s ease;
    }

    .splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .ink-container {
      position: relative;
      width: clamp(280px, 60vw, 600px);
      text-align: center;
    }

    /* SVG brush stroke calligraphy */
    .brush-svg {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(280px, 70vw, 520px);
      height: 200px;
      overflow: visible;
      direction: rtl;
    }

    /* Real Arabic calligraphy text rendered as SVG with ink-draw effect */
    .calligraphy-text {
      font-family: 'Amiri', serif;
      fill: none;
      stroke: var(--dark-text);
      stroke-width: 0.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      paint-order: stroke fill;
      opacity: 0;
      animation: calligraphyReveal 1.8s ease forwards;
    }

    .calligraphy-text.line-1 {
      animation-delay: 0.2s;
      font-size: 38px;
    }

    .calligraphy-text.line-2 {
      animation-delay: 1.1s;
      font-size: 32px;
    }

    .calligraphy-text.line-3 {
      animation-delay: 2.0s;
      font-size: 28px;
    }

    body.light .calligraphy-text {
      stroke: var(--light-text);
    }

    /* Thick accent underline */
    .brush-thick {
      fill: none;
      stroke: var(--dark-muted);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: drawStroke 2s ease 0.3s forwards;
      opacity: 0.12;
      will-change: stroke-dashoffset;
    }

    body.light .brush-thick {
      stroke: var(--light-muted);
    }

    @keyframes drawStroke {
      to { stroke-dashoffset: 0; }
    }

    @keyframes calligraphyReveal {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Ink splatter dots that appear after strokes */
    .ink-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--dark-muted);
      opacity: 0;
      animation: dotAppear 0.3s ease forwards;
      will-change: opacity;
    }

    body.light .ink-dot { background: var(--light-muted); }

    @keyframes dotAppear {
      0% { opacity: 0; transform: scale(0); }
      100% { opacity: 0.4; transform: scale(1); }
    }

    .splash-title {
      font-family: 'Amiri', serif;
      font-size: clamp(40px, 8vw, 80px);
      color: var(--dark-text);
      line-height: 1.2;
      opacity: 0;
      animation: fadeInUp 1s ease 2s forwards;
      position: relative;
      will-change: opacity, transform;
    }

    body.light .splash-title { color: var(--light-text); }

    .splash-sub {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(12px, 2vw, 16px);
      color: var(--dark-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      direction: ltr;
      margin-top: 16px;
      opacity: 0;
      animation: fadeInUp 1s ease 2.4s forwards;
      will-change: opacity, transform;
    }

    body.light .splash-sub { color: var(--light-muted); }

    .splash-line {
      width: 60px;
      height: 1px;
      background: var(--dark-muted);
      margin: 24px auto 0;
      opacity: 0;
      animation: fadeInUp 1s ease 2.6s forwards;
      will-change: opacity, transform;
    }

    body.light .splash-line { background: var(--light-muted); }

    .splash-enter {
      margin-top: 32px;
      padding: 12px 36px;
      background: transparent;
      border: 1px solid var(--dark-muted);
      color: var(--dark-text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeInUp 1s ease 2.8s forwards;
      min-width: 44px;
      min-height: 44px;
      will-change: opacity, transform;
    }

    body.light .splash-enter {
      border-color: var(--light-muted);
      color: var(--light-text);
    }

    .splash-enter:hover {
      background: var(--dark-text);
      color: var(--dark-bg);
    }

    body.light .splash-enter:hover {
      background: var(--light-text);
      color: var(--light-bg);
    }

    /* ===== WALKTHROUGH: TYPEWRITER ===== */
    .walkthrough {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--dark-bg);
      padding: 20px;
    }

    .walkthrough.active { display: flex; }
    body.light .walkthrough { background: var(--light-bg); }

    .type-steps {
      max-width: 500px;
      width: 100%;
    }

    .type-step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--dark-line);
      opacity: 0;
      transform: translateY(16px);
    }

    .type-step.revealed {
      animation: typeReveal 0.6s ease forwards;
    }

    @keyframes typeReveal {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body.light .type-step { border-color: var(--light-line); }

    .type-num {
      font-family: 'Amiri', serif;
      font-size: 32px;
      color: var(--dark-muted);
      line-height: 1;
      min-width: 32px;
    }

    body.light .type-num { color: var(--light-muted); }

    .type-content h3 {
      font-family: 'Tajawal', sans-serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .type-content p {
      font-size: 14px;
      color: var(--dark-muted);
      line-height: 1.6;
    }

    /* Typewriter cursor */
    .type-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--dark-text);
      margin-left: 2px;
      animation: cursorBlink 0.8s step-end infinite;
      vertical-align: text-bottom;
      will-change: opacity;
    }

    body.light .type-cursor { background: var(--light-text); }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    body.light .type-content p { color: var(--light-muted); }

    .walk-enter {
      margin-top: 32px;
      padding: 12px 36px;
      background: var(--dark-text);
      color: var(--dark-bg);
      border: none;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      min-width: 44px;
      min-height: 44px;
    }

    .walk-enter.revealed {
      animation: typeReveal 0.5s ease forwards;
    }

    body.light .walk-enter {
      background: var(--light-text);
      color: var(--light-bg);
    }

    /* ===== MAIN APP ===== */
    .main-app {
      display: none;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .main-app.active { display: block; }

    /* Top bar - monochrome */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--dark-bg);
      border-bottom: 1px solid var(--dark-line);
      direction: ltr;
    }

    body.light .top-bar {
      background: var(--light-bg);
      border-color: var(--light-line);
    }

    .top-brand {
      font-family: 'Amiri', serif;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .top-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--dark-muted);
      cursor: pointer;
      transition: color 0.2s ease;
    }

    body.light .top-btn { color: var(--light-muted); }
    .top-btn:hover { color: var(--dark-text); }
    body.light .top-btn:hover { color: var(--light-text); }

    /* Mono Reader */
    .reader {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 20px 40px;
    }

    .poem-header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--dark-line);
    }

    body.light .poem-header { border-color: var(--light-line); }

    .poem-header h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--dark-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      direction: ltr;
    }

    body.light .poem-header h2 { color: var(--light-muted); }

    .poem-header h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(24px, 4vw, 36px);
      margin-top: 8px;
    }

    .poem-body {
      font-family: 'Amiri', serif;
      font-size: clamp(22px, 3.5vw, 30px);
      line-height: 2.4;
      text-align: center;
      direction: rtl;
    }

    .verse {
      padding: 12px 0;
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
      will-change: opacity, transform;
    }

    .verse:nth-child(1) { animation-delay: 0.2s; }
    .verse:nth-child(2) { animation-delay: 0.5s; }
    .verse:nth-child(3) { animation-delay: 0.8s; }

    /* Dramatic verse separator - animated ink stroke */
    .verse-divider {
      width: 30px;
      height: 1px;
      background: var(--dark-line);
      margin: 0 auto;
      position: relative;
      overflow: visible;
    }

    .verse-divider::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--dark-muted);
      transform: scaleX(0);
      transform-origin: left;
      animation: dividerDraw 0.8s ease 1.5s forwards;
      will-change: transform;
    }

    @keyframes dividerDraw {
      to { transform: scaleX(1); }
    }

    body.light .verse-divider { background: var(--light-line); }
    body.light .verse-divider::after { background: var(--light-muted); }

    /* Minimal icon rail */
    .icon-rail {
      position: fixed;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 40;
      direction: ltr;
    }

    .rail-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--dark-muted);
      cursor: pointer;
      transition: color 0.2s ease;
      border-radius: 8px;
    }

    body.light .rail-btn { color: var(--light-muted); }
    .rail-btn:hover { color: var(--dark-text); background: rgba(255,255,255,0.03); }
    body.light .rail-btn:hover { color: var(--light-text); background: rgba(0,0,0,0.03); }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 8px 0;
      background: var(--dark-bg);
      border-top: 1px solid var(--dark-line);
      direction: ltr;
    }

    body.light .bottom-nav {
      background: var(--light-bg);
      border-color: var(--light-line);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 20px;
      background: transparent;
      border: none;
      color: var(--dark-muted);
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 11px;
      transition: color 0.2s ease;
      min-width: 44px;
      min-height: 44px;
    }

    body.light .nav-item { color: var(--light-muted); }
    .nav-item.active { color: var(--dark-text); }
    body.light .nav-item.active { color: var(--light-text); }

    /* ===== KEYFRAMES ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .brush-stroke, .brush-thick {
        stroke-dashoffset: 0 !important;
      }
      .type-cursor { animation: none; opacity: 1; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .icon-rail { display: none; }
      .reader { padding: 70px 16px 40px; }
      .brush-svg { width: 240px; height: 140px; }
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div class="splash" id="splash">
    <div class="ink-container">
      <!-- SVG Real Arabic Calligraphy with ink-reveal animation -->
      <svg class="brush-svg" viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Background accent underline stroke (thick, faded) -->
        <path class="brush-thick" d="M60 170 C140 160, 280 155, 460 165"/>
        <!-- Real Arabic poetry lines rendered as SVG text with ink aesthetic -->
        <!-- Line 1: قفا نبك من ذكرى حبيب ومنزل (Imru' al-Qais) -->
        <text class="calligraphy-text line-1"
              x="260" y="70"
              text-anchor="middle"
              dominant-baseline="middle">قِفَا نَبْكِ مِنْ ذِكْرَى حَبِيبٍ وَمَنْزِلِ</text>
        <!-- Line 2: على قدر أهل العزم تأتي العزائم (Al-Mutanabbi) -->
        <text class="calligraphy-text line-2"
              x="260" y="120"
              text-anchor="middle"
              dominant-baseline="middle">عَلَى قَدْرِ أَهْلِ الْعَزْمِ تَأْتِي الْعَزَائِمُ</text>
        <!-- Line 3: أنا البحر في أحشائه الدر كامن (Shawqi) -->
        <text class="calligraphy-text line-3"
              x="260" y="163"
              text-anchor="middle"
              dominant-baseline="middle">أَنَا الْبَحْرُ فِي أَحْشَائِهِ الدُّرُّ كَامِنٌ</text>
      </svg>

      <!-- Ink splatter accent dots -->
      <div class="ink-dot" style="top: -8px; right: 28%; animation-delay: 2.4s;"></div>
      <div class="ink-dot" style="top: 4px; right: 18%; animation-delay: 2.6s; width: 3px; height: 3px;"></div>
      <div class="ink-dot" style="top: -15px; right: 52%; animation-delay: 2.8s; width: 5px; height: 5px;"></div>
      <div class="ink-dot" style="top: -6px; right: 68%; animation-delay: 3.0s;"></div>

      <h1 class="splash-title">Poetry bil Araby</h1>
      <p class="splash-sub" style="direction:rtl;letter-spacing:0.05em;">شعر بالعربي</p>
      <div class="splash-line"></div>
    </div>
    <button class="splash-enter" onclick="enterWalkthrough()">Enter Archive</button>
  </div>

  <!-- WALKTHROUGH with typewriter reveal -->
  <div class="walkthrough" id="walkthrough">
    <div class="type-steps" id="typeSteps">
      <div class="type-step" id="step0">
        <span class="type-num">1</span>
        <div class="type-content">
          <h3>&#1575;&#1603;&#1578;&#1588;&#1601; &#1575;&#1604;&#1602;&#1589;&#1575;&#1574;&#1583;</h3>
          <p><span id="typeText0"></span><span class="type-cursor" id="cursor0"></span></p>
        </div>
      </div>
      <div class="type-step" id="step1">
        <span class="type-num">2</span>
        <div class="type-content">
          <h3>&#1575;&#1587;&#1578;&#1605;&#1593; &#1604;&#1604;&#1573;&#1604;&#1602;&#1575;&#1569;</h3>
          <p><span id="typeText1"></span><span class="type-cursor" id="cursor1" style="display:none;"></span></p>
        </div>
      </div>
      <div class="type-step" id="step2">
        <span class="type-num">3</span>
        <div class="type-content">
          <h3>&#1585;&#1572;&#1609; &#1584;&#1603;&#1610;&#1577;</h3>
          <p><span id="typeText2"></span><span class="type-cursor" id="cursor2" style="display:none;"></span></p>
        </div>
      </div>
      <div class="type-step" id="step3">
        <span class="type-num">4</span>
        <div class="type-content">
          <h3>&#1575;&#1581;&#1601;&#1592; &#1608;&#1575;&#1580;&#1605;&#1593;</h3>
          <p><span id="typeText3"></span><span class="type-cursor" id="cursor3" style="display:none;"></span></p>
        </div>
      </div>
    </div>
    <button class="walk-enter" id="walkEnter" onclick="enterApp()">&#1578;&#1575;&#1576;&#1593;</button>
  </div>

  <!-- MAIN APP -->
  <div class="main-app" id="mainApp">
    <header class="top-bar">
      <span class="top-brand">Poetry bil Araby</span>
      <div class="top-actions">
        <button class="top-btn" onclick="toggleTheme()">
          <i data-lucide="sun" style="width:18px;height:18px"></i>
        </button>
      </div>
    </header>

    <nav class="icon-rail">
      <button class="rail-btn"><i data-lucide="heart" style="width:18px;height:18px"></i></button>
      <button class="rail-btn"><i data-lucide="type" style="width:18px;height:18px"></i></button>
      <button class="rail-btn"><i data-lucide="languages" style="width:18px;height:18px"></i></button>
      <button class="rail-btn"><i data-lucide="rotate-ccw" style="width:18px;height:18px"></i></button>
    </nav>

    <main class="reader">
      <div class="poem-header">
        <h2>Ahmad Shawqi</h2>
        <h1>&#1571;&#1581;&#1605;&#1583; &#1588;&#1608;&#1602;&#1610; &mdash; &#1571;&#1605;&#1610;&#1585; &#1575;&#1604;&#1588;&#1593;&#1585;&#1575;&#1569;</h1>
      </div>

      <div class="poem-body">
        <div class="verse">
          &#1571;&#1614;&#1606;&#1575; &#1575;&#1604;&#1576;&#1614;&#1581;&#1585;&#1615; &#1601;&#1610; &#1571;&#1614;&#1581;&#1588;&#1575;&#1574;&#1616;&#1607;&#1616; &#1575;&#1604;&#1583;&#1615;&#1585;&#1615;&#1617; &#1603;&#1575;&#1605;&#1616;&#1606;&#1612;
        </div>
        <div class="verse-divider"></div>
        <div class="verse">
          &#1601;&#1614;&#1607;&#1614;&#1604; &#1587;&#1614;&#1571;&#1614;&#1604;&#1608;&#1575; &#1575;&#1604;&#1594;&#1614;&#1608;&#1617;&#1575;&#1589;&#1614; &#1593;&#1614;&#1606; &#1589;&#1614;&#1583;&#1614;&#1601;&#1575;&#1578;&#1610;
        </div>
        <div class="verse-divider"></div>
        <div class="verse">
          &#1608;&#1614;&#1604;&#1610; &#1601;&#1610;&#1603;&#1614; &#1605;&#1575; &#1604;&#1614;&#1605; &#1610;&#1614;&#1602;&#1615;&#1604;&#1616; &#1575;&#1604;&#1588;&#1616;&#1593;&#1585;&#1615; &#1603;&#1615;&#1604;&#1614;&#1617;&#1607;&#1615;
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active">
        <i data-lucide="compass" style="width:20px;height:20px"></i>
        Discover
      </button>
      <button class="nav-item">
        <i data-lucide="headphones" style="width:20px;height:20px"></i>
        Listen
      </button>
      <button class="nav-item">
        <i data-lucide="sparkles" style="width:20px;height:20px"></i>
        Insight
      </button>
      <button class="nav-item">
        <i data-lucide="copy" style="width:20px;height:20px"></i>
        Copy
      </button>
      <button class="nav-item" onclick="toggleTheme()">
        <i data-lucide="moon" style="width:20px;height:20px"></i>
        Theme
      </button>
    </nav>
  </div>

  <style>
    @keyframes dotReveal {
      from { opacity: 0; }
      to { opacity: 0.5; }
    }
  </style>

  <script>
    /* ===== TYPEWRITER WALKTHROUGH ===== */
    const typeTexts = [
      '\u0623\u0643\u062B\u0631 \u0645\u0646 84,000 \u0642\u0635\u064A\u062F\u0629 \u0645\u0646 \u0639\u0635\u0648\u0631 \u0645\u062E\u062A\u0644\u0641\u0629',
      '\u0625\u0644\u0642\u0627\u0621 \u0635\u0648\u062A\u064A \u0628\u0623\u062F\u0627\u0621 \u0637\u0628\u064A\u0639\u064A',
      '\u062A\u062D\u0644\u064A\u0644 \u0648\u0634\u0631\u062D \u0628\u0627\u0644\u0630\u0643\u0627\u0621 \u0627\u0644\u0627\u0635\u0637\u0646\u0627\u0639\u064A',
      '\u0623\u0646\u0634\u0626 \u0645\u062C\u0645\u0648\u0639\u062A\u0643 \u0627\u0644\u062E\u0627\u0635\u0629'
    ];

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let typewriterRunning = false;

    function typewriterEffect(stepIndex) {
      return new Promise((resolve) => {
        const textEl = document.getElementById(`typeText${stepIndex}`);
        const cursorEl = document.getElementById(`cursor${stepIndex}`);
        const stepEl = document.getElementById(`step${stepIndex}`);
        const text = typeTexts[stepIndex];

        stepEl.classList.add('revealed');

        if (prefersReducedMotion) {
          textEl.textContent = text;
          cursorEl.style.display = 'inline-block';
          resolve();
          return;
        }

        /* Show cursor */
        if (stepIndex > 0) {
          /* Hide previous cursor */
          const prevCursor = document.getElementById(`cursor${stepIndex - 1}`);
          if (prevCursor) prevCursor.style.display = 'none';
        }
        cursorEl.style.display = 'inline-block';

        let charIndex = 0;
        const speed = 35;

        function typeChar() {
          if (charIndex < text.length) {
            textEl.textContent += text.charAt(charIndex);
            charIndex++;
            setTimeout(typeChar, speed);
          } else {
            resolve();
          }
        }

        /* Small delay before typing starts */
        setTimeout(typeChar, 300);
      });
    }

    async function runWalkthrough() {
      if (typewriterRunning) return;
      typewriterRunning = true;

      for (let i = 0; i < typeTexts.length; i++) {
        await new Promise(r => setTimeout(r, 400));
        await typewriterEffect(i);
      }

      /* Show the enter button */
      await new Promise(r => setTimeout(r, 400));
      document.getElementById('walkEnter').classList.add('revealed');

      /* Hide last cursor */
      const lastCursor = document.getElementById(`cursor${typeTexts.length - 1}`);
      if (lastCursor) lastCursor.style.display = 'none';
    }

    function enterWalkthrough() {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('walkthrough').classList.add('active');
      runWalkthrough();
    }

    function enterApp() {
      document.getElementById('walkthrough').classList.remove('active');
      document.getElementById('mainApp').classList.add('active');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function toggleTheme() {
      document.body.classList.toggle('light');
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
</body>
</html>
