name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run all migrations
        run: |
          echo "Applying migrations to production database..."
          psql "$DATABASE_URL" -f supabase/migrations/20260119000000_auth_and_user_features.sql || true
          psql "$DATABASE_URL" -f supabase/migrations/20260222000000_design_review_tables.sql
          echo "Migrations applied ✓"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify design review tables exist
        run: |
          echo "Verifying design review tables..."
          psql "$DATABASE_URL" -c "SELECT COUNT(*) FROM design_items;" \
            && echo "✓ design_items table ready" \
            || (echo "✗ design_items table missing — migration may have failed" && exit 1)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          # Add production env vars here or use secrets
          NODE_ENV: production

      # Placeholder for deployment target (Vercel, Netlify, GitHub Pages)
      - name: Deploy to production
        run: echo "Production deployment will be configured"

      # Optional: Create release tag
      - name: Create release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const date = new Date().toISOString().split('T')[0];

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${date}-${sha}`,
              name: `Release ${date}`,
              body: 'Automated production deployment',
              draft: false,
              prerelease: false
            })
