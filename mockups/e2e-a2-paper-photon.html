<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2: Paper & Photon - Poetry bil Araby</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C5A059;
      --dark-bg: #0c0c0e;
      --light-bg: #FDFCF8;
      --warm-beam: #FFF4E6;
      --paper-white: #FAF9F6;
      --dust: rgba(197, 160, 89, 0.3);
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--light-bg);
      color: #1a1a1a;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    body.dark {
      background: var(--dark-bg);
      color: #e5e5e5;
    }

    /* Splash Screen - Unrolling Paper */
    .splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--warm-beam) 0%, var(--paper-white) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: splashFade 0.6s ease 2.5s forwards;
    }

    .paper-scroll {
      width: 300px;
      height: 400px;
      background: var(--paper-white);
      border: 2px solid var(--gold);
      box-shadow: 0 20px 60px rgba(197, 160, 89, 0.4);
      position: relative;
      overflow: hidden;
      animation: unrollPaper 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
      will-change: transform;
    }

    @keyframes unrollPaper {
      0% { height: 0; transform: translateY(-50px) rotateX(90deg); opacity: 0; }
      50% { height: 200px; transform: translateY(0) rotateX(45deg); opacity: 0.7; }
      100% { height: 400px; transform: translateY(0) rotateX(0deg); opacity: 1; }
    }

    .paper-content {
      padding: 40px 30px;
      text-align: center;
      animation: contentFadeIn 0.8s ease 1.2s forwards;
      opacity: 0;
    }

    @keyframes contentFadeIn {
      to { opacity: 1; }
    }

    .paper-content h1 {
      font-family: 'Amiri', serif;
      font-size: 32px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    /* Floating Dust Particles */
    .dust {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: dustFloat 3s infinite;
      will-change: transform, opacity;
    }

    @keyframes dustFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.4; }
      100% { transform: translateY(-600px) translateX(50px); opacity: 0; }
    }

    .dust:nth-child(1) { left: 20%; animation-delay: 0s; }
    .dust:nth-child(2) { left: 40%; animation-delay: 0.5s; }
    .dust:nth-child(3) { left: 60%; animation-delay: 1s; }
    .dust:nth-child(4) { left: 80%; animation-delay: 1.5s; }

    @keyframes splashFade {
      to { opacity: 0; pointer-events: none; }
    }

    /* Walkthrough */
    .walkthrough {
      position: fixed;
      inset: 0;
      background: rgba(12, 12, 14, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }

    .walkthrough.active { display: flex; }

    .walkthrough-card {
      background: var(--paper-white);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: cardSlideIn 0.5s ease;
    }

    @keyframes cardSlideIn {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .walkthrough-card h2 {
      font-family: 'Amiri', serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .walkthrough-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      justify-content: center;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 44px;
      min-height: 44px;
    }

    .btn-primary {
      background: var(--gold);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(197, 160, 89, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: #666;
      border: 2px solid #ddd;
    }

    /* Main App */
    .app {
      display: none;
      min-height: 100vh;
      padding: 80px 20px 40px;
    }

    .app.active { display: block; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--paper-white);
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 20px rgba(197, 160, 89, 0.1);
      z-index: 100;
      transition: background 0.3s ease;
    }

    .dark .header { background: #1a1a1c; }

    .logo {
      font-family: 'Amiri', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
    }

    .theme-toggle {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: var(--gold);
      color: white;
      transform: rotate(180deg);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .poem-card {
      background: var(--paper-white);
      border-radius: 16px;
      padding: 50px;
      margin: 30px 0;
      box-shadow: 0 10px 40px rgba(197, 160, 89, 0.15);
      border: 1px solid rgba(197, 160, 89, 0.2);
      transition: all 0.4s ease;
    }

    .dark .poem-card {
      background: #1a1a1c;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .poem-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 60px rgba(197, 160, 89, 0.3);
    }

    .poem-title {
      font-family: 'Amiri', serif;
      font-size: 32px;
      color: var(--gold);
      margin-bottom: 30px;
      text-align: center;
    }

    .poem-verse {
      font-family: 'Amiri', serif;
      font-size: 24px;
      line-height: 2;
      text-align: center;
      direction: rtl;
      margin: 30px 0;
    }

    .poet-name {
      text-align: center;
      color: #666;
      font-size: 18px;
      margin-top: 30px;
    }

    .dark .poet-name { color: #999; }

    .control-rail {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 30px;
    }

    .control-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--warm-beam);
      border: 1px solid var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: var(--gold);
    }

    .dark .control-btn {
      background: #2a2a2c;
    }

    .control-btn:hover {
      background: var(--gold);
      color: white;
      transform: scale(1.1);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 768px) {
      .paper-scroll { width: 250px; height: 350px; }
      .poem-card { padding: 30px 20px; }
      .poem-verse { font-size: 20px; }
      .header { padding: 15px 20px; }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div class="splash">
    <div class="paper-scroll">
      <div class="paper-content">
        <h1>ديوان الشعر</h1>
        <p>Unrolling the scroll of wisdom</p>
      </div>
    </div>
    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>
  </div>

  <!-- Walkthrough -->
  <div class="walkthrough" id="walkthrough">
    <div class="walkthrough-card">
      <h2 id="walkthrough-title">Welcome to Paper & Photon</h2>
      <p id="walkthrough-text">Experience Arabic poetry with warm elegance and floating beauty.</p>
      <div class="walkthrough-buttons">
        <button class="btn btn-secondary" onclick="skipWalkthrough()">Skip</button>
        <button class="btn btn-primary" onclick="nextStep()">Next</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="app">
    <header class="header">
      <div class="logo">ديوان الشعر</div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">☀</button>
    </header>

    <div class="container">
      <div class="poem-card">
        <h2 class="poem-title">ديوان الشعر العربي</h2>
        <div class="poem-verse" lang="ar">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <p class="poet-name">— أحمد شوقي</p>

        <div class="control-rail">
          <button class="control-btn" aria-label="Previous">‹</button>
          <button class="control-btn" aria-label="Play">▶</button>
          <button class="control-btn" aria-label="Next">›</button>
          <button class="control-btn" aria-label="Bookmark">★</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let step = 0;
    const steps = [
      { title: 'Welcome to Paper & Photon', text: 'Experience Arabic poetry with warm elegance and floating beauty.' },
      { title: 'Unroll the Scroll', text: 'Each poem appears like an ancient manuscript being revealed.' },
      { title: 'Warm Light Beam', text: 'Gentle illumination guides your reading journey.' },
      { title: 'Ready to Begin', text: 'Dive into the ocean of classical Arabic poetry.' }
    ];

    setTimeout(() => {
      document.getElementById('walkthrough').classList.add('active');
    }, 3200);

    function nextStep() {
      step++;
      if (step >= steps.length) {
        startApp();
      } else {
        document.getElementById('walkthrough-title').textContent = steps[step].title;
        document.getElementById('walkthrough-text').textContent = steps[step].text;
      }
    }

    function skipWalkthrough() {
      startApp();
    }

    function startApp() {
      document.getElementById('walkthrough').classList.remove('active');
      document.getElementById('app').classList.add('active');
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = document.body.classList.contains('dark') ? '☀' : '☾';
    }
  </script>
</body>
</html>
