<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 1: Minimalist Glass Panels</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c0c0e;
      color: #e7e5e4;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header Area */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
      position: relative;
    }

    /* Text Settings Panel - Top Left */
    .text-settings {
      background: rgba(197, 160, 89, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(197, 160, 89, 0.25);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      gap: 24px;
      align-items: center;
      max-width: 420px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(197, 160, 89, 0.6);
      font-weight: 500;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(197, 160, 89, 0.1);
      border: 1px solid rgba(197, 160, 89, 0.3);
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-icon:hover {
      background: rgba(197, 160, 89, 0.2);
      border-color: rgba(197, 160, 89, 0.5);
    }
    .btn-icon.active {
      background: rgba(197, 160, 89, 0.2);
      border-color: rgba(197, 160, 89, 0.6);
      box-shadow: 0 0 12px rgba(197, 160, 89, 0.2);
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(197, 160, 89, 0.3);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle.checked {
      background: rgba(197, 160, 89, 0.3);
      border-color: rgba(197, 160, 89, 0.6);
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: var(--gold);
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.checked .toggle-thumb {
      transform: translateX(20px);
    }

    .font-selector {
      position: relative;
    }
    .font-preview {
      padding: 6px 12px;
      background: rgba(197, 160, 89, 0.1);
      border: 1px solid rgba(197, 160, 89, 0.3);
      border-radius: 8px;
      font-family: 'Amiri', serif;
      font-size: 18px;
      color: var(--gold);
      cursor: pointer;
      min-width: 60px;
      text-align: center;
    }

    /* Day/Night Toggle - Top Right */
    .theme-toggle-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .theme-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(197, 160, 89, 0.6);
    }
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(197, 160, 89, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(197, 160, 89, 0.25);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .theme-icon {
      color: var(--gold);
      width: 20px;
      height: 20px;
    }
    .theme-text {
      font-size: 13px;
      color: var(--gold);
      font-weight: 500;
    }

    /* Vertical Action Sidebar */
    .sidebar {
      position: fixed;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(197, 160, 89, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(197, 160, 89, 0.25);
      border-radius: 16px;
      padding: 12px;
    }

    .sidebar-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: transparent;
      border: none;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .sidebar-btn:hover {
      background: rgba(197, 160, 89, 0.15);
    }
    .sidebar-btn.active {
      background: rgba(197, 160, 89, 0.2);
      border: 1px solid rgba(197, 160, 89, 0.5);
    }
    .sidebar-btn svg {
      width: 20px;
      height: 20px;
    }
    .sidebar-btn span {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }

    /* Demo poem content */
    .poem-content {
      margin-right: 80px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(197, 160, 89, 0.1);
      border-radius: 16px;
      line-height: 1.8;
    }
    .poem-title {
      font-family: 'Amiri', serif;
      font-size: 32px;
      color: var(--gold);
      margin-bottom: 24px;
    }
    .poem-arabic {
      font-family: 'Amiri', serif;
      font-size: 24px;
      color: #e7e5e4;
      margin-bottom: 24px;
      direction: rtl;
    }
    .poem-english {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: rgba(231, 229, 228, 0.7);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header with Text Settings and Theme Toggle -->
    <div class="header">
      <!-- Text Settings Panel (Top Left) -->
      <div class="text-settings">
        <div class="control-group">
          <span class="control-label">Text Size</span>
          <div class="control-row">
            <button class="btn-icon" title="Decrease">−</button>
            <button class="btn-icon active" title="Increase">+</button>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Translate</span>
          <div class="toggle checked" data-role="toggle">
            <div class="toggle-thumb"></div>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Romanize</span>
          <div class="toggle" data-role="toggle">
            <div class="toggle-thumb"></div>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Font</span>
          <div class="font-selector">
            <div class="font-preview" title="Current font: Amiri">ابythm</div>
          </div>
        </div>
      </div>

      <!-- Day/Night Toggle (Top Right) -->
      <div class="theme-toggle-container">
        <span class="theme-label">Appearance</span>
        <div class="theme-toggle" title="Switch to light mode">
          <svg class="theme-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          <span class="theme-text">Dark</span>
        </div>
      </div>
    </div>

    <!-- Vertical Action Sidebar -->
    <div class="sidebar">
      <button class="sidebar-btn active" title="Save poem">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
        <span>Save</span>
      </button>
      <button class="sidebar-btn" title="Share poem">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
        <span>Share</span>
      </button>
      <button class="sidebar-btn active" title="Copy poem">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
        <span>Copy</span>
      </button>
      <button class="sidebar-btn" title="Ratchet mode">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"></path></svg>
        <span>Ratchet</span>
      </button>
      <button class="sidebar-btn" title="Sign in">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <span>Sign In</span>
      </button>
    </div>

    <!-- Demo Content -->
    <div class="poem-content">
      <h1 class="poem-title">The Blind Man</h1>
      <p class="poem-arabic">أرى الله في كل شيء</p>
      <p class="poem-english">I see God in everything</p>
    </div>
  </div>
</body>
</html>
