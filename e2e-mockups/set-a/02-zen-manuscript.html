<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2E #2: Zen Manuscript — Minimal Smoke</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink: #1a1a1a;
  --paper: #f9f7f4;
  --smoke: rgba(100, 100, 100, 0.15);
  --accent: #8B7355;
  --text: #2a2a2a;
  --text-dim: rgba(42, 42, 42, 0.5);
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.dark {
  --ink: #f9f7f4;
  --paper: #1a1a1a;
  --smoke: rgba(200, 200, 200, 0.1);
  --accent: #c5a059;
  --text: #f5f0e8;
  --text-dim: rgba(245, 240, 232, 0.5);
}
html {
  font-family: var(--font-ui);
  background: var(--paper);
  color: var(--text);
}
body { min-height: 100vh; }

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  background: var(--smoke);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  font-size: 20px;
}
.theme-toggle:hover {
  background: rgba(139, 115, 85, 0.2);
  transform: scale(1.1);
}

canvas#smoke {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.3;
}

.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.6;
}

/* SPLASH */
#splash {
  background: var(--paper);
}
.splash-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
  max-width: 600px;
  animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

.zen-title {
  font-family: var(--font-ar);
  font-size: clamp(3rem, 10vw, 5rem);
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 16px;
  line-height: 1.2;
  animation: brushStroke 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s backwards;
  will-change: clip-path;
}
@keyframes brushStroke {
  from { opacity: 0; clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
  to { opacity: 1; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
}

.zen-subtitle {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 64px;
  animation: fadeIn 1s 0.8s backwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.zen-enter {
  padding: 16px 48px;
  min-width: 44px;
  min-height: 44px;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  font-weight: 500;
  animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s backwards;
  will-change: transform;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.zen-enter:hover {
  background: var(--ink);
  color: var(--paper);
  box-shadow: 0 4px 20px var(--smoke);
}

/* MAIN */
#main {
  background: var(--paper);
  display: none;
  padding: 40px 24px;
}
.zen-layout {
  position: relative;
  z-index: 2;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}
.zen-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--smoke);
}
.zen-brand {
  font-family: var(--font-ar);
  font-size: 24px;
  color: var(--ink);
}

.manuscript {
  background: linear-gradient(135deg, var(--smoke), transparent);
  border: 1px solid var(--smoke);
  padding: 48px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.manuscript::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--accent);
  opacity: 0.3;
}
.manuscript:hover {
  border-color: var(--accent);
  box-shadow: 0 8px 32px var(--smoke);
}

.manuscript-text {
  font-family: var(--font-ar);
  font-size: 32px;
  line-height: 2.2;
  color: var(--ink);
  text-align: right;
  direction: rtl;
  margin-bottom: 32px;
}
.manuscript-poet {
  font-size: 14px;
  color: var(--accent);
  text-align: left;
  font-weight: 600;
}

.zen-btn {
  padding: 14px 40px;
  min-width: 44px;
  min-height: 44px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
}
.zen-btn:hover {
  opacity: 0.8;
  transform: translateY(-2px);
}

@media (max-width: 768px) {
  .zen-title { font-size: 3rem; }
  .splash-content { padding: 24px; }
  .manuscript { padding: 32px 24px; }
  .manuscript-text {
    font-size: 24px;
    line-height: 2;
  }
  .theme-toggle {
    width: 44px;
    height: 44px;
    top: 16px;
    right: 16px;
  }
  .label {
    font-size: 8px;
    top: 16px;
    left: 16px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
  <canvas id="smoke"></canvas>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">🌙</span>
  </button>

  <div class="screen" id="splash">
    <div class="label">Zen Manuscript</div>
    <div class="splash-content">
      <h1 class="zen-title">قافية</h1>
      <p class="zen-subtitle">Clarity Through Poetry</p>
      <button class="zen-enter" onclick="showMain()">Enter</button>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="zen-layout">
      <nav class="zen-nav">
        <div class="zen-brand">قافية</div>
      </nav>

      <div class="manuscript">
        <div class="manuscript-text" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="manuscript-poet">— أحمد شوقي</div>
      </div>

      <button class="zen-btn">Next</button>
    </div>
  </div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  html.classList.toggle('dark');
  icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}

function showMain() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

// Smoke Animation
const canvas = document.getElementById('smoke');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class SmokeParticle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + 50;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -Math.random() * 1.5 - 0.5;
    this.radius = Math.random() * 40 + 20;
    this.opacity = Math.random() * 0.1 + 0.05;
    this.life = 0;
    this.maxLife = Math.random() * 200 + 100;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    this.opacity = Math.max(0, (1 - this.life / this.maxLife) * 0.15);
    this.radius += 0.2;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    gradient.addColorStop(0, `rgba(100, 100, 100, ${this.opacity})`);
    gradient.addColorStop(1, 'rgba(100, 100, 100, 0)');
    ctx.fillStyle = gradient;
    ctx.fill();
  }
}

const smokeParticles = [];

function animateSmoke() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (Math.random() < 0.15) {
    smokeParticles.push(new SmokeParticle());
  }

  smokeParticles.forEach((p, i) => {
    p.update();
    p.draw();
    if (p.life > p.maxLife) smokeParticles.splice(i, 1);
  });

  requestAnimationFrame(animateSmoke);
}
animateSmoke();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
