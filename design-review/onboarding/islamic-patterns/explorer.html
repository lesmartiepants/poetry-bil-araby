<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiledPatternMaker — XML Pattern Catalog</title>
<style>
:root {
  --bg: #0d0d14;
  --surface: #13131f;
  --surface2: #1a1a2a;
  --surface3: #22223a;
  --border: #2a2a40;
  --text: #e2e2f0;
  --text-muted: #8888aa;
  --gold: #c5a059;
  --gold-dim: rgba(197,160,89,0.6);
  --lapis: #2a5a8c;
  --sidebar-w: 280px;
  --info-h: 140px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  overflow: hidden;
}
#app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#sidebar-header h1 { font-size: 13px; font-weight: 600; color: var(--gold); letter-spacing: 0.05em; text-transform: uppercase; }
#sidebar-header p { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
#search-wrap { padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: var(--gold); }
#search::placeholder { color: var(--text-muted); }
#tree { flex: 1; overflow-y: auto; padding: 6px 0; }
#tree::-webkit-scrollbar { width: 4px; }
#tree::-webkit-scrollbar-track { background: transparent; }
#tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.group { margin-bottom: 2px; }
.group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px 5px;
  cursor: pointer;
  user-select: none;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: color 0.15s;
}
.group-header:hover { color: var(--text); }
.group-header .arrow { font-size: 9px; transition: transform 0.2s; margin-left: auto; opacity: 0.5; }
.group.open .arrow { transform: rotate(90deg); }
.group-items { display: none; }
.group.open .group-items { display: block; }
.subgroup-header { padding: 4px 12px 3px 20px; font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 4px; }
.pattern-item {
  padding: 5px 12px 5px 28px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-muted);
  transition: background 0.1s, color 0.1s;
  border-left: 2px solid transparent;
  font-size: 12px;
}
.pattern-item:hover { background: var(--surface2); color: var(--text); }
.pattern-item.active { background: var(--surface3); color: var(--gold); border-left-color: var(--gold); }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
#canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: var(--bg);
  min-height: 0;
}
#canvas { background: #0d0d14; display: block; border: 1px solid var(--border); cursor: grab; }
#canvas:active { cursor: grabbing; }
#controls-bar { position: absolute; top: 12px; right: 16px; display: flex; gap: 8px; align-items: center; }
.ctrl-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
#pattern-name-overlay { position: absolute; top: 14px; left: 16px; font-size: 14px; font-weight: 600; color: var(--text); pointer-events: none; }
#pattern-name-overlay span { color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 8px; }
#info-panel {
  height: var(--info-h);
  min-height: var(--info-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  overflow-y: auto;
  flex-shrink: 0;
}
#info-panel h2 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
#info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px 16px; }
.info-cell { display: flex; flex-direction: column; gap: 2px; }
.info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.info-value { font-size: 12px; color: var(--text); font-family: monospace; }
.info-desc { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
#no-selection { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 8px; }
#no-selection .big { font-size: 40px; opacity: 0.2; }
@media (max-width: 700px) {
  :root { --sidebar-w: 100%; --info-h: 100px; }
  #app { flex-direction: column; }
  #sidebar { width: 100%; min-width: 0; height: 42vh; border-right: none; border-bottom: 1px solid var(--border); }
  #main { flex: 1; }
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Pattern Catalog</h1>
      <p id="count-label">Loading...</p>
    </div>
    <div id="search-wrap">
      <input type="text" id="search" placeholder="Search patterns..." autocomplete="off" spellcheck="false">
    </div>
    <div id="tree"></div>
  </div>
  <div id="main">
    <div id="canvas-area">
      <div id="no-selection">
        <div class="big">&#x2666;</div>
        <div>Select a pattern from the sidebar</div>
      </div>
      <canvas id="canvas" style="display:none;"></canvas>
      <div id="pattern-name-overlay" style="display:none;"></div>
      <div id="controls-bar" style="display:none;">
        <button class="ctrl-btn" id="btn-zoom-in">+</button>
        <button class="ctrl-btn" id="btn-zoom-out">-</button>
        <button class="ctrl-btn" id="btn-reset">Reset</button>
        <button class="ctrl-btn" id="btn-fill">Fill</button>
      </div>
    </div>
    <div id="info-panel">
      <div id="info-content"><div style="color:var(--text-muted);font-size:12px;">Select a pattern to see details</div></div>
    </div>
  </div>
</div>

// ============================================================
// STATE
// ============================================================
const state = { selected: null, type: null, zoom: 1, fillMode: false, pan: {x:0,y:0}, dragging: false, dragStart: null };

// ============================================================
// SIDEBAR
// ============================================================
function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildSidebar(filter) {
  filter = (filter || '').toLowerCase();
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  function makeGroup(label, items, renderFn) {
    if (!items.length) return;
    const g = document.createElement('div');
    g.className = 'group open';
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = escH(label) + '<span style="margin-left:auto;font-size:10px;background:var(--surface3);padding:1px 6px;border-radius:10px;color:var(--text-muted)">' + items.length + '</span><span class="arrow">&#9654;</span>';
    hdr.onclick = () => g.classList.toggle('open');
    g.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'group-items';
    renderFn(body);
    g.appendChild(body);
    tree.appendChild(g);
  }

  function addItem(container, name, type, data) {
    const el = document.createElement('div');
    el.className = 'pattern-item' + (state.selected === name && state.type === type ? ' active' : '');
    el.textContent = name;
    el.title = name;
    el.onclick = () => selectPattern(name, type, data, el);
    container.appendChild(el);
  }

  function addSubhdr(container, label) {
    const d = document.createElement('div');
    d.className = 'subgroup-header';
    d.textContent = label;
    container.appendChild(d);
  }

  // --- Girih ---
  const girihItems = CATALOG.girih.filter(g => !filter || g.name.toLowerCase().includes(filter));
  makeGroup('Girih Shapes', girihItems, body => {
    girihItems.forEach(g => addItem(body, g.name, 'girih', g));
  });

  // --- Tilings ---
  const CATS = ['triangles','squares','pentagons','hexagons','octagons','decagons','dodecagons+','mixed'];
  const CAT_LABELS = {
    triangles: 'Triangles (3)',
    squares: 'Squares (4)',
    pentagons: 'Pentagons (5)',
    hexagons: 'Hexagons (6)',
    octagons: 'Octagons (8)',
    decagons: 'Decagons (10)',
    'dodecagons+': 'Dodecagons (12+)',
    mixed: 'Mixed'
  };
  const bycat = {};
  CATALOG.tilings.forEach(t => {
    if (!filter || t.name.toLowerCase().includes(filter) || (t.desc||'').toLowerCase().includes(filter)) {
      const c = t.cat || 'mixed';
      (bycat[c] = bycat[c] || []).push(t);
    }
  });
  const tilingItems = Object.values(bycat).flat();
  makeGroup('Tilings', tilingItems, body => {
    CATS.forEach(cat => {
      const items = bycat[cat];
      if (!items || !items.length) return;
      addSubhdr(body, CAT_LABELS[cat] + ' — ' + items.length);
      items.forEach(t => addItem(body, t.name, 'tiling', t));
    });
  });

  // --- Templates ---
  const bygrp = {};
  CATALOG.templates.forEach(t => {
    if (!filter || t.name.toLowerCase().includes(filter)) {
      (bygrp[t.grp] = bygrp[t.grp] || []).push(t);
    }
  });
  const templateItems = Object.values(bygrp).flat();
  makeGroup('Templates', templateItems, body => {
    Object.entries(bygrp).sort().forEach(([grp, items]) => {
      addSubhdr(body, grp + ' — ' + items.length);
      items.forEach(t => addItem(body, t.name, 'template', t));
    });
  });

  const total = girihItems.length + tilingItems.length + templateItems.length;
  document.getElementById('count-label').textContent = filter
    ? total + ' matches'
    : CATALOG.tilings.length + ' tilings · ' + CATALOG.girih.length + ' girih · ' + CATALOG.templates.length + ' templates';
}

// ============================================================
// SELECTION
// ============================================================
function selectPattern(name, type, data, el) {
  document.querySelectorAll('.pattern-item.active').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  state.selected = name;
  state.type = type;
  state.zoom = 1;
  state.pan = {x: 0, y: 0};

  document.getElementById('no-selection').style.display = 'none';
  const cv = document.getElementById('canvas');
  cv.style.display = 'block';
  document.getElementById('pattern-name-overlay').style.display = 'block';
  document.getElementById('controls-bar').style.display = 'flex';

  const area = document.getElementById('canvas-area');
  const sz = Math.min(area.clientWidth - 32, area.clientHeight - 32, 600);
  cv.width = sz;
  cv.height = sz;

  renderPattern(data, type, cv);
  updateInfo(data, type);
}

// ============================================================
// RENDERING
// ============================================================
function renderPattern(data, type, cv) {
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0,0,W,H);

  const overlay = document.getElementById('pattern-name-overlay');
  if (type === 'girih') {
    drawGirih(ctx, data, W, H);
    overlay.innerHTML = escH(data.name) + '<span>' + (data.type === 'regular' ? data.sides + '-gon' : 'irregular') + '</span>';
  } else if (type === 'tiling') {
    drawTiling(ctx, data, W, H);
    const fs = (data.features||[]).filter(f=>f.sides>0).map(f=>f.sides+'-gon').filter((v,i,a)=>a.indexOf(v)===i).join(', ');
    overlay.innerHTML = escH(data.name) + (fs ? '<span>' + fs + '</span>' : '');
  } else {
    drawTemplate(ctx, data, W, H);
    overlay.innerHTML = escH(data.name) + '<span>template</span>';
  }
}

// ---- fit helpers ----
function fitPts(pts, W, H, pad) {
  let mnX=1e18, mxX=-1e18, mnY=1e18, mxY=-1e18;
  pts.forEach(([x,y]) => { if(isFinite(x)&&isFinite(y)){mnX=Math.min(mnX,x);mxX=Math.max(mxX,x);mnY=Math.min(mnY,y);mxY=Math.max(mxY,y);} });
  if(!isFinite(mnX)) return {ox:W/2,oy:H/2,sc:1};
  const dx=mxX-mnX, dy=mxY-mnY;
  const sc = Math.min(dx>0?W*pad/dx:W*pad, dy>0?H*pad/dy:H*pad);
  return { ox: W/2-(mnX+mxX)/2*sc, oy: H/2-(mnY+mxY)/2*sc, sc };
}

function tc(x, y, ox, oy, sc) {
  return [x*sc*state.zoom + ox + state.pan.x, y*sc*state.zoom + oy + state.pan.y];
}

// ---- girih ----
function drawGirih(ctx, data, W, H) {
  let pts = (data.points || []).slice();

  if (data.type === 'regular' && data.sides > 0) {
    const n = data.sides;
    const base = [];
    for(let k=0;k<n;k++) base.push([Math.cos(2*Math.PI*k/n), Math.sin(2*Math.PI*k/n)]);
    // Apply girih transform (rot in radians)
    const s = data.scale || 1, r = data.rot || 0, tx2 = data.tx||0, ty2 = data.ty||0;
    pts = base.map(([x,y]) => {
      const xs=x*s, ys=y*s;
      return [xs*Math.cos(r)-ys*Math.sin(r)+tx2, xs*Math.sin(r)+ys*Math.cos(r)+ty2];
    });
  }

  if (pts.length < 3) {
    ctx.fillStyle='#8888aa'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Curve-based / no vertices', W/2, H/2); return;
  }

  const {ox,oy,sc} = fitPts(pts, W, H, 0.8);
  ctx.save();
  ctx.strokeStyle='rgba(197,160,89,0.85)';
  ctx.lineWidth=2; ctx.lineJoin='round';
  if(state.fillMode){ ctx.fillStyle='rgba(42,90,140,0.3)'; }
  ctx.beginPath();
  pts.forEach(([x,y],i)=>{ const [cx,cy]=tc(x,y,ox,oy,sc); i?ctx.lineTo(cx,cy):ctx.moveTo(cx,cy); });
  ctx.closePath();
  if(state.fillMode) ctx.fill();
  ctx.stroke();
  ctx.fillStyle='rgba(197,160,89,0.6)';
  pts.forEach(([x,y])=>{ const [cx,cy]=tc(x,y,ox,oy,sc); ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill(); });
  ctx.restore();
  ctx.fillStyle='#555570'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText(pts.length+' vertices', 8, H-8);
}

// ---- tiling ----
function applyPlacement(pts, p) {
  if (p.matrix) {
    const [a,b,c,d,e,f] = p.matrix;
    return pts.map(([x,y]) => [a*x+b*y+e, c*x+d*y+f]);
  }
  const s=p.scale||1, r=(p.rot||0)*Math.PI/180, tx2=p.tranX||0, ty2=p.tranY||0;
  const cr=Math.cos(r), sr=Math.sin(r);
  return pts.map(([x,y]) => { const xs=x*s,ys=y*s; return [xs*cr-ys*sr+tx2, xs*sr+ys*cr+ty2]; });
}

function drawTiling(ctx, data, W, H) {
  const t1=data.t1||[2,0], t2=data.t2||[0,2];
  const basePts = [];

  for(const feat of (data.features||[])) {
    if(feat.type==='regular'&&feat.sides>0) {
      const n=feat.sides;
      const bp=[];
      for(let k=0;k<n;k++) bp.push([Math.cos(2*Math.PI*k/n), Math.sin(2*Math.PI*k/n)]);
      for(const p of (feat.placements||[])) basePts.push(applyPlacement(bp,p));
    } else if((feat.type==='polygon'||feat.type==='edgepoly')&&(feat.points||[]).length>=3) {
      for(const p of (feat.placements||[])) basePts.push(applyPlacement(feat.points,p));
    }
  }

  if(!basePts.length) {
    ctx.fillStyle='#8888aa'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('No renderable features', W/2, H/2); return;
  }

  // Tiling range based on unit cell area
  const area = Math.abs(t1[0]*t2[1]-t1[1]*t2[0]);
  const RANGE = Math.min(Math.max(2, Math.ceil(8/Math.sqrt(Math.max(area,0.01)))), 7);

  const allPts = [];
  for(let i=-RANGE;i<=RANGE;i++) for(let j=-RANGE;j<=RANGE;j++) {
    const ox=i*t1[0]+j*t2[0], oy=i*t1[1]+j*t2[1];
    for(const poly of basePts) for(const [x,y] of poly) allPts.push([x+ox,y+oy]);
  }

  const {ox, oy, sc} = fitPts(allPts, W, H, 0.95);

  ctx.save();
  ctx.strokeStyle='rgba(197,160,89,0.6)';
  ctx.lineWidth=1.5; ctx.lineJoin='round';

  let fi=0;
  for(let i=-RANGE;i<=RANGE;i++) for(let j=-RANGE;j<=RANGE;j++) {
    const offx=i*t1[0]+j*t2[0], offy=i*t1[1]+j*t2[1];
    for(const poly of basePts) {
      const fills=['rgba(42,90,140,0.25)','rgba(197,160,89,0.1)','rgba(80,40,10,0.2)'];
      ctx.beginPath();
      let vis=false;
      poly.forEach(([x,y],idx) => {
        const [cx,cy]=tc(x+offx,y+offy,ox,oy,sc);
        if(cx>-60&&cx<W+60&&cy>-60&&cy<H+60) vis=true;
        idx?ctx.lineTo(cx,cy):ctx.moveTo(cx,cy);
      });
      ctx.closePath();
      if(vis){
        if(state.fillMode){ctx.fillStyle=fills[fi%3];ctx.fill();}
        ctx.stroke();
        fi++;
      }
    }
  }
  ctx.restore();

  ctx.fillStyle='#555570'; ctx.font='10px monospace'; ctx.textAlign='left';
  const npolys=basePts.length*(2*RANGE+1)*(2*RANGE+1);
  ctx.fillText(npolys+' polys · range ±'+RANGE, 8, H-8);
}

// ---- template ----
function drawTemplate(ctx, data, W, H) {
  const lines=data.lines||[], circles=data.circles||[];
  const allPts=[];
  lines.forEach(([x1,y1,x2,y2]) => { allPts.push([x1,y1],[x2,y2]); });
  circles.forEach(([r,cx,cy]) => { allPts.push([cx-r,cy-r],[cx+r,cy+r]); });
  if(!allPts.length){ ctx.fillStyle='#8888aa'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('No data',W/2,H/2); return; }
  const {ox,oy,sc}=fitPts(allPts,W,H,0.88);
  ctx.save();
  ctx.strokeStyle='rgba(42,90,140,0.55)'; ctx.lineWidth=1;
  circles.forEach(([r,cx,cy])=>{
    const [scx,scy]=tc(cx,cy,ox,oy,sc);
    ctx.beginPath(); ctx.arc(scx,scy,r*sc*state.zoom,0,Math.PI*2); ctx.stroke();
  });
  ctx.strokeStyle='rgba(197,160,89,0.8)'; ctx.lineWidth=1.5;
  lines.forEach(([x1,y1,x2,y2])=>{
    const [cx1,cy1]=tc(x1,y1,ox,oy,sc), [cx2,cy2]=tc(x2,y2,ox,oy,sc);
    ctx.beginPath(); ctx.moveTo(cx1,cy1); ctx.lineTo(cx2,cy2); ctx.stroke();
  });
  ctx.restore();
  ctx.fillStyle='#555570'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText(lines.length+' lines · '+circles.length+' circles', 8, H-8);
}

// ============================================================
// INFO PANEL
// ============================================================
function fmt(n) { if(!isFinite(n))return'?'; return Math.abs(n)<0.0001?'0':n.toFixed(3); }

function updateInfo(data, type) {
  const ic = document.getElementById('info-content');
  let html = '';
  if(type==='girih') {
    html = '<h2>'+escH(data.name)+'</h2><div id="info-grid">';
    html += '<div class="info-cell"><div class="info-label">Type</div><div class="info-value">'+escH(data.type)+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Sides</div><div class="info-value">'+(data.sides||'irregular')+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Vertices</div><div class="info-value">'+((data.points||[]).length)+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Scale / Rot</div><div class="info-value">'+fmt(data.scale)+' / '+fmt(data.rot)+'rad</div></div>';
    html += '<div class="info-cell"><div class="info-label">Offset</div><div class="info-value">'+fmt(data.tx)+', '+fmt(data.ty)+'</div></div>';
    html += '</div>';
  } else if(type==='tiling') {
    const feats=(data.features||[]);
    const nplac=feats.reduce((s,f)=>s+f.placements.length,0);
    const fs=feats.map(f=>(f.type==='regular'?'reg-'+f.sides:f.type)+'×'+f.placements.length).join(', ');
    html = '<h2>'+escH(data.name)+'</h2><div id="info-grid">';
    html += '<div class="info-cell"><div class="info-label">T1</div><div class="info-value">['+data.t1.map(fmt).join(', ')+']</div></div>';
    html += '<div class="info-cell"><div class="info-label">T2</div><div class="info-value">['+data.t2.map(fmt).join(', ')+']</div></div>';
    html += '<div class="info-cell"><div class="info-label">Features</div><div class="info-value">'+feats.length+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Total Placements</div><div class="info-value">'+nplac+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Category</div><div class="info-value">'+(data.cat||'-')+'</div></div>';
    html += '</div>';
    if(fs) html += '<div class="info-desc" style="font-family:monospace;font-size:10px;margin-top:4px;">'+escH(fs)+'</div>';
    if(data.desc) html += '<div class="info-desc">'+escH(data.desc)+'</div>';
  } else {
    html = '<h2>'+escH(data.name)+'</h2><div id="info-grid">';
    html += '<div class="info-cell"><div class="info-label">Group</div><div class="info-value">'+escH(data.grp||'-')+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Lines</div><div class="info-value">'+((data.lines||[]).length)+'</div></div>';
    html += '<div class="info-cell"><div class="info-label">Circles</div><div class="info-value">'+((data.circles||[]).length)+'</div></div>';
    html += '</div>';
  }
  ic.innerHTML = html;
}

// ============================================================
// CONTROLS
// ============================================================
function rerender() {
  if(!state.selected) return;
  const cv=document.getElementById('canvas');
  let data=null;
  if(state.type==='tiling') data=CATALOG.tilings.find(t=>t.name===state.selected);
  else if(state.type==='girih') data=CATALOG.girih.find(g=>g.name===state.selected);
  else data=CATALOG.templates.find(t=>t.name===state.selected);
  if(data) renderPattern(data, state.type, cv);
}

document.getElementById('btn-zoom-in').onclick = () => { state.zoom=Math.min(state.zoom*1.25,8); rerender(); };
document.getElementById('btn-zoom-out').onclick = () => { state.zoom=Math.max(state.zoom/1.25,0.1); rerender(); };
document.getElementById('btn-reset').onclick = () => { state.zoom=1; state.pan={x:0,y:0}; rerender(); };
document.getElementById('btn-fill').onclick = function() {
  state.fillMode=!state.fillMode;
  this.style.borderColor=state.fillMode?'var(--gold)':'';
  this.style.color=state.fillMode?'var(--gold)':'';
  rerender();
};

// Mouse pan
const cv=document.getElementById('canvas');
cv.addEventListener('mousedown',e=>{ if(e.button!==0)return; state.dragging=true; state.dragStart={x:e.clientX,y:e.clientY,px:state.pan.x,py:state.pan.y}; });
window.addEventListener('mousemove',e=>{ if(!state.dragging)return; state.pan.x=state.dragStart.px+(e.clientX-state.dragStart.x); state.pan.y=state.dragStart.py+(e.clientY-state.dragStart.y); rerender(); });
window.addEventListener('mouseup',()=>{ state.dragging=false; });

// Wheel zoom
cv.addEventListener('wheel',e=>{ e.preventDefault(); state.zoom=Math.max(0.1,Math.min(8,state.zoom*(e.deltaY>0?0.9:1.1))); rerender(); },{passive:false});

// Touch
let lastTouch=null;
cv.addEventListener('touchstart',e=>{ lastTouch=e.touches; },{passive:true});
cv.addEventListener('touchmove',e=>{ if(!lastTouch||e.touches.length!==1)return; state.pan.x+=e.touches[0].clientX-lastTouch[0].clientX; state.pan.y+=e.touches[0].clientY-lastTouch[0].clientY; lastTouch=e.touches; rerender(); },{passive:true});

// Search
document.getElementById('search').addEventListener('input',function(){ buildSidebar(this.value); });

// Resize
window.addEventListener('resize',()=>{
  if(!state.selected)return;
  const area=document.getElementById('canvas-area');
  const sz=Math.min(area.clientWidth-32,area.clientHeight-32,600);
  cv.width=sz; cv.height=sz;
  rerender();
});

// ============================================================
// INIT
// ============================================================
buildSidebar();
// Auto-select first tiling
setTimeout(()=>{
  const first=CATALOG.tilings[0];
  if(!first)return;
  const el=document.querySelector('.pattern-item[data-type="tiling"]');
  selectPattern(first.name,'tiling',first,el);
},60);
</script>
