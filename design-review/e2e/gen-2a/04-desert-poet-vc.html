<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desert Poet - Vertical Controls</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --charcoal: #1A1614; --ember: #E8611A; --gold: #C5A059;
    --smoke: #6B6B6B; --ash: #D4D0C8; --bg: #1A1614;
    --text: #D4D0C8; --card-bg: rgba(30, 25, 22, 0.92);
    --glow: rgba(232, 97, 26, 0.15);
    --gold-dim: rgba(197, 160, 89, 0.35);
    --speed: 0.5s;
  }
  .light {
    --bg: #F5F0E8; --text: #1A1614; --card-bg: rgba(255, 252, 245, 0.95);
    --glow: rgba(232, 97, 26, 0.1);
  }
  body {
    font-family: 'Tajawal', sans-serif; background: var(--bg);
    color: var(--text); overflow-x: hidden; transition: background var(--speed), color var(--speed);
    min-height: 100vh;
  }

  /* ============ Main App ============ */
  #app {
    max-width: 800px; margin: 0 auto; padding: 2rem 1rem 7rem;
    padding-right: 5rem;
    opacity: 1;
    position: relative; z-index: 1;
  }

  /* Parallax dune layers */
  .dune-layers {
    position: fixed; bottom: 0; left: 0; right: 0; height: 100vh;
    z-index: 0; pointer-events: none; overflow: hidden;
  }
  .dune-layer { position: absolute; bottom: 0; left: -5%; right: -5%; height: 40%; }
  .dune-layer-1 {
    background:
      radial-gradient(ellipse 120% 60% at 30% 100%, #8B6914 0%, transparent 70%),
      radial-gradient(ellipse 100% 50% at 70% 100%, #A07828 0%, transparent 60%);
    opacity: 0.15; z-index: 1;
  }
  .dune-layer-2 {
    height: 30%;
    background:
      radial-gradient(ellipse 110% 70% at 50% 100%, #C5A059 0%, transparent 65%),
      radial-gradient(ellipse 90% 50% at 20% 100%, #B8923A 0%, transparent 55%);
    opacity: 0.1; z-index: 2;
  }
  .dune-layer-3 {
    height: 20%;
    background:
      radial-gradient(ellipse 130% 80% at 60% 100%, #D4B06A 0%, transparent 60%);
    opacity: 0.08; z-index: 3;
  }

  /* ============ Poem Card ============ */
  .poem-card {
    background: var(--card-bg); border-radius: 16px; padding: 3rem 2.5rem;
    position: relative; overflow: hidden; margin-bottom: 2.5rem;
    box-shadow: 0 12px 40px rgba(197,160,89,0.08), 0 0 60px rgba(197,160,89,0.04);
    border: 1px solid rgba(197, 160, 89, 0.15);
    transition: box-shadow 0.3s;
  }
  .poem-card::after {
    content: ''; position: absolute; bottom: -40%; left: 10%; right: 10%; height: 80%;
    background: radial-gradient(ellipse at center bottom, rgba(197,160,89,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .poem-content {
    font-family: 'Amiri', serif; font-size: clamp(1.35rem, 3vw, 1.85rem);
    line-height: 2.4; text-align: center; position: relative; z-index: 1;
  }
  .poem-content .hemistich { display: block; margin: 0.3em 0; }
  .poem-content .separator {
    display: block; width: 40px; height: 1px;
    background: var(--gold); margin: 0.8em auto;
    opacity: 0.4;
  }
  .poet-name {
    text-align: center; margin-top: 1.8rem; font-size: 1.05rem;
    color: var(--gold); font-family: 'Amiri', serif;
    position: relative; z-index: 1;
  }
  .poet-name::before, .poet-name::after {
    content: ''; display: inline-block; width: 36px; height: 1px;
    background: var(--gold-dim); vertical-align: middle; margin: 0 0.8rem;
  }

  /* Translation row */
  .translation-row {
    display: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    color: var(--ash);
    opacity: 0.7;
    text-align: center;
    padding: 12px 0;
    direction: ltr;
    position: relative;
    z-index: 1;
  }
  .translation-row.visible { display: block; }

  /* Inline transliteration */
  .verse-block { margin-bottom: 0.3em; }
  .verse-translit {
    display: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    color: var(--ash);
    opacity: 0.5;
    font-style: italic;
    direction: ltr;
    text-align: center;
    margin-top: 2px;
  }
  .verse-translit.visible { display: block; }

  /* ===== BOTTOM ACTION BAR ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: linear-gradient(180deg, rgba(30,25,22,0.95), rgba(26,22,20,0.98));
    padding: 10px 8px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid rgba(197,160,89,0.2);
    box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
    direction: ltr;
    backdrop-filter: blur(12px);
  }
  .bottom-nav .nav-items-wrap {
    display: flex; align-items: center; justify-content: space-around; gap: 0; width: 100%;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 4px; background: transparent; border: none;
    color: var(--gold); opacity: 0.5; cursor: pointer; font-family: 'Tajawal', sans-serif;
    font-size: 9px; transition: all 0.2s; min-width: 44px; min-height: 44px;
    flex: 1;
  }
  .nav-item.active { opacity: 1; }
  .nav-item:hover { opacity: 1; }

  /* Settings panel */
  .settings-panel {
    display: none;
    position: fixed;
    right: 64px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--card-bg);
    border: 1px solid rgba(197,160,89,0.2);
    border-radius: 12px;
    padding: 16px;
    z-index: 59;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    width: 180px;
    font-size: 13px;
    backdrop-filter: blur(12px);
  }
  .settings-panel.visible { display: block; }
  .settings-panel h4 { margin-bottom: 8px; color: var(--gold); font-weight: 600; }
  .settings-panel label {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; opacity: 0.8;
  }

  /* ===== VERTICAL CONTROLS: Sand Column with Desert Trail Markers ===== */
  .vc-strip {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 52px;
    padding: 14px 4px;
    /* Sand column background */
    background:
      linear-gradient(180deg,
        rgba(197,160,89,0.15) 0%,
        rgba(197,160,89,0.25) 30%,
        rgba(197,160,89,0.3) 50%,
        rgba(197,160,89,0.25) 70%,
        rgba(197,160,89,0.15) 100%
      );
    border-radius: 12px 0 0 12px;
    border: 1px solid rgba(197,160,89,0.2);
    border-right: none;
    box-shadow: -2px 0 12px rgba(0,0,0,0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* Desert trail marker dots between toggles */
  .vc-strip::before {
    content: '';
    position: absolute;
    top: 14px; bottom: 14px;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    background: repeating-linear-gradient(
      180deg,
      rgba(232,97,26,0.3) 0px,
      rgba(232,97,26,0.3) 3px,
      transparent 3px,
      transparent 8px
    );
    z-index: -1;
  }

  .vc-toggle {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(30,25,22,0.6);
    border: 1.5px solid rgba(197,160,89,0.2);
    border-radius: 50%;
    cursor: pointer;
    color: var(--gold);
    opacity: 0.6;
    transition: all 0.3s ease;
    position: relative;
  }

  .vc-toggle:hover {
    opacity: 1;
    border-color: var(--ember);
    box-shadow: 0 0 12px rgba(232,97,26,0.2);
    transform: scale(1.08);
  }

  .vc-toggle.active {
    opacity: 1;
    background: rgba(232,97,26,0.15);
    border-color: var(--ember);
    color: var(--ember);
    box-shadow: 0 0 16px rgba(232,97,26,0.25);
  }

  .vc-toggle i { width: 20px; height: 20px; }

  .vc-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    font-family: 'Tajawal', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: var(--charcoal);
    background: var(--gold);
    padding: 1px 3px;
    border-radius: 3px;
    line-height: 1.2;
  }

  @media (max-width: 768px) {
    #app { padding: 2rem 1rem 100px; padding-right: 52px; }
    .poem-card { padding: 2rem 1.5rem; }
    .poem-content { font-size: 1.25rem; line-height: 2.1; }
    .vc-strip { width: 44px; }
    .vc-toggle { width: 40px; height: 40px; }
    .settings-panel { right: 50px; width: 160px; }
    .verse-translit { font-size: 11px; }
  }
  @media (max-width: 480px) {
    #app { padding-right: 48px; }
    .vc-strip { width: 40px; }
    .vc-toggle { width: 36px; height: 36px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <!-- Main App -->
  <main id="app">
    <div class="dune-layers" aria-hidden="true">
      <div class="dune-layer dune-layer-1"></div>
      <div class="dune-layer dune-layer-2"></div>
      <div class="dune-layer dune-layer-3"></div>
    </div>

    <!-- Vertical Controls: Sand Column with Desert Trail Markers -->
    <nav class="vc-strip" aria-label="Toggle controls">
      <button class="vc-toggle" data-action="translation" aria-label="Toggle translation">
        <span style="font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;line-height:1;letter-spacing:-0.5px">ع<span style="opacity:0.4">|</span>A</span>
      </button>
      <button class="vc-toggle" data-action="transliteration" aria-label="Toggle transliteration">
        <i data-lucide="text-cursor-input"></i>
      </button>
      <button class="vc-toggle" data-action="textsize" aria-label="Cycle text size">
        <i data-lucide="type"></i>
        <span class="vc-badge">M</span>
      </button>
      <button class="vc-toggle" data-action="settings" aria-label="Toggle settings">
        <i data-lucide="settings"></i>
      </button>
    </nav>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
      <h4>Settings</h4>
      <label><input type="checkbox"> Light mode</label>
      <label><input type="checkbox"> Tashkeel</label>
      <label><input type="checkbox" checked> Animations</label>
    </div>

    <div class="poem-card">
      <div class="poem-content">
        <div class="verse-block">
          <span class="hemistich">أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ</span>
          <div class="verse-translit">Ana al-bahru fi ahsha'ihi al-durru kaminun</div>
        </div>
        <span class="separator"></span>
        <div class="verse-block">
          <span class="hemistich">فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي</span>
          <div class="verse-translit">fa-hal sa'alu al-ghawwasa an sadafati</div>
        </div>
      </div>
      <div class="translation-row" id="translationRow">
        I am the sea, in whose depths pearls lie hidden / Have they asked the diver about my shells?
      </div>
      <div class="poet-name">أحمد شوقي</div>
    </div>

    <!-- Bottom Action Bar -->
    <nav class="bottom-nav">
      <div class="nav-items-wrap">
        <button class="nav-item active" aria-label="Next poem"><i data-lucide="shuffle" style="width:20px;height:20px"></i>Shuffle</button>
        <button class="nav-item" aria-label="Save poem"><i data-lucide="heart" style="width:20px;height:20px"></i>Save</button>
        <button class="nav-item" aria-label="Listen"><i data-lucide="headphones" style="width:20px;height:20px"></i>Listen</button>
        <button class="nav-item" aria-label="Share poem"><i data-lucide="share-2" style="width:20px;height:20px"></i>Share</button>
      </div>
    </nav>
  </main>

<script>
(function() {
  'use strict';

  /* Toggle Controls */
  document.querySelectorAll('.vc-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var action = btn.dataset.action;
      if (action === 'textsize') {
        var sizes = ['S','M','L','XL'];
        var badge = btn.querySelector('.vc-badge');
        var idx = sizes.indexOf(badge.textContent);
        idx = (idx + 1) % sizes.length;
        badge.textContent = sizes[idx];
        document.querySelector('.poem-content').style.fontSize =
          {'S':'1rem','M':'1.25rem','L':'1.5rem','XL':'2rem'}[sizes[idx]];
      } else if (action === 'translation') {
        btn.classList.toggle('active');
        document.getElementById('translationRow').classList.toggle('visible');
      } else if (action === 'transliteration') {
        btn.classList.toggle('active');
        document.querySelectorAll('.verse-translit').forEach(function(el) { el.classList.toggle('visible'); });
      } else if (action === 'settings') {
        btn.classList.toggle('active');
        document.getElementById('settingsPanel').classList.toggle('visible');
      } else {
        btn.classList.toggle('active');
      }
    });
  });

  /* Theme via settings checkbox */
  document.querySelector('.settings-panel input[type="checkbox"]').addEventListener('change', function() {
    document.body.classList.toggle('light');
  });

  lucide.createIcons();
})();
</script>
</body>
</html>
