<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 3: Typographic Elegance</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #0c0c0e 0%, #1a1814 100%);
      color: #e7e5e4;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      padding: 40px;
    }

    /* Top Edge Bar - Very Minimal */
    .edge-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(12, 12, 14, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(197, 160, 89, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      z-index: 1000;
    }

    /* Text Settings - Subtle */
    .text-settings {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .text-control-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      group: true;
    }
    .control-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(197, 160, 89, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 18px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .text-control-item:hover .control-circle {
      background: rgba(197, 160, 89, 0.15);
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(197, 160, 89, 0.3);
    }
    .text-control-item.active .control-circle {
      background: rgba(197, 160, 89, 0.2);
      border-color: var(--gold);
    }
    .control-hint {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(197, 160, 89, 0.5);
      font-family: 'Inter', sans-serif;
    }

    .separator {
      width: 1px;
      height: 36px;
      background: linear-gradient(180deg, transparent, rgba(197, 160, 89, 0.4), transparent);
    }

    .toggle-elegant {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .toggle-elegant-bg {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(197, 160, 89, 0.4);
      border-radius: 10px;
      transition: all 0.3s;
    }
    .toggle-elegant.on .toggle-elegant-bg {
      background: rgba(197, 160, 89, 0.2);
      border-color: var(--gold);
    }
    .toggle-elegant-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      background: transparent;
      transition: all 0.3s;
    }
    .toggle-elegant.on .toggle-elegant-knob {
      transform: translateX(16px);
      background: var(--gold);
    }

    .font-selector-elegant {
      padding: 4px 10px;
      border: none;
      border-bottom: 1px solid rgba(197, 160, 89, 0.4);
      background: transparent;
      color: var(--gold);
      font-family: 'Amiri', serif;
      font-size: 16px;
      cursor: pointer;
      outline: none;
    }
    .font-selector-elegant:focus {
      border-bottom-color: var(--gold);
    }
    .font-selector-elegant option {
      background: #1a1814;
    }

    /* Theme Toggle - Artistic */
    .theme-artistic {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 16px;
      border: 1px solid rgba(197, 160, 89, 0.3);
      border-radius: 20px;
      transition: all 0.3s;
    }
    .theme-artistic:hover {
      border-color: rgba(197, 160, 89, 0.6);
      box-shadow: 0 0 20px rgba(197, 160, 89, 0.15);
    }
    .theme-icon-container {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(197, 160, 89, 0.1);
      border: 1px solid rgba(197, 160, 89, 0.3);
    }
    .theme-icon-svg {
      width: 16px;
      height: 16px;
      color: var(--gold);
    }
    .theme-label-elegant {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold);
      font-weight: 500;
      font-family: 'Inter', sans-serif;
    }

    /* Vertical Sidebar - Ultra Minimal */
    .sidebar-minimal {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 8px;
    }

    .sidebar-btn-minimal {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(197, 160, 89, 0.06);
      border: 1px solid transparent;
      color: var(--gold);
      opacity: 0.7;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s;
      position: relative;
    }
    .sidebar-btn-minimal:hover {
      opacity: 1;
      background: rgba(197, 160, 89, 0.12);
      border-color: rgba(197, 160, 89, 0.3);
    }
    .sidebar-btn-minimal.active {
      opacity: 1;
      background: rgba(197, 160, 89, 0.2);
      border-color: rgba(197, 160, 89, 0.5);
      box-shadow: 0 0 16px rgba(197, 160, 89, 0.2);
    }
    .sidebar-btn-minimal svg {
      width: 22px;
      height: 22px;
    }

    /* Tooltip on hover */
    .sidebar-btn-minimal::after {
      content: attr(title);
      position: absolute;
      right: 110%;
      top: 50%;
      transform: translateY(-50%);
      padding: 6px 12px;
      background: rgba(12, 12, 14, 0.95);
      border: 1px solid rgba(197, 160, 89, 0.4);
      border-radius: 6px;
      color: var(--gold);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .sidebar-btn-minimal:hover::after {
      opacity: 1;
    }

    /* Content */
    .main-content {
      margin-top: 100px;
      margin-right: 100px;
      padding: 60px;
      background: linear-gradient(135deg, rgba(197, 160, 89, 0.05) 0%, transparent 50%);
      border: 1px solid rgba(197, 160, 89, 0.15);
      border-radius: 20px;
    }
    .poem-title {
      font-family: 'Amiri', serif;
      font-size: 42px;
      color: var(--gold);
      margin-bottom: 40px;
      font-weight: 400;
    }
    .poem-arabic {
      font-family: 'Amiri', serif;
      font-size: 32px;
      color: #e7e5e4;
      line-height: 2;
      margin-bottom: 40px;
      direction: rtl;
    }
    .poem-english {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: rgba(231, 229, 228, 0.75);
      font-style: italic;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <!-- Top Edge Bar -->
  <div class="edge-bar">
    <!-- Left: Text Settings -->
    <div class="text-settings">
      <div class="text-control-item" title="Decrease text size">
        <div class="control-circle">−</div>
        <span class="control-hint">Size</span>
      </div>
      <div class="text-control-item active" title="Increase text size">
        <div class="control-circle">+</div>
        <span class="control-hint">Size</span>
      </div>

      <div class="separator"></div>

      <div class="text-control-item" title="Toggle translation">
        <div class="control-circle">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
        </div>
        <span class="control-hint">Trans</span>
      </div>
      <div class="text-control-item active" title="Toggle romanization">
        <div class="control-circle">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <span class="control-hint">Rom</span>
      </div>

      <div class="separator"></div>

      <div class="font-selector-elegant" title="Select font">
        <option>ابythm</option>
      </div>
    </div>

    <!-- Right: Theme Toggle -->
    <div class="theme-artistic" title="Switch to light mode">
      <div class="theme-icon-container">
        <svg class="theme-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
      </div>
      <span class="theme-label-elegant">Night</span>
    </div>
  </div>

  <!-- Ultra Minimal Sidebar -->
  <div class="sidebar-minimal">
    <button class="sidebar-btn-minimal active" title="Save poem">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
    </button>
    <button class="sidebar-btn-minimal active" title="Share poem">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
    </button>
    <button class="sidebar-btn-minimal" title="Copy poem">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
    </button>
    <button class="sidebar-btn-minimal" title="Ratchet mode">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"></path></svg>
    </button>
    <button class="sidebar-btn-minimal" title="Sign in">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    </button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h1 class="poem-title">The Blind Man</h1>
    <p class="poem-arabic">أرى الله في كل شيء</p>
    <p class="poem-english">I see God in everything</p>
  </div>
</body>
</html>
