<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Option 3 - Manuscript | Poetry بالعربي</title>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-primary: #1a1610;
      --bg-secondary: #211d15;
      --bg-card: #2a2418;
      --text-primary: #e8dcc8;
      --text-secondary: #a09882;
      --border-color: #3a3328;
      --accent: #c5a059;
      --parchment: #f5edd4;
      --parchment-dark: #e0d4b6;
      --ink: #2a2015;
    }

    [data-theme="light"] {
      --bg-primary: #f5edd4;
      --bg-secondary: #ebe3c8;
      --bg-card: #faf5e8;
      --text-primary: #2a2015;
      --text-secondary: #6a5f48;
      --border-color: #ccc3a8;
      --accent: #8a6e2f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Amiri', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .brand {
      display: flex;
      align-items: flex-end;
      gap: 0.4em;
    }

    .brand-en {
      font-family: 'Amiri', serif;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text-primary);
      font-style: italic;
    }

    .brand-ar {
      font-family: 'Amiri', serif;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      direction: rtl;
    }

    /* Flourish connector */
    .brand-flourish {
      display: flex;
      align-items: flex-end;
      position: relative;
    }

    .brand-flourish::after {
      content: '';
      position: absolute;
      bottom: 0.15em;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 20%, var(--accent) 80%, transparent 100%);
      opacity: 0.4;
    }

    /* Decorative border frame */
    .manuscript-frame {
      border: 2px solid var(--border-color);
      border-image: repeating-linear-gradient(
        45deg,
        var(--accent) 0px,
        var(--accent) 2px,
        transparent 2px,
        transparent 8px
      ) 4;
      padding: 2rem;
    }

    /* Hero context */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      position: relative;
    }

    .hero .brand-flourish {
      padding: 2rem 3rem;
      border: 1px solid var(--border-color);
      border-image: repeating-linear-gradient(
        45deg,
        var(--accent) 0px,
        var(--accent) 1px,
        transparent 1px,
        transparent 6px
      ) 6;
    }

    .hero .brand-en {
      font-size: clamp(3rem, 6vw, 4.5rem);
    }

    .hero .brand-ar {
      font-size: clamp(1.875rem, 4vw, 3rem);
    }

    .hero .brand-icon {
      width: clamp(1.25rem, 2.5vw, 2rem);
      height: clamp(1.25rem, 2.5vw, 2rem);
      color: var(--accent);
      margin-bottom: 0.2em;
    }

    .hero-label {
      margin-top: 1.5rem;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* Ornamental divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem 0;
      color: var(--accent);
      opacity: 0.5;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: var(--accent);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Section layout */
    .section {
      padding: 3rem 1.5rem;
      border-top: 1px solid var(--border-color);
    }

    /* Nav context */
    .nav-demo {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 0;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-image: repeating-linear-gradient(
        45deg,
        var(--accent) 0px,
        var(--accent) 1px,
        transparent 1px,
        transparent 6px
      ) 4;
    }

    .nav-demo .brand-en {
      font-size: 1.25rem;
    }

    .nav-demo .brand-ar {
      font-size: 0.875rem;
    }

    .nav-demo .brand-icon {
      width: 0.75rem;
      height: 0.75rem;
      color: var(--accent);
      margin-bottom: 0.1em;
    }

    .nav-demo .brand-flourish::after {
      display: none;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .nav-link {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-decoration: none;
    }

    /* Card context */
    .card-demo {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 2rem;
      max-width: 360px;
      margin: 0 auto;
      border-image: repeating-linear-gradient(
        45deg,
        var(--accent) 0px,
        var(--accent) 1px,
        transparent 1px,
        transparent 6px
      ) 6;
    }

    .card-demo .brand {
      margin-bottom: 1.25rem;
      justify-content: center;
    }

    .card-demo .brand-en {
      font-size: 1.5rem;
    }

    .card-demo .brand-ar {
      font-size: 1.05rem;
    }

    .card-demo .brand-icon {
      width: 0.875rem;
      height: 0.875rem;
      color: var(--accent);
      margin-bottom: 0.1em;
    }

    .card-demo .brand-flourish::after {
      display: none;
    }

    .card-poem {
      font-family: 'Amiri', serif;
      font-size: 1.125rem;
      line-height: 2;
      color: var(--text-primary);
      direction: rtl;
      text-align: center;
      margin-bottom: 1rem;
    }

    .card-poet {
      font-family: 'Amiri', serif;
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-align: center;
      font-style: italic;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 48px;
      height: 48px;
      border-radius: 0;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background 0.3s ease;
    }

    .theme-toggle:hover {
      background: var(--bg-card);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    /* Context labels */
    .context-badge {
      display: inline-block;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 0;
      padding: 0.2em 0.6em;
      margin-bottom: 1rem;
    }

    /* Icon visibility for theme toggle */
    .icon-sun, .icon-moon {
      display: none;
    }

    [data-mode="dark"] .icon-sun {
      display: block;
    }

    [data-mode="light"] .icon-moon {
      display: block;
    }
  </style>
</head>
<body data-mode="dark">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="icon-sun"><i data-lucide="sun"></i></span>
    <span class="icon-moon"><i data-lucide="moon"></i></span>
  </button>

  <!-- Hero Context -->
  <section class="hero">
    <div class="brand-flourish">
      <div class="brand">
        <i data-lucide="feather" class="brand-icon"></i>
        <span class="brand-en">poetry</span>
        <span class="brand-ar" dir="rtl" lang="ar">بالعربي</span>
      </div>
    </div>
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-dot"></span>
      <span class="divider-line"></span>
    </div>
    <p class="hero-label">Option 3 -- Manuscript</p>
  </section>

  <!-- Nav Context -->
  <section class="section">
    <span class="context-badge">Navigation</span>
    <div class="nav-demo">
      <div class="brand-flourish">
        <div class="brand">
          <i data-lucide="feather" class="brand-icon"></i>
          <span class="brand-en">poetry</span>
          <span class="brand-ar" dir="rtl" lang="ar">بالعربي</span>
        </div>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-link">Discover</a>
        <a href="#" class="nav-link">Poets</a>
      </nav>
    </div>
  </section>

  <!-- Card Context -->
  <section class="section">
    <span class="context-badge">Card</span>
    <div class="card-demo">
      <div class="brand-flourish">
        <div class="brand">
          <i data-lucide="feather" class="brand-icon"></i>
          <span class="brand-en">poetry</span>
          <span class="brand-ar" dir="rtl" lang="ar">بالعربي</span>
        </div>
      </div>
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-dot"></span>
        <span class="divider-line"></span>
      </div>
      <p class="card-poem" lang="ar" dir="rtl">
        وما نيلُ المطالبِ بالتمنّي<br>
        ولكنْ تُؤخَذُ الدنيا غِلابا
      </p>
      <p class="card-poet" lang="ar" dir="rtl">-- أحمد شوقي</p>
    </div>
  </section>

  <script>
    lucide.createIcons();

    const toggle = document.getElementById('themeToggle');
    let isDark = true;

    toggle.addEventListener('click', function() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
      document.body.setAttribute('data-mode', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
