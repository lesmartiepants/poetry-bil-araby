<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mood Picker — Option B: Card Flip Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Forum&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --color-bg:              #0c0c0e;
      --color-gold:            #c5a059;
      --color-gold-dim:        rgba(197, 160, 89, 0.25);
      --color-gold-glow:       rgba(197, 160, 89, 0.5);
      --color-text-primary:    #f0e8d8;
      --color-text-muted:      rgba(240, 232, 216, 0.55);
      --color-glass-fill:      rgba(255, 255, 255, 0.05);
      --color-glass-border:    rgba(255, 255, 255, 0.1);
      --font-arabic:           'Reem Kufi', serif;
      --font-english:          'Forum', serif;
      --card-w:                104px;
      --card-h:                72px;
      --card-radius:           10px;
      --grid-gap:              10px;
      --perspective:           800px;
      --ease-out-expo:         cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:           cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-flip:         0.4s;
      --duration-hover:        0.2s;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-arabic);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ============================================================
       OPTION LABEL
       ============================================================ */
    .option-label {
      position: fixed;
      top: 16px;
      left: 16px;
      font-family: var(--font-english);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--color-gold);
      opacity: 0.7;
      z-index: 100;
      text-transform: uppercase;
      user-select: none;
    }

    /* ============================================================
       BACKGROUND
       ============================================================ */
    #bg-wash {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--color-bg);
      transition: background 0.5s ease;
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      z-index: 5;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      text-align: center;
      padding-top: 36px;
      flex-shrink: 0;
    }

    .title-arabic {
      font-family: var(--font-arabic);
      font-size: clamp(1.4rem, 4.5vw, 1.9rem);
      font-weight: 700;
      color: var(--color-gold);
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .title-english {
      font-family: var(--font-english);
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: var(--color-text-muted);
      margin-top: 6px;
      letter-spacing: 0.08em;
    }

    /* ============================================================
       3x3 FLIP CARD GRID
       ============================================================ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--card-w));
      grid-template-rows: repeat(3, var(--card-h));
      gap: var(--grid-gap);
      perspective: var(--perspective);
      flex-shrink: 0;
    }

    /* The flip wrapper */
    .card-wrapper {
      width: var(--card-w);
      height: var(--card-h);
      perspective: var(--perspective);
      cursor: pointer;
      position: relative;
    }

    /* Inner container that flips */
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform var(--duration-flip) cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--card-radius);
      /* subtle 3D tilt on hover is applied via JS */
    }

    .card-wrapper.flipped .card-inner {
      transform: rotateY(180deg);
    }

    /* Front and back share base styles */
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--card-radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1.5px solid var(--color-glass-border);
    }

    /* FRONT FACE */
    .card-front {
      background: var(--color-glass-fill);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .card-front-english {
      font-family: var(--font-english);
      font-size: 0.78rem;
      color: var(--color-text-primary);
      letter-spacing: 0.04em;
    }

    .card-front-arabic {
      font-family: var(--font-arabic);
      font-size: 0.72rem;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    /* BACK FACE */
    .card-back {
      transform: rotateY(180deg);
      /* Background and border color set inline per emotion */
      overflow: hidden;
    }

    .card-back-arabic {
      font-family: var(--font-arabic);
      font-size: 1.35rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }

    /* Sheen overlay on back */
    .card-back::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0%,
        transparent 50%,
        rgba(0,0,0,0.15) 100%
      );
      pointer-events: none;
      border-radius: var(--card-radius);
    }

    /* ============================================================
       RADIAL WASH ELEMENT
       ============================================================ */
    .wash-ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      will-change: transform, opacity;
    }

    /* ============================================================
       BOTTOM CONTROLS
       ============================================================ */
    .bottom-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    /* ============================================================
       NEXT BUTTON
       ============================================================ */
    .btn-next {
      font-family: var(--font-arabic);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-gold);
      background: transparent;
      border: 1.5px solid var(--color-gold);
      border-radius: 999px;
      padding: 12px 40px;
      min-height: 48px;
      cursor: pointer;
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 0 var(--color-gold-glow);
      transition:
        box-shadow 0.25s var(--ease-out-expo),
        background 0.25s var(--ease-out-expo),
        opacity 0.35s var(--ease-out-expo),
        transform 0.35s var(--ease-spring);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    .btn-next.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .btn-next:hover,
    .btn-next:focus-visible {
      box-shadow: 0 0 22px 7px var(--color-gold-glow);
      background: rgba(197, 160, 89, 0.08);
      outline: none;
    }

    .btn-next:active {
      transform: scale(0.96);
      transition-duration: 0.08s;
    }

    /* Shimmer sweep */
    .btn-next::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(197,160,89,0.2), transparent);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .btn-next:hover::after { left: 150%; }

    /* ============================================================
       PROGRESS DOTS
       ============================================================ */
    .progress-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--color-gold);
      transition: background 0.3s ease, transform 0.3s var(--ease-spring);
    }

    .dot.active {
      background: var(--color-gold);
      transform: scale(1.2);
    }

    /* ============================================================
       RESPONSIVE — at narrow viewports shrink the cards
       ============================================================ */
    @media (max-width: 375px) {
      :root {
        --card-w:   92px;
        --card-h:   66px;
        --grid-gap: 8px;
      }
    }
  </style>
</head>
<body>

  <span class="option-label">Option B</span>

  <!-- Background color wash -->
  <div id="bg-wash"></div>

  <div class="screen">
    <header class="header">
      <h1 class="title-arabic">كيف تشعر الآن؟</h1>
      <p class="title-english" dir="ltr">How are you feeling?</p>
    </header>

    <div class="card-grid" id="card-grid" aria-label="اختر مشاعرك" role="group"></div>

    <div class="bottom-controls">
      <button class="btn-next" id="btn-next" aria-label="التالي" aria-disabled="true">التالي</button>
      <div class="progress-dots" role="list" aria-label="الخطوات">
        <div class="dot active" role="listitem"></div>
        <div class="dot" role="listitem"></div>
        <div class="dot" role="listitem"></div>
        <div class="dot" role="listitem"></div>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       DATA
       ============================================================ */
    const EMOTIONS = [
      { ar: 'فرح',   en: 'Joy',        color: '#c5a059' },
      { ar: 'كآبة',  en: 'Melancholy', color: '#1E3A6E' },
      { ar: 'غضب',   en: 'Anger',      color: '#8B2500' },
      { ar: 'أمل',   en: 'Hope',       color: '#4A7C59' },
      { ar: 'يأس',   en: 'Despair',    color: '#4A4A4A' },
      { ar: 'دهشة',  en: 'Wonder',     color: '#6A4C93' },
      { ar: 'فخر',   en: 'Pride',      color: '#B8860B' },
      { ar: 'وحدة',  en: 'Loneliness', color: '#2E3A5F' },
      { ar: 'حنين',  en: 'Nostalgia',  color: '#8B7355' },
    ];

    const MAX_SELECTIONS = 3;
    let selectedIndices = new Set();
    let cardWrappers = [];
    let hoverTweens = {};

    /* ============================================================
       HELPER: hex → rgb object
       ============================================================ */
    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
      };
    }

    /* ============================================================
       BUILD CARD GRID
       ============================================================ */
    function buildCards() {
      const grid = document.getElementById('card-grid');

      EMOTIONS.forEach((emotion, idx) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.setAttribute('role', 'button');
        wrapper.setAttribute('aria-pressed', 'false');
        wrapper.setAttribute('aria-label', `${emotion.ar} — ${emotion.en}`);
        wrapper.setAttribute('tabindex', '0');

        const { r, g, b } = hexToRgb(emotion.color);
        const backBg = `linear-gradient(135deg, rgba(${r},${g},${b},0.85) 0%, rgba(${r},${g},${b},0.6) 100%)`;

        wrapper.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-front">
              <span class="card-front-english" dir="ltr">${emotion.en}</span>
              <span class="card-front-arabic">${emotion.ar}</span>
            </div>
            <div class="card-face card-back" style="
              background: ${backBg};
              border-color: rgba(${r},${g},${b},0.6);
            ">
              <span class="card-back-arabic">${emotion.ar}</span>
            </div>
          </div>
        `;

        // Entrance stagger
        gsap.from(wrapper, {
          opacity: 0,
          scale: 0.85,
          duration: 0.45,
          delay: 0.2 + idx * 0.055,
          ease: 'back.out(1.5)',
        });

        // Hover 3D tilt (mouse only — pointer events)
        wrapper.addEventListener('pointermove', e => {
          if (selectedIndices.has(idx)) return; // skip tilt on selected
          const rect = wrapper.getBoundingClientRect();
          const rx = ((e.clientY - rect.top) / rect.height - 0.5) * 14;
          const ry = ((e.clientX - rect.left) / rect.width - 0.5) * -14;
          const inner = wrapper.querySelector('.card-inner');
          if (hoverTweens[idx]) hoverTweens[idx].kill();
          hoverTweens[idx] = gsap.to(inner, {
            rotateX: rx, rotateY: ry,
            duration: 0.2,
            ease: 'power2.out',
            overwrite: 'auto',
          });
        });

        wrapper.addEventListener('pointerleave', () => {
          if (selectedIndices.has(idx)) return;
          const inner = wrapper.querySelector('.card-inner');
          if (hoverTweens[idx]) hoverTweens[idx].kill();
          hoverTweens[idx] = gsap.to(inner, {
            rotateX: 0, rotateY: 0,
            duration: 0.35,
            ease: 'power2.out',
            overwrite: 'auto',
          });
        });

        wrapper.addEventListener('click', () => handleCardTap(idx, wrapper, emotion));
        wrapper.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            handleCardTap(idx, wrapper, emotion);
          }
        });

        grid.appendChild(wrapper);
        cardWrappers[idx] = wrapper;
      });
    }

    /* ============================================================
       TAP HANDLER
       ============================================================ */
    function handleCardTap(idx, wrapper, emotion) {
      const wasSelected = selectedIndices.has(idx);

      if (!wasSelected && selectedIndices.size >= MAX_SELECTIONS) {
        // Shake feedback
        gsap.to(wrapper, {
          x: [-6, 6, -4, 4, 0],
          duration: 0.35,
          ease: 'none',
        });
        return;
      }

      if (wasSelected) {
        // Un-flip
        selectedIndices.delete(idx);
        wrapper.classList.remove('flipped');
        wrapper.setAttribute('aria-pressed', 'false');

        // Re-enable tilt
        const inner = wrapper.querySelector('.card-inner');
        gsap.to(inner, { rotateY: 0, duration: 0.4, ease: 'power2.inOut' });
      } else {
        // Flip forward
        selectedIndices.add(idx);
        wrapper.classList.add('flipped');
        wrapper.setAttribute('aria-pressed', 'true');

        // Kill hover tilt before flip
        if (hoverTweens[idx]) hoverTweens[idx].kill();
        const inner = wrapper.querySelector('.card-inner');
        gsap.set(inner, { rotateX: 0 });

        // Color wash radial pulse
        const rect = wrapper.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        spawnWash(cx, cy, emotion.color);

        // Shift background subtly
        shiftBg(emotion.color);
      }

      if (selectedIndices.size === 0) clearBg();
      updateNextButton();
    }

    /* ============================================================
       BACKGROUND SHIFT
       ============================================================ */
    const bgWash = document.getElementById('bg-wash');
    let bgTween = null;

    function shiftBg(hex) {
      const { r, g, b } = hexToRgb(hex);
      const overlay = `radial-gradient(ellipse at center, rgba(${r},${g},${b},0.1) 0%, rgba(12,12,14,1) 70%)`;
      if (bgTween) bgTween.kill();
      gsap.to(bgWash, {
        background: overlay,
        duration: 0.6,
        ease: 'power2.out',
      });
    }

    function clearBg() {
      gsap.to(bgWash, {
        background: '#0c0c0e',
        duration: 0.5,
        ease: 'power2.out',
      });
    }

    /* ============================================================
       RADIAL WASH BURST
       ============================================================ */
    function spawnWash(x, y, color) {
      const { r, g, b } = hexToRgb(color);
      const el = document.createElement('div');
      el.className = 'wash-ring';
      const size = Math.max(window.innerWidth, window.innerHeight) * 2.2;
      el.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${x}px;
        top: ${y}px;
        background: radial-gradient(circle, rgba(${r},${g},${b},0.22) 0%, transparent 60%);
      `;
      document.body.appendChild(el);

      gsap.timeline({
        onComplete: () => el.remove(),
      })
        .to(el, { scale: 1, opacity: 1, duration: 0.5, ease: 'power2.out' })
        .to(el, { opacity: 0, duration: 0.35, ease: 'power2.in' }, '-=0.1');
    }

    /* ============================================================
       NEXT BUTTON
       ============================================================ */
    const btnNext = document.getElementById('btn-next');

    function updateNextButton() {
      if (selectedIndices.size > 0) {
        btnNext.classList.add('visible');
        btnNext.setAttribute('aria-disabled', 'false');
      } else {
        btnNext.classList.remove('visible');
        btnNext.setAttribute('aria-disabled', 'true');
      }
    }

    btnNext.addEventListener('click', () => {
      if (!btnNext.classList.contains('visible')) return;
      gsap.timeline()
        .to(btnNext, { scale: 0.95, duration: 0.1, ease: 'power2.in' })
        .to(btnNext, { scale: 1.04, duration: 0.15, ease: 'power2.out' })
        .to(btnNext, { scale: 1, duration: 0.1 });
    });

    /* ============================================================
       INIT
       ============================================================ */
    buildCards();
  </script>
</body>
</html>
