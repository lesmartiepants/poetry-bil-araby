<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Option 10 - Glass Poetry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d1a;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 1920px;
            height: 1080px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%);
        }

        /* Floating particles */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .container::before {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent);
            top: -200px;
            left: -200px;
        }

        .container::after {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, -50px) scale(1.1); }
            66% { transform: translate(-50px, 100px) scale(0.9); }
        }

        .poem-container {
            text-align: center;
            max-width: 900px;
            padding: 60px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        .poem-title {
            font-family: 'Amiri', serif;
            font-size: 46px;
            margin-bottom: 48px;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 2px 20px rgba(99, 102, 241, 0.4);
        }

        .poem-text {
            font-family: 'Amiri', serif;
            font-size: 34px;
            line-height: 2.5;
            color: #e8e8f0;
            margin-bottom: 36px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 1px 10px rgba(99, 102, 241, 0.2);
        }

        .poem-text.zoom-medium {
            font-size: 42px;
            line-height: 2.6;
        }

        .poem-text.zoom-large {
            font-size: 50px;
            line-height: 2.7;
        }

        .poem-title.zoom-medium {
            font-size: 54px;
        }

        .poem-title.zoom-large {
            font-size: 62px;
        }

        .poet-name {
            font-family: 'Amiri', serif;
            font-size: 26px;
            color: #b0b0c8;
            margin-top: 48px;
            font-style: italic;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transliteration {
            font-family: 'Segoe UI', sans-serif;
            font-size: 19px;
            color: #9898b8;
            font-style: italic;
            margin-top: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transliteration.active {
            opacity: 1;
            max-height: 500px;
            margin-top: 28px;
        }

        /* Poetic Glass Control Bar */
        .control-bar {
            position: fixed;
            right: 48px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.08) 0%, 
                rgba(255, 255, 255, 0.04) 100%);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(99, 102, 241, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-bar:hover {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.12) 0%, 
                rgba(255, 255, 255, 0.06) 100%);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-50%) translateX(-6px);
            box-shadow: 
                0 16px 56px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(99, 102, 241, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border: none;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.1) 0%, 
                rgba(255, 255, 255, 0.05) 100%);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #e0e0f0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.4), 
                rgba(139, 92, 246, 0.4));
            filter: blur(10px);
            opacity: 0;
            z-index: -1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn:hover {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.15) 0%, 
                rgba(255, 255, 255, 0.08) 100%);
            transform: scale(1.15) translateY(-2px);
            box-shadow: 
                0 8px 24px rgba(99, 102, 241, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .control-btn:hover::before {
            opacity: 1;
        }

        .control-btn:hover::after {
            opacity: 0.6;
        }

        .control-btn:active {
            transform: scale(1.08);
        }

        .control-btn.active {
            background: linear-gradient(135deg, 
                rgba(99, 102, 241, 0.3) 0%, 
                rgba(139, 92, 246, 0.3) 100%);
            border-color: rgba(99, 102, 241, 0.5);
            color: #ffffff;
        }

        .control-btn.active::after {
            opacity: 0.8;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.6; filter: blur(10px); }
            50% { opacity: 1; filter: blur(15px); }
        }

        .icon {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .control-btn:hover .icon {
            transform: scale(1.15);
            filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.6));
        }

        /* Flowing Divider */
        .divider {
            height: 1.5px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(99, 102, 241, 0.3) 50%, 
                transparent 100%);
            margin: 10px 6px;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
            animation: divider-flow 3s ease-in-out infinite;
        }

        @keyframes divider-flow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Elegant Tooltip */
        .tooltip {
            position: absolute;
            right: 96px;
            background: linear-gradient(135deg, 
                rgba(30, 30, 50, 0.98) 0%, 
                rgba(20, 20, 40, 0.98) 100%);
            backdrop-filter: blur(16px);
            color: #ffffff;
            padding: 12px 22px;
            border-radius: 16px;
            font-size: 15px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 400;
            letter-spacing: 0.5px;
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(99, 102, 241, 0.3);
        }

        .control-btn:hover .tooltip {
            opacity: 1;
            right: 106px;
        }

        /* Flowing transition effect */
        @keyframes flow-in {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .control-btn {
            animation: flow-in 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .control-btn:nth-child(1) { animation-delay: 0.1s; }
        .control-btn:nth-child(3) { animation-delay: 0.2s; }
        .control-btn:nth-child(5) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="poem-container">
            <h1 class="poem-title" id="poemTitle">قصيدة الحب</h1>
            
            <div class="poem-text" id="poemText">
                أحبك في زمن الخوف والقهر<br>
                أحبك في زمن الحرب والضجر<br>
                وأحبك حين يموت الكلام<br>
                ويبقى الصدى في فضاء السهر
            </div>

            <div class="transliteration" id="transliteration">
                uḥibbuki fī zaman al-khawf wa-l-qahr<br>
                uḥibbuki fī zaman al-ḥarb wa-l-ḍajar<br>
                wa-uḥibbuki ḥīna yamūt al-kalām<br>
                wa-yabqā al-ṣadā fī faḍāʾ al-sahar
            </div>

            <p class="poet-name">— نزار قباني</p>
        </div>

        <div class="control-bar">
            <button class="control-btn" id="saveBtn" onclick="toggleSave()">
                <span class="icon" id="saveIcon">♡</span>
                <span class="tooltip">حفظ القصيدة</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="zoomBtn" onclick="cycleZoom()">
                <span class="icon">A+</span>
                <span class="tooltip">تكبير النص</span>
            </button>

            <div class="divider"></div>

            <button class="control-btn" id="translitBtn" onclick="toggleTranslit()">
                <span class="icon">ع/A</span>
                <span class="tooltip">النقحرة اللاتينية</span>
            </button>
        </div>
    </div>

    <script>
        let saved = false;
        let zoomLevel = 0;
        let translitActive = false;

        function toggleSave() {
            saved = !saved;
            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('saveIcon');
            
            if (saved) {
                icon.textContent = '♥';
                btn.classList.add('active');
            } else {
                icon.textContent = '♡';
                btn.classList.remove('active');
            }
        }

        function cycleZoom() {
            const btn = document.getElementById('zoomBtn');
            const poemText = document.getElementById('poemText');
            const poemTitle = document.getElementById('poemTitle');
            
            zoomLevel = (zoomLevel + 1) % 3;
            
            poemText.classList.remove('zoom-medium', 'zoom-large');
            poemTitle.classList.remove('zoom-medium', 'zoom-large');
            
            if (zoomLevel === 1) {
                poemText.classList.add('zoom-medium');
                poemTitle.classList.add('zoom-medium');
                btn.classList.add('active');
            } else if (zoomLevel === 2) {
                poemText.classList.add('zoom-large');
                poemTitle.classList.add('zoom-large');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleTranslit() {
            translitActive = !translitActive;
            const btn = document.getElementById('translitBtn');
            const translit = document.getElementById('transliteration');
            
            if (translitActive) {
                translit.classList.add('active');
                btn.classList.add('active');
            } else {
                translit.classList.remove('active');
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
