<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 4: WILD CARD - Brutalist Maximalism</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #00ff00;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }
    
    /* Scan line effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 0, 0.03) 0px,
        transparent 1px,
        transparent 2px,
        rgba(0, 255, 0, 0.03) 3px
      );
      pointer-events: none;
      animation: scanline 8s linear infinite;
      z-index: 9999;
    }
    
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }
    
    .container {
      display: flex;
      height: 100vh;
      position: relative;
    }
    
    /* Brutalist Vertical Control Bar - Left Side with System Info */
    .vertical-controls {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 200px;
      background: #000;
      border-right: 3px solid #00ff00;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      font-family: 'Courier New', monospace;
      padding: 20px 0;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
    }
    
    .system-header {
      padding: 10px 15px;
      border-bottom: 2px solid #00ff00;
      margin-bottom: 10px;
    }
    
    .system-title {
      font-size: 16px;
      font-weight: bold;
      color: #00ff00;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .system-time {
      font-size: 11px;
      color: #00ff00;
      opacity: 0.7;
      font-family: monospace;
    }
    
    .control-section {
      margin-bottom: 20px;
      padding: 0 15px;
    }
    
    .section-label {
      font-size: 10px;
      color: #00ff00;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      opacity: 0.6;
      border-bottom: 1px solid rgba(0, 255, 0, 0.2);
      padding-bottom: 4px;
    }
    
    .control-btn {
      width: 100%;
      padding: 12px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 2px solid #00ff00;
      cursor: pointer;
      transition: all 0.1s;
      color: #00ff00;
      position: relative;
      margin-bottom: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .control-btn:hover {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
    }
    
    .control-btn.active {
      background: #00ff00;
      color: #000;
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0.7; }
    }
    
    .control-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.5;
    }
    
    .status-indicator {
      width: 8px;
      height: 8px;
      background: #00ff00;
      border-radius: 50%;
      margin-left: auto;
    }
    
    .status-indicator.inactive {
      background: transparent;
      border: 1px solid #00ff00;
    }
    
    /* Counter display */
    .counter-display {
      font-size: 10px;
      color: #00ff00;
      background: #000;
      border: 1px solid #00ff00;
      padding: 2px 6px;
      margin-left: auto;
      font-family: monospace;
    }
    
    /* Sample content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 80px 0 240px;
      background: #0a0a0a;
    }
    
    .poem-container {
      max-width: 900px;
      text-align: center;
      border: 3px solid #00ff00;
      padding: 40px;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
      position: relative;
    }
    
    .poem-container::before {
      content: '>>> POETRY.SYS LOADED <<<';
      position: absolute;
      top: -20px;
      left: 20px;
      background: #000;
      padding: 4px 12px;
      font-size: 10px;
      color: #00ff00;
      border: 2px solid #00ff00;
    }
    
    .poem-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: #00ff00;
      margin-bottom: 1.5rem;
      font-family: 'Amiri', serif;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }
    
    .poem-text {
      font-size: clamp(1.25rem, 2vw, 1.5rem);
      line-height: 2.4;
      color: #00ff00;
      font-family: 'Amiri', serif;
      transition: font-size 0.2s ease;
    }
    
    .design-label {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #000;
      border: 3px solid #00ff00;
      padding: 10px 20px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00ff00;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 0, 0.5); }
      50% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
    }
    
    /* Zoom levels */
    .zoom-1 { font-size: clamp(1rem, 1.6vw, 1.2rem); }
    .zoom-2 { font-size: clamp(1.25rem, 2vw, 1.5rem); }
    .zoom-3 { font-size: clamp(1.5rem, 2.4vw, 1.8rem); }
    
    /* Terminal cursor */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1.2em;
      background: #00ff00;
      animation: cursor-blink 1s step-end infinite;
      margin-left: 4px;
    }
    
    @keyframes cursor-blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .stats-footer {
      margin-top: auto;
      padding: 15px;
      border-top: 2px solid #00ff00;
      font-size: 10px;
      line-height: 1.6;
    }
    
    .stat-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="design-label">WILD CARD: BRUTALIST</div>
  
  <div class="container">
    <!-- Brutalist Vertical Control Bar (Left Side) -->
    <div class="vertical-controls">
      <div class="system-header">
        <div class="system-title">[ POEM.SYS ]</div>
        <div class="system-time" id="systemTime">00:00:00</div>
      </div>
      
      <!-- Collection Section -->
      <div class="control-section">
        <div class="section-label">&gt; ARCHIVE</div>
        <button class="control-btn active" id="saveBtn" aria-label="Save to collection">
          <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span>SAVE</span>
          <span class="counter-display" id="saveCounter">042</span>
        </button>
      </div>
      
      <!-- Display Section -->
      <div class="control-section">
        <div class="section-label">&gt; DISPLAY</div>
        <button class="control-btn" id="zoomIn" aria-label="Increase text size">
          <span>ZOOM [+]</span>
          <span class="status-indicator inactive"></span>
        </button>
        <button class="control-btn" id="zoomOut" aria-label="Decrease text size">
          <span>ZOOM [-]</span>
          <span class="status-indicator inactive"></span>
        </button>
        <button class="control-btn" id="zoomReset" aria-label="Reset zoom">
          <span>RESET</span>
          <span class="status-indicator inactive"></span>
        </button>
      </div>
      
      <!-- Translation Section -->
      <div class="control-section">
        <div class="section-label">&gt; LANGUAGE</div>
        <button class="control-btn" id="translitBtn" aria-label="Toggle transliteration">
          <span>TRANSLIT</span>
          <span class="status-indicator inactive" id="translitStatus"></span>
        </button>
      </div>
      
      <!-- Stats Footer -->
      <div class="stats-footer">
        <div class="stat-line">
          <span>ZOOM:</span>
          <span id="zoomStat">100%</span>
        </div>
        <div class="stat-line">
          <span>MODE:</span>
          <span id="modeStat">ARABIC</span>
        </div>
        <div class="stat-line">
          <span>STATUS:</span>
          <span>ONLINE</span>
        </div>
      </div>
    </div>
    
    <div class="content">
      <div class="poem-container">
        <h1 class="poem-title" dir="rtl">قصيدة عن الحب<span class="cursor"></span></h1>
        <p class="poem-text zoom-2" id="poemText" dir="rtl">
          يا من هواه أعزه وأذلني<br>
          كيف السبيل إلى وصالك دلني<br><br>
          والله لو عاقبتني ما ضرني<br>
          حبي لك الدنيا وما حولي ملني
        </p>
      </div>
    </div>
  </div>
  
  <script>
    // System time
    function updateTime() {
      const now = new Date();
      const timeStr = now.toTimeString().split(' ')[0];
      document.getElementById('systemTime').textContent = timeStr;
    }
    setInterval(updateTime, 1000);
    updateTime();
    
    // Interactive functionality
    let zoomLevel = 2;
    let saveCount = 42;
    let isSaved = true;
    let translitEnabled = false;
    
    const poemText = document.getElementById('poemText');
    const saveBtn = document.getElementById('saveBtn');
    const zoomIn = document.getElementById('zoomIn');
    const zoomOut = document.getElementById('zoomOut');
    const zoomReset = document.getElementById('zoomReset');
    const translitBtn = document.getElementById('translitBtn');
    const saveCounter = document.getElementById('saveCounter');
    const translitStatus = document.getElementById('translitStatus');
    const zoomStat = document.getElementById('zoomStat');
    const modeStat = document.getElementById('modeStat');
    
    function updateZoomStat() {
      const percentage = zoomLevel === 1 ? '80%' : zoomLevel === 2 ? '100%' : '120%';
      zoomStat.textContent = percentage;
    }
    
    saveBtn.addEventListener('click', () => {
      isSaved = !isSaved;
      saveBtn.classList.toggle('active');
      if (isSaved) {
        saveCount++;
      } else {
        saveCount--;
      }
      saveCounter.textContent = String(saveCount).padStart(3, '0');
    });
    
    zoomIn.addEventListener('click', () => {
      if (zoomLevel < 3) {
        zoomLevel++;
        poemText.className = `poem-text zoom-${zoomLevel}`;
        updateZoomStat();
      }
    });
    
    zoomOut.addEventListener('click', () => {
      if (zoomLevel > 1) {
        zoomLevel--;
        poemText.className = `poem-text zoom-${zoomLevel}`;
        updateZoomStat();
      }
    });
    
    zoomReset.addEventListener('click', () => {
      zoomLevel = 2;
      poemText.className = `poem-text zoom-${zoomLevel}`;
      updateZoomStat();
    });
    
    translitBtn.addEventListener('click', () => {
      translitEnabled = !translitEnabled;
      translitBtn.classList.toggle('active');
      translitStatus.classList.toggle('inactive');
      if (translitEnabled) {
        modeStat.textContent = 'AR+LAT';
        poemText.innerHTML = `يا من هواه أعزه وأذلني<br><span style="opacity: 0.5; font-size: 0.75em; font-family: 'Courier New';">&gt; yā man hawāhu a'azzahu wa-adhallanī</span><br>كيف السبيل إلى وصالك دلني<br><span style="opacity: 0.5; font-size: 0.75em; font-family: 'Courier New';">&gt; kayfa as-sabīlu ilā wiṣālika dallanī</span><br><br>والله لو عاقبتني ما ضرني<br><span style="opacity: 0.5; font-size: 0.75em; font-family: 'Courier New';">&gt; wallāhi law 'āqabtanī mā ḍarranī</span><br>حبي لك الدنيا وما حولي ملني<br><span style="opacity: 0.5; font-size: 0.75em; font-family: 'Courier New';">&gt; ḥubbī laka ad-dunyā wa mā ḥawlī mallanī</span>`;
      } else {
        modeStat.textContent = 'ARABIC';
        poemText.innerHTML = `يا من هواه أعزه وأذلني<br>كيف السبيل إلى وصالك دلني<br><br>والله لو عاقبتني ما ضرني<br>حبي لك الدنيا وما حولي ملني`;
      }
    });
  </script>
</body>
</html>
