<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splash Option A: Ink Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --deep-water: #0A1420;
  --ripple-silver: #B8C8D8;
  --moonlight: #E8E4F0;
  --gold: #C5A059;
  --text-dim: rgba(232,228,240,0.5);
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html { font-family: var(--font-ui); background: var(--deep-water); color: var(--moonlight); }
body { min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

.splash-container {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--deep-water);
  transition: opacity 1s ease;
}
.splash-container.hidden { opacity: 0; pointer-events: none; }

/* Single ink ring expanding outward */
.ink-ring {
  position: absolute; top: 50%; left: 50%;
  width: 0; height: 0;
  border-radius: 50%;
  border: 1.5px solid var(--ripple-silver);
  transform: translate(-50%, -50%);
  opacity: 0;
}
.ink-ring:nth-child(1) { animation: ringExpand 4s ease-out 0.8s forwards; }
.ink-ring:nth-child(2) { animation: ringExpand 4s ease-out 1.4s forwards; border-color: rgba(197,160,89,0.4); }
.ink-ring:nth-child(3) { animation: ringExpand 4s ease-out 2.0s forwards; border-color: rgba(196,122,138,0.3); }

@keyframes ringExpand {
  0% { width: 0; height: 0; opacity: 0.6; }
  100% { width: 80vmax; height: 80vmax; opacity: 0; }
}

/* Ink droplet falling from above */
.ink-droplet {
  position: absolute; top: 20%; left: 50%;
  width: 8px; height: 12px;
  margin-left: -4px;
  background: radial-gradient(ellipse at 40% 30%, var(--moonlight), var(--ripple-silver));
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  opacity: 0;
  animation: dropletFall 1.2s cubic-bezier(0.55, 0, 1, 0.45) 0.2s forwards;
}
@keyframes dropletFall {
  0% { opacity: 0.9; transform: translateY(0) scale(1); }
  80% { opacity: 0.7; }
  100% { opacity: 0; transform: translateY(30vh) scale(0.5); }
}

/* Impact splash - small circle that appears at center */
.ink-impact {
  position: absolute; top: 50%; left: 50%;
  width: 20px; height: 20px;
  margin: -10px 0 0 -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(184,200,216,0.4), transparent);
  opacity: 0;
  animation: impactFlash 0.6s ease-out 1.3s forwards;
}
@keyframes impactFlash {
  0% { opacity: 0; transform: scale(0.5); }
  30% { opacity: 0.8; }
  100% { opacity: 0; transform: scale(3); }
}

/* Brand text */
.brand {
  position: relative; z-index: 10;
  text-align: center;
  opacity: 0;
  animation: brandReveal 2s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
}
@keyframes brandReveal {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.brand-name {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 0.5rem; margin-bottom: 0.75rem;
}
.brand-en {
  font-family: 'Forum', serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  letter-spacing: -0.05em;
  color: var(--gold);
  line-height: 1;
}
.brand-ar {
  font-family: 'Reem Kufi', sans-serif;
  font-weight: 700;
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  color: var(--gold);
  line-height: 1;
}
.brand-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  direction: ltr;
}

/* Auto-advance indicator */
.progress-line {
  position: absolute; bottom: 60px; left: 50%;
  transform: translateX(-50%);
  width: 80px; height: 1px;
  background: rgba(184,200,216,0.15);
  overflow: hidden;
  opacity: 0;
  animation: brandReveal 1s ease 2.5s forwards;
}
.progress-line::after {
  content: '';
  position: absolute; left: 0; top: 0;
  width: 0; height: 100%;
  background: var(--gold);
  animation: progressFill 3s linear 2.5s forwards;
}
@keyframes progressFill {
  from { width: 0; }
  to { width: 100%; }
}
</style>
</head>
<body>

<div class="splash-container" id="splash">
  <div class="ink-droplet"></div>
  <div class="ink-impact"></div>
  <div class="ink-ring"></div>
  <div class="ink-ring"></div>
  <div class="ink-ring"></div>

  <div class="brand">
    <div class="brand-name">
      <span class="brand-en">poetry</span>
      <span class="brand-ar">بالعربي</span>
    </div>
    <p class="brand-subtitle">Poetry on Still Water</p>
  </div>

  <div class="progress-line"></div>
</div>

<script>
/* Auto-advance after 5.5s (animations + 3s progress bar) */
setTimeout(function() {
  document.getElementById('splash').classList.add('hidden');
}, 5500);
</script>
</body>
</html>
