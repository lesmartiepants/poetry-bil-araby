name: Design Review Preview Links

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'design-review-output/**'
      - 'mockups/**'
      - 'scripts/generate-splash-round1-pages.mjs'
      - 'scripts/copy-review-assets.js'
      - 'src/app.jsx'
      - 'vercel.json'
      - '.github/workflows/design-review-preview-links.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to comment on'
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment-design-review-links:
    name: Comment Design Review Links
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.state == 'open'
    concurrency:
      group: design-review-preview-links-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post/update PR comment with review links
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- design-review-preview-links -->';
            const waitMs = 20000;
            const maxAttempts = 30; // 10 minutes max wait

            async function resolvePullRequestMeta() {
              if (context.eventName === 'pull_request') {
                const pullRequest = context.payload.pull_request;
                return {
                  issueNumber: context.issue.number,
                  headSha: pullRequest.head.sha
                };
              }

              const inputPr = core.getInput('pr_number') || context.payload.inputs?.pr_number;
              const issueNumber = Number.parseInt(inputPr || '', 10);
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
                core.setFailed(`Invalid or missing pr_number input: "${inputPr || ''}"`);
                return null;
              }

              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issueNumber
              });

              if (pr.data.state !== 'open') {
                core.info(`PR #${issueNumber} is ${pr.data.state}; skipping comment update.`);
                return null;
              }

              return {
                issueNumber,
                headSha: pr.data.head.sha
              };
            }

            function toHttpsUrl(candidate) {
              if (!candidate) return null;
              const clean = candidate.trim();
              if (clean.startsWith('http://') || clean.startsWith('https://')) return clean;
              if (clean.includes('.vercel.app')) return `https://${clean.replace(/^\/+/, '')}`;
              return null;
            }

            function decodeVcPayload(commentBody) {
              const vcMatch = commentBody.match(/\[vc\]:\s*#[^:]*:([A-Za-z0-9+/_=-]+)/);
              if (!vcMatch) return null;

              try {
                const normalized = vcMatch[1]
                  .replace(/-/g, '+')
                  .replace(/_/g, '/')
                  .padEnd(Math.ceil(vcMatch[1].length / 4) * 4, '=');
                const decoded = Buffer.from(normalized, 'base64').toString('utf8');
                const payload = JSON.parse(decoded);
                const firstProject = payload?.projects?.[0];
                return toHttpsUrl(firstProject?.previewUrl || firstProject?.liveFeedback?.link || null);
              } catch (error) {
                return null;
              }
            }

            function extractPreviewUrl(commentBody) {
              const explicitPreview = commentBody.match(/\[Preview\]\((https:\/\/[^\s)]+)\)/i);
              if (explicitPreview) return toHttpsUrl(explicitPreview[1]);

              const vcPayloadUrl = decodeVcPayload(commentBody);
              if (vcPayloadUrl) return vcPayloadUrl;

              const domainMatches = commentBody.match(/https:\/\/[a-z0-9.-]+\.vercel\.app[^\s)]*/ig) || [];
              const filtered = domainMatches.find((item) => !item.includes('open-feedback'));
              if (filtered) return toHttpsUrl(filtered);

              const bareDomain = commentBody.match(/([a-z0-9-]+\.vercel\.app)/i);
              if (bareDomain) return toHttpsUrl(bareDomain[1]);

              return null;
            }

            function sanitizeBaseUrl(url) {
              return url ? url.replace(/\/+$/, '') : url;
            }

            async function sleep(ms) {
              await new Promise((resolve) => setTimeout(resolve, ms));
            }

            function toDisplayName(identifier) {
              return identifier
                .split('-')
                .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
            }

            function loadComponentEntries() {
              const designReviewRoot = path.join(process.cwd(), 'design-review-output');
              const results = [];

              if (!fs.existsSync(designReviewRoot)) {
                return results;
              }

              const componentDirs = fs
                .readdirSync(designReviewRoot, { withFileTypes: true })
                .filter((entry) => entry.isDirectory())
                .map((entry) => entry.name);

              for (const component of componentDirs) {
                const componentPath = path.join(designReviewRoot, component);
                const roundDirs = fs
                  .readdirSync(componentPath, { withFileTypes: true })
                  .filter((entry) => entry.isDirectory() && /^round-\d+$/.test(entry.name))
                  .map((entry) => entry.name);

                let latest = null;

                for (const roundDirName of roundDirs) {
                  const roundNumber = Number.parseInt(roundDirName.replace('round-', ''), 10);
                  const manifestPath = path.join(componentPath, roundDirName, 'review-manifest.json');
                  if (!fs.existsSync(manifestPath)) continue;

                  try {
                    const raw = fs.readFileSync(manifestPath, 'utf8');
                    const manifest = JSON.parse(raw);
                    const themes = (manifest.themes || []).map((theme) => theme.id).filter(Boolean);

                    if (!latest || roundNumber > latest.round) {
                      latest = {
                        component,
                        round: roundNumber,
                        themes
                      };
                    }
                  } catch (error) {
                    core.warning(`Failed to parse manifest: ${manifestPath}`);
                  }
                }

                if (latest) {
                  results.push(latest);
                }
              }

              if (results.length === 0) {
                results.push({
                  component: 'splash',
                  round: 1,
                  themes: ['particles', 'constellation', 'mandala', 'geometric', 'zen', 'aurora', 'ink', 'manuscript', 'light']
                });
              }

              results.sort((a, b) => a.component.localeCompare(b.component));
              return results;
            }

            async function getCommitDateIso(headSha) {
              const commit = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: headSha
              });
              return commit.data?.commit?.committer?.date || commit.data?.commit?.author?.date || new Date().toISOString();
            }

            async function getIssueComments(issueNumber) {
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });
            }

            function selectBestPreviewComment(comments, commitDateIso) {
              const commitDate = new Date(commitDateIso);
              const commitThreshold = new Date(commitDate.getTime() - 2 * 60 * 1000); // allow slight clock drift

              const candidates = comments
                .filter((comment) => /vercel\.app|^\[vc\]:/im.test(comment.body || ''))
                .map((comment) => ({
                  comment,
                  previewUrl: extractPreviewUrl(comment.body || '')
                }))
                .filter((entry) => !!entry.previewUrl)
                .sort((a, b) => new Date(b.comment.created_at) - new Date(a.comment.created_at));

              const matchingCommitWindow = candidates.find(
                (entry) => new Date(entry.comment.created_at) >= commitThreshold
              );

              return matchingCommitWindow || candidates[0] || null;
            }

            async function waitForPreviewUrl(issueNumber, commitDateIso) {
              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const comments = await getIssueComments(issueNumber);
                const selected = selectBestPreviewComment(comments, commitDateIso);
                if (selected?.previewUrl) {
                  return sanitizeBaseUrl(selected.previewUrl);
                }

                if (attempt < maxAttempts) {
                  core.info(`Vercel preview URL not found yet (attempt ${attempt}/${maxAttempts}); retrying in ${waitMs / 1000}s.`);
                  await sleep(waitMs);
                }
              }
              return null;
            }

            function buildCommentBody(baseUrl, headSha, components) {
              const routeRows = [];
              routeRows.push(['Design Review Home', '/design-review']);

              for (const entry of components) {
                const componentName = toDisplayName(entry.component);
                routeRows.push([`${componentName} Master`, `/design-review/${entry.component}`]);
                routeRows.push([`${componentName} Streamlined`, `/design-review/${entry.component}/streamlined`]);
                routeRows.push([`${componentName} Matrix`, `/design-review/${entry.component}/matrix`]);

                for (const themeId of entry.themes) {
                  routeRows.push([`${componentName} Category: ${themeId}`, `/design-review/${entry.component}/category/${themeId}`]);
                }
              }

              const tableRows = routeRows
                .map(([label, route]) => `| ${label} | [Open](${baseUrl}${route}) |`)
                .join('\n');

              const componentSummary = components
                .map((entry) => `- ${toDisplayName(entry.component)} (latest tracked round: ${entry.round})`)
                .join('\n');

              return [
                marker,
                `### Design Review Links for \`${headSha.slice(0, 7)}\``,
                '',
                `Preview deployment: [${baseUrl}](${baseUrl})`,
                '',
                'Components detected:',
                componentSummary,
                '',
                '| Page | Link |',
                '|---|---|',
                tableRows,
                '',
                '_Auto-posted for design review/mockup related commits._'
              ].join('\n');
            }

            async function upsertBotComment(issueNumber, body) {
              const comments = await getIssueComments(issueNumber);
              const existing = comments.find(
                (comment) =>
                  comment.user?.login === 'github-actions[bot]' &&
                  (comment.body || '').includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                core.info(`Updated existing design review links comment: ${existing.id}`);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
              core.info('Created new design review links comment.');
            }

            const prMeta = await resolvePullRequestMeta();
            if (!prMeta) return;

            const commitDateIso = await getCommitDateIso(prMeta.headSha);
            const previewBaseUrl = await waitForPreviewUrl(prMeta.issueNumber, commitDateIso);
            const components = loadComponentEntries();

            if (!previewBaseUrl) {
              core.setFailed('Could not detect a Vercel preview URL to build design review links.');
              return;
            }

            const commentBody = buildCommentBody(previewBaseUrl, prMeta.headSha, components);
            await upsertBotComment(prMeta.issueNumber, commentBody);
