<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option C — Swipe Gesture Bar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#09090b;--surface:#18181b;--surface-2:#1c1c1f;--surface-3:#27272a;
      --border:#2e2e32;--border-light:#3f3f46;--text:#fafafa;--text-2:#a1a1aa;--text-3:#71717a;
      --accent:#d4a84b;--accent-dim:rgba(212,168,75,.15);
      --green:#22c55e;--green-dim:rgba(34,197,94,.12);
      --red:#ef4444;--red-dim:rgba(239,68,68,.12);
      --purple:#a855f7;--purple-dim:rgba(168,85,247,.12);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);width:390px;height:844px;overflow:hidden;margin:0 auto;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

    /* ── Toolbar ── */
    .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px}
    .tb-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3)}
    .tb-select{appearance:none;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:6px 24px 6px 10px;border-radius:6px;font-size:11px;font-weight:500;font-family:inherit}

    /* ── Preview ── */
    .preview{flex:1;background:#0c0c0e;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .preview-label{position:absolute;top:0;left:0;right:0;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:10px;color:var(--text-2)}
    .fake-content{text-align:center;opacity:.4}
    .fake-content h1{font-size:36px;direction:rtl;font-weight:400}
    .fake-content p{font-size:12px;color:var(--text-3);margin-top:8px}

    /* ═══════════════════════════════════════════
       OPTION C — Minimal Sliding Tray
       Ultra-clean two-tier tray that slides up from
       bottom edge. Top tier = verdict chips + nav.
       Pull handle reveals comment + submit. Glassmorphic.
       ═══════════════════════════════════════════ */
    .tray{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:rgba(20,20,22,.88);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-top:1px solid rgba(255,255,255,.06);
      border-radius:20px 20px 0 0;
      padding-bottom:env(safe-area-inset-bottom,0);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
      transform:translateY(0);
    }
    .tray.expanded{transform:translateY(0)}

    /* Handle */
    .tray-handle{
      padding:8px 0 4px;display:flex;justify-content:center;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .tray-handle span{width:36px;height:4px;border-radius:2px;background:var(--border-light);display:block;transition:background .2s}
    .tray-handle:hover span{background:var(--text-3)}

    /* Tier 1: main actions */
    .tier1{
      padding:4px 14px 10px;
      display:flex;align-items:center;gap:6px;
    }

    /* Verdict chips — pill-shaped, inline */
    .vchip{
      display:flex;align-items:center;gap:5px;
      padding:9px 14px;border-radius:20px;
      border:1px solid var(--border);background:transparent;
      color:var(--text-3);font-size:13px;font-weight:600;
      cursor:pointer;transition:all .18s;font-family:inherit;
      white-space:nowrap;
    }
    .vchip:active{transform:scale(.95)}
    .vchip .vc-icon{font-size:15px}
    .vchip.active-keep{background:var(--green-dim);border-color:var(--green);color:var(--green)}
    .vchip.active-discard{background:var(--red-dim);border-color:var(--red);color:var(--red)}
    .vchip.active-revisit{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}

    .tier1-spacer{flex:1}

    /* Nav arrows */
    .tnav{
      width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
      background:transparent;color:var(--text-3);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .15s;
    }
    .tnav:hover{border-color:var(--border-light);color:var(--text)}
    .tnav:active{transform:scale(.9)}
    .tnav:disabled{opacity:.2;cursor:default}
    .tnav svg{width:14px;height:14px}
    .tier1-counter{font-size:11px;color:var(--text-2);min-width:30px;text-align:center;font-variant-numeric:tabular-nums}

    /* Tier 2: expanded area */
    .tier2{
      max-height:0;overflow:hidden;
      transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .35s;
      padding:0 14px;
    }
    .tier2.open{max-height:160px;padding:0 14px 14px}

    .tier2-comment{
      width:100%;
      background:var(--surface-3);border:1px solid var(--border);
      border-radius:14px;color:var(--text);font-size:13px;
      padding:10px 14px;height:60px;resize:none;outline:none;font-family:inherit;
      transition:border-color .15s;
    }
    .tier2-comment:focus{border-color:var(--accent)}
    .tier2-comment::placeholder{color:var(--text-3)}

    .tier2-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .tier2-tally{font-size:10px;color:var(--text-3);display:flex;gap:8px}
    .tier2-submit{
      padding:8px 22px;border-radius:20px;border:none;
      background:var(--accent);color:var(--bg);
      font-size:12px;font-weight:700;font-family:inherit;
      cursor:pointer;transition:all .15s;
    }
    .tier2-submit:active{transform:scale(.95)}

    /* Message toggle icon */
    .msg-btn{
      width:36px;height:36px;border-radius:50%;
      border:1px solid var(--border);background:transparent;
      color:var(--text-3);display:flex;align-items:center;justify-content:center;
      font-size:16px;cursor:pointer;transition:all .15s;position:relative;
    }
    .msg-btn:hover{border-color:var(--border-light);color:var(--text)}
    .msg-btn:active{transform:scale(.9)}
    .msg-btn.active{color:var(--accent);border-color:var(--accent)}
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="tb-label">Component</span>
    <select class="tb-select"><option>Splash Screen (11)</option></select>
    <span class="tb-label" style="margin-left:4px">Category</span>
    <select class="tb-select"><option>Particle Field (3)</option></select>
  </div>

  <div class="preview">
    <div class="preview-label">Particle Field — Gold Mystical &nbsp;·&nbsp; <span style="color:var(--text-3)">Rich gold palette</span></div>
    <div class="fake-content">
      <h1>بالعربي poetry</h1>
      <p>Mockup preview area</p>
    </div>
  </div>

  <div class="tray" id="tray">
    <div class="tray-handle" onclick="toggleTray()"><span></span></div>

    <div class="tier1">
      <!-- Verdict chips -->
      <button class="vchip active-keep" onclick="toggleV(this,'keep')"><span class="vc-icon">✓</span>Keep</button>
      <button class="vchip" onclick="toggleV(this,'discard')"><span class="vc-icon">✗</span>Discard</button>
      <button class="vchip" onclick="toggleV(this,'revisit')"><span class="vc-icon">↻</span>Later</button>

      <span class="tier1-spacer"></span>

      <button class="msg-btn" id="msgBtn" onclick="toggleTray()" title="Comment">💬</button>

      <button class="tnav" disabled><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg></button>
      <span class="tier1-counter">2/58</span>
      <button class="tnav"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 3l5 5-5 5"/></svg></button>
    </div>

    <div class="tier2" id="tier2">
      <textarea class="tier2-comment" placeholder="What stands out? Any notes..."></textarea>
      <div class="tier2-row">
        <div class="tier2-tally">
          <span style="color:var(--green)">✓ 3</span>
          <span style="color:var(--red)">✗ 1</span>
          <span style="color:var(--purple)">↻ 0</span>
        </div>
        <button class="tier2-submit">Submit Review</button>
      </div>
    </div>
  </div>

  <script>
    function toggleV(el,v){
      const cls={keep:'active-keep',discard:'active-discard',revisit:'active-revisit'};
      const was=el.classList.contains(cls[v]);
      document.querySelectorAll('.vchip').forEach(b=>b.className='vchip');
      if(!was) el.classList.add(cls[v]);
    }
    let trayOpen=false;
    function toggleTray(){
      trayOpen=!trayOpen;
      document.getElementById('tier2').classList.toggle('open',trayOpen);
      document.getElementById('msgBtn').classList.toggle('active',trayOpen);
    }
  </script>
</body>
</html>
