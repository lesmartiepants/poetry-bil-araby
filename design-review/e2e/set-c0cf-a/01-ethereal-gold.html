<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>E2E #1: Ethereal Gold — Poetry bil Araby</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #C5A059;
  --gold-light: #d4af6a;
  --gold-glow: rgba(197, 160, 89, 0.35);
  --gold-subtle: rgba(197, 160, 89, 0.08);
  --bg: #0c0c0e;
  --bg2: #12111a;
  --bg3: #0e0e16;
  --text: #FDFCF8;
  --text-dim: rgba(253, 252, 248, 0.5);
  --text-faint: rgba(253, 252, 248, 0.25);
  --indigo: #4F46E5;
  --indigo-glow: rgba(79, 70, 229, 0.25);
  --radius: 16px;
  --radius-sm: 8px;
  --font-ar: 'Amiri', serif;
  --font-ui: 'Tajawal', system-ui, sans-serif;
}
html.light {
  --bg: #FDFCF8;
  --bg2: #f5f0e8;
  --bg3: #ede8dc;
  --text: #0c0c0e;
  --text-dim: rgba(12, 12, 14, 0.55);
  --text-faint: rgba(12, 12, 14, 0.28);
  --gold-glow: rgba(197, 160, 89, 0.22);
  --gold-subtle: rgba(197, 160, 89, 0.06);
  --indigo-glow: rgba(79, 70, 229, 0.12);
}
html {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
  overflow-x: hidden;
}
body { min-height: 100vh; }

/* ---- Particle Canvas ---- */
canvas#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.5;
}

/* ---- Screen Base ---- */
.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
}
.screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 28% 38%, var(--indigo-glow), transparent 52%),
    radial-gradient(circle at 72% 62%, var(--gold-glow), transparent 48%);
  opacity: 0.45;
  animation: pulseGrad 20s ease-in-out infinite alternate;
  pointer-events: none;
  will-change: opacity, transform;
}
@keyframes pulseGrad {
  0%   { opacity: 0.3; transform: scale(1); }
  100% { opacity: 0.55; transform: scale(1.06); }
}

/* ---- Theme Toggle ---- */
.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1.5px solid rgba(197, 160, 89, 0.5);
  background: rgba(12, 12, 14, 0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
html.light .theme-toggle {
  background: rgba(253, 252, 248, 0.7);
  border-color: rgba(197, 160, 89, 0.4);
}
.theme-toggle:hover {
  border-color: var(--gold);
  background: rgba(197, 160, 89, 0.14);
  transform: scale(1.08);
  box-shadow: 0 0 20px var(--gold-glow);
}
.theme-toggle:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 3px;
}
.theme-icon {
  width: 18px;
  height: 18px;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
}

/* ---- Screen Label ---- */
.label {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.5;
  font-weight: 500;
}

/* ==================== SPLASH SCREEN ==================== */
#splash {
  background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 60%, var(--bg3) 100%);
}

.splash-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 48px 40px;
  max-width: 700px;
  width: 100%;
  animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(36px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Brand lockup */
.brand-lockup {
  margin-bottom: 16px;
}
.brand-en {
  display: block;
  font-size: clamp(0.65rem, 1.5vw, 0.75rem);
  text-transform: uppercase;
  letter-spacing: 0.45em;
  color: var(--gold);
  opacity: 0.75;
  font-weight: 500;
  margin-bottom: 20px;
  animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
}

.logo {
  display: flex;
  flex-direction: row-reverse;
  align-items: baseline;
  justify-content: center;
  gap: 18px;
  margin-bottom: 12px;
}
.logo-ar {
  font-family: var(--font-ar);
  font-size: clamp(3rem, 8vw, 4.5rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
}
.logo-en {
  font-size: clamp(2.2rem, 6vw, 4.2rem);
  font-weight: 200;
  color: var(--text);
  letter-spacing: -0.04em;
  text-transform: lowercase;
  animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.35s backwards;
}
@keyframes floatIn {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Gold separator */
.gold-separator {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto 28px;
  animation: fadeIn 1s 0.5s backwards;
}

.tagline {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5em;
  background: linear-gradient(90deg, var(--indigo), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 52px;
  font-weight: 600;
  animation: fadeIn 1s 0.6s backwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.enter-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 17px 52px;
  min-height: 52px;
  border: 1.5px solid var(--gold);
  background: linear-gradient(135deg, rgba(197, 160, 89, 0.1), rgba(197, 160, 89, 0.03));
  color: var(--gold);
  font-family: var(--font-ui);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.38em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 0 24px var(--gold-glow), inset 0 0 16px rgba(197, 160, 89, 0.06);
  border-radius: 2px;
  animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s backwards;
  will-change: transform, box-shadow;
  position: relative;
  overflow: hidden;
}
.enter-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(197, 160, 89, 0.15), transparent);
  opacity: 0;
  transition: opacity 0.4s ease;
}
.enter-btn:hover::after { opacity: 1; }
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
.enter-btn:hover {
  box-shadow: 0 0 48px var(--gold-glow), 0 6px 24px rgba(197, 160, 89, 0.18);
  transform: translateY(-3px);
  letter-spacing: 0.42em;
}
.enter-btn:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 4px;
}

.hint {
  margin-top: 36px;
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.2em;
  animation: fadeIn 1s 1.1s backwards;
}

/* ==================== MAIN APP ==================== */
#main {
  background: var(--bg);
  display: none;
  align-items: flex-start;
}
.main-layout {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 860px;
  padding: 40px 28px 60px;
  min-height: 100vh;
  min-height: 100dvh;
  margin: 0 auto;
}
.main-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  margin-bottom: 32px;
  border-bottom: 1px solid rgba(197, 160, 89, 0.12);
}
.main-brand {
  font-family: var(--font-ar);
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.02em;
}
.main-brand-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
}

/* Poem card */
.poem-card {
  background: var(--gold-subtle);
  border: 1px solid rgba(197, 160, 89, 0.18);
  border-radius: var(--radius);
  padding: 44px 48px 36px;
  margin-bottom: 20px;
  transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: default;
  will-change: transform;
}
.poem-card:hover {
  border-color: rgba(197, 160, 89, 0.45);
  box-shadow: 0 8px 36px var(--gold-glow), 0 2px 8px rgba(0,0,0,0.12);
  transform: translateY(-3px);
}

/* Ornamental top line */
.poem-card::before {
  content: '';
  display: block;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--indigo));
  margin: 0 0 28px auto;
  border-radius: 1px;
  opacity: 0.7;
}

.poem-text {
  font-family: var(--font-ar);
  font-size: 30px;
  line-height: 2.1;
  color: var(--text);
  text-align: right;
  direction: rtl;
  margin-bottom: 28px;
  letter-spacing: 0.01em;
}
.poem-poet {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--gold);
  text-align: left;
  font-weight: 600;
  letter-spacing: 0.08em;
  opacity: 0.85;
}

/* Actions row */
.poem-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: flex-end;
  margin-bottom: 32px;
}

.btn-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid rgba(197, 160, 89, 0.3);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  color: var(--text-dim);
}
.btn-icon:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(197, 160, 89, 0.08);
  transform: scale(1.08);
}
.btn-icon:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.btn-next {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 36px;
  min-height: 48px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 999px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 16px rgba(197, 160, 89, 0.3);
  will-change: transform;
}
.btn-next:hover {
  transform: scale(1.05) translateY(-1px);
  box-shadow: 0 8px 24px rgba(197, 160, 89, 0.4);
}
.btn-next:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 3px;
}

/* Poem counter */
.poem-counter {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.15em;
  text-align: center;
  margin-top: 8px;
}

/* ==================== MOBILE ==================== */
@media (max-width: 768px) {
  .logo-ar { font-size: clamp(2.6rem, 9vw, 3.5rem); }
  .logo-en { font-size: clamp(2rem, 8vw, 3rem); }
  .enter-btn {
    padding: 15px 36px;
    font-size: 11px;
    letter-spacing: 0.28em;
    min-height: 48px;
  }
  .splash-content { padding: 32px 20px; }
  .poem-card { padding: 28px 24px 24px; }
  .poem-text { font-size: 22px; line-height: 1.9; }
  .theme-toggle { width: 44px; height: 44px; top: 16px; right: 16px; }
  .label { font-size: 8px; top: 16px; left: 16px; letter-spacing: 0.3em; }
  .main-layout { padding: 32px 20px 48px; }
}

/* ==================== REDUCED MOTION ==================== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .screen::before { animation: none; }
  .poem-card:hover { transform: none; }
}
</style>
</head>
<body>
  <canvas id="particles"></canvas>

  <!-- Theme Toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme">
    <!-- Moon icon (default dark mode) -->
    <svg class="theme-icon" id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="#C5A059">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
    </svg>
  </button>

  <!-- SPLASH -->
  <div class="screen" id="splash">
    <div class="label">Poetry bil Araby — Splash</div>
    <div class="splash-content">
      <div class="brand-lockup">
        <span class="brand-en">Poetry bil Araby</span>
        <div class="logo">
          <span class="logo-ar" lang="ar">شعر بالعربي</span>
          <span class="logo-en" aria-hidden="true">&amp;</span>
        </div>
      </div>
      <div class="gold-separator"></div>
      <div class="tagline">Arabic Poetry — Pair by Pair</div>
      <button class="enter-btn" onclick="showMain()">
        Begin Your Journey
      </button>
      <div class="hint">Scroll to explore &nbsp;·&nbsp; Tap to continue</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="screen" id="main">
    <div class="main-layout">
      <nav class="main-nav">
        <div>
          <div class="main-brand" lang="ar">شعر بالعربي</div>
          <div class="main-brand-sub">Poetry bil Araby</div>
        </div>
      </nav>

      <div class="poem-card">
        <div class="poem-text" lang="ar" dir="rtl">
          أَنا البَحرُ في أَحشائِهِ الدُرُّ كامِنٌ<br>
          فَهَل سَأَلوا الغَوّاصَ عَن صَدَفاتي
        </div>
        <div class="poem-poet">— أحمد شوقي</div>
      </div>

      <div class="poem-actions">
        <!-- Bookmark icon -->
        <button class="btn-icon" aria-label="Save poem">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <!-- Share icon -->
        <button class="btn-icon" aria-label="Share poem">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
        <button class="btn-next" onclick="nextPoem()">Next Poem</button>
      </div>

      <div class="poem-counter">١ من ٨٤٬٣٢٩</div>
    </div>
  </div>

<script>
/* ---- Theme Toggle ---- */
var isLight = false;
var themeIcon = document.getElementById('theme-icon');

var MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
var SUN_SVG  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  themeIcon.innerHTML = isLight ? SUN_SVG : MOON_SVG;
}

/* ---- Navigation ---- */
function showMain() {
  var splash = document.getElementById('splash');
  var main   = document.getElementById('main');
  splash.style.opacity = '0';
  splash.style.transition = 'opacity 0.5s ease';
  setTimeout(function() {
    splash.style.display = 'none';
    main.style.display   = 'flex';
    main.style.opacity   = '0';
    main.style.transition = 'opacity 0.5s ease';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { main.style.opacity = '1'; });
    });
  }, 500);
}

/* ---- Next Poem (stub) ---- */
function nextPoem() {
  var card = document.querySelector('.poem-card');
  card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
  card.style.opacity    = '0';
  card.style.transform  = 'translateY(-10px)';
  setTimeout(function() {
    card.style.transform = 'translateY(10px)';
    requestAnimationFrame(function() {
      card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      card.style.opacity    = '1';
      card.style.transform  = 'translateY(0)';
    });
  }, 320);
}

/* ---- Particle System ---- */
var canvas = document.getElementById('particles');
var ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function Particle() {
  this.reset();
}
Particle.prototype.reset = function() {
  this.x       = Math.random() * canvas.width;
  this.y       = Math.random() * canvas.height;
  this.vx      = (Math.random() - 0.5) * 0.4;
  this.vy      = (Math.random() - 0.5) * 0.4 - 0.08;
  this.radius  = Math.random() * 1.8 + 0.4;
  this.opacity = Math.random() * 0.4 + 0.1;
  this.pulse   = Math.random() * Math.PI * 2;
  this.pulseSpeed = 0.01 + Math.random() * 0.02;
};
Particle.prototype.update = function() {
  this.x     += this.vx;
  this.y     += this.vy;
  this.pulse += this.pulseSpeed;
  this.opacity = (Math.random() * 0.25 + 0.08) + Math.sin(this.pulse) * 0.12;
  if (this.x < -5 || this.x > canvas.width + 5 ||
      this.y < -5 || this.y > canvas.height + 5) {
    this.reset();
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + 5;
  }
};
Particle.prototype.draw = function() {
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(197,160,89,' + this.opacity.toFixed(2) + ')';
  ctx.fill();
};

var COUNT     = Math.min(60, Math.floor(window.innerWidth / 16));
var particles = [];
for (var i = 0; i < COUNT; i++) { particles.push(new Particle()); }

var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function animateParticles() {
  if (prefersReduced) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(function(p) { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>
</body>
</html>
