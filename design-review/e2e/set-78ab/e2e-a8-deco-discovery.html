<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A8 Deco Discovery - Desert Mirage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Reem+Kufi:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&family=Poiret+One&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand: #E8D5B7; --sienna: #8B5E3C; --desert-night: #1A0F0A;
    --oasis: #2D7B6F; --gold: #C5A059;
    --sand-light: #F5EDE0; --sienna-dark: #6B3720;
    --bg: var(--desert-night); --fg: var(--sand); --card-bg: rgba(26,15,10,0.85);
    --card-border: rgba(139,94,60,0.4); --muted: rgba(232,213,183,0.5);
    /* Unified dune palette (warm gradient from dark to light) */
    --dune-1: #6B3720; --dune-2: #5A2E1A; --dune-3: #4A2516; --dune-4: #3A1C12;
  }
  [data-theme="light"] {
    --bg: var(--sand-light); --fg: var(--desert-night); --card-bg: rgba(255,255,255,0.92);
    --card-border: rgba(197,160,89,0.4); --muted: rgba(26,15,10,0.4);
    --dune-1: #D4B896; --dune-2: #C8A880; --dune-3: #BC9A6E; --dune-4: #B08C5E;
  }
  html { font-size: 16px; }
  body {
    font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--fg);
    min-height: 100vh; overflow-x: hidden; transition: background 0.6s, color 0.6s;
  }

  /* ---- SVG Sand Texture ---- */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
  }

  /* ---- Splash ---- */
  .splash {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(180deg, #0D0A14 0%, var(--desert-night) 40%, var(--dune-4) 100%);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    transition: opacity 1s ease-out;
  }
  .splash.hidden { opacity: 0; pointer-events: none; }
  .stars { position: absolute; inset: 0; overflow: hidden; }
  .star {
    position: absolute; background: #FFF; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: 0.95; } }

  /* Unified dune color palette */
  .dune { position: absolute; bottom: 0; left: -5%; width: 110%; }
  .dune-1 { height: 25%; background: var(--dune-1); border-radius: 55% 75% 0 0 / 100%; z-index: 4; animation: dune1 10s ease-in-out infinite alternate; }
  .dune-2 { height: 33%; background: var(--dune-2); border-radius: 75% 45% 0 0 / 100%; z-index: 3; animation: dune2 14s ease-in-out infinite alternate; }
  .dune-3 { height: 40%; background: var(--dune-3); border-radius: 45% 65% 0 0 / 100%; z-index: 2; animation: dune3 18s ease-in-out infinite alternate; }
  .dune-4 { height: 48%; background: var(--dune-4); border-radius: 65% 50% 0 0 / 100%; z-index: 1; animation: dune4 23s ease-in-out infinite alternate; }
  @keyframes dune1 { to { transform: translateX(18px); } }
  @keyframes dune2 { to { transform: translateX(-22px); } }
  @keyframes dune3 { to { transform: translateX(12px); } }
  @keyframes dune4 { to { transform: translateX(-9px); } }

  .splash-brand {
    position: relative; z-index: 10; display: flex; align-items: flex-end;
    justify-content: center; gap: 0.5rem; margin-bottom: 0.75rem;
  }
  .splash-brand-en {
    font-family: 'Forum', serif; font-size: clamp(3rem, 6vw, 4.5rem);
    letter-spacing: -0.05em; color: var(--gold); line-height: 1;
    text-shadow: 0 0 50px rgba(197,160,89,0.4);
  }
  .splash-brand-ar {
    font-family: 'Reem Kufi', sans-serif; font-weight: 700;
    font-size: clamp(1.875rem, 4vw, 3rem); color: var(--gold); line-height: 1;
  }
  .splash-subtitle {
    position: relative; z-index: 10; font-family: 'Tajawal', sans-serif;
    font-size: clamp(0.9rem, 2.5vw, 1.25rem); color: var(--muted);
    margin-top: 0.5rem; letter-spacing: 0.1em; direction: ltr;
  }
  .splash-enter {
    position: relative; z-index: 10; margin-top: 2.5rem;
    padding: 14px 40px; min-height: 44px; background: transparent;
    border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Tajawal', sans-serif; font-size: 15px; border-radius: 8px;
    cursor: pointer; transition: all 0.3s ease;
    opacity: 0; animation: fadeIn 1s 2s forwards;
  }
  .splash-enter:hover { background: var(--gold); color: var(--desert-night); box-shadow: 0 0 30px rgba(197,160,89,0.3); }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ---- Walkthrough (sequential tap) ---- */
  .walkthrough {
    position: fixed; inset: 0; z-index: 900; background: var(--bg);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem; cursor: pointer;
  }
  .walkthrough.active { display: flex; }

  .walk-card {
    max-width: 400px; width: 90%; padding: 2rem; text-align: center;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 16px; opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .walk-card.visible { opacity: 1; transform: translateY(0); }

  .walk-icon {
    width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 50%;
    background: rgba(45,123,111,0.15); display: flex; align-items: center;
    justify-content: center; color: var(--oasis);
  }
  .walk-card h3 {
    font-family: 'Tajawal', sans-serif; font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: 500; color: var(--fg); direction: ltr; margin-bottom: 4px;
  }
  .walk-card .walk-ar {
    font-family: 'Tajawal', sans-serif; font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: var(--gold); direction: rtl; margin-bottom: 8px;
  }
  .walk-card p {
    font-size: clamp(0.8rem, 1.8vw, 0.95rem); line-height: 1.7; color: var(--muted); direction: ltr;
  }
  .walk-progress { display: flex; gap: 8px; margin-top: 2rem; }
  .walk-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--card-border);
    transition: all 0.3s;
  }
  .walk-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
  .walk-hint { margin-top: 1rem; font-size: 13px; color: var(--muted); opacity: 0.6; }

  /* ===== MAIN APP ===== */
  /* Art Deco Geometric — stepped corners, sunburst motifs, gold dividers */
  .app { display: none; min-height: 100vh; position: relative; }
  .app.active { display: block; }

  /* Deco nav */
  .deco-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px; height: 52px;
    background: rgba(26, 15, 10, 0.9);
    backdrop-filter: blur(10px);
    direction: ltr;
  }
  .deco-nav::after {
    content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }
  .deco-nav-brand {
    font-family: 'Poiret One', sans-serif;
    font-size: 18px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold);
  }

  /* Geometric panel frame */
  .deco-frame {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 80px 20px 120px;
  }

  .deco-panel {
    position: relative;
    max-width: 400px; width: 100%;
    padding: 2.5rem 2rem;
    background: rgba(26, 15, 10, 0.75);
    backdrop-filter: blur(8px);
  }

  /* Stepped corner borders (Art Deco) */
  .deco-panel::before,
  .deco-panel::after {
    content: ''; position: absolute;
    width: 24px; height: 24px;
    border-color: var(--gold); border-style: solid;
  }
  .deco-panel::before {
    top: 0; left: 0;
    border-width: 2px 0 0 2px;
  }
  .deco-panel::after {
    top: 0; right: 0;
    border-width: 2px 2px 0 0;
  }
  .deco-panel-bottom::before,
  .deco-panel-bottom::after {
    content: ''; position: absolute;
    width: 24px; height: 24px;
    border-color: var(--gold); border-style: solid;
  }
  .deco-panel-bottom::before {
    bottom: 0; left: 0;
    border-width: 0 0 2px 2px;
  }
  .deco-panel-bottom::after {
    bottom: 0; right: 0;
    border-width: 0 2px 2px 0;
  }

  /* Inner stepped border */
  .deco-inner-border {
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(197, 160, 89, 0.15);
    pointer-events: none;
  }

  /* Gold divider lines */
  .deco-divider {
    height: 1px; margin: 1.25rem 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.35;
  }

  /* Sunburst ornament */
  .deco-sunburst {
    display: flex; justify-content: center; gap: 3px;
    margin: 1rem 0;
  }
  .deco-ray {
    width: 1px; background: var(--gold); opacity: 0.3;
    transform-origin: bottom center;
  }
  .deco-ray:nth-child(1) { height: 12px; transform: rotate(-20deg); }
  .deco-ray:nth-child(2) { height: 16px; transform: rotate(-10deg); }
  .deco-ray:nth-child(3) { height: 20px; }
  .deco-ray:nth-child(4) { height: 16px; transform: rotate(10deg); }
  .deco-ray:nth-child(5) { height: 12px; transform: rotate(20deg); }

  .deco-poet {
    font-family: 'Poiret One', sans-serif;
    font-size: 12px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold);
    text-align: center; margin-bottom: 0.5rem;
    direction: ltr;
  }
  .deco-poet-ar {
    font-family: 'Amiri', serif;
    font-size: 14px; color: var(--muted);
    text-align: center; direction: rtl;
    margin-bottom: 1rem;
  }

  .deco-verses {
    font-family: 'Amiri', serif;
    font-size: clamp(1.25rem, 3.5vw, 1.625rem);
    line-height: 2.2;
    text-align: center;
    color: var(--fg);
    direction: rtl;
    margin-bottom: 1rem;
  }

  .deco-translation {
    font-family: 'Tajawal', sans-serif;
    font-size: 13px; color: var(--muted);
    text-align: center; direction: ltr;
    line-height: 1.6;
  }

  /* ===== CONTROLS ===== */
  /* Gold Deco Fan — opens from bottom center, each segment is an action */

  .deco-fan-trigger {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 55;
    width: 48px; height: 48px;
    background: transparent;
    border: 1px solid rgba(197, 160, 89, 0.4);
    color: var(--gold);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    /* Deco diamond shape */
    transform: translateX(-50%) rotate(45deg);
  }
  .deco-fan-trigger-icon {
    transform: rotate(-45deg);
    font-family: 'Poiret One', sans-serif;
    font-size: 18px; letter-spacing: 0.1em;
  }
  .deco-fan-trigger:hover,
  .deco-fan-trigger:active {
    border-color: var(--gold);
    background: rgba(197, 160, 89, 0.1);
  }

  .deco-fan-overlay {
    position: fixed; inset: 0; z-index: 58;
    background: rgba(26, 15, 10, 0.6);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .deco-fan-overlay.visible {
    opacity: 1; pointer-events: auto;
  }

  .deco-fan {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: flex;
    gap: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .deco-fan.open {
    opacity: 1; pointer-events: auto;
  }

  .fan-segment {
    width: 64px; height: 64px;
    background: rgba(26, 15, 10, 0.85);
    border: 1px solid rgba(197, 160, 89, 0.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    -webkit-tap-highlight-color: transparent;
    transform-origin: bottom center;
  }
  /* Fan spread positions */
  .fan-segment:nth-child(1) { transform: rotate(-24deg) translateY(-20px); transition-delay: 0s; }
  .fan-segment:nth-child(2) { transform: rotate(-8deg) translateY(-28px); transition-delay: 0.05s; }
  .fan-segment:nth-child(3) { transform: rotate(8deg) translateY(-28px); transition-delay: 0.1s; }
  .fan-segment:nth-child(4) { transform: rotate(24deg) translateY(-20px); transition-delay: 0.15s; }

  .deco-fan:not(.open) .fan-segment {
    transform: rotate(0deg) translateY(0);
    opacity: 0;
  }

  .fan-segment:hover,
  .fan-segment:active {
    background: rgba(197, 160, 89, 0.15);
    border-color: var(--gold);
  }

  .fan-segment-icon {
    color: var(--gold); display: flex;
    align-items: center; justify-content: center;
  }
  .fan-segment-label {
    font-family: 'Poiret One', sans-serif;
    font-size: 8px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold);
    opacity: 0.7;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .dune { transform: none !important; }
  }
  @media (max-width: 768px) {
    .deco-panel { padding: 2rem 1.5rem; }
    .fan-segment { width: 56px; height: 56px; }
  }
</style>
</head>
<body>

  <!-- Splash Screen -->
  <div class="splash" id="splash">
    <div class="stars" id="stars"></div>
    <div class="dune dune-4"></div>
    <div class="dune dune-3"></div>
    <div class="dune dune-2"></div>
    <div class="dune dune-1"></div>
    <div class="splash-brand">
      <span class="splash-brand-en">poetry</span>
      <span class="splash-brand-ar">بالعربي</span>
    </div>
    <p class="splash-subtitle">Desert Mirage</p>
    <button class="splash-enter" id="splashEnter">Enter</button>
  </div>

  <!-- Walkthrough (sequential tap-to-advance) -->
  <div class="walkthrough" id="walkthrough">
    <div class="walk-card" id="walkCard">
      <div class="walk-icon" id="walkIcon"></div>
      <h3 id="walkTitle"></h3>
      <div class="walk-ar" id="walkAr"></div>
      <p id="walkDesc"></p>
    </div>
    <div class="walk-progress" id="walkProgress"></div>
    <span class="walk-hint">Tap anywhere to continue</span>
  </div>

  <!-- ===== MAIN APP ===== -->
  <main class="app" id="app">
    <!-- Deco nav -->
    <header class="deco-nav">
      <span class="deco-nav-brand">Qafiyah</span>
    </header>

    <!-- Geometric panel framing the poem -->
    <div class="deco-frame">
      <div class="deco-panel">
        <div class="deco-panel-bottom"></div>
        <div class="deco-inner-border"></div>

        <div class="deco-sunburst">
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
        </div>

        <div class="deco-poet">Al-Mutanabbi</div>
        <div class="deco-poet-ar" lang="ar" dir="rtl">المتنبي</div>

        <div class="deco-divider"></div>

        <div class="deco-verses" lang="ar" dir="rtl">
          عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ<br>
          وَتَأْتِي عَلَى قَدْرِ الكِرَامِ المَكَارِمُ
        </div>

        <div class="deco-divider"></div>

        <div class="deco-translation">
          Great deeds come to those of great resolve,<br>
          and noble acts to those of noble character.
        </div>

        <div class="deco-sunburst">
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
          <div class="deco-ray"></div>
        </div>
      </div>
    </div>

    <!-- ===== CONTROLS ===== -->
    <!-- Diamond trigger -->
    <button class="deco-fan-trigger" id="fanTrigger" aria-label="Open actions">
      <span class="deco-fan-trigger-icon">+</span>
    </button>

    <!-- Overlay -->
    <div class="deco-fan-overlay" id="fanOverlay"></div>

    <!-- Gold fan segments -->
    <div class="deco-fan" id="decoFan">
      <div class="fan-segment" data-action="next">
        <div class="fan-segment-icon"><i data-lucide="arrow-right" style="width:16px;height:16px"></i></div>
        <div class="fan-segment-label">Next</div>
      </div>
      <div class="fan-segment" data-action="save">
        <div class="fan-segment-icon"><i data-lucide="heart" style="width:16px;height:16px"></i></div>
        <div class="fan-segment-label">Save</div>
      </div>
      <div class="fan-segment" data-action="listen">
        <div class="fan-segment-icon"><i data-lucide="headphones" style="width:16px;height:16px"></i></div>
        <div class="fan-segment-label">Listen</div>
      </div>
      <div class="fan-segment" data-action="share">
        <div class="fan-segment-icon"><i data-lucide="share-2" style="width:16px;height:16px"></i></div>
        <div class="fan-segment-label">Share</div>
      </div>
    </div>
  </main>

<script>
(function() {
  // Stars
  var starsEl = document.getElementById('stars');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = (Math.random() * 100).toFixed(1) + '%';
    s.style.top = (Math.random() * 48).toFixed(1) + '%';
    s.style.setProperty('--dur', (1.2 + Math.random() * 3.5).toFixed(2) + 's');
    s.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
    var sz = (1 + Math.random() * 2).toFixed(1);
    s.style.width = sz + 'px'; s.style.height = sz + 'px';
    starsEl.appendChild(s);
  }

  // Walkthrough steps (English primary, bilingual)
  var walkSteps = [
    { icon: 'compass', title: 'Discover 84,000+ Poems', ar: 'اكتشف القصائد', desc: 'Browse thousands of classical and modern Arabic poems from centuries of literary heritage.' },
    { icon: 'headphones', title: 'Listen to Recitation', ar: 'استمع للإيقاع', desc: 'Hear poems brought to life with natural AI voices capturing the melody of Arabic verse.' },
    { icon: 'sparkles', title: 'AI-Powered Insights', ar: 'رؤى ذكية', desc: 'Get deep analysis of meter, meaning, and historical context with intelligent annotations.' },
    { icon: 'heart', title: 'Save Your Favorites', ar: 'شارك الجمال', desc: 'Build your personal collection and share the beauty of Arabic poetry.' }
  ];
  var currentStep = 0;

  function renderStep() {
    var step = walkSteps[currentStep];
    var card = document.getElementById('walkCard');
    var iconEl = document.getElementById('walkIcon');
    var titleEl = document.getElementById('walkTitle');
    var arEl = document.getElementById('walkAr');
    var descEl = document.getElementById('walkDesc');
    var progress = document.getElementById('walkProgress');

    while (iconEl.firstChild) iconEl.removeChild(iconEl.firstChild);
    var ic = document.createElement('i');
    ic.setAttribute('data-lucide', step.icon);
    ic.style.width = '24px'; ic.style.height = '24px';
    iconEl.appendChild(ic);

    titleEl.textContent = step.title;
    arEl.textContent = step.ar;
    descEl.textContent = step.desc;

    while (progress.firstChild) progress.removeChild(progress.firstChild);
    for (var d = 0; d < walkSteps.length; d++) {
      var dot = document.createElement('div');
      dot.className = 'walk-dot' + (d === currentStep ? ' active' : '');
      progress.appendChild(dot);
    }

    card.classList.remove('visible');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { card.classList.add('visible'); });
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  // Splash enter
  document.getElementById('splashEnter').addEventListener('click', function() {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('walkthrough').classList.add('active');
    currentStep = 0;
    renderStep();
  });

  // Tap to advance
  document.getElementById('walkthrough').addEventListener('click', function() {
    currentStep++;
    if (currentStep >= walkSteps.length) {
      document.getElementById('walkthrough').style.display = 'none';
      document.getElementById('app').classList.add('active');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    } else {
      renderStep();
    }
  });

  /* ===== DECO FAN CONTROLS ===== */
  var fan = document.getElementById('decoFan');
  var fanOverlay = document.getElementById('fanOverlay');
  var fanTrigger = document.getElementById('fanTrigger');

  function openFan() {
    fan.classList.add('open');
    fanOverlay.classList.add('visible');
    fanTrigger.style.display = 'none';
  }
  function closeFan() {
    fan.classList.remove('open');
    fanOverlay.classList.remove('visible');
    fanTrigger.style.display = '';
  }

  fanTrigger.addEventListener('click', openFan);
  fanTrigger.addEventListener('touchstart', function(e) {
    e.preventDefault(); openFan();
  });
  fanOverlay.addEventListener('click', closeFan);

  /* Touch feedback on fan segments */
  document.querySelectorAll('.fan-segment').forEach(function(seg) {
    seg.addEventListener('touchstart', function() {
      seg.style.background = 'rgba(197, 160, 89, 0.2)';
      seg.style.borderColor = 'var(--gold)';
    }, { passive: true });
    seg.addEventListener('touchend', function() {
      setTimeout(function() {
        seg.style.background = '';
        seg.style.borderColor = '';
      }, 150);
    }, { passive: true });
  });

  // Init icons
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
  });
})();
</script>
</body>
</html>
